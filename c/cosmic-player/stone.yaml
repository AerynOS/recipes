name        : cosmic-player
version     : "1.1.0"
release     : 34
summary     : COSMIC media player
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-player
upstreams   :
    - https://github.com/pop-os/cosmic-player/archive/refs/tags/epoch-1.1.0.tar.gz : d3ccb0fcbd3ae82ba9efe1d9f0b9822d09f7a5f3abb94dd08199adf4a73d2881
description : |
    Cosmic Desktop Media Player
builddeps   :
    - binary(just)
    - pkgconfig(gstreamer-1.0)
    - pkgconfig(gstreamer-plugins-base-1.0)
    - pkgconfig(xkbcommon)
rundeps     :
    # Moss upgrade bug
    - gstreamer-plugins-good
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
