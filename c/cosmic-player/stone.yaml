name        : cosmic-player
version     : "1.0.16"
release     : 33
summary     : COSMIC media player
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-player
upstreams   :
    - https://github.com/pop-os/cosmic-player/archive/refs/tags/epoch-1.0.16.tar.gz : ceb96146a9c483c5b7f47a9398bb2dc620fbb5f5871b9eff04480496bf8a4be9
description : |
    Cosmic Desktop Media Player
builddeps   :
    - binary(just)
    - pkgconfig(gstreamer-1.0)
    - pkgconfig(gstreamer-plugins-base-1.0)
    - pkgconfig(xkbcommon)
rundeps     :
    # Moss upgrade bug
    - gstreamer-plugins-good
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
