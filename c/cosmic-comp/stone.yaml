name        : cosmic-comp
version     : "1.2.0"
release     : 51
summary     : Cosmic Desktop Compositor
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-comp
upstreams   :
    - https://github.com/pop-os/cosmic-comp/archive/refs/tags/epoch-1.2.0.tar.gz :  c5460c145043691cfd304de02bdbb63111d064d96c08cd8713f4258e8696f364
description : |
    Cosmic Desktop Compositor
builddeps   :
    - binary(just)
    - pkgconfig(gbm)
    - pkgconfig(libdisplay-info)
    - pkgconfig(libinput)
    - pkgconfig(libseat)
    - pkgconfig(libudev)
    - pkgconfig(pixman-1)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(Xwayland)
    - iso-codes
    - shared-mime-info
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %make_install prefix=%(prefix) TARGET=%(target_triple)/release
