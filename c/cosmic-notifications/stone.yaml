name        : cosmic-notifications
version     : "1.1.0"
release     : 43
summary     : Cosmic Desktop Notifications
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-notifications
upstreams   :
    - https://github.com/pop-os/cosmic-notifications/archive/refs/tags/epoch-1.1.0.tar.gz : 7d7d55b6b84600429739398a8719b627692692a529b01232bf5325bf2dfd537b
description : |
    Cosmic Desktop Notifications
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
