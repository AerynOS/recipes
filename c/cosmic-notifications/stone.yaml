name        : cosmic-notifications
version     : "1.3.0"
release     : 45
summary     : Cosmic Desktop Notifications
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-notifications
upstreams   :
    - https://github.com/pop-os/cosmic-notifications/archive/refs/tags/epoch-1.3.0.tar.gz : c9bd198e2ee0e444f54a521976f4209423799ea6120b798898ea9a5c132a6e5d
description : |
    Cosmic Desktop Notifications
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
