name        : cosmic-notifications
version     : "1.4.0"
release     : 46
summary     : Cosmic Desktop Notifications
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-notifications
upstreams   :
    - https://github.com/pop-os/cosmic-notifications/archive/refs/tags/epoch-1.4.0.tar.gz : 8431557ec6efe06507c10a214f99352d1a702bd438e53d79193ea288d7152b3a
description : |
    Cosmic Desktop Notifications
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
