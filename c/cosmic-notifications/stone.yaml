name        : cosmic-notifications
version     : "1.0.16"
release     : 42
summary     : Cosmic Desktop Notifications
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-notifications
upstreams   :
    - https://github.com/pop-os/cosmic-notifications/archive/refs/tags/epoch-1.0.16.tar.gz : cfd066099d35ed37205a8475c032d47a4c23ff85072ba7e8a591aaa7386cdb4d
description : |
    Cosmic Desktop Notifications
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
