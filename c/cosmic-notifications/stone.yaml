name        : cosmic-notifications
version     : "1.2.0"
release     : 44
summary     : Cosmic Desktop Notifications
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-notifications
upstreams   :
    - https://github.com/pop-os/cosmic-notifications/archive/refs/tags/epoch-1.2.0.tar.gz : c46df717a827412596f9c9075390d5e142d603546603b03ad783149dc6f77c61
description : |
    Cosmic Desktop Notifications
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
