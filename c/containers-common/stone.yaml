name        : containers-common
version     : "1"
release     : 2
homepage    : https://github.com/containers/container-libs
# No upstreams!
summary     : Common config files for various container tools
description : |
    Common config files for various container tools
license     : MPL-2.0
rundeps     :
    - netavark
install     : |
    %install_file %(pkgdir)/policy.json %(installroot)%(datadir)/containers/policy.json
    %install_file %(pkgdir)/registries.conf %(installroot)%(datadir)/containers/registries.conf
    %install_file %(pkgdir)/registries.yaml %(installroot)%(datadir)/containers/registries.d/default.yaml
