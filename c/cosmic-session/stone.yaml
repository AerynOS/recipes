name        : cosmic-session
version     : "1.0.16"
release     : 54
summary     : Cosmic Session Management
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-session
upstreams   :
    - https://github.com/pop-os/cosmic-session/archive/refs/tags/epoch-1.0.16.tar.gz : 841eb967cb697269f7047ea7838c37a111ea85c6e6214d97ed3e8d275f45250c
description : |
    Cosmic Session Management
builddeps   :
    - binary(just)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(awk)
    - binary(boltctl)
    - binary(cosmic-app-library)
    - binary(cosmic-bg)
    - binary(cosmic-comp)
    - binary(cosmic-files)
    - binary(cosmic-greeter)
    - binary(cosmic-idle)
    - binary(cosmic-notifications)
    - binary(cosmic-osd)
    - binary(cosmic-panel)
    - binary(cosmic-randr)
    - binary(cosmic-settings)
    - binary(cosmic-settings-daemon)
    - binary(cosmic-workspaces)
    - binary(gnome-keyring)
    - binary(switcherooctl)
    - binary(update-desktop-database)
    - binary(update-mime-database)
    - binary(upower)
    - binary(xdg-user-dirs-gtk-update)
    - accountsservice
    - font-noto
    - font-opensans
    - pciutils
    - wireplumber
    - xdg-desktop-portal-cosmic
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install

    %install_file data/dconf/profile/cosmic %(installroot)%(datadir)/dconf/profile/cosmic
