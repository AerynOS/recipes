name        : cosmic-files
version     : "1.3.0"
release     : 51
homepage    : https://github.com/pop-os/cosmic-files
upstreams   :
    - https://github.com/pop-os/cosmic-files/archive/refs/tags/epoch-1.3.0.tar.gz :  afa8eeff84b50fb88bfe0fb7c64c98e3562878a5203b3316e78b103b10e8c084
summary     : Cosmic Desktop File Browser
description : |
    Cosmic desktop File Browser
license     :
    - GPL-3.0
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(bzip2)
    - pkgconfig(glib-2.0)
    - pkgconfig(liblzma)
    - pkgconfig(libzstd)
    - pkgconfig(xkbcommon)
rundeps     :
    # Used for file services
    - gvfs-fuse
    - gvfs-nfs
    - gvfs-smb
networking  : true
environment : |
    # Force system libs
    export ZSTD_SYS_USE_PKG_CONFIG=1
setup       : |
    %cargo_fetch
build       : |
    %cargo_build -p cosmic-files
    %cargo_build -p cosmic-files-applet
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
