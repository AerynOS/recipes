name        : cosmic-files
version     : "1.0.16"
release     : 48
homepage    : https://github.com/pop-os/cosmic-files
upstreams   :
    - https://github.com/pop-os/cosmic-files/archive/refs/tags/epoch-1.0.16.tar.gz :  bf7919e64524ed8fe4b3c1a64e2903cc5fdbc86853354a107174df6af26c2775
summary     : Cosmic Desktop File Browser
description : |
    Cosmic desktop File Browser
license     :
    - GPL-3.0
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(bzip2)
    - pkgconfig(glib-2.0)
    - pkgconfig(liblzma)
    - pkgconfig(libzstd)
    - pkgconfig(xkbcommon)
rundeps     :
    # Used for file services
    - gvfs-fuse
    - gvfs-nfs
    - gvfs-smb
networking  : true
environment : |
    # Force system libs
    export ZSTD_SYS_USE_PKG_CONFIG=1
setup       : |
    %cargo_fetch
build       : |
    %cargo_build -p cosmic-files
    %cargo_build -p cosmic-files-applet
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
