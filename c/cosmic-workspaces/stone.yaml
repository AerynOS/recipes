name        : cosmic-workspaces
version     : "1.0.9"
release     : 34
homepage    : https://github.com/pop-os/cosmic-workspaces-epoch
upstreams   :
    - git|https://github.com/pop-os/cosmic-workspaces-epoch.git : 828534ad9cdd23c80b383893829609616b85048b
summary     : Cosmic Desktop Workspaces
description : |
    Cosmic Desktop Workspaces
license     : GPL-3.0
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(dbus-1)
    - pkgconfig(gbm)
    - pkgconfig(libinput)
