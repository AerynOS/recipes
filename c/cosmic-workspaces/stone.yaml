name        : cosmic-workspaces
version     : "1.2.0"
release     : 43
homepage    : https://github.com/pop-os/cosmic-workspaces-epoch
upstreams   :
    - https://github.com/pop-os/cosmic-workspaces-epoch/archive/refs/tags/epoch-1.2.0.tar.gz : d0f51a1b3f24020e065d255f33d1bb8e36ecaa8d307e551a4d4a18716a84e3d1
summary     : Cosmic Desktop Workspaces
description : |
    Cosmic Desktop Workspaces
license     : GPL-3.0
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(dbus-1)
    - pkgconfig(gbm)
    - pkgconfig(libinput)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %make_install prefix=%(prefix) TARGET=%(target_triple)/release
