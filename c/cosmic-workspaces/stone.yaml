name        : cosmic-workspaces
version     : "1.0.10"
release     : 35
homepage    : https://github.com/pop-os/cosmic-workspaces-epoch
upstreams   :
    - git|https://github.com/pop-os/cosmic-workspaces-epoch.git : 4e9c902ee29a9621b3c37257c6c8102b79dd65de
summary     : Cosmic Desktop Workspaces
description : |
    Cosmic Desktop Workspaces
license     : GPL-3.0
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(dbus-1)
    - pkgconfig(gbm)
    - pkgconfig(libinput)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %make_install prefix=%(prefix) TARGET=%(target_triple)/release
