name        : cosmic-workspaces
version     : "1.0.13"
release     : 38
homepage    : https://github.com/pop-os/cosmic-workspaces-epoch
upstreams   :
    - git|https://github.com/pop-os/cosmic-workspaces-epoch : cd729d045bd24ee6f08f1812087400d6a1883634
