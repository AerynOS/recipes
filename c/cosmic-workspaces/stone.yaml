name        : cosmic-workspaces
version     : "1.1.0"
release     : 42
homepage    : https://github.com/pop-os/cosmic-workspaces-epoch
upstreams   :
    - https://github.com/pop-os/cosmic-workspaces-epoch/archive/refs/tags/epoch-1.1.0.tar.gz : 58d991c53692cdee6fd60e120021da4bf95f53bd52e04834e094c3fde3ff462f
summary     : Cosmic Desktop Workspaces
description : |
    Cosmic Desktop Workspaces
license     : GPL-3.0
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(dbus-1)
    - pkgconfig(gbm)
    - pkgconfig(libinput)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %make_install prefix=%(prefix) TARGET=%(target_triple)/release
