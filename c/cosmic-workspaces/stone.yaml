name        : cosmic-workspaces
version     : "1.4.0"
release     : 45
homepage    : https://github.com/pop-os/cosmic-workspaces-epoch
upstreams   :
    - https://github.com/pop-os/cosmic-workspaces-epoch/archive/refs/tags/epoch-1.4.0.tar.gz : 80a87a436591c042475f808d7998d83d2d961d827802e286e50be5c2443b7f7d
