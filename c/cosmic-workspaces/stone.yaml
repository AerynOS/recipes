name        : cosmic-workspaces
version     : "1.0.16"
release     : 41
homepage    : https://github.com/pop-os/cosmic-workspaces-epoch
upstreams   :
    - https://github.com/pop-os/cosmic-workspaces-epoch/archive/refs/tags/epoch-1.0.16.tar.gz : aa974853ecd5e587f884f40c36c297412c6e4a2b46224284991edd9c49f5e7df
