name        : cosmic-applibrary
version     : "1.4.0"
release     : 47
summary     : Cosmic Desktop App Launcher
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-applibrary
upstreams   :
    - https://github.com/pop-os/cosmic-applibrary/archive/refs/tags/epoch-1.4.0.tar.gz : 5e5ea604948d17b7e1713d801780c3ae0399d04cac463916630b1ad3580ab181
description : |
    Cosmic Desktop App Launcher
builddeps   :
    - binary(just)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
