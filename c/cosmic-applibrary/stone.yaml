name        : cosmic-applibrary
version     : "1.2.0"
release     : 45
summary     : Cosmic Desktop App Launcher
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-applibrary
upstreams   :
    - https://github.com/pop-os/cosmic-applibrary/archive/refs/tags/epoch-1.2.0.tar.gz : 6fb131dff104c2806e76e71f90364cfeea61147a4abbcd9e1c34c26bebb96ed0
description : |
    Cosmic Desktop App Launcher
builddeps   :
    - binary(just)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
