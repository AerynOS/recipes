name        : cosmic-applibrary
version     : "1.3.0"
release     : 46
summary     : Cosmic Desktop App Launcher
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-applibrary
upstreams   :
    - https://github.com/pop-os/cosmic-applibrary/archive/refs/tags/epoch-1.3.0.tar.gz : 242699ea80d67718a4cd13862897c33a46d7c4532986ab577e06b260f8d7b14c
description : |
    Cosmic Desktop App Launcher
builddeps   :
    - binary(just)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
