name        : cosmic-applibrary
version     : "1.0.16"
release     : 43
summary     : Cosmic Desktop App Launcher
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-applibrary
upstreams   :
    - https://github.com/pop-os/cosmic-applibrary/archive/refs/tags/epoch-1.0.16.tar.gz : f854824cf91a1d20b8d85b6d3297226548c7c630b2f498bc309df320b25bfa5d
description : |
    Cosmic Desktop App Launcher
builddeps   :
    - binary(just)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
