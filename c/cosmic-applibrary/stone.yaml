name        : cosmic-applibrary
version     : "1.1.0"
release     : 44
summary     : Cosmic Desktop App Launcher
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-applibrary
upstreams   :
    - https://github.com/pop-os/cosmic-applibrary/archive/refs/tags/epoch-1.1.0.tar.gz : 6080d58ef3e25ffa4537944b9108fdfd3e099d907380fb90c18cd31b97639bad
description : |
    Cosmic Desktop App Launcher
builddeps   :
    - binary(just)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
