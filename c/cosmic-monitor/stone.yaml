name        : cosmic-monitor
version     : "1.2.0"
release     : 2
summary     : Cosmic System Monitor 
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-monitor
upstreams   :
    - https://github.com/pop-os/cosmic-monitor/archive/refs/tags/epoch-1.2.0.tar.gz : 8dca207ef71a91652412da5273b431b8ffd6c092e3860d7dd09e4056e407a03f
description : |
    Cosmic System Monitor
builddeps   :
    - binary(just)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
