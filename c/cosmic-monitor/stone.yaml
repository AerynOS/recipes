name        : cosmic-monitor
version     : "1.1.0"
release     : 1
summary     : Cosmic System Monitor 
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-monitor
upstreams   :
    - https://github.com/pop-os/cosmic-monitor/archive/refs/tags/epoch-1.1.0.tar.gz : d56f46b679e79b19b87f753f683f29967e6c00f7b5a043e6bd5ca5c61658835d
description : |
    Cosmic System Monitor
builddeps   :
    - binary(just)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
