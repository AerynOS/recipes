name        : cosmic-randr
version     : "1.1.0"
release     : 40
summary     : Cosmic Desktop display configuration
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-randr
upstreams   :
    - https://github.com/pop-os/cosmic-randr/archive/refs/tags/epoch-1.1.0.tar.gz : 5a95f60da4e89efb2c2ec8b35bd23bf35b2ef39e71e769cc73493f57ec2eb264
description : |
    Cosmic Desktop display configuration
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
