name        : cosmic-randr
version     : "1.0.16"
release     : 39
summary     : Cosmic Desktop display configuration
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-randr
upstreams   :
    - https://github.com/pop-os/cosmic-randr/archive/refs/tags/epoch-1.0.16.tar.gz : 1b748ffd2e4dccf01ad947dfdd63d09d420ec7a922000aac3c39418dee9fb5f5
description : |
    Cosmic Desktop display configuration
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
