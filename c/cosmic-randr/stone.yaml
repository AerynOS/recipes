name        : cosmic-randr
version     : "1.2.0"
release     : 41
summary     : Cosmic Desktop display configuration
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-randr
upstreams   :
    - https://github.com/pop-os/cosmic-randr/archive/refs/tags/epoch-1.2.0.tar.gz : 1d8f75a4a3aa386ed44f5051eaa852b8742e745981e98ff4e903ed0384b1c617
description : |
    Cosmic Desktop display configuration
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
