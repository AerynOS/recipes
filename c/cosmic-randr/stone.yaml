name        : cosmic-randr
version     : "1.3.0"
release     : 42
summary     : Cosmic Desktop display configuration
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-randr
upstreams   :
    - https://github.com/pop-os/cosmic-randr/archive/refs/tags/epoch-1.3.0.tar.gz : df4a0827325f45323f3646048e3528b6b7a05f12d3fc77353fa88cfb86118fdd
description : |
    Cosmic Desktop display configuration
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
