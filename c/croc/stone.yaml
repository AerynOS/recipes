name        : croc
version     : "10.4.13"
release     : 2
homepage    : https://github.com/schollz/croc
upstreams   :
    - https://github.com/schollz/croc/archive/refs/tags/v10.4.13.tar.gz : 6c65f5c60d2cc3e189edcdeb791e83f7ee6cf398c5c4437273320d0221d0fff8
summary     : Securely transfer files and folders between any two computers
description : |
    croc is a tool that allows any two computers to simply and securely
    transfer files and folders. It provides end-to-end encryption using PAKE,
    supports cross-platform transfers, multiple files, resuming interrupted
    transfers, and can relay through a proxy without requiring port forwarding
    or a local server.
license     : MIT
networking  : true
setup       : |
    %go_mod
build       : |
    CGO_ENABLED=0 go build -v \
        -ldflags "-s -w -X github.com/schollz/croc/v10/src/cli.Version=v%(version)"

    ./croc generate-fish-completion > croc.fish
install     : |
    %install_bin croc
    %install_file LICENSE -t %(installroot)%(datadir)/licenses/%(name)/

    %install_file src/install/bash_autocomplete %(installroot)%(bashcompletionsdir)/croc
    %install_file src/install/zsh_autocomplete %(installroot)%(zshcompletionsdir)/_croc
    %install_file croc.fish %(installroot)%(fishcompletionsdir)/croc.fish
    %install_file croc.service -t %(installroot)%(libdir)/systemd/system/
check       : |
    go test -skip TestRemoteLookupIPTimeout ./...
