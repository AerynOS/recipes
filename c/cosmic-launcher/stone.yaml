name        : cosmic-launcher
version     : "1.0.16"
release     : 43
summary     : Cosmic Desktop Launcher
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-launcher
upstreams   :
    - https://github.com/pop-os/cosmic-launcher/archive/refs/tags/epoch-1.0.16.tar.gz : 82cc3b81f9da86e264b0f7e65320cc3e06e0ad654777de4eaba9b0c898333638
description : |
    Cosmic Desktop Launcher
builddeps   :
    - binary(just)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(pop-launcher)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
