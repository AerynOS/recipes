name        : cosmic-launcher
version     : "1.4.0"
release     : 47
summary     : Cosmic Desktop Launcher
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-launcher
upstreams   :
    - https://github.com/pop-os/cosmic-launcher/archive/refs/tags/epoch-1.4.0.tar.gz : 1424147a40c10d1dc9ded3c99a48d7d075c6cc0f9fbf209b2c15ce4889672380
description : |
    Cosmic Desktop Launcher
builddeps   :
    - binary(just)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(pop-launcher)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
