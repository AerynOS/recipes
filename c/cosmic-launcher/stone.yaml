name        : cosmic-launcher
version     : "1.2.0"
release     : 45
summary     : Cosmic Desktop Launcher
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-launcher
upstreams   :
    - https://github.com/pop-os/cosmic-launcher/archive/refs/tags/epoch-1.2.0.tar.gz : c3168ca353f89292499c0a8aa8f0a572f4ddbe749fa1830202f8d47dee741122
description : |
    Cosmic Desktop Launcher
builddeps   :
    - binary(just)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(pop-launcher)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
