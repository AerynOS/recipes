name        : cosmic-launcher
version     : "1.3.0"
release     : 46
summary     : Cosmic Desktop Launcher
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-launcher
upstreams   :
    - https://github.com/pop-os/cosmic-launcher/archive/refs/tags/epoch-1.3.0.tar.gz : d603f9c0fab552881cdd70673ed6134bc6d1e0086d413a703efcd9e926b7947e
description : |
    Cosmic Desktop Launcher
builddeps   :
    - binary(just)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(pop-launcher)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
