name        : cosmic-launcher
version     : "1.1.0"
release     : 44
summary     : Cosmic Desktop Launcher
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-launcher
upstreams   :
    - https://github.com/pop-os/cosmic-launcher/archive/refs/tags/epoch-1.1.0.tar.gz : 9c4020954af90752d39314c7752ea3c0d179e5860be3900cccff69515bec0617
description : |
    Cosmic Desktop Launcher
builddeps   :
    - binary(just)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(pop-launcher)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
