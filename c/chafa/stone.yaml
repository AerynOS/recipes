name        : chafa
version     : "1.18.2"
release     : 4
homepage    : https://github.com/hpjansson/chafa
upstreams   :
    - https://github.com/hpjansson/chafa/releases/download/1.18.2/chafa-1.18.2.tar.xz : 0b8d9ba9f347e8b6c0c71878217c9b0e478b4a42aa4babea0bf20840567239c2
summary     : Converts image data into graphics formats or ANSI/Unicode character art suitable for display in a terminal.
description : |
    Converts image data into graphics formats or ANSI/Unicode character art suitable for display in a terminal.
license     :
    - LGPL-3.0
    - GPL-3.0
builddeps   :
    - binary(xsltproc)
    - pkgconfig(freetype2)
    - pkgconfig(glib-2.0)
    - pkgconfig(libavif)
    - pkgconfig(libheif)
    - pkgconfig(libjpeg)
    - pkgconfig(libjxl)
    - pkgconfig(librsvg-2.0)
    - pkgconfig(libtiff-4)
    - pkgconfig(libwebp)
    - docbook
    - docbook-xsl
    # TODO: Patch to fix man page generation
environment : |
    %export_docbook_catalogs
setup       : |
    %configure \
        --disable-static
build       : |
    %make
install     : |
    %make_install
packages    :
    - "%(name)-libs":
        paths:
            - /usr/lib/lib*.so.*

    - "%(name)-devel":
        paths:
            - /usr/lib/chafa/include/chafaconfig.h
