name        : crun
version     : "1.27.1"
release     : 3
homepage    : https://github.com/containers/crun
upstreams   :
    - https://github.com/containers/crun/releases/download/1.27.1/crun-1.27.1.tar.zst : a1b9829c1de814719df65e2ba3922eb56249c5939a50be769f91e948193cac55
summary     : A fast and low-memory footprint OCI Container Runtime fully written in C
description : |
    A fast and lightweight fully featured OCI runtime and C library for running containers
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
builddeps   :
    - binary(go-md2man)
    - binary(gperf)
    - binary(python3)
    - pkgconfig(libcap)
    - pkgconfig(libseccomp)
    # - pkgconfig(python3)
    - pkgconfig(systemd)
    - pkgconfig(yajl)
    # criu
setup       : |
    # What even uses the python bindings? They shouldn't be re-enabled until there's a note here what they're for
    %configure \
        --disable-static \
        --enable-shared \
        --without-python-bindings
build       : |
    %make
install     : |
    %make_install
