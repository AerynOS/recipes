name        : carapace
version     : "1.6.3"
release     : 1
homepage    : https://github.com/carapace-sh/carapace
upstreams   :
  - https://github.com/carapace-sh/carapace-bin/archive/refs/tags/v1.6.3.tar.gz : 226907d1df5a0ceabbf4ec511019cb46e4649f42642a1d1d9618a9768efb56ed
summary     : A multi-shell completion library
description : |
  Carapace-bin provides argument completion for multiple CLI commands, works across multiple POSIX and non-POSIX shells
license     :
  - Apache-2.0
networking  : true
builddeps   :
  - binary(go)
build       : |
  go generate ./cmd/...
  go build -v -ldflags="-X main.version=v%(version)" ./cmd/carapace
install     : |
  %install_bin carapace

  %install_dir %(installroot)%(datadir)/licenses/%(name)
  %install_file LICENSE %(installroot)%(datadir)/licenses/%(name)/LICENSE
