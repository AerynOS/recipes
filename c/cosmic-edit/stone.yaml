name        : cosmic-edit
version     : "1.0.16"
release     : 46
homepage    : https://github.com/pop-os/cosmic-edit
upstreams   :
    - https://github.com/pop-os/cosmic-edit/archive/refs/tags/epoch-1.0.16.tar.gz :  5d2338ec8b8376137eb7592798fd859d03a838e30b05c06225f3f3f28051552a
summary     : Cosmic Desktop Text Editor
description : |
    Cosmic desktop Text Editor
license     :
    - GPL-3.0
builddeps   :
    - binary(just)
    - pkgconfig(glib-2.0)
    - pkgconfig(xkbcommon)
rundeps     :
    - gvfs # Used for file services
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
