name        : cosmic-edit
version     : "1.1.0"
release     : 47
homepage    : https://github.com/pop-os/cosmic-edit
upstreams   :
    - https://github.com/pop-os/cosmic-edit/archive/refs/tags/epoch-1.1.0.tar.gz :  8a254c3fc067f472f6b8f25880c8823b905b777647c136224f1da42e38464746
summary     : Cosmic Desktop Text Editor
description : |
    Cosmic desktop Text Editor
license     :
    - GPL-3.0
builddeps   :
    - binary(just)
    - pkgconfig(glib-2.0)
    - pkgconfig(xkbcommon)
rundeps     :
    - gvfs # Used for file services
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
