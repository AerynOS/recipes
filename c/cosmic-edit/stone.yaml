name        : cosmic-edit
version     : "1.2.0"
release     : 48
homepage    : https://github.com/pop-os/cosmic-edit
upstreams   :
    - https://github.com/pop-os/cosmic-edit/archive/refs/tags/epoch-1.2.0.tar.gz :  f060b5c3a870680051e55351cf0f217164be1e578213f7d26172cfd587276505
summary     : Cosmic Desktop Text Editor
description : |
    Cosmic desktop Text Editor
license     :
    - GPL-3.0
builddeps   :
    - binary(just)
    - pkgconfig(glib-2.0)
    - pkgconfig(xkbcommon)
rundeps     :
    - gvfs # Used for file services
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
