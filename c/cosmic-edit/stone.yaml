name        : cosmic-edit
version     : "1.3.0"
release     : 49
homepage    : https://github.com/pop-os/cosmic-edit
upstreams   :
    - https://github.com/pop-os/cosmic-edit/archive/refs/tags/epoch-1.3.0.tar.gz :  63e3c11bfcd18187a8eae78225ef3f0f69cef44eb4fa9c825b4c72721ae8ba3e
summary     : Cosmic Desktop Text Editor
description : |
    Cosmic desktop Text Editor
license     :
    - GPL-3.0
builddeps   :
    - binary(just)
    - pkgconfig(glib-2.0)
    - pkgconfig(xkbcommon)
rundeps     :
    - gvfs # Used for file services
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
