name        : cosmic-panel
version     : "1.2.0"
release     : 45
summary     : Cosmic Desktop Panel
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-panel
upstreams   :
    - https://github.com/pop-os/cosmic-panel/archive/refs/tags/epoch-1.2.0.tar.gz : 7380b05fc58b4384871a3878d91ec46f4b3a0537aa28212b4811a6463597efc1
description : |
    Cosmic Desktop panel
builddeps   :
    - binary(just)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(cosmic-applets)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    RUST_BACKTRACE=1 %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
