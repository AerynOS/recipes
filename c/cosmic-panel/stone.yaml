name        : cosmic-panel
version     : "1.3.0"
release     : 46
summary     : Cosmic Desktop Panel
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-panel
upstreams   :
    - https://github.com/pop-os/cosmic-panel/archive/refs/tags/epoch-1.3.0.tar.gz : b0fa3a2d0e7f4d5c2629d3a681b15cde58e07ce9ef1d68b62b1063d08f7ba86c
description : |
    Cosmic Desktop panel
builddeps   :
    - binary(just)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(cosmic-applets)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    RUST_BACKTRACE=1 %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
