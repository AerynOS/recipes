name        : cosmic-panel
version     : "1.1.0"
release     : 44
summary     : Cosmic Desktop Panel
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-panel
upstreams   :
    - https://github.com/pop-os/cosmic-panel/archive/refs/tags/epoch-1.1.0.tar.gz : e51a4aa1474a2505ca3e8ed80578428a7e24afd8e643e523ce100e7a0c2e2364
description : |
    Cosmic Desktop panel
builddeps   :
    - binary(just)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(cosmic-applets)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    RUST_BACKTRACE=1 %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
