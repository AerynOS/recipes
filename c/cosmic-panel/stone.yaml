name        : cosmic-panel
version     : "1.0.16"
release     : 43
summary     : Cosmic Desktop Panel
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-panel
upstreams   :
    - https://github.com/pop-os/cosmic-panel/archive/refs/tags/epoch-1.0.16.tar.gz : f71b3bfdb614e750879eecc59939892fcf90337d121b6ab904d9f9fd6235a969
description : |
    Cosmic Desktop panel
builddeps   :
    - binary(just)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(cosmic-applets)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    RUST_BACKTRACE=1 %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
