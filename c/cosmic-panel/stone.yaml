name        : cosmic-panel
version     : "1.4.0"
release     : 47
summary     : Cosmic Desktop Panel
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-panel
upstreams   :
    - https://github.com/pop-os/cosmic-panel/archive/refs/tags/epoch-1.4.0.tar.gz : c41d843f5e57b530ed74078f665fea6452e343a3c1bfe9cf637bcb029e4f5709
description : |
    Cosmic Desktop panel
builddeps   :
    - binary(just)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(cosmic-applets)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    RUST_BACKTRACE=1 %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
