name        : cosmic-greeter
version     : "1.3.0"
release     : 55
summary     : Cosmic Desktop Greeter
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-greeter
upstreams   :
    - https://github.com/pop-os/cosmic-greeter/archive/refs/tags/epoch-1.3.0.tar.gz : ec9921d3c2089df604d3851161d4ffb30c7630120801b86747d562d4e031cf09
description : |
    Cosmic Desktop Greeter
builddeps   :
    - binary(just)
    - pkgconfig(dbus-1)
    - pkgconfig(libinput)
    - pkgconfig(libseat)
    - pkgconfig(libudev)
    - pkgconfig(pam)
    - pkgconfig(xkbcommon)
    - clang-devel
    # Override fallback wallpaper
    - os-artwork
rundeps     :
    - binary(greetd)
    - cosmic-wallpapers
    # Temporary workaround until we have some kind of virtual package that defines the base system
    - linux-pam
networking  : true
setup       : |
    # Override fallback background
    cp /usr/share/backgrounds/aerynos/DreamyBrno.jpg res/background.jpg

    %cargo_fetch
    %patch %(pkgdir)/0001-debian-Port-sample-service-pam-to-Serpent-OS.patch
    # For building from tarballs revert https://github.com/pop-os/cosmic-greeter/pull/203
    %patch %(pkgdir)/0001-no-git-hash.patch
build       : |
    %cargo_build --all
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install

    # userdb pls
    rm -rfv %(installroot)%(libdir)/sysusers.d
    %install_file %(pkgdir)/cosmic-greeter.group %(installroot)%(libdir)/userdb/cosmic-greeter.group
    ln -s cosmic-greeter.group %(installroot)%(libdir)/userdb/23.group
    %install_file %(pkgdir)/cosmic-greeter.user %(installroot)%(libdir)/userdb/cosmic-greeter.user
    ln -s cosmic-greeter.user %(installroot)%(libdir)/userdb/23.user

    # systemd bits
    %install_file %(pkgdir)/cosmic-greeter-daemon.service %(installroot)%(libdir)/systemd/system/cosmic-greeter-daemon.service
    %install_file %(pkgdir)/cosmic-greeter.service %(installroot)%(libdir)/systemd/system/cosmic-greeter.service
    %install_file %(pkgdir)/cosmic-greeter.toml %(installroot)%(datadir)/greetd/cosmic-greeter.toml

    # pam bits
    %install_file debian/cosmic-greeter.pam %(installroot)%(vendordir)/pam.d/cosmic-greeter
