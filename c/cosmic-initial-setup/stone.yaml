name        : cosmic-initial-setup
version     : "1.0.16"
release     : 27
summary     : Cosmic Initial Setup
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-initial-setup
upstreams   :
    - https://github.com/pop-os/cosmic-initial-setup/archive/refs/tags/epoch-1.0.16.tar.gz : f7d0192cc311db1ce9f8221d340dc1ad3a29d201c66d68a93387284d5526339c
description : |
    Cosmic Desktop Intial Setup Application
builddeps   :
    - binary(git-lfs)
    - binary(just)
    - pkgconfig(flatpak)
    - pkgconfig(libinput)
    - pkgconfig(libudev)
    - pkgconfig(openssl)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %patch %(pkgdir)/0001-Allow-xdg-directory-to-be-overridden.patch

    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" \
    XDG_INSTALL_DIR="%(datadir)/xdg" \
        just rootdir=%(installroot) install
