name        : cosmic-initial-setup
version     : "1.2.0"
release     : 29
summary     : Cosmic Initial Setup
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-initial-setup
upstreams   :
    - https://github.com/pop-os/cosmic-initial-setup/archive/refs/tags/epoch-1.2.0.tar.gz : 20b2b4b3730f9cb26bc240416b97910c93212cc929d3101f35647654176cd06f
description : |
    Cosmic Desktop Intial Setup Application
builddeps   :
    - binary(git-lfs)
    - binary(just)
    - pkgconfig(flatpak)
    - pkgconfig(libinput)
    - pkgconfig(libudev)
    - pkgconfig(openssl)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %patch %(pkgdir)/0001-Allow-xdg-directory-to-be-overridden.patch

    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" \
    XDG_INSTALL_DIR="%(datadir)/xdg" \
        just rootdir=%(installroot) install
