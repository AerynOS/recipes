name        : cairomm
version     : "1.18.1"
release     : 5
homepage    : https://www.cairographics.org/cairomm/
upstreams   :
    - https://gitlab.freedesktop.org/cairo/cairomm/-/archive/1.18.1/cairomm-1.18.1.tar.gz : 5515952f586c1d7ed745ccd4cce09766e152b66d551a61b57c5d6d5af323154e
summary     : C++ interface to cairo (1.16 ABI)
description : |
    This library provides a C++ interface to cairo (1.16 ABI)
license     : LGPL-2.1-or-later
builddeps   :
    - binary(doxygen)
    - binary(mm-common-get)
    - binary(perl)
    - binary(python3)
    - binary(xsltproc)
    - cmake(Boost)
    - pkgconfig(cairo)
    - pkgconfig(fontconfig)
    - pkgconfig(mm-common-libstdc++)
    - pkgconfig(sigc++-3.0)
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
