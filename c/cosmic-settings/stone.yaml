name        : cosmic-settings
version     : "1.3.0"
release     : 53
summary     : Cosmic Desktop Settings
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-settings
upstreams   :
    - https://github.com/pop-os/cosmic-settings/archive/refs/tags/epoch-1.3.0.tar.gz : faf8b882445dd99f3161238fa118083e27a83644b8ba7c19472d7e0f088e32d8
description : |
    Cosmic Desktop Settings
builddeps   :
    - binary(just)
    - pkgconfig(dav1d)
    - pkgconfig(libinput)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(nm-connection-editor)
    - binary(pipewire-pulse)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
