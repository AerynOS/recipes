name        : cosmic-settings
version     : "1.4.0"
release     : 54
summary     : Cosmic Desktop Settings
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-settings
upstreams   :
    - https://github.com/pop-os/cosmic-settings/archive/refs/tags/epoch-1.4.0.tar.gz : 2b31755a67834f029389504cd92b495bdf7e8f55cbfaf7a67cc7d55a9831f671
description : |
    Cosmic Desktop Settings
builddeps   :
    - binary(just)
    - pkgconfig(dav1d)
    - pkgconfig(libinput)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(nm-connection-editor)
    - binary(pipewire-pulse)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
