name        : cosmic-settings-daemon
version     : "1.0.16"
release     : 44
summary     : Cosmic Settings Daemon
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-settings-daemon
upstreams   :
    - https://github.com/pop-os/cosmic-settings-daemon/archive/refs/tags/epoch-1.0.16.tar.gz : 36b06d47402777e56477f27d124c5bcbb6f54348edd232f80ab156a5fbf38047
description : |
    Cosmic Settings Daemon
builddeps   :
    - binary(just)
    - binary(mold)
    - pkgconfig(libgeoclue-2.0)
    - pkgconfig(libinput)
    - pkgconfig(libpulse)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
rundeps     :
    - geoclue
    - pop-os-sound-theme
    - power-profiles-daemon
networking  : true
environment :
    export GEOCLUE_AGENT=$(realpath %(libdir)/geoclue/geoclue-2.0/demos/agent)
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %make_install prefix=%(prefix) TARGET=%(target_triple)/release
