name        : cosmic-settings-daemon
version     : "1.4.0"
release     : 48
summary     : Cosmic Settings Daemon
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-settings-daemon
upstreams   :
    - https://github.com/pop-os/cosmic-settings-daemon/archive/refs/tags/epoch-1.4.0.tar.gz : 83057e054570d26e8106b2069f9bbef9c20cb0f6ead18e259a66465f13c3b2df
description : |
    Cosmic Settings Daemon
builddeps   :
    - binary(just)
    - binary(mold)
    - pkgconfig(libgeoclue-2.0)
    - pkgconfig(libinput)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(libpulse)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
rundeps     :
    - geoclue
    - pop-os-sound-theme
    - power-profiles-daemon
networking  : true
environment :
    export GEOCLUE_AGENT=$(realpath %(libdir)/geoclue/geoclue-2.0/demos/agent)
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %make_install prefix=%(prefix) TARGET=%(target_triple)/release
