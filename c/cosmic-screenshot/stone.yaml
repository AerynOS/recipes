name        : cosmic-screenshot
version     : "1.4.0"
release     : 45
summary     : Cosmic Screenshot Tool
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-screenshot
upstreams   :
    - https://github.com/pop-os/cosmic-screenshot/archive/refs/tags/epoch-1.4.0.tar.gz : 8c40cb968289ed2535789aec70b429da1ad79776a62e5a3168fc4de1a6f11b4f
description : |
    Cosmic Screenshot Tool
builddeps   :
    - binary(just)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
