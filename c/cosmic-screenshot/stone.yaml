name        : cosmic-screenshot
version     : "1.1.0"
release     : 42
summary     : Cosmic Screenshot Tool
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-screenshot
upstreams   :
    - https://github.com/pop-os/cosmic-screenshot/archive/refs/tags/epoch-1.1.0.tar.gz : 782961fcdd9b24450efbe9c56800265e39ede36f9fea3fd834b2f59dc7cc334a
description : |
    Cosmic Screenshot Tool
builddeps   :
    - binary(just)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
