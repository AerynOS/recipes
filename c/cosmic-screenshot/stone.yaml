name        : cosmic-screenshot
version     : "1.0.9.git+20a0371"
release     : 34
summary     : Cosmic Screenshot Tool
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-screenshot
upstreams   :
    - git|https://github.com/pop-os/cosmic-screenshot.git : 20a03711ab4bd65a9d98c07b2da10c39075c3c52
description : |
    Cosmic Screenshot Tool
builddeps   :
    - binary(just)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
