name        : cosmic-screenshot
version     : "1.0.15.git+2020fb2"
release     : 40
summary     : Cosmic Screenshot Tool
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-screenshot
upstreams   :
    - git|https://github.com/pop-os/cosmic-screenshot.git : 2020fb21accb65e94fe0b3f8270e5e3359cafabe
description : |
    Cosmic Screenshot Tool
builddeps   :
    - binary(just)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
