name        : cosmic-screenshot
version     : "1.2.0"
release     : 43
summary     : Cosmic Screenshot Tool
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-screenshot
upstreams   :
    - https://github.com/pop-os/cosmic-screenshot/archive/refs/tags/epoch-1.2.0.tar.gz : 96e54244e2225cf3e124af72d94ee7df982a82da9db49c8428d80e94dea8c3e1
description : |
    Cosmic Screenshot Tool
builddeps   :
    - binary(just)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
