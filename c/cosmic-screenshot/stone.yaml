name        : cosmic-screenshot
version     : "1.3.0"
release     : 44
summary     : Cosmic Screenshot Tool
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-screenshot
upstreams   :
    - https://github.com/pop-os/cosmic-screenshot/archive/refs/tags/epoch-1.3.0.tar.gz : a3242fb32f91a8b5653b70adfb1c007ac8f5184ce4d7f0dbb5be1d50bc3c6b89
description : |
    Cosmic Screenshot Tool
builddeps   :
    - binary(just)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
