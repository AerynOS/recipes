name        : cosmic-screenshot
version     : "1.0.16"
release     : 41
summary     : Cosmic Screenshot Tool
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-screenshot
upstreams   :
    - https://github.com/pop-os/cosmic-screenshot/archive/refs/tags/epoch-1.0.16.tar.gz : 36df4d25a0ac3456feab6fe52a0f7ff5aca484540322ed747ce23ba5a7a4d334
description : |
    Cosmic Screenshot Tool
builddeps   :
    - binary(just)
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
