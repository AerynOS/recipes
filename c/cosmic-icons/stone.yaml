name        : cosmic-icons
version     : "1.0.16"
release     : 41
summary     : Cosmic Icons by System76
license     : CC-BY-SA-4.0
homepage    : https://github.com/pop-os/cosmic-icons
upstreams   :
    - https://github.com/pop-os/cosmic-icons/archive/refs/tags/epoch-1.0.16.tar.gz :  d23aecb6a5586795c2fc0f305c0055b413e788980db1b983705f5eaaa864862c
description : |
    Cosmic Icons by System76
builddeps   :
    - binary(gtk-update-icon-cache)
    - binary(just)
    - hicolor-icon-theme
    - pop-os-icon-theme
rundeps     :
    - pop-os-icon-theme
install     : |
    just rootdir=%(installroot) install

    for i in %(installroot)%(datadir)/icons/*/; do
        gtk-update-icon-cache -f $i
    done
