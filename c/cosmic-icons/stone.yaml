name        : cosmic-icons
version     : "1.1.0"
release     : 42
summary     : Cosmic Icons by System76
license     : CC-BY-SA-4.0
homepage    : https://github.com/pop-os/cosmic-icons
upstreams   :
    - https://github.com/pop-os/cosmic-icons/archive/refs/tags/epoch-1.1.0.tar.gz :  1de684477013b47c0f9757e575ed638bbdcd2ffc30829f8e707f5eeba581233b
description : |
    Cosmic Icons by System76
builddeps   :
    - binary(gtk-update-icon-cache)
    - binary(just)
    - hicolor-icon-theme
    - pop-os-icon-theme
rundeps     :
    - pop-os-icon-theme
install     : |
    just rootdir=%(installroot) install

    for i in %(installroot)%(datadir)/icons/*/; do
        gtk-update-icon-cache -f $i
    done
