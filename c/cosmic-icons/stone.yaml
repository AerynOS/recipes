name        : cosmic-icons
version     : "1.2.0"
release     : 43
summary     : Cosmic Icons by System76
license     : CC-BY-SA-4.0
homepage    : https://github.com/pop-os/cosmic-icons
upstreams   :
    - https://github.com/pop-os/cosmic-icons/archive/refs/tags/epoch-1.2.0.tar.gz :  e86484a3d8bd2bf15db9924a92741ca31a557ee49f59822fb2c1686316287f7e
description : |
    Cosmic Icons by System76
builddeps   :
    - binary(gtk-update-icon-cache)
    - binary(just)
    - hicolor-icon-theme
    - pop-os-icon-theme
rundeps     :
    - pop-os-icon-theme
install     : |
    just rootdir=%(installroot) install

    for i in %(installroot)%(datadir)/icons/*/; do
        gtk-update-icon-cache -f $i
    done
