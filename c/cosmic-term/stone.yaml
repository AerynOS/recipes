name        : cosmic-term
version     : "1.2.0"
release     : 47
homepage    : https://github.com/pop-os/cosmic-term
upstreams   :
    - https://github.com/pop-os/cosmic-term/archive/refs/tags/epoch-1.2.0.tar.gz : cda8feaed0f27630ac544146906ce6b77255f743c2c1d0185d0a189f699cd5b5
