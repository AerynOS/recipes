name        : cosmic-term
version     : "1.3.0"
release     : 48
homepage    : https://github.com/pop-os/cosmic-term
upstreams   :
    - https://github.com/pop-os/cosmic-term/archive/refs/tags/epoch-1.3.0.tar.gz : 46c9328367f1c8efd99f586ba17c56580cbb5a2e4e5e8563d55dc8d5d0d5b2a7
