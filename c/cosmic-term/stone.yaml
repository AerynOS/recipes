name        : cosmic-term
version     : "1.1.0"
release     : 46
homepage    : https://github.com/pop-os/cosmic-term
upstreams   :
    - https://github.com/pop-os/cosmic-term/archive/refs/tags/epoch-1.1.0.tar.gz : 72ef099320fa6a33162b1adc8a0d85d91d47d76e0f1a0aa264dba60e07f63a37
summary     : Cosmic Desktop Terminal Application
