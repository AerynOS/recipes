name        : calendarsupport
version     : "26.04.3"
release     : 16
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/calendarsupport-26.04.3.tar.xz : cb0fe6531a4811ccc368e0c3f1d59118f4524bc051976707188c55bcea0c643b
homepage    : https://kontact.kde.org/
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
summary     : Calendar Support library provides helper utilities for calendaring applications
description : |
    Calendar Support library provides helper utilities for calendaring applications.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CalendarCore)
    - cmake(KF6Codecs)
    - cmake(KF6GuiAddons)
    - cmake(KF6Holidays)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(KF6Mime)
    - cmake(KF6TextCustomEditor)
    - cmake(KPim6Akonadi)
    - cmake(KPim6AkonadiCalendar)
    - cmake(KPim6CalendarUtils)
    - cmake(KPim6IdentityManagementCore)
setup       : |
    %patch %(pkgdir)/kf6kmime.patch
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KPim6AkonadiCalendar)
            - cmake(KPim6IdentityManagementCore)
            - cmake(KF6Mime)
