name        : cava
version     : "0.10.7"
release     : 4
homepage    : https://github.com/LukashonakV/cava
upstreams   :
    - https://github.com/LukashonakV/cava/archive/refs/tags/0.10.7.tar.gz : 50cc6413e9c96c503657f814744a2baf429a24ff9fed31a8343e0ed285269eff
summary     : Cross-platform Audio Visualizer
description : |
    Cross-platform Audio Visualizer
license     : MIT
builddeps   :
    - pkgconfig(alsa)
    - pkgconfig(fftw3)
    - pkgconfig(gl)
    - pkgconfig(iniparser)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(libpulse)
    - pkgconfig(ncursesw)
    - pkgconfig(sdl2)
    - pkgconfig(sndio)
    # jack
setup       : |
    %meson \
        -Dbuild_target=all
build       : |
    %meson_build
install     : |
    %meson_install
packages    :
    - "lib%(name)":
        paths:
            - /usr/lib/libcava.so.*

    - "%(name)-devel":
        rundeps:
            - "lib%(name)"
tuning      :
    # <inline asm>:25:9: error: Could not find incbin file 'src/output/shaders/bar_spectrum.frag'
    #    25 | .incbin "src/output/shaders/bar_spectrum.frag"
    - lto: false
