name        : cosmic-bg
version     : "1.3.0"
release     : 46
summary     : Cosmic Desktop Background Service
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-bg
upstreams   :
    - https://github.com/pop-os/cosmic-bg/archive/refs/tags/epoch-1.3.0.tar.gz :  6a871aa9fce958f6895bb1d9b39c54e7cf177df2a24ca5022011ea50940fb6ee
description : |
    Cosmic Desktop Background Service
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(dav1d)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %patch %(pkgdir)/aerynos_branding.patch
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
