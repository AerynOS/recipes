name        : cosmic-bg
version     : "1.1.0"
release     : 44
summary     : Cosmic Desktop Background Service
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-bg
upstreams   :
    - https://github.com/pop-os/cosmic-bg/archive/refs/tags/epoch-1.1.0.tar.gz :  e12282920a8970c8df1499b3fb3930722dc5900dac3e8015039f474cc0ca6a85
description : |
    Cosmic Desktop Background Service
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %patch %(pkgdir)/aerynos_branding.patch
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
