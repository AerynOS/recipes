name        : cosmic-bg
version     : "1.2.0"
release     : 45
summary     : Cosmic Desktop Background Service
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-bg
upstreams   :
    - https://github.com/pop-os/cosmic-bg/archive/refs/tags/epoch-1.2.0.tar.gz :  0d06c9668781670de190c1e5ecbe3a3c87e5b947b0143ef84ed01d2baa3e9112
description : |
    Cosmic Desktop Background Service
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %patch %(pkgdir)/aerynos_branding.patch
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
