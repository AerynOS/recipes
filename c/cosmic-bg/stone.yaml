name        : cosmic-bg
version     : "1.0.16"
release     : 43
summary     : Cosmic Desktop Background Service
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-bg
upstreams   :
    - https://github.com/pop-os/cosmic-bg/archive/refs/tags/epoch-1.0.16.tar.gz :  b5dc91d77b3973d8c144c1b6cb975e6629b7ac11da21ca250c5cbb8a4f999de6
description : |
    Cosmic Desktop Background Service
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %patch %(pkgdir)/aerynos_branding.patch
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
