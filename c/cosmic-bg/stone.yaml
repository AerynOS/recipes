name        : cosmic-bg
version     : "1.0.10.git+06970d5"
release     : 36
summary     : Cosmic Desktop Background Service
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-bg
upstreams   :
    - git|https://github.com/pop-os/cosmic-bg.git : 06970d5945b45a634b9ed314f5ca3a86a8502fd8
description : |
    Cosmic Desktop Background Service
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %patch %(pkgdir)/serpent_branding.patch
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
