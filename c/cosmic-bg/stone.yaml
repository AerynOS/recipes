name        : cosmic-bg
version     : "1.4.0"
release     : 47
summary     : Cosmic Desktop Background Service
license     : GPL-3.0
homepage    : https://github.com/pop-os/cosmic-bg
upstreams   :
    - https://github.com/pop-os/cosmic-bg/archive/refs/tags/epoch-1.4.0.tar.gz :  401b1753d5dfa2c45b00eac34dd5a675dcd02d5e9c7ee7cd3676cf37c2242d30
description : |
    Cosmic Desktop Background Service
builddeps   :
    - binary(just)
    - binary(which)
    - pkgconfig(dav1d)
    - pkgconfig(xkbcommon)
networking  : true
setup       : |
    %patch %(pkgdir)/aerynos_branding.patch
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
