name        : curl
version     : "8.20.0"
release     : 31
summary     : A utility for fetching files from remote servers
license     : MIT
homepage    : https://curl.se/
description : |
    A utility for fetching files from remote servers.
upstreams   :
    - https://curl.se/download/curl-8.20.0.tar.gz: fc5819cad3f9f5482669adcdc49a782c15f36d2a0715b395b06d9173593d2dc0
builddeps:
    - pkgconfig(krb5-gssapi)
    - pkgconfig(ldap)
    - pkgconfig(libnghttp3)
    - pkgconfig(libngtcp2)
    - pkgconfig(libssh2)
    - pkgconfig32(jansson)
    - pkgconfig32(libbrotlidec)
    - pkgconfig32(libcrypto)
    - pkgconfig32(libnghttp2)
    - pkgconfig32(libpsl)
    - pkgconfig32(libzstd)
    - pkgconfig32(zlib)
emul32      : true
profiles    :
    - emul32:
        environment: |
            _extra_args="--disable-ldap"
    - x86_64:
        environment: |
            _extra_args="--with-ldap --with-libssh2 --with-gssapi --with-ngtcp2 --with-nghttp3"
setup       : |
    %configure \
        --disable-static \
        --enable-versioned-symbols \
        --with-ca-bundle="/etc/ssl/certs/ca-certificates.crt" \
        --with-fish-functions-dir=/usr/share/fish/vendor_completions.d/ \
        --with-openssl \
        --with-zsh-functions-dir=/usr/share/zsh/site-functions/ \
        $_extra_args
build       : |
    %make
install     : |
    %make_install
# TODO enable checks
tune        :
    - nosemantic
    - optimize: size
packages    :
    - "%(name)-libs":
        rundeps:
            - ca-certificates
        paths:
            - /usr/lib/libcurl.so.*

    - "%(name)-devel":
        paths:
            - /usr/bin/curl-config
            - /usr/share/man/man1/curl-config*
