name        : cpx
version     : "0.1.4"
release     : 2
homepage    : https://github.com/11happy/cpx
upstreams   :
    - https://github.com/11happy/cpx/archive/refs/tags/v0.1.4.tar.gz : f7d8b7d1926c007d358780dbf82e4ef6b0a84cb44ea3f68732f29a83e78a0495
summary     : cp reimagined
description : |
    cpx is a modern replacement for the traditional cp command, built with Rust for maximum performance and safety on Linux systems.
license     : 
    - MIT
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %cargo_install
check       : |
    # a few test fail
    %cargo_test || exit 0
