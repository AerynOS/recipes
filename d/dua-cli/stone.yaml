name        : dua-cli
version     : "2.37.1"
release     : 1
homepage    : https://github.com/Byron/dua-cli
upstreams   :
    - https://github.com/Byron/dua-cli/archive/refs/tags/v2.37.1.tar.gz : 309194f35a6cabe8a91046641680862cbe1e1379f55c88c94337b541ce987969
summary     : A tool to conveniently learn about the disk usage of directories
description : |
    dua (Disk Usage Analyzer) is a tool to conveniently learn about the disk usage of directories, fast! It offers a terminal user interface for interactive exploration and supports parallel directory traversal for improved performance.
license     : MIT
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %cargo_install dua
    %install_file LICENSE -t %(installroot)%(datadir)/licenses/%(name)/

    target/*/release/dua completions bash | %install_file /dev/stdin %(installroot)%(bashcompletionsdir)/dua
    target/*/release/dua completions zsh | %install_file /dev/stdin %(installroot)%(zshcompletionsdir)/_dua
    target/*/release/dua completions fish | %install_file /dev/stdin %(installroot)%(fishcompletionsdir)/dua.fish
check       : |
    %cargo_test -- --skip interactive --skip test_ignore_directories
