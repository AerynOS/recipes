name        : dav1d
version     : "1.5.4"
release     : 6
homepage    : https://code.videolan.org/videolan/dav1d
upstreams   :
    - https://code.videolan.org/videolan/dav1d/-/archive/1.5.4/dav1d-1.5.4.tar.bz2 : 2abfb0c89212e6e4733a54e0ae509ec00a5b845a6360946f918806e14aedb011
    - https://code.videolan.org/videolan/dav1d-test-data/-/archive/1.5.4/dav1d-test-data-1.5.4.tar.gz :
        hash: b19926f25347a32633ffb40f6189eb750b50f1b8b02b2eb63954845a744de343
        rename: dav1d-test-data.tar.gz
        unpack: false
summary     : AV1 decoder targeted to be small and fast
description : |
    dav1d is a new AV1 cross-platform Decoder, open-source, and focused on speed and correctness.
license     : BSD-2-Clause
builddeps   :
    - binary(nasm)
    - pkgconfig(libxxhash)
tuning      :
    - lto: full
setup       : |
    mkdir tests/dav1d-test-data
    bsdtar-static -xf %(sourcedir)/dav1d-test-data.tar.gz --strip-components=1 -C tests/dav1d-test-data

    %meson \
        -Dtestdata_tests=true
build       : |
    %meson_build
install     : |
    %meson_install
check       : |
    %meson_test
packages    :
    - "lib%(name)":
        summary: Library files for dav1d
        description: |
            Library files for dav1d, the AV1 cross-platform Decoder
        paths:
            - /usr/lib/libdav1d.so.*
