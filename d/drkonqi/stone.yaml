name        : drkonqi
version     : "6.7.1"
release     : 19
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.1/drkonqi-6.7.1.tar.xz : 360f0d966c1c513c69ed30b0de714aa2f5fa9539cfa9fd89d55593bf8fe49154
homepage    : https://kde.org/plasma-desktop/
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
summary     : KDE Crash Handler
description : |
    The KDE Crash Handler.
builddeps   :
    - binary(coredumpctl)
    - binary(eu-unstrip)
    - binary(gdb)
    - binary(python3)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6I18n)
    - cmake(KF6IdleTime)
    - cmake(KF6JobWidgets)
    - cmake(KF6KIO)
    - cmake(KF6Notifications)
    - cmake(KF6Service)
    - cmake(KF6StatusNotifierItem)
    - cmake(KF6SyntaxHighlighting)
    - cmake(KF6Wallet)
    - cmake(KF6WidgetsAddons)
    - cmake(KF6WindowSystem)
    - cmake(PolkitQt6-1)
    - cmake(Qt6Quick)
    - pkgconfig(systemd)
    - python(psutil)
    - python(pygdbmi)
    - python(sentry-sdk)
    - kf6-kirigami
    - kf6-kitemmodels
rundeps     :
    - binary(coredumpctl)
    - binary(eu-unstrip)
    - binary(gdb)
    - binary(python3)
    - python(psutil)
    - python(pygdbmi)
    - python(sentry-sdk)
    - kf6-kirigami
    - kf6-kitemmodels
    # flatpak-coredumpctl is installed if flatpak is installed
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6 \
        -DWITH_PYTHON_VENDORING=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install
