name        : debugedit
version     : "5.3"
release     : 1
upstreams   :
    - https://sourceware.org/ftp/debugedit/5.3/debugedit-5.3.tar.xz : 3b8c6396fe235e0270c9b9c0d244cfd0e86c284fc27e820acc58360e7cfa08c2
homepage    : https://sourceware.org/debugedit
license     : LGPL-2.1-or-later
summary     : Tool to mangle source locations in .debug files
description : |
    Tool to mangle source locations in .debug files
builddeps   :
    - binary(cpio)
    - binary(dwz)
    - binary(gdb-add-index)
    - binary(readelf)
    - pkgconfig(libdw)
    - pkgconfig(libelf)
    - pkgconfig(libxxhash)
setup       : |
    %patch %(pkgdir)/elflint.patch

    %configure \
        --disable-inlined-xxhash
build       : |
    %make
install     : |
    %make_install
check       : |
    export CCACHE_DISABLE=1
    # build-id recompute fails, likely due to our build-id patches
    %make check || true
