name        : dolphin-plugins
version     : "26.04.2"
release     : 2
homepage    : https://apps.kde.org/de/dolphin_plugins/
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/dolphin-plugins-26.04.2.tar.xz : 8c53ce19b2b910f087de42180c034dd9c087598d3b145815a3eba713006e22e7
summary     : Plugins for Dolphin
description : |
    These plugins integrate Dolphin with the revision control systems Bazaar, Mercurial and Git.
    A Dropbox plugin gives action items to keep your files synced to the Dropbox service.
    A disk image integration plugin adds a mount or unmount action.
license     : GPL-2.0-or-later
builddeps   :
    - binary(python3)
    - cmake(DolphinVcs)
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(KF6Solid)
    - cmake(KF6TextEditor)
    - cmake(KF6TextWidgets)
    - cmake(KF6XmlGui)
    - cmake(Qt6)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
