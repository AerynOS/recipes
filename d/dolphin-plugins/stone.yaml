name        : dolphin-plugins
version     : "26.04.3"
release     : 3
homepage    : https://apps.kde.org/de/dolphin_plugins/
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/dolphin-plugins-26.04.3.tar.xz : 35fe9e822c6a61608ea194ec9b949b49c44b2b3b77a877454847a305d7963252
summary     : Plugins for Dolphin
description : |
    These plugins integrate Dolphin with the revision control systems Bazaar, Mercurial and Git.
    A Dropbox plugin gives action items to keep your files synced to the Dropbox service.
    A disk image integration plugin adds a mount or unmount action.
license     : GPL-2.0-or-later
builddeps   :
    - binary(python3)
    - cmake(DolphinVcs)
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(KF6Solid)
    - cmake(KF6TextEditor)
    - cmake(KF6TextWidgets)
    - cmake(KF6XmlGui)
    - cmake(Qt6)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
