name        : doxygen
version     : "1.17.0"
release     : 14
homepage    :  https://www.doxygen.org/
upstreams   :
    - https://github.com/doxygen/doxygen/releases/download/Release_1_17_0/doxygen-1.17.0.src.tar.gz : fa4c3dd78785abc11ccc992bc9c01e7a8c3120fe14b8a8dfd7cefa7014530814
summary     : The de-facto standard tool for generating documentation from annotated C++ sources
description : |
    The de-facto standard tool for generating documentation from annotated C++ sources
license     : GPL-2.0-only
builddeps  :
    - binary(bison)
    - binary(flex)
    - binary(llvm-config-22)
    - binary(python3)
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Svg)
    - pkgconfig(spdlog)
    - pkgconfig(sqlite3)
    - clang-devel
rundeps    :
    - graphviz
setup      : |
    %cmake \
        -Dbuild_wizard=ON \
        -Duse_libc++:BOOL=OFF \
        -Duse_libclang:BOOL=ON \
        -Duse_sys_fmt:BOOL=ON \
        -Duse_sys_spdlog:BOOL=ON \
        -Duse_sys_sqlite3:BOOL=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
    %install_file %(builddir)/man/doxy{gen,wizard}.1 -t %(installroot)%(mandir)/man1
packages    :
    - "doxywizard":
        # TODO needs a .desktop file and metainfo
        description: |
            Doxywizard is a graphical front-end to read/edit/write doxygen configuration files and to launch doxygen
        paths:
            - /usr/bin/doxywizard
            - /usr/share/man/man1/doxywizard.1
        rundeps:
            - binary(doxygen)
            - qt6-wayland
