name        : docker-compose
version     : "5.3.0"
release     : 21
homepage    : https://github.com/docker/compose
upstreams   :
    - https://github.com/docker/compose/archive/refs/tags/v5.3.0.tar.gz : 496ee43bc6ecee6fbac28e93f6e784a7b0207baec7ae2b0ffb57cfd83bc92874
summary     : Define and run multi-container applications with Docker
description : |
    Define and run multi-container applications with Docker
license     :
    - Apache-2.0
networking  : true
builddeps   :
    - binary(git)
    - binary(go)
rundeps     :
    - binary(docker)
environment : |
    export _compose_r=github.com/docker/compose
    export _cli_plugins_dir=%(libdir)/docker/cli-plugins
setup      : |
    %go_mod
build      : |
    export GO111MODULE=auto

    export GOFLAGS+=" -ldflags=-X=${_compose_r}/v2/internal.Version=v%(version)"

    # Git commit corresponding to the version tag
    export GITCOMMIT=$(git ls-remote https://github.com/docker/compose.git refs/tags/v%(version) |awk '{print $1}')

    go build -trimpath -tags "e2e,kube" -o docker-compose ./cmd
install    : |
    %install_exe docker-compose -t %(installroot)${_cli_plugins_dir}/

    # Compatibility symlink
    %install_dir %(installroot)%(bindir)
    ln -srv %(installroot)/${_cli_plugins_dir}/docker-compose %(installroot)%(bindir)/docker-compose
