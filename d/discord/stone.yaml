name        : discord
version     : "1.0.139"
release     : 55
summary     : Group chat, video, and voice calling app
license     : Distributable
homepage    : https://discord.com/
upstreams   :
    - https://dl.discordapp.net/apps/linux/1.0.139/discord-1.0.139.tar.gz : 7eacf2f46af49ddf2258f74d7b92f5e0f71f6a75b169d5205f4a8679b435063f
description : |
    Discord is a proprietary freeware VoIP application and digital distribution platform designed for video gaming communities, that specializes in text, image, video and audio communication between users in a chat channel.
builddeps   :
    - binary(ln)
rundeps     :
    - binary(xdg-open)
setup       : |
    %patch %(pkgdir)/0001-Use-libdir.patch
install     : |
    _discord_root=%(libdir)/discord
    _discord_install=%(installroot)/$_discord_root

    %install_exe discord -t $_discord_install
    %install_exe updater_bootstrap -t $_discord_install

    %install_dir %(installroot)%(bindir)
    ln -srv $_discord_install/discord %(installroot)/%(bindir)/discord

    # Desktop file, icon
    %install_file %(pkgdir)/discord.desktop %(installroot)%(datadir)/applications/discord.desktop
    %install_file discord.png %(installroot)%(datadir)/icons/hicolor/256x256/apps/discord.png
