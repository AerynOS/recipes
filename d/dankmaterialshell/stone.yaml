name        : dankmaterialshell
version     : "1.5.2"
release     : 13
homepage    : https://danklinux.com/
upstreams   :
    - https://github.com/AvengeMedia/DankMaterialShell/archive/refs/tags/v1.5.2.tar.gz : 2fa4fccb9e3fd259fb5e2c8d6e5fe329096f893ca6b8ac9766c699061e0b347c
summary     : Desktop shell for wayland compositor
description : |
    DankMaterialShell (dms) is a Wayland desktop shell built with Quickshell and Go. It serves a purpose similar to GNOME Shell or KDE Plasma, providing a unified interface for launching applications, managing windows, managing hardware interfaces, notifications, and much more.
license     :
    - JSON
    - MIT
    - X11-distribute-modifications-variant
    - Xnet
builddeps   :
    - binary(go)
rundeps     :
    - accountsservice # User integration
    - binary(quickshell)
networking  : true
setup       : |
    cd core
    %go_mod
build       : |
    pushd core

    go build -o bin/dms \
        -tags distro_binary \
        -ldflags "-X main.Version=v%(version)" \
        ./cmd/dms
    popd
install     : |
    # TODO: Fix this in the makefile
    %install_dir %(installroot)%(bindir)

    %make_install \
        PREFIX=%(prefix) \
        SYSTEMD_USER_DIR=%(installroot)%(libdir)/systemd/user

    # Fix the service
    # sed -i "s|%(installroot)||g" %(installroot)%(libdir)/systemd/user/dms.service
