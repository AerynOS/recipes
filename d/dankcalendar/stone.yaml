name        : dankcalendar
version     : "0.2.1"
release     : 1
homepage    : https://danklinux.com/
upstreams   :
    - https://github.com/AvengeMedia/dankcalendar/releases/download/v0.2.1/dankcalendar-0.2.1.tar.gz : cc4701465f719be10641307d391170f92685f9625d69442097e37093b83a77c9
summary     : Calendar from the Dank Linux Suite
description : |
    DankCalendar is a standalone calendar app that brings your Local, Google, Microsoft, CalDAV, and iCloud calendars together in one place. It runs as a lightweight daemon with a tray icon, keeps your accounts in sync, and reminds you about events — all with the look and feel of DankMaterialShell.
license     : MIT
builddeps   :
    - binary(go)
rundeps     :
    - binary(quickshell)
networking  : true
setup       : |
    cd core
    %go_mod
build       : |
    cd core

    go build -o bin/dcal \
        -tags distro_binary \
        -ldflags "-X main.Version=v%(version)" \
        ./cmd/dcal

    mkdir ../completions
    bin/dcal completion bash > ../completions/dcal
    bin/dcal completion zsh > ../completions/_dcal
    bin/dcal completion fish > ../completions/dcal.fish
install     : |
    # TODO: Fix this in the makefile
    %install_dir %(installroot)%(datadir)/icons/hicolor/scalable/apps

    %make_install install-systemd \
        PREFIX=%(installroot)%(prefix) \
        SYSTEMD_USER_DIR=%(installroot)%(libdir)/systemd/user

    # Fix the service
    sed -i "s|%(installroot)||g" %(installroot)%(libdir)/systemd/user/dcal.service

    %install_file completions/dcal -t %(installroot)%(bashcompletionsdir)
    %install_file completions/_dcal -t %(installroot)%(zshcompletionsdir)
    %install_file completions/dcal.fish -t %(installroot)%(fishcompletionsdir)
