name        : erofs-utils
version     : 1.8.5
release     : 4
homepage    : https://git.kernel.org/pub/scm/linux/kernel/git/xiang/erofs-utils.git
upstreams   :
    - https://git.kernel.org/pub/scm/linux/kernel/git/xiang/erofs-utils.git/snapshot/erofs-utils-1.8.5.tar.gz : cd8611270e9c86fe062f647103ca6ada9ed710e4430fdd5960d514777919200d
summary     : EROFS filesystem utilities
description : |
    EROFS filesystem utilities
license     :
    - GPL-2.0-or-later
    - Apache-2.0
builddeps   :
    - binary(gettext)
    - pkgconfig(fuse3)
    - pkgconfig(liblz4)
    - pkgconfig(liblzma)
    - pkgconfig(libxxhash)
    - pkgconfig(libzstd)
    - pkgconfig(uuid)
    - pkgconfig(zlib)
setup       : |
    %reconfigure --enable-fuse \
                 --enable-multithreading
build       : |
    %make
install     : |
    %make_install
