name        : erofs-utils
version     : "1.9.1"
release     : 9
homepage    : https://git.kernel.org/pub/scm/linux/kernel/git/xiang/erofs-utils.git
upstreams   :
    - https://git.kernel.org/pub/scm/linux/kernel/git/xiang/erofs-utils.git/snapshot/erofs-utils-1.9.1.tar.gz : a9ef5ab67c4b8d2d3e9ed71f39cd008bda653142a720d8a395a36f1110d0c432
summary     : EROFS filesystem utilities
description : |
    EROFS filesystem utilities
license     :
    - GPL-2.0-or-later
    - Apache-2.0
builddeps   :
    - binary(flex)
    - binary(gettext)
    - pkgconfig(fuse3)
    - pkgconfig(json-c)
    - pkgconfig(libcurl)
    - pkgconfig(libdeflate)
    - pkgconfig(liblz4)
    - pkgconfig(liblzma)
    - pkgconfig(libnl-genl-3.0)
    - pkgconfig(libxml-2.0)
    - pkgconfig(libxxhash)
    - pkgconfig(libzstd)
    - pkgconfig(openssl)
    - pkgconfig(uuid)
    - pkgconfig(zlib)
setup       : |
    %reconfigure \
        --enable-fuse \
        --with-libdeflate
build       : |
    %make
install     : |
    %make_install
