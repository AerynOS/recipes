name        : erofs-utils
version     : "1.9.2"
release     : 10
homepage    : https://git.kernel.org/pub/scm/linux/kernel/git/xiang/erofs-utils.git
upstreams   :
    - https://git.kernel.org/pub/scm/linux/kernel/git/xiang/erofs-utils.git/snapshot/erofs-utils-1.9.2.tar.gz : d915b45646a928174917c44a2c84ba005b161e84ab732cd5d2560371560b8d13
summary     : EROFS filesystem utilities
description : |
    EROFS filesystem utilities
license     :
    - GPL-2.0-or-later
    - Apache-2.0
    - MIT
builddeps   :
    - binary(flex)
    - binary(gettext)
    - pkgconfig(fuse3)
    - pkgconfig(json-c)
    - pkgconfig(libcurl)
    - pkgconfig(libdeflate)
    - pkgconfig(liblz4)
    - pkgconfig(liblzma)
    - pkgconfig(libnl-genl-3.0)
    - pkgconfig(libxml-2.0)
    - pkgconfig(libxxhash)
    - pkgconfig(libzstd)
    - pkgconfig(openssl)
    - pkgconfig(uuid)
    - pkgconfig(zlib)
setup       : |
    %reconfigure \
        --enable-fuse \
        --with-libdeflate
build       : |
    %make
install     : |
    %make_install
