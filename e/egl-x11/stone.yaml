name        : egl-x11
version     : "1.0.5"
release     : 3
homepage    : https://github.com/NVIDIA/egl-x11
upstreams   :
    - https://github.com/NVIDIA/egl-x11/archive/refs/tags/v1.0.5.tar.gz : 92e22178b3aba63be4cb2bf8953991bdf52ad3e5ec26212143b2df46d16e82d7
summary     : The X11/XCB external platform library
description : |
    EGL platform library for the NVIDIA driver to support XWayland via xlib (using EGL_KHR_platform_x11) or xcb (using EGL_EXT_platform_xcb)
license     : Apache-2.0
emul32      : true
builddeps   :
    - pkgconfig32(egl) # include <EGL/egl.h>
    - pkgconfig32(gbm)
    - pkgconfig32(libdrm)
    - pkgconfig32(x11)
    - pkgconfig32(x11-xcb)
    - pkgconfig32(xcb)
    - pkgconfig(eglexternalplatform)
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
# packages    :
#     - "%(name)-devel":
#         paths:
#             - /usr/share/wayland-eglstream/
