name        : evince
version     : "48.4"
release     : 1
homepage    : https://gitlab.gnome.org/GNOME/evince
upstreams   :
    - https://gitlab.gnome.org/GNOME/evince/-/archive/48.4/evince-48.4.tar.gz : 3a660f2e844a773c5b9bc381aeb14c1b2a702c6eeaf03ae9dcb9b363885bc18d
summary     : Document viewer (PDF, PostScript, XPS, djvu, dvi, tiff, cbr, cbz, cb7, cbt)
description : |
    Document viewer (PDF, PostScript, XPS, djvu, dvi, tiff, cbr, cbz, cb7, cbt)
license     : GPL-2.0-or-later
builddeps   :
    - binary(gi-docgen)
    - binary(itstool)
    - binary(msgfmt)
    - binary(update-desktop-database)
    - pkgconfig(ddjvuapi)
    - pkgconfig(gdk-pixbuf-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(libarchive)
    - pkgconfig(libhandy-1)
    - pkgconfig(libnautilus-extension-4)
    - pkgconfig(poppler-glib)
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
