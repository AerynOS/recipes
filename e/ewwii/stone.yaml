name        : ewwii
version     : "0.5.0"
release     : 3
homepage    : https://ewwii-sh.github.io/
upstreams   :
    - git|https://github.com/Ewwii-sh/ewwii.git : aa84dcf49adc975900031ff4b05b8965fbfa63fc
