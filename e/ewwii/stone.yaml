name        : ewwii
version     : 0.3.1
release     : 1
homepage    : https://ewwii-sh.github.io/
upstreams   :
    - git|https://github.com/Ewwii-sh/ewwii.git : 460faff6c72128d70b6dc8b121cf067ec529c18f
summary     :  An eww rewrite that is powerful, flexible, and extensible. 
description : |
     An eww rewrite that is powerful, flexible, and extensible. 
license     : 
    - GPL-3.0-only
builddeps   :
    - pkgconfig(cairo-gobject)
    - pkgconfig(gdk-pixbuf-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(graphene-gobject-1.0)
    - pkgconfig(gtk4)
    - pkgconfig(gtk4-layer-shell-0)
    - pkgconfig(pango)
networking  : true
setup       : |
    %patch %(pkgdir)/0001-rebuild-cargo-lock.patch
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %cargo_install
check       : |
    %cargo_test
