name        : evolution
version     : "3.60.2"
release     : 1
upstreams   :
    - https://download.gnome.org/sources/evolution/3.60/evolution-3.60.2.tar.xz : 218a49fa5068155dbdbd35a30d10a2f237c72465fb1d0e0aa78889f039c2ed8f
homepage    : https://gnome.pages.gitlab.gnome.org/evolution/help/
license     : GPL-2.0-or-later AND GFDL-1.3-or-later
summary     : Evolution Mail Client
description : |
    Evolution Mail Client
builddeps   :
    - binary(glib-mkenums)
    - binary(intltool-update)
    - binary(itstool)
    - binary(msgfmt)
    - pkgconfig(atk)
    - pkgconfig(cairo-gobject)
    - pkgconfig(camel-1.2)
    - pkgconfig(enchant-2)
    - pkgconfig(gail-3.0)
    - pkgconfig(gdk-pixbuf-2.0)
    - pkgconfig(geocode-glib-2.0)
    - pkgconfig(gio-2.0)
    - pkgconfig(gio-unix-2.0)
    - pkgconfig(gmodule-2.0)
    - pkgconfig(gnome-autoar-0)
    - pkgconfig(gnome-desktop-3.0)
    - pkgconfig(gspell-1)
    - pkgconfig(gsettings-desktop-schemas)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(gweather4)
    - pkgconfig(ldap)
    - pkgconfig(libcanberra-gtk3)
    - pkgconfig(libcmark)
    - pkgconfig(libebackend-1.2)
    - pkgconfig(libebook-1.2)
    - pkgconfig(libecal-2.0)
    - pkgconfig(libedataserver-1.2)
    - pkgconfig(libedataserverui-1.2)
    - pkgconfig(libnotify)
    - pkgconfig(libsecret-1)
    - pkgconfig(libsoup-3.0)
    - pkgconfig(libxml-2.0)
    - pkgconfig(nspr)
    - pkgconfig(nss)
    - pkgconfig(shared-mime-info)
    - pkgconfig(sqlite3)
    - pkgconfig(webkit2gtk-4.1)
    # ytnef
    # highlight
    # libpst
rundeps     :
    - gvfs-goa
setup       : |
    %cmake \
        -DENABLE_PST_IMPORT=OFF \
        -DENABLE_TEXT_HIGHLIGHT=OFF \
        -DENABLE_YTNEF=OFF \
        -DLIBEXEC_INSTALL_DIR=%(libdir) \
        -DSYSCONF_INSTALL_DIR=%(sysconfdir) \
        -DWITH_NSPR_INCLUDES=%(includedir)/nspr \
        -DWITH_NSS_INCLUDES=%(includedir)/nss
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-help":
        summary: Help files for %(name)
        description: This package contains user documentation for %(name)
        rundeps:
            - "%(name)"
        paths:
            - /usr/share/help/

    - "%(name)-bogofilter":
        summary: Bogofilter plugin for Evolution
        description: Bogofilter plugin for Evolution
        rundeps:
            - "%(name)"
        paths:
            - /usr/lib/evolution/modules/module-bogofilter.so
            - /usr/share/glib-2.0/schemas/org.gnome.evolution.bogofilter.gschema.xml
            - /usr/share/metainfo/org.gnome.Evolution-bogofilter.metainfo.xml

    - "%(name)-spamassassin":
        summary: SpamAssassin plugin for Evolution
        description: SpamAssassin plugin for Evolution
        rundeps:
            - "%(name)"
        paths:
            - /usr/lib/evolution/modules/module-spamassassin.so
            - /usr/share/glib-2.0/schemas/org.gnome.evolution.spamassassin.gschema.xml
            - /usr/share/metainfo/org.gnome.Evolution-spamassassin.metainfo.xml
