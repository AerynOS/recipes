name        : editorconfig-core-c
version     : "0.12.11"
release     : 6
homepage    : https://editorconfig.org/
upstreams   :
    - https://github.com/editorconfig/editorconfig-core-c/archive/refs/tags/v0.12.11.tar.gz : 9d8b420b56a969ea3cf784861c72d26fa0e158fa1494d732df2c8a1480d36a5c
summary     : EditorConfig core library written in C
description : |
    EditorConfig makes it easy to maintain the correct coding style when switching
    between different text editors and between different projects.
license     : BSD-2-Clause
builddeps   :
    - binary(doxygen)
    - pkgconfig(libpcre2-8)
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
    rm -fv %(installroot)/usr/lib/libeditorconfig_static.a
packages    :
    - "%(name)-libs":
        paths:
            - /usr/lib/lib*.so.*
