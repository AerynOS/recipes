name        : eza
version     : "0.23.4"
release     : 5
homepage    : https://github.com/eza-community/eza
upstreams   :
    - https://github.com/eza-community/eza/archive/refs/tags/v0.23.4.tar.gz : 9fbcad518b8a2095206ac385329ca62d216bf9fdc652dde2d082fcb37c309635
license     : EUPL-1.2
summary     : A modern alternative to ls
description : |
    eza is a modern alternative for the venerable file-listing
    command-line program ls that ships with Unix and Linux operating systems,
    giving it more features and better defaults.
builddeps   :
    - binary(go-md2man)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build

    for FILENAME in eza.1 eza_colors-explanation.5 eza_colors.5; do
        go-md2man < man/${FILENAME}.md > man/${FILENAME}
    done
install     : |
    %cargo_install

    # completions
    %install_file completions/zsh/_eza %(installroot)%(zshcompletionsdir)/_eza
    %install_file completions/bash/eza %(installroot)%(bashcompletionsdir)/eza
    %install_file completions/fish/eza.fish %(installroot)%(fishcompletionsdir)/eza.fish

    for FILENAME in eza.1 eza_colors-explanation.5 eza_colors.5; do
        %install_file man/${FILENAME} %(installroot)%(mandir)/man${FILENAME##*.}/${FILENAME}
    done
check       : |
    %cargo_test
