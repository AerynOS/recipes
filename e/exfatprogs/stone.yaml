name        : exfatprogs
version     : "1.4.2"
release     : 6
homepage    : https://github.com/exfatprogs/exfatprogs
upstreams   :
    - https://github.com/exfatprogs/exfatprogs/releases/download/1.4.2/exfatprogs-1.4.2.tar.gz : a8cbb4a5f002d49bc60c093030b26f5f36d9716e133118bdb0c311d6a3909fdc
summary     : exFAT filesystem userspace utilities
description : |
    exfatprogs are the official userspace utilities that contain all of the standard utilities for creating, fixing and debugging exFAT filesystems in Linux.
license     : GPL-2.0-or-later
builddeps   :
    - binary(bison)
    - binary(flex)
    - pkgconfig(blkid)
setup       : |
    # Bash required or fts.h detection fails
    %configure_with_bash
build       : |
    %make
install     : |
    %make_install
