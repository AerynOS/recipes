name        : envision
version     : "3.2.0+git.aa84e48e"
release     : 2
homepage    : https://gitlab.com/gabmus/envision
upstreams   :
    - git|https://gitlab.com/gabmus/envision.git : aa84e48e8de86dd12d62604340a29748b599d298
summary     : Orchestrator for the free XR stack
description : |
    Envision is a graphical app that acts as an orchestrator to get a full Monado setup up and running with a few clicks
license     : AGPL-3.0-or-later
builddeps   :
    - binary(cargo)
    - binary(desktop-file-validate)
    - binary(glib-compile-resources)
    - binary(msgfmt)
    - pkgconfig(gio-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(gtk4)
    - pkgconfig(libadwaita-1)
    - pkgconfig(openxr)
    - pkgconfig(vte-2.91-gtk4)
    # - appstream-util
rundeps     :
    - binary(monado-service)
    - xrizer
networking  : true
setup       : |
    %meson \
      -Dprofile=release
build       : |
    %meson_build
install     : |
    %meson_install
