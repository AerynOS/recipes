name        : yakuake
version     : "26.04.2"
release     : 21
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/yakuake-26.04.2.tar.xz : dd853206eb325b96866cf14d2804088a0988d80fe2236f5240fb7a8f4f71676f
homepage    : https://apps.kde.org/yakuake/
license     : GPL-2.0-or-later
summary     : A quake style dropdown terminal.
description : |
    A quake-inspired dropdown terminal window.  Qt-based, robust, and highly configurable.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6DBusAddons)
    - cmake(KF6GlobalAccel)
    - cmake(KF6I18n)
    - cmake(KF6IconThemes)
    - cmake(KF6KIO)
    - cmake(KF6NewStuff)
    - cmake(KF6Notifications)
    - cmake(KF6NotifyConfig)
    - cmake(KF6Parts)
    - cmake(KF6StatusNotifierItem)
    - cmake(KF6WidgetsAddons)
    - cmake(KF6WindowSystem)
    - cmake(KWayland)
    - cmake(PlasmaWaylandProtocols)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Svg)
    - cmake(Qt6WaylandClient)
    - pkgconfig(wayland-client)
    - pkgconfig(xcb)
    - pkgconfig(xcb-randr)
    - pkgconfig(xcb-util)
rundeps     :
    - konsole-part
    - qt6-wayland
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
