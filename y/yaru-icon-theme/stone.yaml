name        : yaru-icon-theme
version     : "26.10.1"
release     : 2
homepage    : https://github.com/ubuntu/yaru/
upstreams   :
    - https://github.com/ubuntu/yaru/archive/refs/tags/26.10.1.tar.gz : 93e96ce884020266cf860dee3462d77c9473eb5186cca6f21af4e7d069049717
summary     : Ubuntu Yaru GNOME theme
description : |
    Yaru is the default theme for Ubuntu, backed by the community.
license     :
    - CC-BY-SA-4.0
    - GPL-3.0-or-later
builddeps   :
    - binary(python3)
    - binary(sassc)
    - pkgconfig(glib-2.0)
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
    # Could not get false flags and -Daccent-colors to work properly.
    # it would only install Yaru-icons without the accent colors.
    # Remove the files instead.
    rm -rf "%(installroot)/usr/share/themes"
    rm -rf "%(installroot)/usr/share/sounds"
    rm -rf "%(installroot)/usr/share/gnome-shell"
    rm -rf "%(installroot)/usr/share/gtksourceview-4"
    rm -rf "%(installroot)/usr/share/gtksourceview-5"
    rm -rf "%(installroot)/usr/share/glib-2.0"
    rm -rf "%(installroot)/usr/share/xsessions"
    rm -rf "%(installroot)/usr/share/wayland-sessions"
