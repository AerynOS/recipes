name        : yt-dlp
version     : "2026.06.09"
release     : 2
homepage    : https://github.com/yt-dlp/yt-dlp
upstreams   :
    - https://github.com/yt-dlp/yt-dlp/archive/refs/tags/2026.06.09.tar.gz : 6add707714c1d9a960cb6f4de1dcbd9fbf857f1bc488d26b43f0701246a06f38
summary     : yt-dlp is a feature-rich command-line audio/video downloader with support for thousands of sites
description : |
    yt-dlp is a feature-rich command-line audio/video downloader with support for thousands of sites. The project is a fork of youtube-dl based on the now inactive youtube-dlc.
builddeps   :
    - python(hatchling)
rundeps     :
    - binary(ffmpeg)
    - binary(ffprobe)
    - binary(node)
    - binary(python)
    - python(yt-dlp-ejs)
license     :
    - Unlicense
build       : |
    %pyproject_build
install     : |
    %pyproject_install
