name        : yt-dlp
version     : "2026.07.04"
release     : 3
homepage    : https://github.com/yt-dlp/yt-dlp
upstreams   :
    - https://github.com/yt-dlp/yt-dlp/archive/refs/tags/2026.07.04.tar.gz : 7fb7ca0509dd8f21263246d3d749a346e049fa9d3cfdef072e05c7bbd88d6fc0
summary     : yt-dlp is a feature-rich command-line audio/video downloader with support for thousands of sites
description : |
    yt-dlp is a feature-rich command-line audio/video downloader with support for thousands of sites. The project is a fork of youtube-dl based on the now inactive youtube-dlc.
license     :
    - Unlicense
builddeps   :
    - python(hatchling)
rundeps     :
    - binary(ffmpeg)
    - binary(ffprobe)
    - binary(node)
    - binary(python)
    - python(yt-dlp-ejs)
build       : |
    %pyproject_build
install     : |
    %pyproject_install
