name        : tesseract-tessdata
version     : "4.1.0"
release     : 1
upstreams   :
    - git|https://github.com/tesseract-ocr/tessdata_fast.git : 65727574dfcd264acbb0c3e07860e4e9e9b22185
homepage    : https://github.com/tesseract-ocr/tessdata_fast
license     : Apache-2.0
summary     : Trained models for the Tesseract Open Source OCR Engine
