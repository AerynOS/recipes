name        : tailscale
version     : "1.98.5"
release     : 13
homepage    : https://github.com/tailscale/tailscale
upstreams   :
    - https://github.com/tailscale/tailscale/archive/refs/tags/v1.98.5.tar.gz : 58407eb29a1d5a6f5baf3784ac6d3e3d55e0af514e012f2cde1c6afbc5e6bcea
summary     :  Private WireGuard® networks made easy
description : |
    The easiest, most secure way to use WireGuard and 2FA.
license     : BSD-3-Clause
networking  : true
builddeps   :
    - git
    - golang
rundeps     :
    - sysbinary(iptables)
environment: |
   export VERSION_LONG=%(version)
   export VERSION_SHORT=%(version)
setup       : |
   %patch %(pkgdir)/defaults.patch
build       : |
   ./build_dist.sh tailscale.com/cmd/tailscale
   ./build_dist.sh tailscale.com/cmd/tailscaled
install     : |
   %install_exe %(workdir)/tailscale %(installroot)%(bindir)/tailscale
   %install_exe %(workdir)/tailscaled %(installroot)%(sbindir)/tailscaled
   %install_file LICENSE -t %(installroot)%(datadir)/licenses/%(name)/

   %install_file %(workdir)/cmd/tailscaled/tailscaled.service %(installroot)/%(libdir)/systemd/system/tailscaled.service
   %install_file %(workdir)/cmd/tailscaled/tailscaled.defaults %(installroot)%(vendordir)/tailscale/tailscaled

   %install_file %(pkgdir)/*.preset -t %(installroot)/%(libdir)/systemd/system-preset/

   %(workdir)/tailscale completion bash | %install_file /dev/stdin %(installroot)%(bashcompletionsdir)/tailscale
   %(workdir)/tailscale completion zsh | %install_file /dev/stdin %(installroot)%(zshcompletionsdir)/_tailscale
   %(workdir)/tailscale completion fish | %install_file /dev/stdin %(installroot)%(fishcompletionsdir)/tailscale.fish
