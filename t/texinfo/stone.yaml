name        : texinfo
version     : "7.3"
release     : 11
homepage    : https://www.gnu.org/software/texinfo
upstreams   :
    - https://ftp.gnu.org/gnu/texinfo/texinfo-7.3.tar.xz : 51f74eb0f51cfa9873b85264dfdd5d46e8957ec95b88f0fb762f63d9e164c72e
summary     : GNU software documentation system
description : |
    Texinfo is a documentation system that uses a single source to produce many forms of output.
license     : GPL-3.0-or-later
builddeps   :
    - binary(msgfmt)
    - pkgconfig(ncursesw)
    - perl-devel
rundeps     :
    - binary(perl)
setup       : |
    %configure
build       : |
    %make
install     : |
    %make_install

    %install_file %(pkgdir)/trigger.yaml %(installroot)/usr/share/moss/triggers/tx.d/texinfo.yaml
