name        : taglib
version     : "2.3.1"
release     : 8
homepage    : https://taglib.org/
upstreams   :
    - https://github.com/taglib/taglib/releases/download/v2.3.1/taglib-2.3.1.tar.gz : a19d90e6fd41d09a0281ec0fe762d51491d7a6ccffc923c4f7868c5e647ca230
summary     : Library to read metadata from a variety of multimedia formats
description : |
    TagLib is a library for reading and editing the meta-data of several popular
    audio formats. Currently it supports both ID3v1 and ID3v2 for MP3 files, Ogg
    Vorbis comments and ID3 tags and Vorbis comments in FLAC, MPC, Speex, WavPack
    TrueAudio, WAV, AIFF, MP4 and ASF files.
license     :
    - LGPL-2.1-or-later
    - MPL-1.1
builddeps   :
    - cmake(utf8cpp)
    - pkgconfig(zlib)
checkdeps   :
    - pkgconfig(cppunit)
setup       : |
    %cmake \
        -DBUILD_SHARED_LIBS=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
check       : |
    %cmake_test
packages    :
    - "%(name)-devel":
        paths:
            - /usr/bin/taglib-config
