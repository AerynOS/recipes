name: thunderbird
version: "115.12.0"
release: 38
homepage: https://www.thunderbird.net/
upstreams:
    - https://archive.mozilla.org/pub/thunderbird/releases/115.12.0/linux-x86_64/en-US/thunderbird-115.12.0.tar.bz2: 2602127232258953184918382713177008139834b1249c21b1f1d118111e1f11
license:
    - MPL-2.0
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
summary: Standalone mail and news reader from Mozilla
description: |
    Thunderbird is a full-featured, cross platform, free and open source email, news, and chat client. It is easy to set up and customize.
component: network.mail
rundeps:
    - libatomic
    - libcanberra
    - libdbus-glib
    - libgtk-3
    - libstartup-notification
    - libxtst
    - nss
    - ttf-dejavu
builddeps:
    - desktop-file-utils
    - python3
install: |
    # Install files
    install -d -m 00755 $D/usr/lib
    mv thunderbird $D/usr/lib/

    # Install launcher
    install -d -m 00755 $D/usr/bin
    tee "$D/usr/bin/thunderbird" > /dev/null << EOF
    #!/bin/sh
    /usr/lib/thunderbird/thunderbird "\$@"
    EOF
    chmod 00755 $D/usr/bin/thunderbird

    # Install desktop file
    install -d -m 00755 $D/usr/share/applications
    tee "$D/usr/share/applications/thunderbird.desktop" > /dev/null << EOF
    [Desktop Entry]
    Name=Thunderbird
    Comment=Send and Receive Email
    GenericName=Email Client
    Exec=thunderbird %u
    Icon=thunderbird
    Terminal=false
    Type=Application
    Categories=Network;Email;
    EOF

    # Install icons
    for size in 16 22 24 32 48 128 256; do
        install -d -m 00755 $D/usr/share/icons/hicolor/${size}x${size}/apps
        install -m 00644 chrome/icons/default/default${size}.png $D/usr/share/icons/hicolor/${size}x${size}/apps/thunderbird.png
    done
