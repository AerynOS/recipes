name        : tpm2-tss
version     : "4.2.0"
release     : 6
homepage    : https://tpm2-software.github.io
upstreams   :
    - https://github.com/tpm2-software/tpm2-tss/releases/download/4.2.0/tpm2-tss-4.2.0.tar.gz : b53f0c5c8c4ce17f05701a410ca9688f725ca380c9bc4640eacd0eadb1fea124
summary     : OSS implementation of the TCG TPM2 Software Stack
description : |
    %(name) is an OSS implementation of the TCG TPM2 Software Stack.
license     :
    - BSD-2-Clause
builddeps   :
    - pkgconfig(json-c)
    - pkgconfig(libcrypto)
    - pkgconfig(libcurl)
    - pkgconfig(uuid)
    - shadow
setup       : |
    %patch %(pkgdir)/stateless/0001-Support-stateless-config-file.patch

    # It wants groupadd for whatever reason.
    export PATH="$PATH:/usr/sbin"

    %configure \
        --disable-static \
        --with-runstatedir=/run
build       : |
    %make
install     : |
    %make_install

    %install_dir %(installroot)%(vendordir)
    mv %(installroot)/etc/tpm2-tss %(installroot)%(vendordir)
    rmdir %(installroot)/etc
packages    :
    - "%(name)-fapi":
        summary: High-level TPM2.0 Software Stack
        description: High-level TPM2.0 Software Stack
        paths:
            - /usr/lib/libtss2-fapi.so.*

    - "%(name)-devel":
        rundeps:
            - "%(name)-fapi"
