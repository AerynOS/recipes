name        : amdgpu_top
version     : "0.11.4"
release     : 8
homepage    : https://github.com/Umio-Yasuno/amdgpu_top
upstreams   :
    - https://github.com/Umio-Yasuno/amdgpu_top/archive/refs/tags/v0.11.4.tar.gz : 2b9a60c5d79b3d0addbe24ed491f867d56df4af6ccd92b22f8cdc371e80bb7a0
summary     : A tool that displays AMD GPU utilization
description : |
    The tool displays information gathered from performance counters (GRBM, GRBM2), sensors, fdinfo, and AMDGPU driver.
license     : MIT
networking  : true
builddeps   :
    - pkgconfig(libdrm)
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %cargo_install

    %install_file assets/amdgpu_top.desktop -t %(installroot)%(datadir)/applications
