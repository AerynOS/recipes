name        : amdgpu_top
version     : "0.11.5"
release     : 9
homepage    : https://github.com/Umio-Yasuno/amdgpu_top
upstreams   :
    - https://github.com/Umio-Yasuno/amdgpu_top/archive/refs/tags/v0.11.5.tar.gz : e511ed15a6e0f3ea72321dfc97145ffb85999b37b6b304e9795978945f3f04cd
summary     : A tool that displays AMD GPU utilization
description : |
    The tool displays information gathered from performance counters (GRBM, GRBM2), sensors, fdinfo, and AMDGPU driver.
license     : MIT
networking  : true
builddeps   :
    - pkgconfig(libdrm)
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %cargo_install

    %install_file assets/amdgpu_top.desktop -t %(installroot)%(datadir)/applications
