name        : amdgpu_top
version     : "0.11.3"
release     : 7
homepage    : https://github.com/Umio-Yasuno/amdgpu_top
upstreams   :
    - https://github.com/Umio-Yasuno/amdgpu_top/archive/refs/tags/v0.11.3.tar.gz : 8fc21b08949d871ae07daa96d79c31ea46b419a7bfd7fa12e06534f299294c0a
summary     : A tool that displays AMD GPU utilization
description : |
    The tool displays information gathered from performance counters (GRBM, GRBM2), sensors, fdinfo, and AMDGPU driver.
license     : MIT
networking  : true
builddeps   :
    - pkgconfig(libdrm)
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %cargo_install

    %install_file assets/amdgpu_top.desktop -t %(installroot)%(datadir)/applications
