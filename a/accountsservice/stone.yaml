name        : accountsservice
version     : "26.13.3"
release     : 9
homepage    : https://www.freedesktop.org/wiki/Software/AccountsService/
upstreams   :
    - https://gitlab.freedesktop.org/-/project/838/uploads/fbd268e2b5f5bab08b61fade596ef2db/accountsservice-26.13.3.tar.xz : 448941e38013894a9f20c1502a334674d5d0e0fc050b317bc086058eb314016a
summary     : D-BUS encapsulation for user and account management
description : |
    AccountsService is a D-Bus service for accessing the list of user accounts and information attached to those accounts.
license     :
    - GPL-3.0-or-later
builddeps   :
    - binary(msgfmt)
    - binary(vapigen)
    - binary(xmlto)
    - pkgconfig(dbus-1)
    - pkgconfig(gio-2.0)
    - pkgconfig(gio-unix-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(libxcrypt)
    - pkgconfig(polkit-gobject-1)
    - pkgconfig(systemd)
    - docbook
environment : |
    %export_docbook_catalogs
setup       : |
    %patch %(pkgdir)/0001-Allow-version-to-be-overridden.patch

    export VERSION_OVERRIDE="%(version)"

    %meson \
        -Ddocbook=true
build       : |
    %meson_build
install     : |
    %meson_install

    # Stateless
    %tmpfiles "d /var/lib/AccountsService/icons 0775 root root -"
    %tmpfiles "d /var/lib/AccountsService/users 0700 root root -"
    rmdir -v %(installroot)/var/lib/AccountsService/icons \
             %(installroot)/var/lib/AccountsService/users \
             %(installroot)/var/lib/AccountsService/ \
             %(installroot)/var/lib/ \
             %(installroot)/var/
packages    :
    - "%(name)-devel":
        paths:
            - /usr/share/vala/
