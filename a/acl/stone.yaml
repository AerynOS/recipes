name        : acl
version     : "2.4.0"
release     : 6
homepage    : https://savannah.nongnu.org/projects/acl
upstreams   :
    - https://download.savannah.gnu.org/releases/acl/acl-2.4.0.tar.xz : e661131456d2708a01c614a0f400e11d7d1bfaeb6f3e74b75bb980b72f0161a3
summary     : Access control list utilities
description : |
    Commands for Manipulating POSIX Access Control Lists
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
emul32      : true
builddeps   :
    - binary(msgfmt)
    - pkgconfig32(libattr)
setup       : |
    %configure \
        --enable-shared \
        --disable-static
build       : |
    %make
install     : |
    %make_install
