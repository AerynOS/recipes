name        : aquamarine
version     : "0.12.0"
release     : 4
upstreams   :
    - https://github.com/hyprwm/aquamarine/archive/refs/tags/v0.12.0.tar.gz : a945f5ffb62412bf7512bd3694f10a9b30749a6d7ac49e2c1d671e0cdd7971b5
homepage    : https://github.com/hyprwm/aquamarine
license     : BSD-3-Clause
summary     : A very light linux rendering backend library
description : |
    Aquamarine is a very light linux rendering backend library. It provides basic abstractions for an application to render on a Wayland session (in a window) or a native DRM session. It is agnostic of the rendering API (Vulkan/OpenGL) and designed to be lightweight, performant, and minimal. Aquamarine provides no bindings for other languages. It is C++-only.
builddeps   :
    - cmake(hyprwayland-scanner)
    - pkgconfig(gbm)
    - pkgconfig(hwdata)
    - pkgconfig(hyprutils)
    - pkgconfig(libdisplay-info)
    - pkgconfig(libdrm)
    - pkgconfig(libinput)
    - pkgconfig(libseat)
    - pkgconfig(libudev)
    - pkgconfig(opengl)
    - pkgconfig(pixman-1)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-protocols)
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
