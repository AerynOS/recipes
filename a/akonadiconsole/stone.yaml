name        : akonadiconsole
version     : "26.04.3"
release     : 11
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/akonadiconsole-26.04.3.tar.xz : d27092a87af4da2d5e3a15eb5a73497081438f6545c2d86c2f2d7ff2db5364e5
homepage    : https://invent.kde.org/pim/akonadiconsole
license     :
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.0-or-later
summary     : Akonadi management and debugging console
description : |
    Akonadi management and debugging console
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CalendarCore)
    - cmake(KF6Completion)
    - cmake(KF6Config)
    - cmake(KF6Contacts)
    - cmake(KF6Crash)
    - cmake(KF6DBusAddons)
    - cmake(KF6DocTools)
    - cmake(KF6I18n)
    - cmake(KF6ItemModels)
    - cmake(KF6ItemViews)
    - cmake(KF6KIO)
    - cmake(KF6Mime)
    - cmake(KF6TextWidgets)
    - cmake(KF6WidgetsAddons)
    - cmake(KF6XmlGui)
    - cmake(KPim6Akonadi)
    - cmake(KPim6AkonadiContactWidgets)
    - cmake(KPim6AkonadiMime)
    - cmake(KPim6AkonadiSearch)
    - cmake(KPim6CalendarSupport)
    - cmake(KPim6Libkdepim)
    - cmake(KPim6MessageViewer)
    - cmake(xapian)
setup       : |
    %patch %(pkgdir)/kf6kmime.patch
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
