name        : atuin
version     : "18.17.1"
release     : 5
homepage    : https://github.com/atuinsh/atuin
upstreams   :
    - https://github.com/atuinsh/atuin/archive/refs/tags/v18.17.1.tar.gz : 851c3f4870e4bd181b98d2dae60b9fd76ef30f05f16a85efa21ac7e7cf294862
license     : MIT
summary     : ✨ Magical shell history
description : |
    Atuin replaces your existing shell history with a SQLite database, and records additional context
    for your commands. Additionally, it provides optional and fully encrypted synchronisation of your
    history between machines, via an Atuin server
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %cargo_install
    _atuin=%(cargo_target_dir)/atuin
    ${_atuin} gen-completions --shell bash | %install_file /dev/stdin %(installroot)%(bashcompletionsdir)/atuin
    ${_atuin} gen-completions --shell zsh  | %install_file /dev/stdin %(installroot)%(zshcompletionsdir)/_atuin
    ${_atuin} gen-completions --shell fish | %install_file /dev/stdin %(installroot)%(fishcompletionsdir)/atuin.fish
check       : |
    # test fails - requires a pre-configured environment
    # since we don't patch anything we can rely on the upstream having already tested this release
    # %cargo_test
