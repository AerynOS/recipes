name        : appstream
version     : "1.1.3"
release     : 18
homepage    : https://www.freedesktop.org/wiki/Distributions/AppStream/
upstreams   :
    - https://www.freedesktop.org/software/appstream/releases/AppStream-1.1.3.tar.xz : 2624f967068427edc94f3979edae3571bb077063f5bc231f737776da527bf467
summary     : Tools and libraries to work with AppStream metadata
description : |
    AppStream is a cross-distribution effort for enhancing the way we interact with the software repositories provided by (Linux) distributions by standardizing software component metadata.
license     :
    - LGPL-2.1-or-later
builddeps   :
    # TODO: steamming, docs
    - binary(gperf)
    - binary(itstool)
    - binary(msgfmt)
    - binary(qmlcachegen6)
    - binary(vapigen)
    - binary(xsltproc)
    - pkgconfig(Qt6UiTools)
    - pkgconfig(bash-completion)
    - pkgconfig(glib-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(libblake3)
    - pkgconfig(libcurl)
    - pkgconfig(libfyaml)
    - pkgconfig(librsvg-2.0)
    - pkgconfig(libsystemd)
    - pkgconfig(libxml-2.0)
    - pkgconfig(libzstd)
    - pkgconfig(xmlb)
    - docbook
    - docbook-xsl
environment : |
    pushd AppStream-%(version)
    export CFLAGS="${CFLAGS} -Wno-error=missing-include-dirs"

    %export_docbook_catalogs
setup       : |
    %meson \
        --sysconfdir=%(datadir)/appstream \
        -Dapidocs=false \
        -Dcompose=true \
        -Dinstall-docs=false \
        -Dqt=true \
        -Dstemming=false \
        -Dvapi=true
build       : |
    %meson_build
install     : |
    %meson_install
packages    :
    - "%(name)-devel":
        paths:
            - /usr/share/gettext/its/
            - /usr/share/installed-tests/
            - /usr/share/vala/

    - "%(name)-compose":
        summary: "Compose AppStream metadata catalog from directory trees"
        description: |
            Compose AppStream metadata catalog from directory trees
        paths:
            - /usr/lib/appstream/appstreamcli-compose
            - /usr/lib/libappstream-compose.so.*
            - /usr/lib/girepository-1.0/AppStreamCompose-1.0.typelib
            - /usr/share/man/man1/appstreamcli-compose.1
            - /usr/share/metainfo/org.freedesktop.appstream.compose.metainfo.xml

    - "%(name)-compose-devel":
        summary: "Tools and libraries to work with AppStream metadata - compose tools (development files)"
        description: |
            Tools and libraries to work with AppStream metadata - compose tools (development files)
        rundeps:
            - "%(name)-compose"
            - "%(name)-devel"
        paths:
            - /usr/include/appstream-compose/
            - /usr/lib/libappstream-compose.so
            - /usr/lib/pkgconfig/appstream-compose.pc
            - /usr/share/gir-1.0/AppStreamCompose-1.0.gir

    - "%(name)-qt6":
        summary: "Tools and libraries to work with AppStream metadata - Qt6 bindings"
        description: |
            Tools and libraries to work with AppStream metadata - Qt6 bindings
        paths:
            - /usr/lib/libAppStreamQt.so.*

    - "%(name)-qt6-devel":
        summary: "Tools and libraries to work with AppStream metadata - Qt6 bindings (development files)"
        description: |
            Tools and libraries to work with AppStream metadata - Qt6 bindings (development files)
        rundeps:
            - "%(name)-qt6"
            - "%(name)-devel"
        paths:
            - /usr/include/AppStreamQt/
            - /usr/lib/cmake/AppStreamQt/
            - /usr/lib/libAppStreamQt.so
