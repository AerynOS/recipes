name        : alsa-utils
version     : "1.2.16"
release     : 10
homepage    : https://www.alsa-project.org/wiki/Main_Page
upstreams   :
    - https://github.com/alsa-project/alsa-utils/archive/refs/tags/v1.2.16.tar.gz : 4d613eac36b0b41eb11b7917f61f372cd0e56e30812319d8a8cca62a8249ea95
summary     : ALSA Utilities
description : |
    Advanced Linux Sound Architecture - Utilities
license     : GPL-2.0-or-later
builddeps   :
    - binary(ar)
    - binary(autopoint)
    - binary(tar)
    - pkgconfig(alsa)
    - pkgconfig(ncursesw)
    - pkgconfig(systemd)
setup       : |
    %reconfigure \
        --disable-alsaconf \
        --with-udev-rules-dir=/usr/lib/udev/rules.d
build       : |
    %make
install     : |
    %make_install

    # Stateless
    %tmpfiles "d /var/lib/alsa 755 root root - -"
    rmdir -v %(installroot)/var/lib/alsa \
             %(installroot)/var/lib/ \
             %(installroot)/var/
