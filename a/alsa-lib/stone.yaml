name        : alsa-lib
version     : "1.2.16.1"
release     : 19
homepage    : https://www.alsa-project.org/wiki/Main_Page
upstreams   :
    - https://www.alsa-project.org/files/pub/lib/alsa-lib-1.2.16.1.tar.bz2 : f740db7f488255944ffd4428416ee3390a96742856916433df468c281436480e
summary     : ALSA Libraries
description : |
    Advanced Linux Sound Architecture client libraries
license     :
    - LGPL-2.1-or-later
builddeps   :
    - binary(ar)
setup       : |
    %configure \
        --disable-old-symbols \
        --disable-static \
        --with-versioned=yes
build       : |
    %make V=1
install     : |
    %make_install
packages    :
    - "%(name)":
        rundeps:
            - alsa-topology-conf
            - alsa-ucm-conf
