name        : autoconf
version     : "2.73"
release     : 6
summary     : Extensible package of M4 macros
license     : GPL-2.0-or-later
homepage    : https://www.gnu.org/software/autoconf
description : |
    Extensible package of M4 macros
upstreams   :
    - https://ftp.gnu.org/gnu/autoconf/autoconf-2.73.tar.xz: 9fd672b1c8425fac2fa67fa0477b990987268b90ff36d5f016dae57be0d6b52e
builddeps   :
    - binary(m4)
    - binary(perl)
rundeps     :
    - binary(m4)
    - binary(perl)
    - binary(slibtool)
setup       : |
    %configure
build       : |
    %make
install     : |
    %make_install

    rm -v %(installroot)/usr/share/info/standards.info
tuning      :
    - lto
    - optimize: speed
