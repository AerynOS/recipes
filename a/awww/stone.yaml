name        : awww
version     : "0.12.0"
release     : 1
homepage    : https://codeberg.org/LGFae/awww
upstreams   :
    - git|https://codeberg.org/LGFae/awww.git : 7a8fc2e646b97e5ae508a44d3449e3b41345d456
summary     :  An Answer to your Wayland Wallpaper Woes
description : |
    Efficient animated wallpaper daemon for wayland, controlled at runtime
license     :
    - GPL-3.0-or-later
builddeps   :
    - binary(scdoc)
    - pkgconfig(liblz4)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-protocols)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %cargo_install awww
    %cargo_install awww-daemon

    ./doc/gen.sh

    %install_dir %(installroot)%(mandir)/man1
    cp doc/generated/* %(installroot)%(mandir)/man1/.
