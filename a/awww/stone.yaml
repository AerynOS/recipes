name        : awww
version     : "0.12.1"
release     : 2
homepage    : https://codeberg.org/LGFae/awww
upstreams   :
    - https://codeberg.org/LGFae/awww/archive/v0.12.1.tar.gz : 97b3f1c6d65d9d30e51b17092a45244f8c8549607c9207f3c98d82b28ba18fca
summary     :  An Answer to your Wayland Wallpaper Woes
description : |
    Efficient animated wallpaper daemon for wayland, controlled at runtime
license     : GPL-3.0-or-later
builddeps   :
    - binary(scdoc)
    - pkgconfig(liblz4)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-protocols)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %cargo_install awww awww-daemon

    ./doc/gen.sh

    %install_dir %(installroot)%(mandir)/man1
    cp doc/generated/* %(installroot)%(mandir)/man1/.
