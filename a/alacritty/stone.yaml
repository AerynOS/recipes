name        : alacritty
version     : "0.17.0"
release     : 8
homepage    : https://alacritty.org/
upstreams   :
    - https://github.com/alacritty/alacritty/archive/refs/tags/v0.17.0.tar.gz : 38d6527d346cda5c6049332a1f3338a89ea66cd7981b54d4c3ce801b392496f8
summary     : A cross-platform, OpenGL terminal emulator.
description : |
    Alacritty is a modern terminal emulator that comes with sensible defaults, but allows for extensive configuration.
networking  : true
license     :
    - Apache-2.0
    - MIT
builddeps   :
    - binary(cargo)
    - binary(cmake)
    - binary(make)
    - binary(scdoc)
    - pkgconfig(fontconfig)
setup       : |
    %cargo_fetch
build       : |
    %cargo_build

    for FILENAME in alacritty-bindings.5 alacritty-msg.1 alacritty.1 alacritty.5; do
        scdoc < extra/man/${FILENAME}.scd > extra/man/${FILENAME}
    done
install     : |
    %cargo_install

    %install_file LICENSE-APACHE %(installroot)%(datadir)/licenses/%(name)/LICENSE-APACHE
    %install_file LICENSE-MIT %(installroot)%(datadir)/licenses/%(name)/LICENSE-MIT

    %install_file extra/completions/alacritty.bash %(installroot)%(bashcompletionsdir)/alacritty
    %install_file extra/completions/_alacritty %(installroot)%(zshcompletionsdir)/_alacritty
    %install_file extra/completions/alacritty.fish %(installroot)%(fishcompletionsdir)/alacritty.fish

    for FILENAME in alacritty-bindings.5 alacritty-msg.1 alacritty.1 alacritty.5; do
        %install_file extra/man/${FILENAME} %(installroot)%(mandir)/man${FILENAME##*.}/${FILENAME}
    done

    %install_file extra/linux/Alacritty.desktop -t %(installroot)%(datadir)/applications/
    %install_file extra/logo/alacritty-term.svg %(installroot)%(datadir)/icons/hicolor/scalable/apps/Alacritty.svg
    %install_file extra/linux/org.alacritty.Alacritty.appdata.xml -t %(installroot)%(datadir)/metainfo/
check       : |
    %cargo_test
