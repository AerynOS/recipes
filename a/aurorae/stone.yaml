name        : aurorae
version     : "6.7.1"
release     : 21
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.1/aurorae-6.7.1.tar.xz : abef91b84d364114a45f28bc4cb087ccf242650e77373081f2aa2e25d00f11a4
homepage    : https://kde.org/plasma-desktop/
license     :
    - GPL-2.0-or-later
    - MIT
    - CC0-1.0
summary     : Themable window decorations for KWin
description : |
    Themable window decorations for KWin
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KDecoration3)
    - cmake(KF6ColorScheme)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6KCMUtils)
    - cmake(KF6NewStuff)
    - cmake(KF6Package)
    - cmake(KF6Svg)
    - cmake(Qt6Quick)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)":
        rundeps:
            # QML dep
            - kf6-ksvg
