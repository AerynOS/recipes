name        : aurorae
version     : "6.7.3"
release     : 23
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.3/aurorae-6.7.3.tar.xz : a7953e8c65ca653a01025f76aa06cec13c40999665f79251f006f6f01248ecec
homepage    : https://kde.org/plasma-desktop/
license     :
    - GPL-2.0-or-later
    - MIT
    - CC0-1.0
summary     : Themable window decorations for KWin
description : |
    Themable window decorations for KWin
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KDecoration3)
    - cmake(KF6ColorScheme)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6KCMUtils)
    - cmake(KF6NewStuff)
    - cmake(KF6Package)
    - cmake(KF6Svg)
    - cmake(Qt6Quick)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)":
        rundeps:
            # QML dep
            - kf6-ksvg
