name        : isoimagewriter
version     : "26.04.2"
release     : 2
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/isoimagewriter-26.04.2.tar.xz : b271665789186168ea635da6f941660198d59bdbcd41046e783947d80b5ba088
homepage    : https://apps.kde.org/isoimagewriter/
license     : GPL-3.0-or-later
summary     : ISO Image Writer is a KDE tool to write a .iso file to a USB disk
description : |
    ISO Image Writer is a KDE tool to write a .iso file to a USB disk
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Gpgmepp)
    - cmake(KF6Archive)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6I18n)
    - cmake(KF6IconThemes)
    - cmake(KF6Solid)
    - cmake(KF6WidgetsAddons)
    - cmake(QGpgmeQt6)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
