name        : inputplumber
version     : "0.76.0"
release     : 55
homepage    : https://github.com/ShadowBlip/InputPlumber
upstreams   :
    - https://github.com/ShadowBlip/InputPlumber/archive/refs/tags/v0.76.0.tar.gz : b60cf4352016a23560f15187ed005a81b9da95dd7e9efb0700a4c94f510cc5f9
summary     : Open source input router and remapper daemon for Linux
description : |
    InputPlumber is an open source input routing and control daemon for Linux.
    It can be used to combine any number of input devices (like gamepads, mice, and keyboards)
    and translate their input to a variety of virtual device formats.
license     : GPL-3.0-or-later
networking  : true
builddeps   :
    - binary(llvm-config-22)
    - pkgconfig(libevdev)
    - pkgconfig(libiio)
    - pkgconfig(libudev)
    - clang-devel
setup       : |
    # fix folder permissions due to coreutils 0.7.0+
    find rootfs -type d -exec chmod 755 {} \;
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %cargo_install
    # preserve use of our own macros so we dont use the generic cargo invocations in the makefile,
    # which basically just copies all of rootfs/ to the installroot
    %install_dir %(installroot)/usr
    cp -R rootfs/usr/* %(installroot)/usr/.
    rm -rf %(installroot)%(datadir)/dbus-1/system-services

    # Disable system-wide upon install
    %install_file %(pkgdir)/inputplumber.preset -t %(installroot)/%(libdir)/systemd/system-preset
