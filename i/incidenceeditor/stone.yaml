name        : incidenceeditor
version     : "26.04.3"
release     : 16
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/incidenceeditor-26.04.3.tar.xz : a14342bbc4531153802d74d3405df459f4611554571f559824811e52b2886d36
homepage    : https://kontact.kde.org/
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
summary     : KDE PIM incidence editor
description : |
    KDE PIM incidence editor.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CalendarCore)
    - cmake(KF6Codecs)
    - cmake(KF6GuiAddons)
    - cmake(KF6I18n)
    - cmake(KF6IconThemes)
    - cmake(KF6KIO)
    - cmake(KF6Mime)
    - cmake(KF6TextWidgets)
    - cmake(KGantt6)
    - cmake(KPim6Akonadi)
    - cmake(KPim6AkonadiCalendar)
    - cmake(KPim6AkonadiMime)
    - cmake(KPim6CalendarSupport)
    - cmake(KPim6CalendarUtils)
    - cmake(KPim6EventViews)
    - cmake(KPim6IdentityManagementCore)
    - cmake(KPim6LdapWidgets)
    - cmake(KPim6Libkdepim)
    - cmake(KPim6PimCommonAkonadi)
    - cmake(KPim6TextEdit)
setup       : |
    %patch %(pkgdir)/kf6kmime.patch
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KF6CalendarCore)
            - cmake(KF6Mime)
            - cmake(KPim6AkonadiMime)
            - cmake(KPim6CalendarSupport)
            - cmake(KPim6CalendarUtils)
            - cmake(KPim6EventViews)
