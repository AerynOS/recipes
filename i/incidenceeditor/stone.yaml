name        : incidenceeditor
version     : "26.04.2"
release     : 14
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/incidenceeditor-26.04.2.tar.xz : ad3da4dd53a47f072c16e277fe3b841ad0e3dddf29906cf9492fef32ee7eb664
homepage    : https://kontact.kde.org/
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
summary     : KDE PIM incidence editor
description : |
    KDE PIM incidence editor.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CalendarCore)
    - cmake(KF6Codecs)
    - cmake(KF6GuiAddons)
    - cmake(KF6I18n)
    - cmake(KF6IconThemes)
    - cmake(KF6KIO)
    - cmake(KF6TextWidgets)
    - cmake(KGantt6)
    - cmake(KPim6Akonadi)
    - cmake(KPim6AkonadiCalendar)
    - cmake(KPim6AkonadiMime)
    - cmake(KPim6CalendarSupport)
    - cmake(KPim6CalendarUtils)
    - cmake(KPim6EventViews)
    - cmake(KPim6IdentityManagementCore)
    - cmake(KPim6LdapWidgets)
    - cmake(KPim6Libkdepim)
    - cmake(KPim6Mime)
    - cmake(KPim6PimCommonAkonadi)
    - cmake(KPim6TextEdit)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KF6CalendarCore)
            - cmake(KPim6AkonadiMime)
            - cmake(KPim6CalendarSupport)
            - cmake(KPim6CalendarUtils)
            - cmake(KPim6EventViews)
            - cmake(KPim6Mime)
