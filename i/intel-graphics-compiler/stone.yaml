name        : intel-graphics-compiler
version     : "2.38.2"
release     : 7
homepage    : https://github.com/intel/intel-graphics-compiler
upstreams   :
    - https://github.com/intel/intel-graphics-compiler/archive/refs/tags/v2.38.2.tar.gz:
        hash: 24f707f08d9b87e7e6857f8a83d9944990189c051ce9b3c91c291bdc1563246f
        unpackdir: igc
    - https://github.com/intel/vc-intrinsics/archive/refs/tags/v0.25.0.tar.gz:
        hash: 83d6e0528feb6a47f7818e7c1dd3305dd8a48fb1103d279571dad517a93a8d39
        unpackdir: vc-intrinsics
    - https://github.com/llvm/llvm-project/releases/download/llvmorg-17.0.6/llvm-project-17.0.6.src.tar.xz:
        hash: 58a8818c60e6627064f312dbf46c02d9949956558340938b71cf731ad8bc0813
        unpackdir: llvm-project
    - git|https://github.com/intel/opencl-clang.git:
        ref: 059ad9df664d9cdf54632e12b0011130dcadb46d
        clonedir: llvm-project/llvm/projects/opencl-clang
    - git|https://github.com/KhronosGroup/SPIRV-LLVM-Translator.git:
        ref: 6798e15796e21339af79e248c067cfb746c60d0c
        clonedir: llvm-project/llvm/projects/llvm-spirv
summary     : Intel Graphics Compiler for OpenCL
description : |
    The Intel® Graphics Compiler for OpenCL™ is an LLVM-based compiler for OpenCL™ targeting Intel® graphics hardware architecture.
license     : MIT
tuning      : # Copypasta from LLVM (???)
    - fortify: false
    - frame-pointer: false
    - harden: false
    - icf: all
    - lto: false
    - nosemantic: true
    - optimize: speed
    - symbolic: all
builddeps   :
    - binary(bison)
    - binary(flex)
    - binary(mold)
    - binary(objdump)
    - binary(patch)
    - binary(python)
    - cmake(SPIRV-Headers)
    - cmake(SPIRV-Tools)
    - cmake(libxml2)
    - pkgconfig(libedit)
    - pkgconfig(libzstd)
    - pkgconfig(protobuf)
    - pkgconfig(valgrind)
    - pkgconfig(zlib)
    - python(mako)
    - python(pygments)
    - python(pyyaml)
setup       : |
    # PR for replacing `<ciso646>` with `<version>`
    %patch %(pkgdir)/383.patch
    %patch %(pkgdir)/werror.patch

    # Fake-out opencl-clang into thinking its a git repo
    # so that it can apply patches to itself (From Nix)
    git -C ../llvm-project init
    git -C ../llvm-project -c user.name=boulder -c user.email= commit --allow-empty -m stub
    pushd ../
    %patch %(pkgdir)/use-patch-instead-of-git-am.patch
    popd

    %cmake \
        -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
        -DIGC_OPTION__ARCHITECTURE_TARGET=Linux64 \
        -DIGC_OPTION__CLANG_MODE=Source \
        -DIGC_OPTION__LLD_MODE=Source \
        -DIGC_OPTION__LLVM_PREFERRED_VERSION="17.0.6" \
        -DIGC_OPTION__LLVM_MODE=Source \
        -DIGC_OPTION__LINK_KHRONOS_SPIRV_TRANSLATOR=ON \
        -DIGC_OPTION__SPIRV_TOOLS_MODE=Prebuilds \
        -DIGC_OPTION__USE_PREINSTALLED_SPIRV_HEADERS=ON \
        -DIGC_OPTION__VC_INTRINSICS_MODE=Source \
        -DLLVM_EXTERNAL_SPIRV_HEADERS_SOURCE_DIR=/usr/include/spirv/ \
        -Wno-dev
build       : |
    %cmake_build
install     : |
    %cmake_install

    # Move and Remove stuff that conflict
    mv %(installroot)%(includedir)/opencl-c{,-base}.h %(installroot)%(includedir)/igc
    rm -f %(installroot)%(bindir)/lld
