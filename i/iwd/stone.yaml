name        : iwd
version     : "3.12"
release     : 9
homepage    : https://iwd.wiki.kernel.org/
upstreams   :
    - https://mirrors.edge.kernel.org/pub/linux/network/wireless/iwd-3.12.tar.xz : d89a5e45c7180170e19be828f9e944a768c593758094fc57a358d0e7c4cb1a49
summary     : iNet Wireless Daemon
description : |
    iNet Wireless Daemon
license     :
    - LGPL-2.1-or-later
builddeps   :
    - binary(rst2man)
    - pkgconfig(dbus-1)
    - pkgconfig(libedit)
    - pkgconfig(readline)
    - pkgconfig(systemd)
setup       : |
    %configure \
        --enable-hwsim \
        --enable-libedit \
        --enable-ofono \
        --enable-tools \
        --enable-wired
build       : |
    %make
install     : |
    %make_install
