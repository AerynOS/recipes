name        : sdl2-image
version     : "2.8.12"
release     : 7
homepage    : https://www.libsdl.org/
upstreams   :
    - https://github.com/libsdl-org/SDL_image/releases/download/release-2.8.12/SDL2_image-2.8.12.tar.gz : 393f5efb50536ec13ca4f4affb69cc9966d3c3f969e6c5e701faddf9f9785381
summary     : SDL2 - Image Loading Support
description : |
    SDL2 - Image Loading Support
license     :
    - Zlib
builddeps   :
    - pkgconfig(libavif)
    - pkgconfig(libjpeg)
    - pkgconfig(libjxl)
    - pkgconfig(libpng)
    - pkgconfig(libtiff-4)
    - pkgconfig(libwebp)
    - pkgconfig(libwebpdemux)
    - pkgconfig(sdl2-compat)
setup       : |
    %patch %(pkgdir)/0001-pkgconfig-Require-sdl2_compat.patch

    %configure --disable-static
build       : |
    %make
install     : |
    %make_install
