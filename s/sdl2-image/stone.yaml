name        : sdl2-image
version     : "2.8.10"
release     : 6
homepage    : https://www.libsdl.org/
upstreams   :
    - https://github.com/libsdl-org/SDL_image/releases/download/release-2.8.10/SDL2_image-2.8.10.tar.gz : ebc059d01c007a62f4b04f10cf858527c875062532296943174df9a80264fd65
summary     : SDL2 - Image Loading Support
description : |
    SDL2 - Image Loading Support
license     :
    - Zlib
builddeps   :
    - pkgconfig(libavif)
    - pkgconfig(libjpeg)
    - pkgconfig(libjxl)
    - pkgconfig(libpng)
    - pkgconfig(libtiff-4)
    - pkgconfig(libwebp)
    - pkgconfig(libwebpdemux)
    - pkgconfig(sdl2-compat)
setup       : |
    %patch %(pkgdir)/0001-pkgconfig-Require-sdl2_compat.patch

    %configure --disable-static
build       : |
    %make
install     : |
    %make_install
