name        : swaybg
version     : "1.2.2"
release     : 4
homepage    : https://github.com/swaywm/swaybg
upstreams   :
    - https://github.com/swaywm/swaybg/releases/download/v1.2.2/swaybg-1.2.2.tar.gz : a6652a0060a0bea3c3318d9d03b6dddac34f6aeca01b883eef9e58281f5202a1
summary     : Wallpaper utility for Wayland compositors.
description : |
    swaybg is a wallpaper utility for Wayland compositors. It is compatible
    with any Wayland compositor which implements the wlr-layer-shell protocol
    and wl_output version 4.
license     :
    - MIT
builddeps   :
    - binary(scdoc)
    - pkgconfig(cairo)
    - pkgconfig(gdk-pixbuf-2.0)
    - pkgconfig(wayland-protocols)
    - pkgconfig(wayland-client)
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
