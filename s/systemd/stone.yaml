name        : systemd
version     : "259.7"
release     : 87
summary     : A System and Service Manager
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
    - MIT
homepage    : http://www.freedesktop.org/wiki/Software/systemd
description : |
    A System and Service Manager
upstreams   :
    - https://github.com/systemd/systemd/archive/refs/tags/v259.7.tar.gz : 80e9f60f62154e0f76a97bbdd8d020c84f723c3f4a9fded2cdb880efd11b877f
builddeps   :
    - binary(bpftool)
    - binary(gcc)
    - binary(gperf)
    - binary(m4)
    - binary(readelf.py)
    - binary(rsync)
    - binary(xsltproc)
    - pkgconfig(blkid)
    - pkgconfig(bzip2)
    - pkgconfig(dbus-1)
    - pkgconfig(fdisk)
    - pkgconfig(glib-2.0)
    - pkgconfig(gpg-error)
    - pkgconfig(libacl)
    - pkgconfig(libarchive)
    - pkgconfig(libattr)
    - pkgconfig(libbpf)
    - pkgconfig(libcryptsetup)
    - pkgconfig(libcurl)
    - pkgconfig(libdw)
    - pkgconfig(libffi)
    - pkgconfig(libfido2)
    - pkgconfig(libgcrypt)
    - pkgconfig(libidn2)
    - pkgconfig(libkmod)
    - pkgconfig(liblz4)
    - pkgconfig(liblzma)
    - pkgconfig(libmicrohttpd)
    - pkgconfig(libpcre2-8)
    - pkgconfig(libqrencode)
    - pkgconfig(libseccomp)
    - pkgconfig(mount)
    - pkgconfig(openssl)
    - pkgconfig(p11-kit-1)
    - pkgconfig(pam)
    - pkgconfig(polkit-gobject-1)
    - pkgconfig(pwquality)
    - pkgconfig(tss2-esys)
    - pkgconfig(xkbcommon)
    - pkgconfig(zlib)
    - pkgconfig32(libxcrypt)
    - pkgconfig32(libzstd)
    - python(jinja2)
    - python(lxml)
    - python(pefile)
    - docbook
    - docbook-xsl
    - gettext-devel
    # libaudit (+32bit)
    # systemtap
    # libselinux/libapparmor
rundeps     :
    # Dash is now the default system shell (/usr/bin/sh) so we need to ensure it is always present and pulled in on existing systems
    - binary(dash)
    - binary(ntp-daemon)
    - binary(setfont)
    - system-accounts
    - terminus-font
    - tzdata
emul32      : true
environment : |
    %export_docbook_catalogs
setup       : |
    %patch %(pkgdir)/patches/downstream/0001-tmpfiles-Make-var-cache-ldconfig-world-readable.patch
    %patch %(pkgdir)/patches/downstream/0001-tmpfiles-Allow-nsswitch-clobber-at-non-boot-interval.patch
    %patch %(pkgdir)/patches/downstream/0001-gpt-auto-generate-Stop-automounting-xbootldr-and-esp.patch
    %patch %(pkgdir)/patches/downstream/0001-path-lookup-Include-stateless-xdg-path-by-default.patch
    # Needed because we conservatively enable agetty on all ttys for now
    # due to KMSCon currently stealing focus from display managers
    %patch %(pkgdir)/patches/downstream/0001-downstream-Allow-default-font-to-be-set.patch
    %patch %(pkgdir)/patches/downstream/0001-Don-t-build-32bit-EFI-stub.patch

    # Upstream patches
    # None for now

    # ERROR: File fuzz-unit-file/dm-back-slash.swap does not exist.
    # mv "test/fuzz/fuzz-unit-file/dm-back\x2dslash.swap" "test/fuzz/fuzz-unit-file/dm-back-slash.swap"

    _IS_64BIT_BOOL="true"
    _IS_64BIT_FEAT="enabled"
    if [[ %(target_triple) = i686* ]]; then
        _IS_64BIT_BOOL="false"
        _IS_64BIT_FEAT="disabled"
    fi

    # TODO:
    # - Figure out what to do about run0. Do we keep it? If so it should be tested and configured
    # - Make sure that openssh works with the stateless paths that systemd installs
    %meson \
        -Dacl=${_IS_64BIT_FEAT} \
        -Dadm-gid=16 \
        -Dadm-group=true \
        -Danalyze=${_IS_64BIT_BOOL} \
        -Daudio-gid=11 \
        -Dbacklight=${_IS_64BIT_BOOL} \
        -Dbinfmt=${_IS_64BIT_BOOL} \
        -Dblkid=${_IS_64BIT_FEAT} \
        -Dbootloader=${_IS_64BIT_FEAT} \
        -Dbpf-compiler="clang" \
        -Dbpf-framework=${_IS_64BIT_FEAT} \
        -Dbzip2=${_IS_64BIT_FEAT} \
        -Dcdrom-gid=15 \
        -Dcoredump=${_IS_64BIT_BOOL} \
        -Dcreate-log-dirs=false \
        -Ddefault-compression=zstd \
        -Ddefault-dnssec=no \
        -Ddefault-timeout-sec=5 \
        -Ddialout-gid=10 \
        -Ddisk-gid=8 \
        -Ddns-over-tls=${_IS_64BIT_BOOL} \
        -Defi=${_IS_64BIT_BOOL} \
        -Delfutils=${_IS_64BIT_FEAT} \
        -Denvironment-d=${_IS_64BIT_BOOL} \
        -Dfdisk=${_IS_64BIT_FEAT} \
        -Dfirstboot=${_IS_64BIT_BOOL} \
        -Dfirst-boot-full-preset=true \
        -Dfuzz-tests=false \
        -Dgcrypt=${_IS_64BIT_FEAT} \
        -Dgshadow=${_IS_64BIT_BOOL} \
        -Dgnutls=${_IS_64BIT_FEAT} \
        -Dhibernate=${_IS_64BIT_BOOL} \
        -Dhomed=${_IS_64BIT_FEAT} \
        -Dhostnamed=${_IS_64BIT_BOOL} \
        -Didn=${_IS_64BIT_BOOL} \
        -Dima=${_IS_64BIT_BOOL} \
        -Dinitrd=${_IS_64BIT_BOOL} \
        -Dinstall-sysconfdir=false \
        -Dinstall-tests=false \
        -Dipe=${_IS_64BIT_BOOL} \
        -Dkernel-install=false \
        -Dkmem-gid=3 \
        -Dkmod=${_IS_64BIT_FEAT} \
        -Dkvm-gid=61 \
        -Dldconfig=${_IS_64BIT_BOOL} \
        -Dlibarchive=${_IS_64BIT_FEAT} \
        -Dlibcryptsetup=${_IS_64BIT_FEAT} \
        -Dlibcurl=${_IS_64BIT_FEAT} \
        -Dlibfido2=${_IS_64BIT_FEAT} \
        -Dlibidn2=${_IS_64BIT_FEAT} \
        -Dlocaled=${_IS_64BIT_BOOL} \
        -Dlogind=${_IS_64BIT_BOOL} \
        -Dlp-gid=9 \
        -Dmachined=${_IS_64BIT_BOOL} \
        -Dman=${_IS_64BIT_FEAT} \
        -Dmicrohttpd=${_IS_64BIT_FEAT} \
        -Dmode=release \
        -Dmountfsd=${_IS_64BIT_BOOL} \
        -Dnetworkd=${_IS_64BIT_BOOL} \
        -Dnobody-group=nobody \
        -Dnobody-user=nobody \
        -Dnsresourced=${_IS_64BIT_BOOL} \
        -Dnss-systemd=true \
        -Dok-color=highlight-blue \
        -Doomd=${_IS_64BIT_BOOL} \
        -Dopenssl=${_IS_64BIT_FEAT} \
        -Dp11kit=${_IS_64BIT_FEAT} \
        -Dpam=${_IS_64BIT_FEAT} \
        -Dpamconfdir="%(vendordir)/pam.d" \
        -Dpamlibdir="%(libdir)/security" \
        -Dpcre2=${_IS_64BIT_FEAT} \
        -Dpolkit=${_IS_64BIT_FEAT} \
        -Dportabled=${_IS_64BIT_BOOL} \
        -Dpstore=${_IS_64BIT_BOOL} \
        -Dpwquality=${_IS_64BIT_FEAT} \
        -Dqrencode=${_IS_64BIT_FEAT} \
        -Dquotacheck=${_IS_64BIT_BOOL} \
        -Drandomseed=${_IS_64BIT_BOOL} \
        -Drender-gid=30 \
        -Drepart=${_IS_64BIT_FEAT} \
        -Drfkill=${_IS_64BIT_BOOL} \
        -Drpmmacrosdir=no \
        -Dsbat-distro="aerynos" \
        -Dsbat-distro-summary="AerynOS" \
        -Dsbat-distro-pkgname="%(name)" \
        -Dsbat-distro-version="%(version)" \
        -Dsbat-distro-url="https://aerynos.com/" \
        -Dseccomp=${_IS_64BIT_FEAT} \
        -Dsgx-gid=405 \
        -Dshellprofiledir="%(vendordir)/profile.d" \
        -Dslow-tests=false \
        -Dsmack=${_IS_64BIT_BOOL} \
        -Dsplit-bin=true \
        -Dsshconfdir="%(vendordir)/ssh/ssh_config.d" \
        -Dsshdconfdir="%(vendordir)/ssh/sshd_config.d" \
        -Dstatus-unit-format-default=combined \
        -Dstoragetm=${_IS_64BIT_BOOL} \
        -Dsysext=${_IS_64BIT_BOOL} \
        -Dsysupdate=disabled \
        -Dsysupdated=disabled \
        -Dsysusers=${_IS_64BIT_BOOL} \
        -Dsysvinit-path="" \
        -Dtape-gid=4 \
        -Dtests=false \
        -Dtimedated=${_IS_64BIT_BOOL} \
        -Dtimesyncd=${_IS_64BIT_BOOL} \
        -Dtmpfiles=${_IS_64BIT_BOOL} \
        -Dtpm=${_IS_64BIT_BOOL} \
        -Dtpm2=${_IS_64BIT_FEAT} \
        -Dtty-gid=5 \
        -Duser-path=/usr/local/bin:/usr/local/sbin:/usr/bin:/usr/sbin \
        -Duserdb=${_IS_64BIT_BOOL}  \
        -Dusers-gid=100 \
        -Dutmp=${_IS_64BIT_BOOL} \
        -Dutmp-gid=13 \
        -Dvconsole=${_IS_64BIT_BOOL} \
        -Dvideo-gid=12 \
        -Dvmspawn=${_IS_64BIT_FEAT} \
        -Dwheel-gid=28 \
        -Dwheel-group=true \
        -Dxdg-autostart=${_IS_64BIT_BOOL} \
        -Dxkbcommon=${_IS_64BIT_FEAT} \
        -Dzlib=${_IS_64BIT_FEAT}
build       : |
    %meson_build
install     : |
    %meson_install
    if [[ %(target_triple) = i686* ]]; then
        # Don't need these for the systemd libs
        rm -rfv %(installroot)%(libdir)/systemd/

        for i in %(name)-32bit %(name)-32bit-devel; do
            %install_dir %(installroot)%(docdir)/${i}
            echo "DEPRECATED" > %(installroot)%(docdir)/${i}/README
        done

        exit 0
    fi

    # Stateless: Clean up /var directories, they are created via tmpfiles already
    rmdir %(installroot)/var/lib/systemd %(installroot)/var/lib %(installroot)/var

    # Don't clobber pam!
    rm -rf %(installroot)%(datadir)/factory/etc/pam.d

    # config.
    %install_file %(pkgdir)/configs/journald/00-journald.conf %(installroot)%(libdir)/systemd/journald.conf.d/00-journald.conf
    %install_file %(pkgdir)/configs/10-timeout-abort.conf %(installroot)%(libdir)/systemd/system/service.d/10-timeout-abort.conf
    %install_file %(pkgdir)/configs/00-timeouts.conf %(installroot)%(libdir)/systemd/system.conf.d/00-timeouts.conf
    %install_file %(pkgdir)/configs/00-timeouts.conf %(installroot)%(libdir)/systemd/user.conf.d/00-timeouts.conf
    %install_file %(pkgdir)/configs/10-map-count.conf %(installroot)%(libdir)/sysctl.d/10-map-count.conf

    # Default to BFQ scheduler for rotational drives, and kyber for sata/nvme SSDs
    %install_file %(pkgdir)/configs/60-block-scheduler.rules -t %(installroot)%(udevrulesdir)

    # Coredump configuration
    %install_file %(pkgdir)/configs/coredump/limits.conf %(installroot)%(vendordir)/security/limits.d/20-coredump-aeryn.conf
    %install_file %(pkgdir)/configs/coredump/manager.conf %(installroot)%(libdir)/systemd/system.conf.d/20-coredump-aeryn.conf
    %install_file %(pkgdir)/configs/coredump/manager.conf %(installroot)%(libdir)/systemd/user.conf.d/20-coredump-aeryn.conf

    # OOMD configuration
    %install_file %(pkgdir)/configs/oomd/defaults.conf %(installroot)%(libdir)/systemd/oomd.conf.d/10-oomd-defaults.conf
    %install_file %(pkgdir)/configs/oomd/10-oomd-root-slice-defaults.conf %(installroot)%(libdir)/systemd//system/-.slice.d/10-oomd-root-slice-defaults.conf
    %install_file %(pkgdir)/configs/oomd/10-oomd-user-service-defaults.conf %(installroot)%(libdir)/systemd/system/user@.service.d/10-oomd-defaults.conf

    # Resolved configuration
    %install_file %(pkgdir)/configs/resolved/00-disable-mdns.conf %(installroot)%(libdir)/systemd/resolved.conf.d/00-disable-mdns.conf

    # Allow kmscon to take over
    # - disable until further notice due to KMSCon stealing focus from display managers
    # rm -v %(installroot)%(libdir)/systemd/system/autovt@.service

    # ... but conservatively enable getty on tty1 for rescue.target and troubleshooting
    # This also enables users to start e.g. sway from tty1 (sway et al. don't work with kmscon)
    # ln -srv %(installroot)%(libdir)/systemd/system/getty@.service %(installroot)%(libdir)/systemd/system/getty@tty1.service

    # Workaround for systemd not supporting `--global` preset-all on first-boot. Taken from https://github.com/systemd/particleos/blob/main/mkosi.extra/usr/lib/systemd/system/preset-global.service
    # Systemd issue: https://github.com/systemd/systemd/issues/30206
    %install_file %(pkgdir)/units/preset-global.service %(installroot)%(libdir)/systemd/system/preset-global.service
    # We need to enable this manually instead of via preset so as to avoid potential ordering issues
    %install_dir %(installroot)%(libdir)/systemd/system/basic.target.wants/
    ln -srv %(installroot)%(libdir)/systemd/system/preset-global.service %(installroot)%(libdir)/systemd/system/basic.target.wants/preset-global.service

    # Helper script for use by other triggers
    %install_exe %(pkgdir)/systemd-hook.sh %(installroot)/usr/share/moss/helpers/systemd-hook.sh

    # Stateful preset support
    %tmpfiles "d /var/lib/moss/triggers/presets 0775 root root -"
    %install_exe %(pkgdir)/preset-wrapper.sh %(installroot)/usr/share/moss/helpers/preset-wrapper.sh

    # install necessary system triggers
    %install_file %(pkgdir)/systemd_etcfiles.yaml %(installroot)/usr/share/moss/triggers/sys.d/systemd_etcfiles.yaml
    %install_file %(pkgdir)/systemd_tmpfiles.yaml %(installroot)/usr/share/moss/triggers/sys.d/systemd_tmpfiles.yaml
    %install_file %(pkgdir)/systemd_sysusers.yaml %(installroot)/usr/share/moss/triggers/sys.d/systemd_sysusers.yaml
    %install_file %(pkgdir)/systemd_binfmt.yaml %(installroot)/usr/share/moss/triggers/sys.d/systemd_binfmt.yaml
    %install_file %(pkgdir)/systemd_presets.yaml %(installroot)/usr/share/moss/triggers/sys.d/systemd_presets.yaml
    %install_file %(pkgdir)/systemd_machine_id.yaml %(installroot)/usr/share/moss/triggers/sys.d/systemd_machine_id.yaml

    # And transaction triggers
    %install_file %(pkgdir)/systemd_hwdb.yaml %(installroot)/usr/share/moss/triggers/tx.d/systemd_hwdb.yaml

    %install_exe -t %(installroot)/usr/lib/systemd/system-environment-generators %(pkgdir)/configs/50-xdg-{config,data}-dirs

    %install_dir %(installroot)%(docdir)/%(name)-devel/
    echo "DEPRECATED" > %(installroot)%(docdir)/%(name)-devel/README
tuning      :
    - fortify: lvl2 # lvl3 causes segfaults on boot with Clang
packages    :
    - "%(name)-libs":
        summary: Libraries for systemd and udev
        description: Libraries for systemd and udev
        rundeps:
            # Default compression for everything thus required
            - soname(libzstd.so.1(x86_64))
        paths:
            - /usr/lib/libnss_*.so.*
            - /usr/lib/libsystemd.so.*
            - /usr/lib/libudev.so.*
            - /usr/share/man/man8/libnss_*.so.*

    - "%(name)-libs-devel":
        summary: Libraries for systemd and udev - Devel
        description: Libraries for systemd and udev - Devel
        rundeps:
            - "%(name)-libs"
        paths:
            - /usr/include/libudev.h
            - /usr/include/systemd/
            - /usr/lib/libsystemd.so
            - /usr/lib/libudev.so
            - /usr/lib/pkgconfig/
            - /usr/share/dbus-1/interfaces/
            - /usr/share/man/man3/
            - /usr/share/pkgconfig/

    - "%(name)-shared":
        summary: Internal libraries used by various systemd binaries
        description: Internal libraries used by various systemd binaries
        rundeps:
            # This specific list should only contain dependencies used by sysusers/tmpfiles
            - soname(libacl.so.1(x86_64))
            # libaudit
        paths:
            - /usr/lib/systemd/libsystemd-core-*.so
            - /usr/lib/systemd/libsystemd-shared-*.so

    - "%(name)":
        rundeps:
            - "%(name)-libs"
            - "%(name)-sysusers"
            - "%(name)-tmpfiles"
            # These dependencies are all dlopen()ed
            # readelf -p .note.dlopen /usr/lib/systemd/libsystemd-shared-*.so
            - soname(libacl.so.1(x86_64))
            - soname(libarchive.so.13(x86_64))
            - soname(libbpf.so.1(x86_64))
            - soname(libblkid.so.1(x86_64))
            - soname(libdw.so.1(x86_64))
            - soname(libelf.so.1(x86_64))
            - soname(libidn2.so.0(x86_64))
            - soname(libkmod.so.2(x86_64))
            - soname(libmount.so.1(x86_64))
            - soname(libpam.so.0(x86_64))
            - soname(libpcre2-8.so.0(x86_64))
            - soname(libpwquality.so.1(x86_64))
            - soname(libqrencode.so.4(x86_64))
            - soname(libseccomp.so.2(x86_64))
            - soname(libzstd.so.1(x86_64))
            # Keyboard layout support
            - soname(libxkbcommon.so.0(x86_64))
            # Disk encryption
            - soname(libcryptsetup.so.12(x86_64))
            # TPM support
            - soname(libtss2-esys.so.0(x86_64))
            - soname(libtss2-mu.so.0(x86_64))
            - soname(libtss2-rc.so.0(x86_64))

    - "%(name)-32bit-libs":
        summary: Libraries for systemd and udev - 32bit
        description: Libraries for systemd and udev - 32bit
        rundeps:
            # Somewhere between Systemd v254 and v257 compression algorithms were switched to dlopen. Our build supports xz/lz4/zstd but since
            # zstd is the default make that the only required dependency
            - soname(libzstd.so.1(386))
        paths:
            - /usr/lib32/lib*.so.*

    - "%(name)-32bit-libs-devel":
        summary: Libraries for systemd and udev - 32bit Devel
        description: Libraries for systemd and udev - 32bit Devel
        rundeps:
            - "%(name)-32bit-libs"
            - "%(name)-libs-devel"
        paths:
            - /usr/lib32/lib*.so
            - /usr/lib32/pkgconfig/

    # sysusers and tmpfiles are split so that they can be used as dependencies without pulling in the rest of systemd
    - "%(name)-sysusers":
        summary: Creates system users and groups
        description: Creates system users and groups
        paths:
            - /usr/bin/systemd-sysusers
            - /usr/lib/systemd/system/sysinit.target.wants/systemd-sysusers.service
            - /usr/lib/systemd/system/systemd-sysusers.service
            - /usr/lib/sysusers.d/
            - /usr/share/man/man5/sysusers.d.5*
            - /usr/share/man/man8/systemd-sysusers*.8*
            - /usr/share/moss/triggers/sys.d/systemd_sysusers.yaml

    - "%(name)-tmpfiles":
        summary: Creates, deletes, and cleans up files and directories
        description: Creates, deletes, and cleans up files and directories
        rundeps:
            - "%(name)-sysusers"
        paths:
            - /usr/bin/systemd-tmpfiles
            - /usr/lib/systemd/system/sysinit.target.wants/systemd-tmpfiles*
            - /usr/lib/systemd/system/systemd-tmpfiles*
            - /usr/lib/systemd/system/timers.target.wants/systemd-tmpfiles*
            - /usr/lib/systemd/user/systemd-tmpfiles*
            - /usr/lib/tmpfiles.d/
            - /usr/share/man/man5/tmpfiles.d.5*
            - /usr/share/man/man8/systemd-tmpfiles*
            - /usr/share/moss/triggers/sys.d/systemd_tmpfiles.yaml
            - /usr/share/zsh/site-functions/_systemd-tmpfiles

    - "%(name)-boot":
        summary: Simple UEFI boot manager
        description: Simple UEFI boot manager
        rundeps:
            - "%(name)"
        paths:
            - /usr/bin/bootctl
            - /usr/lib/systemd/boot/efi/
            - /usr/lib/systemd/system-generators/systemd-bless-boot-generator
            - /usr/lib/systemd/system/sockets.target.wants/systemd-bootctl.socket
            - /usr/lib/systemd/system/sysinit.target.wants/systemd-boot-random-seed.service
            - /usr/lib/systemd/system/systemd-bless-boot.service
            - /usr/lib/systemd/system/systemd-boot-random-seed.service
            - /usr/lib/systemd/system/systemd-boot-clear-sysfail.service
            - /usr/lib/systemd/system/systemd-boot-random-seed.service
            - /usr/lib/systemd/system/systemd-boot-update.service
            - /usr/lib/systemd/system/systemd-bootctl@.service
            - /usr/lib/systemd/system/systemd-bootctl*.socket
            - /usr/lib/systemd/systemd-bless-boot
            - /usr/share/bash-completion/completions/bootctl
            - /usr/share/man/man1/bootctl.1*
            - /usr/share/man/man5/loader.conf.5*
            - /usr/share/man/man7/sd-boot.7*
            - /usr/share/man/man7/sd-stub.7*
            - /usr/share/man/man7/systemd-boot.7*
            - /usr/share/man/man7/systemd-stub.7*
            - /usr/share/man/man8/systemd-bless-boot*
            - /usr/share/man/man8/systemd-boot-random-seed.service.8*
            - /usr/share/zsh/site-functions/_bootctl

    - "%(name)-coredump":
        summary: Tools for storing and retrieving coredumps
        description: Tools for storing and retrieving coredumps
        rundeps:
            - "%(name)"
        paths:
            - /usr/bin/coredumpctl
            - /usr/lib/sysctl.d/50-coredump.conf
            - /usr/lib/systemd/system/sockets.target.wants/systemd-coredump.socket
            - /usr/lib/systemd/system/systemd-coredump*.*
            - /usr/lib/systemd/system.conf.d/20-coredump-aeryn.conf
            - /usr/lib/systemd/systemd-coredump
            - /usr/lib/sysusers.d/systemd-coredump.conf
            - /usr/lib/systemd/user.conf.d/20-coredump-aeryn.conf
            - /usr/share/bash-completion/completions/coredumpctl
            - /usr/share/defaults/security/limits.d/20-coredump-aeryn.conf
            - /usr/share/man/man1/coredumpctl.1*
            - /usr/share/man/man5/coredump.conf*.5*
            - /usr/share/man/man8/systemd-coredump*.8*
            - /usr/share/zsh/site-functions/_coredumpctl

    - "%(name)-homed":
        summary: Home area manager
        description: Home area manager
        rundeps:
            - "%(name)"
            - "%(name)-userdbd"
        paths:
            - /usr/bin/homectl
            - /usr/bin/systemd-home-fallback-shell
            - /usr/lib/security/pam_systemd_home.so
            - /usr/lib/systemd/system/systemd-homed*
            - /usr/lib/systemd/systemd-homed
            - /usr/lib/systemd/systemd-homework
            - /usr/share/bash-completion/completions/homectl
            - /usr/share/dbus-1/system-services/org.freedesktop.home1.service
