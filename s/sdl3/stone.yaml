name        : sdl3
version     : "3.4.8"
release     : 14
homepage    : https://libsdl.org
upstreams   :
    - https://github.com/libsdl-org/SDL/releases/download/release-3.4.8/SDL3-3.4.8.tar.gz : e9fff7467fb60f037e6708da18b25560649e4c63edc2a69bb871b960d9cbfbba
summary     : Simple DirectMedia Library
description : |
    Simple DirectMedia Library
license     : Zlib
builddeps   :
    - pkgconfig(alsa)
    - pkgconfig(dbus-1)
    - pkgconfig(egl)
    - pkgconfig(fribidi)
    - pkgconfig(gbm)
    - pkgconfig(ibus-1.0)
    - pkgconfig(libdecor-0)
    - pkgconfig(libdrm)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(libpulse)
    - pkgconfig(libthai)
    - pkgconfig(libunwind-generic)
    - pkgconfig(liburing-ffi)
    - pkgconfig(libusb-1.0)
    - pkgconfig(sndio)
    - pkgconfig(wayland-client)
    - pkgconfig(x11)
    - pkgconfig(xcursor)
    - pkgconfig(xext)
    - pkgconfig(xfixes)
    - pkgconfig(xi)
    - pkgconfig(xkbcommon)
    - pkgconfig(xrandr)
    - pkgconfig(xscrnsaver)
    - pkgconfig(xtst)
    # jack
tuning      :
    - lto: full
setup       : |
    # SDL has a wide range of functionality that is dlopen()ed at runtime
    # However to maintain a certain minimal featureset we directly link some
    # libraries instead so that they are detected by autodep.
    %cmake \
        -DSDL_HIDAPI_LIBUSB=ON \
        -DSDL_HIDAPI_LIBUSB_SHARED=OFF \
        -DSDL_KMSDRM_SHARED=OFF \
        -DSDL_RPATH=OFF \
        -DSDL_PIPEWIRE_SHARED=OFF \
        -DSDL_STATIC=OFF \
        -DSDL_WAYLAND_LIBDECOR_SHARED=OFF \
        -DSDL_WAYLAND_SHARED=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install
