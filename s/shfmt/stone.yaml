name        : shfmt
version     : "3.13.1"
release     : 1
homepage    : https://github.com/mvdan/sh
upstreams   :
    - https://github.com/mvdan/sh/archive/refs/tags/v3.13.1.tar.gz : b31aad2d4c26b0c6e8ebe894d59022520bbebce33e082d7d29e4325eee35d308
summary     : Shell formatter
description     : Format shell programs
license     : 
    - BSD-3-Clause 
networking  : true
builddeps   :
    - binary(git)
    - binary(go)
    - binary(man)
    - binary(scdoc)
    # dbus-1 is required to make `man` work. For more info, see https://github.com/AerynOS/os-tools/issues/828
    - pkgconfig(dbus-1)
setup       : |
    %go_mod
build       : |
    go build ./cmd/shfmt
    scdoc < ./cmd/shfmt/shfmt.1.scd > shfmt.1
install     : |
    %install_bin shfmt
    %install_file shfmt.1 -t %(installroot)%(mandir)/man1
check       : |
    go test ./cmd/shfmt/
    man -M %(installroot)%(mandir) shfmt > /dev/null
