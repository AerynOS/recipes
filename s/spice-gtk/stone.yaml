name        : spice-gtk
version     : "0.43"
release     : 4
homepage    : https://www.spice-space.org/download/gtk
upstreams   :
    - https://gitlab.freedesktop.org/-/project/64/uploads/88f5d31a961da9921add46ca3f0be904/spice-gtk-0.43.tar.xz :
        hash: cee26e5b2d22909f35b40a94398d1e863ca3962ee46494ca97aab206abc3203b
summary     : GTK client and libraries for SPICE remote desktop servers (gtk3 version)
description : |
    GTK client and libraries for SPICE remote desktop servers (gtk3 version)
license     : LGPL-2.1-or-later
builddeps   :
    - binary(asciidoc)
    - binary(gi-docgen)
    # - binary(gtkdoc-scan)
    - binary(msgfmt)
    - binary(pod2man)
    - pkgconfig(epoxy)
    - pkgconfig(gio-unix-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(gstreamer-1.0)
    - pkgconfig(gstreamer-app-1.0)
    - pkgconfig(gtk+-3.0)
    # - pkgconfig(libcacard)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(libacl)
    - pkgconfig(libcap-ng)
    - pkgconfig(libjpeg)
    - pkgconfig(liblz4)
    # - pkgconfig(libphodav-2.0)
    # - pkgconfig(libphodav-3.0)
    - pkgconfig(libsasl2)
    #- pkgconfig(libsoup-2.4)
    - pkgconfig(libsoup-3.0)
    #- pkgconfig(libucontext)
    - pkgconfig(libusb-1.0)
    - pkgconfig(libusbredirhost)
    - pkgconfig(libusbredirparser-0.5)
    - pkgconfig(libva-x11)
    - pkgconfig(opus)
    - pkgconfig(polkit-gobject-1)
    - pkgconfig(spice-protocol)
    - pkgconfig(vapigen)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-cursor)
    - pkgconfig(wayland-protocols)
    - pkgconfig(wayland-scanner)
    - pkgconfig(wayland-server)
    - pkgconfig(x11)
    - python(pyparsing)
    - python(six)
    - docbook-xsl
environment : |
    %export_docbook_catalogs
setup       : |
    export LDFLAGS="${LDFLAGS} -Wl,--undefined-version"
    %meson \
        -Dgtk_doc=disabled \
        -Dusb-ids-path="%(datadir)/hwdata/usb.ids"
build       : |
    %meson_build
install     : |
    %meson_install
    chmod -c 4755 %(installroot)/%(libdir)/spice-gtk/spice-client-glib-usb-acl-helper

    # TODO: with capabilities spice-client-glib-usb-acl-helper needs CAP_FOWNER+EP

    %install_dir %(installroot)%(docdir)/%(name)-devel/
    echo "DEPRECATED" > %(installroot)%(docdir)/%(name)-devel/README
check       : |
    %meson_test
packages    :
    - "%(name)3":
        summary: A GTK3 widget for SPICE clients
        description: A GTK3 widget for SPICE clients
        paths:
            - /usr/lib/libspice-client-gtk-3.0.so.*
            - /usr/lib/girepository-1.0/SpiceClientGtk-3.0.typelib

    - "%(name)3-devel":
        summary: A GTK3 widget for SPICE clients - devel
        description: A GTK3 widget for SPICE clients - devel
        rundeps:
            - "%(name)3"
        paths:
            - /usr/lib/libspice-client-gtk-3.0.so
            - /usr/include/spice-client-gtk-3.0/
            - /usr/lib/pkgconfig/spice-client-gtk-3.0.pc
            - /usr/share/gir-1.0/SpiceClientGtk*
            - /usr/share/vala/vapi/spice-client-gtk*

    - "spice-glib":
        summary: A GObject for communicating with Spice servers
        description: A GObject for communicating with Spice servers
        paths:
            - /usr/lib/spice-gtk/spice-client-glib-usb-acl-helper
            - /usr/lib/libspice-client-glib-2.0.so.*
            - /usr/lib/girepository-1.0/SpiceClientGLib-2.0.typelib
            - /usr/share/locale/**/**/spice-gtk.mo
            - /usr/share/polkit-1/actions/org.spice-space.lowlevelusbaccess.policy

    - "spice-glib-devel":
        summary: A GObject for communicating with Spice servers - devel
        description: A GObject for communicating with Spice servers - devel
        rundeps:
            - "spice-glib"
        paths:
            - /usr/lib/libspice-client-glib-2.0.so
            - /usr/include/spice-client-glib-2.0/
            - /usr/lib/pkgconfig/spice-client-glib-2.0.pc
            - /usr/share/gir-1.0/SpiceClientGLib*
            - /usr/share/vala/vapi/spice-client-glib-*

    - "%(name)-tools":
        summary: Spice-gtk tools
        description: Spice-gtk tools
        paths:
            - /usr/bin/spicy
            - /usr/bin/spicy-screenshot
            - /usr/bin/spicy-stats

    - "%(name)-devel":
        paths:
            - /usr/share/doc/spice-gtk-devel/
