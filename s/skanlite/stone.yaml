name        : skanlite
version     : "26.04.3"
release     : 12
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/skanlite-26.04.3.tar.xz : dac757451b430192a00eef7a90aad14f5e59d9460e9ff5fb162922ca47403417
homepage    : https://apps.kde.org/skanlite/
license     : GPL-2.0-or-later
summary     : Image Scanning Application for KDE
description : |
    Skanlite is a simple image scanning application that does nothing more than scan and save images, based on the KSane backend.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6DocTools)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(KF6XmlGui)
    - cmake(KSaneCore6)
    - cmake(KSaneWidgets6)
rundeps     :
    # Work out of the box for most scanners
    - sane-drivers-scanners
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-docs":
        paths:
            - /usr/share/doc
