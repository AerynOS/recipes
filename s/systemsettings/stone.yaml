name        : systemsettings
version     : "6.6.2"
release     : 18
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.2/systemsettings-6.6.2.tar.xz : 36913727fb1902fc443a12b4951a8a4914cd135a7c6cbd09b5dabbd782a4ffa1
homepage    : https://kde.org/plasma-desktop/
license     :
    - GFDL-1.2-only
    - GPL-2.0-or-later
summary     : System settings utility for Plasma
description : |
    System settings utility for Plasma
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Auth)
    - cmake(KF6Crash)
    - cmake(KF6ItemViews)
    - cmake(KF6ItemModels)
    - cmake(KF6KCMUtils)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(KF6Service)
    - cmake(KF6IconThemes)
    - cmake(KF6WidgetsAddons)
    - cmake(KF6WindowSystem)
    - cmake(KF6XmlGui)
    - cmake(KF6DBusAddons)
    - cmake(KF6Config)
    - cmake(KF6GuiAddons)
    - cmake(KF6Kirigami)
    - cmake(KF6JobWidgets)
    - cmake(KF6Runner)
    - cmake(KF6ColorScheme)
    - cmake(KF6DocTools)
    - cmake(PlasmaActivities)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Quick)
rundeps     :
    - kf6-kirigami
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-docs":
        paths:
            - /usr/share/doc
