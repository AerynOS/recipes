name        : starship
version     : "1.26.0"
release     : 19
license     : ISC
homepage    : https://starship.rs/
upstreams   :
    - https://github.com/starship/starship/archive/refs/tags/v1.26.0.tar.gz : 8c95e8a6c596b29ac192104eae00dd991e8c8fd66083fd2b34d6b223a5803a59
summary     : The minimal, blazing-fast, and infinitely customizable prompt for any shell!
description : |
    The minimal, blazing-fast, and infinitely customizable prompt for any shell!
builddeps   :
    - binary(cmake)
    - binary(make)
rundeps     :
    - font-firacode-nerd
networking  : true
tuning      :
    - optimize: speed
    - lto: thin
setup       : |
    %install_file %(pkgdir)/aeryn-os.toml docs/public/presets/toml/aeryn-os.toml
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %cargo_install
    %install_file LICENSE -t %(installroot)%(datadir)/licenses/%(name)/

    target/*/release/starship completions bash | %install_file /dev/stdin %(installroot)%(bashcompletionsdir)/starship
    target/*/release/starship completions zsh | %install_file /dev/stdin %(installroot)%(zshcompletionsdir)/_starship
    target/*/release/starship completions fish | %install_file /dev/stdin %(installroot)%(fishcompletionsdir)/starship.fish

    # Default initialisation
    %install_file %(pkgdir)/50-starship.sh %(installroot)%(vendordir)/profile.d/50-starship.sh
check      : |
    # $HOME .config tests fail and TERM=dumb causing issues in a couple of tests
    %cargo_test || :
