name        : swayosd
version     : "0.3.2"
release     : 2
homepage    : https://github.com/ErikReider/SwayOSD
upstreams   :
    - https://github.com/ErikReider/SwayOSD/archive/refs/tags/v0.3.2.tar.gz : cb7ce2d47550b71fb2ecf48cf589d8553cfe2cacd257483cd1bf73db18f9a505
summary     :  A OSD window for common actions like volume, playback and capslock.
description : |
    A OSD window for common actions like volume, playback and capslock.
license     : 
    - GPL-3.0
networking  : true
builddeps   :
    - binary(glib-compile-resources)
    - binary(rustc)
    - binary(sassc)
    - pkgconfig(dbus-1)
    - pkgconfig(gdk-pixbuf-2.0)
    - pkgconfig(gtk4)
    - pkgconfig(gtk4-layer-shell-0)
    - pkgconfig(libevdev)
    - pkgconfig(libinput)
    - pkgconfig(libpulse)
setup       : |
    %patch %(pkgdir)/stateless-config.patch
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
