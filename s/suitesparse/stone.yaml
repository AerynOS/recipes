name        : suitesparse
version     : "7.12.2"
release     : 1
homepage    : https://github.com/DrTimothyAldenDavis/SuiteSparse
upstreams   :
    - https://github.com/DrTimothyAldenDavis/SuiteSparse/archive/refs/tags/v7.12.2.tar.gz : 679412daa5f69af96d6976595c1ac64f252287a56e98cc4a8155d09cc7fd69e8
summary     : A suite of sparse matrix algorithms
description : |
    SuiteSparse is a set of sparse-matrix-related packages written or co-authored by Tim Davis
license     :
    - GPL-3.0-or-later
builddeps   :
#   - cuda # Not currently packaged
    - binary(flang)
    - pkgconfig(openblas)
    - pkgconfig(gmp)
    - pkgconfig(mpfr)
    - pkgconfig(tbb)
setup       : |
    %cmake \
      -DBLA_VENDOR=OpenBLAS \
      -DSUITESPARSE_USE_STRICT=ON \
      -DSUITESPARSE_USE_CUDA=OFF \
      -DINTERNAL_METIS=ON \
      -DBUILD_STATIC_LIBS=OFF \
      -DCMAKE_C_FLAGS="-Wno-error=incompatible-pointer-types"
build       : |
    %cmake_build
install     : |
    %cmake_install
