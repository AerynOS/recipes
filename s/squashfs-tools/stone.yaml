name        : squashfs-tools
version     : "4.7.5"
release     : 6
homepage    : https://github.com/plougher/squashfs-tools
upstreams   :
    - https://github.com/plougher/squashfs-tools/releases/download/4.7.5/squashfs-tools-4.7.5.tar.gz : 547b7b7f4d2e44bf91b6fc554664850c69563701deab9fd9cd7e21f694c88ea6
summary     : Manipulate SquashFS images
description : |
    Manipulate SquashFS images
license     :
    - GPL-2.0-or-later
builddeps   :
    - binary(help2man)
    - binary(which)
    - pkgconfig(liblzma)
    - pkgconfig(libzstd)
    - pkgconfig(liblz4)
    - pkgconfig(lzo2)
    - pkgconfig(zlib)
build       : |
    %make \
        -C squashfs-tools \
        GZIP_SUPPORT=1 \
        LZ4_SUPPORT=1 \
        LZMA_XZ_SUPPORT=1 \
        LZO_SUPPORT=1 \
        XATTR_SUPPORT=1 \
        XZ_SUPPORT=1 \
        ZSTD_SUPPORT=1
install     : |
    %make \
        -C squashfs-tools \
        INSTALL_PREFIX="%(installroot)%(prefix)" \
        INSTALL_MANPAGES_DIR="%(installroot)%(mandir)/man1" \
        install
