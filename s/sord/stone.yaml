name        : sord
version     : "0.16.22"
release     : 4
homepage    : https://gitlab.com/drobilla/sord
upstreams   :
    - https://gitlab.com/drobilla/sord/-/archive/v0.16.22/sord-v0.16.22.tar.gz : 040fb3f369dd49a7717eb28ca0a66766352e25e760729903fc8a01e117122901
summary     : Lightweight C library for storing RDF statements in memory
description : |
    Lightweight C library for storing RDF statements in memory
license     :
    - 0BSD
    - BSD-3-Clause
    - ISC
builddeps   :
    - binary(doxygen)
    - pkgconfig(libpcre2-8)
    - pkgconfig(serd-0)
    - pkgconfig(zix-0)
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
packages    :
    - "%(name)-devel":
        paths:
            - /usr/share/doc/
