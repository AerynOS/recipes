name        : swaylock
version     : "1.8.5"
release     : 3
homepage    : https://github.com/swaywm/swaylock
upstreams   :
    - https://github.com/swaywm/swaylock/releases/download/v1.8.5/swaylock-1.8.5.tar.gz : ebd02c3c6a755d63102779c2c2430a4aab32d22bed0d73d6353974c1e5ad18a8
summary     : Screen locking utility for wayland compositors
description : |
    Screen locking utility for wayland compositors
license     :
    - MIT
builddeps   :
    - binary(scdoc)
    - pkgconfig(cairo)
    - pkgconfig(gdk-pixbuf-2.0)
    - pkgconfig(libcrypt)
    - pkgconfig(pam)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-protocols)
    - pkgconfig(wayland-scanner)
    - pkgconfig(xkbcommon)
setup       : |
    %patch %(pkgdir)/stateless.patch
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
