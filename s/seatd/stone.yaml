name        : seatd
version     : "0.9.3"
release     : 5
homepage    : https://git.sr.ht/~kennylevinsen/seatd
upstreams   :
    - https://git.sr.ht/~kennylevinsen/seatd/archive/0.9.3.tar.gz : 302564d54d8e28191fadfd734f2675ecb0c9e0615a58011b89ef15dfa4dbaa96
summary     : Seat management daemon and library
description : |
    A minimal seat management daemon, and a universal seat management library.
license     :
    - MIT
builddeps   :
    - binary(scdoc)
    - pkgconfig(libsystemd)
setup       : |
    %meson \
        -Dlibseat-logind=systemd
build       : |
    %meson_build
install     : |
    %meson_install
