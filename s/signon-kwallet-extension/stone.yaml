name        : signon-kwallet-extension
version     : "25.12.3"
release     : 12
upstreams   :
    - https://download.kde.org/stable/release-service/25.12.3/src/signon-kwallet-extension-25.12.3.tar.xz : 4fc7566893bf8dd0d6e236d52e13319c809642b7e85f6680bcfbad47888a4836
homepage    : https://kde.org/
license     : GPL-2.0-or-later
summary     : KWallet integration for signon framework
description : |
    KWallet integration for signon framework
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Wallet)
    - pkgconfig(SignOnExtension)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
