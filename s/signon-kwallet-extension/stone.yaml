name        : signon-kwallet-extension
version     : "26.04.0"
release     : 13
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.0/src/signon-kwallet-extension-26.04.0.tar.xz : 82c4c7136b3d9aa8c84eef7170cb9f042adf74bd7e322bbddad8f9d6cd923802
homepage    : https://kde.org/
license     : GPL-2.0-or-later
summary     : KWallet integration for signon framework
description : |
    KWallet integration for signon framework
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Wallet)
    - pkgconfig(SignOnExtension)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
