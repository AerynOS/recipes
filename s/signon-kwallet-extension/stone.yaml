name        : signon-kwallet-extension
version     : "26.04.3"
release     : 16
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/signon-kwallet-extension-26.04.3.tar.xz : 329bd9bc50504eb6bd7d431f7db6725287832550d60f7189ef8d0201092753c7
homepage    : https://kde.org/
license     : GPL-2.0-or-later
summary     : KWallet integration for signon framework
description : |
    KWallet integration for signon framework
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Wallet)
    - pkgconfig(SignOnExtension)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
