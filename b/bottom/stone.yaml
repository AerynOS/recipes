name        : bottom
version     : "0.14.6"
release     : 13
homepage    : https://clementtsang.github.io/bottom
upstreams   :
    - https://github.com/ClementTsang/bottom/archive/refs/tags/0.14.6.tar.gz : ec899586164423377ceaf0d15975b8cb4430e47f3c84db0394411048755c1412
    - https://github.com/ClementTsang/bottom/releases/download/0.14.6/completion.tar.gz : 1badcb95d13022a0d4210d06b5b90eb9b6a898dc2d86ff04af12a2ba12ca39fb
    - https://github.com/ClementTsang/bottom/releases/download/0.14.6/manpage.tar.gz : 593c30115b4f781761981f29ff6718083e9732acf726dd6930fa0eaf77a9cd98
summary     : Yet another cross-platform graphical process/system monitor
description : |
    A customizable cross-platform graphical process/system monitor for the terminal. Supports Linux, macOS, and Windows. Inspired by gtop, gotop, and htop.
license     : MIT
networking  : true
builddeps   :
    - binary(bsdtar-static)
setup       : |
    bsdtar-static -xf %(sourcedir)/completion.tar.gz
    bsdtar-static -xf %(sourcedir)/manpage.tar.gz

    %cargo_fetch
build       : |
    %cargo_build --bin btm
install     : |
    %cargo_install btm

    %install_file LICENSE %(installroot)%(datadir)/licenses/%(name)/LICENSE

    %install_file btm.bash %(installroot)%(bashcompletionsdir)/btm
    %install_file _btm %(installroot)%(zshcompletionsdir)/_btm
    %install_file btm.fish %(installroot)%(fishcompletionsdir)/btm.fish

    %install_file btm.1.gz %(installroot)%(mandir)/man1/btm.1.gz

    %install_file desktop/bottom.desktop %(installroot)%(datadir)/applications/bottom.desktop
    %install_file assets/icons/bottom-system-monitor.svg %(installroot)%(datadir)/icons/hicolor/scalable/apps/bottom-system-monitor.svg
check       : |
    %cargo_test
