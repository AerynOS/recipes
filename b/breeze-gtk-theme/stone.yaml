name        : breeze-gtk-theme
version     : "6.6.3"
release     : 14
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.3/breeze-gtk-6.6.3.tar.xz : 32e2e5947d5d26c1ae2020feca79302d2eea54bce655a6596dd34df5656e5e8d
homepage    : https://kde.org/plasma-desktop/
license     :
    - BSD-3-Clause
    - LGPL-2.1-only
summary     : GTK Theme Built to Match KDE's Breeze
description : |
    A GTK Theme Built to Match KDE's Breeze
builddeps   :
    - binary(python3)
    - binary(sassc)
    - cmake(Breeze)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - pkgconfig(cairo)
    - python(pycairo)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
