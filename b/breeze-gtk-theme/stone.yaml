name        : breeze-gtk-theme
version     : "6.7.2"
release     : 19
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.2/breeze-gtk-6.7.2.tar.xz : b5f15489ccd3159395f2828043c893035d8c0b4a18b050d188bbea8b6a5a99c5
homepage    : https://kde.org/plasma-desktop/
license     :
    - BSD-3-Clause
    - LGPL-2.1-only
summary     : GTK Theme Built to Match KDE's Breeze
description : |
    A GTK Theme Built to Match KDE's Breeze
builddeps   :
    - binary(python3)
    - binary(sassc)
    - cmake(Breeze)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - pkgconfig(cairo)
    - python(pycairo)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
