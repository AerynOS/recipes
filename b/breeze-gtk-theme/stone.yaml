name        : breeze-gtk-theme
version     : "6.7.0"
release     : 17
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.0/breeze-gtk-6.7.0.tar.xz : 28599e177b4166a7b332f834a72696cf882cf9f6a9ee192708a27f474c1027c0
homepage    : https://kde.org/plasma-desktop/
license     :
    - BSD-3-Clause
    - LGPL-2.1-only
summary     : GTK Theme Built to Match KDE's Breeze
description : |
    A GTK Theme Built to Match KDE's Breeze
builddeps   :
    - binary(python3)
    - binary(sassc)
    - cmake(Breeze)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - pkgconfig(cairo)
    - python(pycairo)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
