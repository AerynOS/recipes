name        : breeze-gtk-theme
version     : "6.7.1"
release     : 18
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.1/breeze-gtk-6.7.1.tar.xz : 7cc27c174417c89befe4715523abc3ac6a80d318fc2f0e184942f34a17becb6e
homepage    : https://kde.org/plasma-desktop/
license     :
    - BSD-3-Clause
    - LGPL-2.1-only
summary     : GTK Theme Built to Match KDE's Breeze
description : |
    A GTK Theme Built to Match KDE's Breeze
builddeps   :
    - binary(python3)
    - binary(sassc)
    - cmake(Breeze)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - pkgconfig(cairo)
    - python(pycairo)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
