name        : buildah
version     : "1.44.1"
release     : 7
homepage    : https://buildah.io/
upstreams   :
    - https://github.com/containers/buildah/archive/refs/tags/v1.44.1.tar.gz : ac022c60c84f0dd447f1982ae9e28e89d73892d0da24276fa6662cd1d045885e
summary     : A command line tool used for creating OCI Images
description : |
    The buildah package provides a command line tool which can be used to
    * create a working container from scratch
    or
    * create a working container from an image as a starting point
    * mount/umount a working container's root file system for manipulation
    * save container's root file system layer to create a new image
    * delete a working container or an image
license     : 
    - Apache-2.0
    - BSD-2-Clause
    - BSD-3-Clause
    - ISC
    - MIT
    - MPL-2.0
builddeps   :
    - binary(go)
    - binary(go-md2man)
    - pkgconfig(gpgme)
    - pkgconfig(libseccomp)
    - pkgconfig(sqlite3)
    - pkgconfig(systemd)
    - shadow-devel
rundeps     :
    - binary(passt)
    - binary(runc)
    - binary(skopeo)
tuning      :
    # Vendored build; -mod=readonly would skip vendor/ and need the network.
    - golang-modflags: false
build       : |
    export BUILDTAGS="containers_image_ostree_stub libsqlite3 libsubid seccomp systemd"

    # The containers/image prefix has changed domain names so in order to ensure that we use the correct setting regardless of which one is used just use both
    %make PREFIX="%(prefix)" \
        EXTRA_LDFLAGS="-X github.com/containers/image/v5/signature.systemDefaultPolicyPath=%(datadir)/containers/policy.json \
                       -X go.podman.io/image/v5/signature.systemDefaultPolicyPath=%(datadir)/containers/policy.json"
install     : |
    %make_install PREFIX="%(prefix)" install.completions
