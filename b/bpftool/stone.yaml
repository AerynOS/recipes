name        : bpftool
version     : "7.7.0"
release     : 6
upstreams   :
    - https://github.com/libbpf/bpftool/releases/download/v7.7.0/bpftool-libbpf-v7.7.0-sources.tar.gz: 7d46a381f607432bdb5201a08b889924b6a4883bf09e8efca82a86a7d122cc97
homepage    : https://github.com/libbpf/bpftool
license     :
    - GPL-2.0-only
    - BSD-2-Clause
summary     : Inspection and simple manipulation of eBPF programs and maps
description : |
    Inspection and simple manipulation of eBPF programs and maps
builddeps   :
    - binary(llvm-config-22)
    - binary(rst2man)
    - pkgconfig(libcap)
    - pkgconfig(libelf)
    - pkgconfig(openssl)
    - binutils-devel
environment : |
    _common_args="-C src \
                  prefix=/usr \
                  mandir=%(mandir)"
build       : |
    %make \
        ${_common_args} \
        HOSTCC="${CC}" \
        EXTRA_CFLAGS="${CFLAGS}" \
        EXTRA_LDFLAGS="${LDFLAGS}" \
        all doc
install     : |
    %make_install ${_common_args} doc-install

    mv %(installroot)/usr/{sbin,bin}
