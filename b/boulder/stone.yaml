name        : boulder
version     : "0.26.6+git.d4bae61"
release     : 157
summary     : Modern package building tool
license     : MPL-2.0
homepage    : https://github.com/AerynOS/os-tools
description : |
    Modern package building tool with containerized builds and intelligent package splitting
upstreams   :
    - git|https://github.com/AerynOS/os-tools.git :
        ref : d4bae61b256c4339bd22080325e1322d8d76a6bc
    - git|https://github.com/spdx/license-list-data.git :
        ref : d46e94e2c78ceede1cfc63cfa0396472d2798d4c # v3.27.0
builddeps   :
    - binary(cargo)
rundeps     :
    # needed for `boulder recipe (...)` actions
    - binary(bsdtar)
networking  : true
tuning      :
    - optimize: size
    - lto: full
environment : |
    export RUSTFLAGS="$RUSTFLAGS -C codegen-units=1"
check       : |
    %cargo_test --features moss/testing
setup       : |
    %cargo_fetch
build       : |
    %cargo_build -p boulder
install     : |
    %cargo_install
    %install_dir %(installroot)%(datadir)/boulder
    cp -R boulder/data/* %(installroot)%(datadir)/boulder/.

    # Completions
    mkdir compl/
    ./%(cargo_target_dir)/boulder --generate-completions compl/.
    %install_file compl/_boulder %(installroot)%(datadir)/zsh/site-functions/_boulder
    %install_file compl/boulder.bash %(installroot)%(datadir)/bash-completion/completions/boulder
    %install_file compl/boulder.fish %(installroot)%(datadir)/fish/completions/boulder.fish

    # Generate manpages
    mkdir man/
    ./%(cargo_target_dir)/boulder --generate-manpages man/.
    %install_dir %(installroot)%(mandir)/man1
    cp man/*.1 %(installroot)%(mandir)/man1/.

    # SPDX licenses
    %install_dir %(installroot)%(datadir)/boulder/licenses/
    cp %(sourcedir)/license-list-data.git/text/* %(installroot)%(datadir)/boulder/licenses/
