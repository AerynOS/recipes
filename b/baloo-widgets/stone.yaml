name        : baloo-widgets
version     : "26.04.0"
release     : 17
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.0/src/baloo-widgets-26.04.0.tar.xz : aa3f15c66d5bdf46c1fb66d8fb2f4c7693f2b3ba46a8fe56a3c193fc9e92d6d3
homepage    : https://community.kde.org/Baloo
license     : LGPL-2.1-only
summary     : Widgets for the Baloo search engine
description : |
    Widgets for the Baloo search engine
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
