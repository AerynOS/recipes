    - cmake(KF6FileMetaData)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(KF6Service)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
