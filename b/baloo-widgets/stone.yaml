name        : baloo-widgets
version     : "25.12.3"
release     : 16
upstreams   :
    - https://download.kde.org/stable/release-service/25.12.3/src/baloo-widgets-25.12.3.tar.xz : 0b03fc0adfeda46deeb53fb5e22bb9108715ebc1d8f5b19ca4e5c2216332c711
homepage    : https://community.kde.org/Baloo
license     : LGPL-2.1-only
summary     : Widgets for the Baloo search engine
description : |
    Widgets for the Baloo search engine
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Baloo)
    - cmake(KF6Config)
    - cmake(KF6FileMetaData)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(KF6Service)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
