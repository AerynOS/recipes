name        : bitwarden
version     : "2026.6.1"
release     : 7
summary     : A secure and free password manager for all of your devices
license     : GPL-3.0-only
homepage    : hhttps://github.com/bitwarden/clients/tree/main/apps/desktop
upstreams   :
    - https://github.com/bitwarden/clients/archive/refs/tags/desktop-v2026.6.1.tar.gz: e6c2d2c7bf95ca1e4cafc2e096d75fd6806a59c292f7f6150d10860591fa7550
description : |
    A secure and free password manager for all of your devices
networking  : true
builddeps   :
    - binary(npm)
setup       : |
    %patch %(pkgdir)/patches/0001-Don-t-run-postinstall.patch
    %patch %(pkgdir)/patches/messaging.patch
    %patch %(pkgdir)/patches/native-messaging.patch
    %patch %(pkgdir)/patches/nativelib.patch
    %patch %(pkgdir)/patches/sourcemaps.patch
    %patch %(pkgdir)/patches/unnecessary-deps.patch

    npm ci

    cd apps/desktop/desktop_native
    %cargo_fetch
build       : |
    cd apps/desktop/

    pushd desktop_native
    %cargo_build \
        --package desktop_napi \
        --package desktop_proxy \
        --package process_isolation

    mv %(cargo_target_dir)/libdesktop_napi.so napi/desktop_napi.node
    popd

    npm run build
    npm run clean:dist

    # Shrink bundle by deleting unnecessary files
    pushd build
    find -name '*.map' -type f -print -delete
    find -name '*package-lock.json' -type f -print -delete
    popd

    npm exec -c "electron-builder --linux --x64 --dir"
install     : |
    bitwardendir=%(libdir)/%(name)

    %install_dir %(installroot)${bitwardendir}
    cp -a apps/desktop/dist/linux-unpacked/* %(installroot)${bitwardendir}

    %install_dir %(installroot)%(bindir)
    %install_exe %(pkgdir)/bitwarden.sh %(installroot)%(bindir)/bitwarden-desktop

    # desktop_proxy, libprocess_isolation
    %install_exe apps/desktop/desktop_native/%(cargo_target_dir)/desktop_proxy %(installroot)${bitwardendir}
    %install_exe apps/desktop/desktop_native/%(cargo_target_dir)/libprocess_isolation.so %(installroot)${bitwardendir}

    %install_file %(pkgdir)/com.bitwarden.desktop.desktop -t %(installroot)%(datadir)/applications/
    %install_file %(pkgdir)/com.bitwarden.desktop.metainfo.xml -t %(installroot)%(datadir)/metainfo/

    for i in 16 32 64 128 256 512 1024; do
        %install_dir %(installroot)/%(datadir)/icons/hicolor/${i}x${i}/apps
        %install_file apps/desktop/resources/icons/${i}x${i}.png %(installroot)/%(datadir)/icons/hicolor/${i}x${i}/apps/bitwarden.png
    done

    # chrome-sandbox needs to be setuid
    chmod -c u+s %(installroot)${bitwardendir}/chrome-sandbox
