name        : bolt
version     : "0.9.11"
release     : 6
homepage    : https://gitlab.freedesktop.org/bolt/bolt
upstreams   :
    - https://gitlab.freedesktop.org/bolt/bolt/-/archive/0.9.11/bolt-0.9.11.tar.gz : cde4fc6d4a188e37d088cf59a5b2d174ac4b03d57bf9d084d711ba92105c33c0
summary     : Thunderbolt device manager
description : |
    Thunderbolt device manager
license     : LGPL-2.1-or-later
builddeps   :
    - binary(a2x)
    - binary(git)
    - pkgconfig(gio-2.0)
    - pkgconfig(gio-unix-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(libudev)
    - pkgconfig(polkit-gobject-1)
    - pkgconfig(systemd)
    - pkgconfig(udev)
    - docbook
environment : |
    %export_docbook_catalogs
setup       : |
    %meson \
        -Dprivileged-group=wheel
build       : |
    %meson_build
install     : |
    %meson_install
