name        : blake3
version     : "1.8.4"
release     : 7
summary     : BLAKE3 hash algorithm
license     : Apache-2.0
homepage    : https://github.com/BLAKE3-team/BLAKE3
upstreams   :
    - https://github.com/BLAKE3-team/BLAKE3/archive/refs/tags/1.8.4.tar.gz : b5ee5f5c5e025eb2733ae3af8d4c0e53bb66dff35095decfd377f1083e8ac9be
description : |
    BLAKE3 hash algorithm
builddeps   :
    - cmake(TBB)
setup       : |
    cd c
    %cmake \
        -DBUILD_SHARED_LIBS=ON \
        -DBLAKE3_USE_TBB=ON
build       : |
    cd c
    %cmake_build
install     : |
    cd c
    %cmake_install
