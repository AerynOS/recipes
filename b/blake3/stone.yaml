name        : blake3
version     : "1.8.5"
release     : 8
summary     : BLAKE3 hash algorithm
license     : Apache-2.0
homepage    : https://github.com/BLAKE3-team/BLAKE3
upstreams   :
    - https://github.com/BLAKE3-team/BLAKE3/archive/refs/tags/1.8.5.tar.gz : 220bd81286e2a0585beac66d41ac3f4c2c33ae8a4e339fc88cf22d5e00514fe9
description : |
    BLAKE3 hash algorithm
builddeps   :
    - cmake(TBB)
setup       : |
    cd c
    %cmake \
        -DBUILD_SHARED_LIBS=ON \
        -DBLAKE3_USE_TBB=ON
build       : |
    cd c
    %cmake_build
install     : |
    cd c
    %cmake_install
