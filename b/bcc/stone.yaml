name        : bcc
version     : "0.37.0"
release     : 9
upstreams   :
    - https://github.com/iovisor/bcc/releases/download/v0.37.0/bcc-src-with-submodule-0.37.0.tar.gz : 7734b780202b22dff335780b506b56833ec6cf7435e03b1346d5bf644b4e1f95
homepage    : https://github.com/iovisor/bcc
license     : Apache-2.0
summary     : BPF Compiler Collection
description : |
    BPF Compiler Collection
builddeps   :
    - binary(bison)
    - binary(bpftool)
    - binary(flex)
    - binary(gzip)
    - binary(llvm-config-22)
    - binary(python3)
    - cmake(Clang)
    - pkgconfig(libbpf)
    - pkgconfig(libdebuginfod)
    - pkgconfig(libffi)
    - pkgconfig(liblzma)
    - pkgconfig(libxml-2.0)
    - pkgconfig(luajit)
    - python(setuptools)
environment : |
    cd bcc
setup       : |
    %patch %(pkgdir)/0001-Always-escape.patch

    %cmake \
        -DCMAKE_USE_LIBBPF_PACKAGE=ON \
        -DENABLE_LLVM_SHARED=1 \
        -DENABLE_TESTS=OFF \
        -DREVISION=%(version) \
        -DRUN_LUA_TESTS=OFF
build       : |
    %cmake_build
    cd libbpf-tools
    %make BPFTOOL=bpftool LIBBPF_OBJ=%(libdir)/libbpf.so CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
install     : |
    %cmake_install

    %install_dir %(installroot)%(sbindir)

    pushd %(installroot)/usr/share/bcc/tools
    for f in *; do
        if [ ! -d "$f" ]; then
            ln -srv %(installroot)/usr/share/bcc/tools/$f %(installroot)/usr/sbin/bcc-$f
        fi
    done
    popd

    pushd libbpf-tools
    %make_install APP_PREFIX="bpf-" prefix="/usr" bindir="/usr/sbin"
    popd

    # Fix manpages
    mv %(installroot)/usr/share/bcc/man %(installroot)/usr/share/man
    pushd %(installroot)/usr/share/man/man8
    for i in *; do
        mv $i bcc-$i
    done
    popd

    # Nuke static
    rm -v %(installroot)%(libdir)/*.a
packages    :
    - "libbpf-tools":
        summary: Command line libbpf tools for BPF Compiler Collection (BCC)
        description: Command line libbpf tools for BPF Compiler Collection (BCC)
        paths:
            - /usr/sbin/bpf-*

    - "%(name)-tools":
        summary: Command line tools for BPF Compiler Collection (BCC)
        description: Command line tools for BPF Compiler Collection (BCC)
        rundeps:
            - "%(name)"
            - "python-%(name)"
            # python-netaddr
        paths:
            - /usr/sbin/bcc-*
            - /usr/share/bcc/introspection/
            - /usr/share/bcc/tools/
            - /usr/share/man/man8/bcc-*

    - "%(name)-docs":
        paths:
            - /usr/share/bcc/examples/

    - "python-%(name)":
        summary: Python bindings for BPF Compiler Collection (BCC)
        description: Python bindings for BPF Compiler Collection (BCC)
        rundeps:
            - "%(name)"
        paths:
            - /usr/lib/python3*/site-packages/

    - "%(name)-lua":
        summary: Standalone tool to run BCC tracers written in Lua
        description: Standalone tool to run BCC tracers written in Lua
        rundeps:
            - "%(name)"
        paths:
            - /usr/bin/bcc-lua
