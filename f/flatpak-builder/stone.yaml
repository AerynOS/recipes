name        : flatpak-builder
version     : "1.4.10"
release     : 2
upstreams   :
    - https://github.com/flatpak/flatpak-builder/releases/download/1.4.10/flatpak-builder-1.4.10.tar.xz : b1721078c0697c8ca1d7db965232b509d1aa87f68b4dae378eb500bddddb9cc1
homepage    : https://flatpak.org
license     : LGPL-2.1-or-later
summary     : Tool to build flatpaks from source
description : |
    Flatpak-builder is a tool for building flatpaks from sources
builddeps   :
    - binary(debugedit)
    - binary(xmlto)
    - binary(xsltproc)
    - pkgconfig(glib-2.0)
    - pkgconfig(gio-2.0)
    - pkgconfig(gio-unix-2.0)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(libcurl)
    - pkgconfig(libelf)
    - pkgconfig(libxml-2.0)
    - pkgconfig(ostree-1)
    - pkgconfig(yaml-0.1)
    - appstream-compose
    - docbook
    - docbook-xsl
rundeps     :
    - binary(debugedit)
    - binary(rofiles-fuse)
    - appstream-compose
environment : |
    %export_docbook_catalogs
setup       : |
    # glibc 2.43 build failure, remove in future version
    # export CFLAGS+=" -Wno-error=incompatible-pointer-types"

    %meson
build       : |
    %meson_build
install     : |
    %meson_install
