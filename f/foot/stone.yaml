name        : foot
version     : "1.26.1"
release     : 3
homepage    : https://codeberg.org/dnkl/foot
upstreams   :
    - https://codeberg.org/dnkl/foot/archive/1.26.1.tar.gz : 2213a78b773c1f87bc503fcc2914d1f3474e9aaa2cb7fc92ec5dba4867ab71e0
summary     : The fast, lightweight and minimalistic Wayland terminal emulator.
description : |
    The fast, lightweight and minimalistic Wayland terminal emulator.
license     : MIT
builddeps   :
    - binary(tic)
    - binary(scdoc)
    - pkgconfig(fcft)
    - pkgconfig(fontconfig)
    - pkgconfig(freetype2)
    - pkgconfig(ncurses)
    - pkgconfig(pixman-1)
    - pkgconfig(tllist)
    - pkgconfig(systemd)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-cursor)
    - pkgconfig(wayland-protocols)
    - pkgconfig(wayland-scanner)
    - pkgconfig(xkbcommon)
    # libutf8proc
dependencies: |
    - library(fcft)
tuning:
    - lto: full
    - optimize: speed
setup       : |
    %meson \
        --prefix=/usr
build       : |
    %meson_build
install     : |
    %meson_install
    %install_dir %(installroot)%(vendordir)/%(name)
    %install_file foot.ini %(installroot)%(vendordir)/%(name)/foot.ini
packages     :
    - "%(name)":
        rundeps:
            - "terminfo-%(name)"

    - "terminfo-%(name)":
        summary: Terminfo for %(name)
        description: Terminfo for %(name), split out so that it can be used from ncurses
        paths:
            - /usr/share/terminfo/
