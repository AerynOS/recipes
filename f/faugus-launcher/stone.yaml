name        : faugus-launcher
version     : "2.0.2"
release     : 11
homepage    : https://github.com/Faugus/faugus-launcher
upstreams   :
    - https://github.com/Faugus/faugus-launcher/archive/refs/tags/2.0.2.tar.gz : f7cbe011c7eaac0dedce60efb75d0ae3fa51e54aaf3396e3ee1d3c930941d8af
summary     : A simple and lightweight app for running Windows games using UMU-Launcher
description : |
    A simple and lightweight app for running Windows games using UMU-Launcher
license     : MIT
builddeps   :
    - binary(gtk4-update-icon-cache)
rundeps     :
    - binary(python3)
    - python(dbus-python)
    - python(icoextract)
    - python(pillow)
    - python(psutil)
    - python(pygobject)
    - python(requests)
    - python(vdf)
    - gtk-4
    - libadwaita
    - libmanette
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
