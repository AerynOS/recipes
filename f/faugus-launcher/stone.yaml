name        : faugus-launcher
version     : "1.18.10"
release     : 2
homepage    : https://github.com/Faugus/faugus-launcher
upstreams   :
    - https://github.com/Faugus/faugus-launcher/archive/refs/tags/1.18.10.tar.gz : 66c6d49d0936af774347d55608f0be08bdb2b6e87ecd882c5971bc86d6326dce
summary     : A simple and lightweight app for running Windows games using UMU-Launcher
description : |
    A simple and lightweight app for running Windows games using UMU-Launcher
license     :
    - MIT
builddeps   :
    - binary(gtk4-update-icon-cache)
rundeps     :
    - binary(magick)
    - binary(python3)
    - python(icoextract)
    - python(pillow)
    - python(psutil)
    - python(pygobject)
    - python(requests)
    - python(vdf)
    - libayatana-appindicator
    - libcanberra
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
