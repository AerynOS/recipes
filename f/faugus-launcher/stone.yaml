name        : faugus-launcher
version     : "1.20.4"
release     : 4
homepage    : https://github.com/Faugus/faugus-launcher
upstreams   :
    - https://github.com/Faugus/faugus-launcher/archive/refs/tags/1.20.4.tar.gz : 373e8732f0ddd965e6922d79a7a5d0c8b46ecd248b9734c25d21f0d539b26c0b
summary     : A simple and lightweight app for running Windows games using UMU-Launcher
description : |
    A simple and lightweight app for running Windows games using UMU-Launcher
license     :
    - MIT
builddeps   :
    - binary(gtk4-update-icon-cache)
rundeps     :
    - binary(magick)
    - binary(python3)
    - binary(vulkaninfo)
    - python(icoextract)
    - python(pillow)
    - python(psutil)
    - python(pycairo)
    - python(pygobject)
    - python(requests)
    - python(vdf)
    - libayatana-appindicator
    - libcanberra
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
