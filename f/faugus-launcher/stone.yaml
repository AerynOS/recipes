name        : faugus-launcher
version     : "1.17.5"
release     : 1
homepage    : https://github.com/Faugus/faugus-launcher
upstreams   :
    - https://github.com/Faugus/faugus-launcher/archive/refs/tags/1.17.5.tar.gz : 9399b27c0ec36fb12a9f3e8a5afdaeac530d3661f27d4cced86490032d4f471a
summary     : A simple and lightweight app for running Windows games using UMU-Launcher
description : |
    A simple and lightweight app for running Windows games using UMU-Launcher
license     :
    - MIT
builddeps   :
    - binary(gtk4-update-icon-cache)
rundeps     :
    - binary(magick)
    - binary(python3)
    - python(filelock)
    - python(icoextract)
    - python(pillow)
    - python(psutil)
    - python(pygobject)
    - python(requests)
    - python(vdf)
    - libayatana-appindicator
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
