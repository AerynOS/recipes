name        : faugus-launcher
version     : "1.22.6"
release     : 6
homepage    : https://github.com/Faugus/faugus-launcher
upstreams   :
    - https://github.com/Faugus/faugus-launcher/archive/refs/tags/1.22.6.tar.gz : f073c03a7624a5b894e928a5c02e500887fcc95214e97c96f0d26df7f2960670
summary     : A simple and lightweight app for running Windows games using UMU-Launcher
description : |
    A simple and lightweight app for running Windows games using UMU-Launcher
license     :
    - MIT
builddeps   :
    - binary(gtk4-update-icon-cache)
rundeps     :
    - binary(magick)
    - binary(python3)
    - binary(vulkaninfo)
    - python(icoextract)
    - python(pillow)
    - python(psutil)
    - python(pycairo)
    - python(pygobject)
    - python(requests)
    - python(vdf)
    - libayatana-appindicator
    - libcanberra
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
