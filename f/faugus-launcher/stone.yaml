name        : faugus-launcher
version     : "1.22.4"
release     : 5
homepage    : https://github.com/Faugus/faugus-launcher
upstreams   :
    - https://github.com/Faugus/faugus-launcher/archive/refs/tags/1.22.4.tar.gz : e5b055e2109fd897a7b1638c9065bcf653218f517ccec2fc0edb691453be5928
summary     : A simple and lightweight app for running Windows games using UMU-Launcher
description : |
    A simple and lightweight app for running Windows games using UMU-Launcher
license     :
    - MIT
builddeps   :
    - binary(gtk4-update-icon-cache)
rundeps     :
    - binary(magick)
    - binary(python3)
    - binary(vulkaninfo)
    - python(icoextract)
    - python(pillow)
    - python(psutil)
    - python(pycairo)
    - python(pygobject)
    - python(requests)
    - python(vdf)
    - libayatana-appindicator
    - libcanberra
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
