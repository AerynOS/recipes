name        : faugus-launcher
version     : "2.0.0"
release     : 9
homepage    : https://github.com/Faugus/faugus-launcher
upstreams   :
    - https://github.com/Faugus/faugus-launcher/archive/refs/tags/2.0.0.tar.gz : 34c9591a179d2206cc656dfcc23fbe985d3292c2da5801d5a6fb1a198eac3bee
summary     : A simple and lightweight app for running Windows games using UMU-Launcher
description : |
    A simple and lightweight app for running Windows games using UMU-Launcher
license     :
    - MIT
builddeps   :
    - binary(gtk4-update-icon-cache)
rundeps     :
    - binary(python3)
    - python(dbus-python)
    - python(icoextract)
    - python(pillow)
    - python(psutil)
    - python(pygobject)
    - python(requests)
    - python(vdf)
    - libadwaita
    - libmanette
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
