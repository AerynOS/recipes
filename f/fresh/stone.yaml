name        : fresh
version     : "0.4.5"
release     : 8
homepage    : https://getfresh.dev/
upstreams   :
    - https://github.com/sinelaw/fresh/archive/refs/tags/v0.4.5.tar.gz : 6dbfebeda46b10b6c2b3b83923b80640c2d5f332072f97a2d2d50b5c10f0d796
summary     : A terminal text editor built in rust
description : |
  A lightweight, fast terminal-based text editor with LSP support and TypeScript plugins built with Rust.
checkdeps   :
    - binary(python3)
license     : GPL-2.0-only
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %cargo_install
    %install_file crates/fresh-editor/flatpak/io.github.sinelaw.fresh.desktop %(installroot)%(datadir)/applications/io.github.sinelaw.fresh.desktop
    %install_file crates/fresh-editor/flatpak/io.github.sinelaw.fresh.metainfo.xml %(installroot)%(datadir)/metainfo/io.github.sinelaw.fresh.metainfo.xml
    %install_file crates/fresh-editor/flatpak/io.github.sinelaw.fresh.svg %(installroot)%(datadir)/icons/hicolor/scalable/apps/io.github.sinelaw.fresh.svg
check       : |
    %cargo_test --lib
