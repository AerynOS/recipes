name        : flatpak-kcm
version     : "6.7.0"
release     : 17
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.0/flatpak-kcm-6.7.0.tar.xz : 4a6490696eb4c86438b04e97dc163be50b0cd7bb7eacfbb204692094ff60b76b
homepage    : https://kde.org/plasma-desktop/
license     : GPL-2.0-or-later
summary     : Flatpak Permissions Management KCM
description : |
    Flatpak Permissions Management KCM
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6IconThemes)
    - cmake(KF6ItemModels)
    - cmake(KF6KCMUtils)
    - cmake(KF6Service)
    - cmake(Qt6Quick)
    - cmake(Qt6Svg)
    - pkgconfig(flatpak)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
