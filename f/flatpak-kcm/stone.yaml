name        : flatpak-kcm
version     : "6.7.3"
release     : 20
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.3/flatpak-kcm-6.7.3.tar.xz : 003766fec79807f86dc3d504bf888da9d371ebb8dd0ae9280df9b38ed053fed2
homepage    : https://kde.org/plasma-desktop/
license     : GPL-2.0-or-later
summary     : Flatpak Permissions Management KCM
description : |
    Flatpak Permissions Management KCM
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6IconThemes)
    - cmake(KF6ItemModels)
    - cmake(KF6KCMUtils)
    - cmake(KF6Service)
    - cmake(Qt6Quick)
    - cmake(Qt6Svg)
    - pkgconfig(flatpak)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
