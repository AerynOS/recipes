name        : flatpak-kcm
version     : "6.7.2"
release     : 19
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.2/flatpak-kcm-6.7.2.tar.xz : 0bcab3d514d15e060f8f5b0f974361d3037bdbc72fe9ac0774e29394490c2119
homepage    : https://kde.org/plasma-desktop/
license     : GPL-2.0-or-later
summary     : Flatpak Permissions Management KCM
description : |
    Flatpak Permissions Management KCM
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6IconThemes)
    - cmake(KF6ItemModels)
    - cmake(KF6KCMUtils)
    - cmake(KF6Service)
    - cmake(Qt6Quick)
    - cmake(Qt6Svg)
    - pkgconfig(flatpak)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
