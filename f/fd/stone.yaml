name        : fd
version     : "10.4.2"
release     : 5
homepage    : https://github.com/sharkdp/fd
upstreams   :
    - https://github.com/sharkdp/fd/archive/refs/tags/v10.4.2.tar.gz : 3a7e027af8c8e91c196ac259c703d78cd55c364706ddafbc66d02c326e57a456
summary     : A simple, fast and user-friendly alternative to find
description : |
    fd is a program to find entries in your filesystem. It is a simple, fast and user-friendly alternative to find. While it does not aim to support all of find's powerful functionality, it provides sensible (opinionated) defaults for a majority of use cases.
license     :
    - Apache-2.0
    - MIT
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
    %make completions
install     : |
    %cargo_install fd

    %install_file LICENSE-APACHE %(installroot)%(datadir)/licenses/%(name)/LICENSE-APACHE
    %install_file LICENSE-MIT %(installroot)%(datadir)/licenses/%(name)/LICENSE-MIT
    %install_file doc/fd.1 %(installroot)%(mandir)/man1/fd.1
    %install_file autocomplete/fd.bash %(installroot)%(bashcompletionsdir)/fd
    %install_file autocomplete/fd.fish %(installroot)%(fishcompletionsdir)/fd.fish
    %install_file autocomplete/_fd %(installroot)%(zshcompletionsdir)/_fd
check       : |
    %cargo_test
