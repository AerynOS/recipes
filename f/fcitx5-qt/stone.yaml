name        : fcitx5-qt
version     : "5.1.14"
release     : 1
homepage    : https://github.com/fcitx/fcitx5-qt
upstreams   :
    - https://github.com/fcitx/fcitx5-qt/archive/refs/tags/5.1.14.tar.gz : 80cbbc6b3ad08a6b7a40bb6cc4072e1c3bcf2099a821ce04b1bd510848c804d7
summary     : Qt library and IM module for fcitx5
description : |
    Qt library and IM module for fcitx5
license     :
    - BSD-3-Clause
    - LGPL-2.1-or-later
builddeps   :
    - cmake(ECM)
    - cmake(Fcitx5Utils)
    - cmake(Qt5)
    - cmake(Qt6)
    - cmake(Qt6WaylandClient)
    - cmake(Qt6WaylandGlobalPrivate)
    - pkgconfig(xcb)
    - pkgconfig(xkbcommon)
    - pkgconfig(xkbcommon-x11)
    - gettext
    - gettext-devel
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
