name        : file
version     : "5.48"
release     : 12
homepage    : https://astron.com/pub/file
upstreams   :
    - https://astron.com/pub/file/file-5.48.tar.gz : ed14656883b23a364b4057c05595d93252da9bc473d30106519519d0da141283
summary     : File type identification utility
description : |
    File type identification utility
license     :
    - BSD-2-Clause
builddeps   :
    - binary(flex)
    - pkgconfig(bzip2)
    - pkgconfig(liblzma)
    - pkgconfig(libseccomp)
    - pkgconfig(libzstd)
    - pkgconfig(zlib)
setup       : |
    %patch %(pkgdir)/0001-magic-Support-Serpent-OS-stone-format.patch
    # Fix linking libmagic
    export CFLAGS="$CFLAGS -pthread"
    %reconfigure \
        --disable-static \
        --enable-shared \
        --enable-libseccomp
build      : |
    export LD_LIBRARY_PATH=$PWD/src/.libs
    %make
install     : |
    %make_install
    # Clean empty man dirs
    find %(installroot)%(mandir) -empty -type d -delete
