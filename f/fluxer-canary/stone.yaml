name: fluxer-canary
version: "2026.519.235858"
release: 1
homepage: https://canary.fluxer.app/
upstreams:
  - https://api.canary.fluxer.app/dl/desktop/canary/linux/x64/2026.519.235858/tar_gz:
      hash: 33c89041de237ec75cf1f7be88d8883f02fecd22026be5eb372aace1c35889c2
      rename: "Fluxer Canary-2026.519.235858-linux-x86_64.tar.gz"
summary: Group chat, video, and voice calling app
description: |
  Fluxer is a free and open source instant messaging and VoIP platform built for friends, groups, and communities.
license:
  - AGPL-3.0-or-later
builddeps:
  - binary(ln)
install: |
  %install_dir %(installroot){%(bindir),%(libdir)}
  cp -a . %(installroot)%(libdir)/fluxer-canary
  ln -srv %(installroot)%(libdir)/fluxer-canary/fluxer-canary %(installroot)%(bindir)/fluxer-canary

  %install_file %(pkgdir)/fluxer-canary.desktop -t %(installroot)%(datadir)/applications/
  %install_dir %(installroot)%(datadir)/icons/hicolor/{256x256/apps/,512x512/apps/}
  ln -srv %(installroot)%(libdir)/fluxer-canary/resources/icons/256x256.png %(installroot)%(datadir)/icons/hicolor/256x256/apps/fluxer-canary.png
  ln -srv %(installroot)%(libdir)/fluxer-canary/resources/icons/512x512.png %(installroot)%(datadir)/icons/hicolor/512x512/apps/fluxer-canary.png
