name        : ffmpegthumbnailer
version     : "2.3.0"
release     : 1
homepage    : https://github.com/dirkvdb/ffmpegthumbnailer
upstreams   :
    - https://github.com/dirkvdb/ffmpegthumbnailer/archive/refs/tags/v2.3.0.tar.gz : ddf561e294385f07d0bd5a28d0aab9de79b8dbaed29b576f206d58f3df79b508
summary     : Lightweight video thumbnailer that can be used by file managers to create thumbnails for video files
description : |
    FFmpegthumbnailer is a lightweight video thumbnailer that can be used by file managers to create thumbnails for your video files.
    The thumbnailer uses ffmpeg to decode frames from the video files, so supported videoformats depend on the configuration flags of ffmpeg.
    This thumbnailer was designed to be as fast and lightweight as possible. The only dependencies are ffmpeg and libpng/libjpeg.
license     : GPL-2.0-or-later
builddeps   :
    - pkgconfig(libavcodec)
    - pkgconfig(libavfilter)
    - pkgconfig(libavformat)
    - pkgconfig(libavutil)
    - pkgconfig(libjpeg)
    - pkgconfig(libpng)
setup       : |
    %cmake \
        -DENABLE_AUDIO_THUMBNAILER=ON \
        -DENABLE_GIO=ON \
        -DENABLE_THUMBNAILER=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
