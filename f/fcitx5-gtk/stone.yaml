name        : fcitx5-gtk
version     : "5.1.6"
release     : 1
homepage    : https://github.com/fcitx/fcitx5-gtk
upstreams   :
    - https://github.com/fcitx/fcitx5-gtk/archive/refs/tags/5.1.6.tar.gz : 56ecc894ba485184459906ac340bef4212d7484de78c8608d8366b48c5bb6bf6
summary     : gtk im module and glib based dbus client library
description : |
    gtk im module and glib based dbus client library
license     : 
    - LGPL-2.1-or-later
builddeps   :
    - cmake(ECM)
    - pkgconfig(gio-2.0)
    - pkgconfig(gio-unix-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(gobject-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(gtk4)
    - pkgconfig(xkbcommon)
    - pkgconfig(xkbcommon-x11)
setup       : |
    %cmake -DENABLE_GTK2_IM_MODULE=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install
