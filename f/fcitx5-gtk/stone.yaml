name        : fcitx5-gtk
version     : "5.1.7"
release     : 1
homepage    : https://github.com/fcitx/fcitx5-gtk
upstreams   :
    - https://github.com/fcitx/fcitx5-gtk/archive/refs/tags/5.1.7.tar.gz : 92d7a5e3ed9eac8c8173983723013816f4706dddc3f019b4bb5c76c48cf4dd92
summary     : gtk im module and glib based dbus client library
description : |
    gtk im module and glib based dbus client library
license     :
    - LGPL-2.1-or-later
builddeps   :
    - cmake(ECM)
    - pkgconfig(gio-2.0)
    - pkgconfig(gio-unix-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(gobject-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(gtk4)
    - pkgconfig(xkbcommon)
    - pkgconfig(xkbcommon-x11)
setup       : |
    %cmake -DENABLE_GTK2_IM_MODULE=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install
