name        : fakeroot
version     : "1.38.1"
release     : 10
homepage    : https://packages.debian.org/fakeroot
upstreams   :
    - https://deb.debian.org/debian/pool/main/f/fakeroot/fakeroot_1.38.1.orig.tar.gz : 37c5063942efe2e2aeefd6e71ae2690bcb9b7d512c53bc6409b54d0730cbdac1
summary     : Tool for simulating super-user privileges
description : |
    Tool for simulating super-user privileges
license     :
    - GPL-3.0-or-later
emul32      : true
builddeps   :
    - pkgconfig(libacl)
    - pkgconfig(libattr)
    - pkgconfig(libcap)
setup       : |
    %configure \
        --disable-static \
        --libdir=%(libdir)/fakeroot \
        --with-ipc=sysv
build       : |
    %make
install     : |
    %make_install
