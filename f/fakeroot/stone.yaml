name        : fakeroot
version     : "1.38"
release     : 9
homepage    : https://packages.debian.org/fakeroot
upstreams   :
    - https://deb.debian.org/debian/pool/main/f/fakeroot/fakeroot_1.38.orig.tar.gz : 37504619270923546f36d98107f44a3c3be41c8ccd57dfd722311819623fe002
summary     : Tool for simulating super-user privileges
description : |
    Tool for simulating super-user privileges
license     :
    - GPL-3.0-or-later
emul32      : true
builddeps   :
    - pkgconfig(libacl)
    - pkgconfig(libattr)
    - pkgconfig(libcap)
setup       : |
    %configure \
        --disable-static \
        --libdir=%(libdir)/fakeroot \
        --with-ipc=sysv
build       : |
    %make
install     : |
    %make_install
