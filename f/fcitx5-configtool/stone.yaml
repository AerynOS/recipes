name        : fcitx5-configtool
version     : "5.1.14"
release     : 1
homepage    : https://github.com/fcitx/fcitx5-configtool
upstreams   :
    - https://github.com/fcitx/fcitx5-configtool/archive/refs/tags/5.1.14.tar.gz : e0c7a8f71b139bede9def20093f1dcd38a4ab03348fae57dec65115c4e1e322a
summary     : fcitx5-configtool is a Qt-based GUI tool that provides a user-friendly configuration interface for Fcitx 5
description : |
    fcitx5-configtool is a Qt-based GUI tool that provides a user-friendly configuration interface for Fcitx 5. It has two different implementations: one based on QWidget, which can be accessed via fcitx5-config-qt, and the other based on KCM/Kirigami2, which can be found in Plasma systemsettings.
license     :
    - GPL-2.0-or-later
builddeps   :
    - cmake(ECM)
    - cmake(Fcitx5Config)
    - cmake(Fcitx5Core)
    - cmake(Fcitx5Qt6DBusAddons)
    - cmake(Fcitx5Qt6WidgetsAddons)
    - cmake(Fcitx5Utils)
    - cmake(KF6CoreAddons)
    - cmake(KF6DBusAddons)
    - cmake(KF6Declarative)
    - cmake(KF6I18n)
    - cmake(KF6IconThemes)
    - cmake(KF6ItemViews)
    - cmake(KF6KCMUtils)
    - cmake(KF6Kirigami)
    - cmake(KF6Package)
    - cmake(KF6Svg)
    - cmake(KF6WidgetsAddons)
    - cmake(KF6WindowSystem)
    - cmake(Plasma)
    - pkgconfig(iso-codes)
    - pkgconfig(xkbcommon)
    - pkgconfig(xkbcommon-x11)
    - pkgconfig(xkbfile)
    - pkgconfig(xkeyboard-config)
    - gettext
    - gettext-devel
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
