name        : fastfetch
version     : "2.65.1"
release     : 22
homepage    : https://github.com/fastfetch-cli/fastfetch
upstreams   :
    - https://github.com/fastfetch-cli/fastfetch/archive/refs/tags/2.65.1.tar.gz : c4a9d191601bae302cfa9939f2b5666d2565e83229840cd00554c4913646f0ad
summary     : Fastfetch is a system information tool
description : |
    Fastfetch is a system information tool written in C that displays information about your operating system, software and hardware.
license     : MIT
builddeps   :
    - cmake(VulkanHeaders)
    - pkgconfig(ImageMagick)
    - pkgconfig(OpenCL)
    - pkgconfig(dbus-1)
    - pkgconfig(dconf)
    - pkgconfig(ddcutil)
    - pkgconfig(egl)
    - pkgconfig(gio-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(libdrm)
    - pkgconfig(libelf)
    - pkgconfig(libpulse)
    - pkgconfig(pciaccess)
    - pkgconfig(sqlite3)
    - pkgconfig(vulkan)
    - pkgconfig(wayland-client)
    - pkgconfig(x11)
    - pkgconfig(xrandr)
    - pkgconfig(zlib)
    # TODO missing deps:
    # xfconf
tuning      :
    - optimize: speed
setup       : |
    # We actually permit dlopen so that users don't need every single library installed
    %cmake \
        -DENABLE_DIRECTX_HEADERS=OFF \
        -DENABLE_LTO=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install
    %install_file LICENSE -t %(installroot)%(datadir)/licenses/%(name)/
