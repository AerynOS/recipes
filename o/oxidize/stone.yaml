name        : oxidize
version     : "0.3.3"
release     : 5
homepage    : https://github.com/christian-bendiksen/oxidize
upstreams   :
    - https://github.com/christian-bendiksen/oxidize/archive/refs/tags/v0.3.3.tar.gz : ac6c08c0f77180f5e4a697281d2d03c9acc58d68652633bae52ef5933837c8ef
summary     : Oxidize is a tool for atomically changing themes in window managers.
description : |
    Oxidize is a tool for atomically changing themes in window managers.
license     : MIT
networking  : true
builddeps   :
    - pkgconfig(gio-2.0)
    - pkgconfig(glib-2.0)
setup       : |
    %cargo_fetch
build       : |
    %cargo_build --workspace
install     : |
    %cargo_install
    %install_file %(cargo_target_dir)/liboxidize_gio.so %(installroot)%(libdir)/gio/modules/liboxidize_gio.so
check       : |
    %cargo_test
