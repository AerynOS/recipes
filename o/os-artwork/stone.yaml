name        : os-artwork
version     : "3"
release     : 8
summary     : Operating System Artwork
license     : Distributable
homepage    : https://www.aerynos.com/
upstreams   :
    - git|http://github.com/aerynOS/artwork.git : ea9b3f8334e1c82542cfe83caf0372720e220356
    - git|https://github.com/AerynOS/brand.git : eb7e3d22084a85991e88c1a694aae528f0571a2c
description : |
    Default artwork for AerynOS
builddeps   :
    - binary(just)
install     : |
    DESTDIR=%(installroot) just install
    # TODO: Install 24x24 and 48x48 icons for the system logo by mutating the SVG

    cd ../brand.git
    %install_file png/logo-light_128.png %(installroot)%(datadir)/icons/aerynos-logo.png
    %install_file png/logo-dark_128.png %(installroot)%(datadir)/icons/aerynos-logo-dark.png


    %install_dir %(installroot)%(datadir)/pixmaps

    ln -s /usr/share/icons/aerynos-logo-dark.png %(installroot)/usr/share/pixmaps/system-logo-white.png
    ln -s /usr/share/icons/aerynos-logo.png %(installroot)/usr/share/pixmaps/system-logo-black.png

    %install_file svg/logo-light.svg %(installroot)%(datadir)/icons/aerynos-logo.svg
    %install_file svg/logo-dark.svg %(installroot)%(datadir)/icons/aerynos-logo-dark.svg

    ln -s /usr/share/icons/aerynos-logo-dark.svg %(installroot)/usr/share/pixmaps/system-logo-white.svg
    ln -s /usr/share/icons/aerynos-logo.svg %(installroot)/usr/share/pixmaps/system-logo-black.svg

    # This could be part of plasma-defaults instead, but if the AerynOS artwork is present we always want the
    # logo to show up in kcminfocenter even if the plasma-defaults package is uninstalled
    %install_file %(pkgdir)/kcm-about-distrorc -t %(installroot)%(datadir)/xdg
