name        : openblas
version     : "0.3.32"
release     : 10
homepage    : https://github.com/OpenMathLib/OpenBLAS
upstreams   :
    - https://github.com/OpenMathLib/OpenBLAS/archive/refs/tags/v0.3.32.tar.gz : f8a1138e01fddca9e4c29f9684fd570ba39dedc9ca76055e1425d5d4b1a4a766
summary     : OpenBLAS is an optimized BLAS library based on GotoBLAS2 1.13 BSD version
description : |
    OpenBLAS is an optimized BLAS library based on GotoBLAS2 1.13 BSD version
license     : BSD-3-Clause
builddeps   :
    - binary(flang)
setup       : |
    %patch %(pkgdir)/0001-Fix-building-with-openblas.patch

    %cmake \
        -DCMAKE_Fortran_COMPILER=flang \
        -DBUILD_SHARED_LIBS=ON \
        -DDYNAMIC_ARCH=ON \
        -DTARGET=GENERIC \
        -DUSE_OPENMP=1 \
build       : |
    %cmake_build
install     : |
    %cmake_install
