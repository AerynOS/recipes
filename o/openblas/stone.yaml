name        : openblas
version     : "0.3.33"
release     : 11
homepage    : https://github.com/OpenMathLib/OpenBLAS
upstreams   :
    - https://github.com/OpenMathLib/OpenBLAS/archive/refs/tags/v0.3.33.tar.gz : 6761af1d9f5d353ab4f0b7497be2643313b36c8f31caec0144bfef198e71e6ab
summary     : OpenBLAS is an optimized BLAS library based on GotoBLAS2 1.13 BSD version
description : |
    OpenBLAS is an optimized BLAS library based on GotoBLAS2 1.13 BSD version
license     : BSD-3-Clause
builddeps   :
    - binary(flang)
setup       : |
    %patch %(pkgdir)/0001-Fix-building-with-openblas.patch

    %cmake \
        -DCMAKE_Fortran_COMPILER=flang \
        -DBUILD_SHARED_LIBS=ON \
        -DDYNAMIC_ARCH=ON \
        -DTARGET=GENERIC \
        -DUSE_OPENMP=1 \
build       : |
    %cmake_build
install     : |
    %cmake_install
