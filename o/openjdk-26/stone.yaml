name        : openjdk-26
version     : "26"
release     : 1
upstreams   :
    - https://github.com/openjdk/jdk26u/archive/refs/tags/jdk-26-ga.tar.gz:
        hash: 058d51d13d12ce3efaf3921feeec366e39db03972d12dae6c9a09962eaafa408
        unpackdir: "jdk"
    # BOOTSTRAPPING
    - https://github.com/adoptium/temurin25-binaries/releases/download/jdk-25.0.2%2B10/OpenJDK25U-jdk_x64_linux_hotspot_25.0.2_10.tar.gz:
        hash: 987387933b64b9833846dee373b640440d3e1fd48a04804ec01a6dbf718e8ab8
        unpackdir: "jdk/bootstrap-jdk"
    # Detection seems broken, we can't use system gtest (TODO fix this)
    - https://github.com/google/googletest/archive/refs/tags/v1.14.0.tar.gz:
        hash: 8ad598c73ad796e0d8280b082cebd82a630d73e73cd3c70057938a6501bba5d7
        unpackdir: "jdk/gtest-local"
homepage    : https://openjdk.java.net/
summary     : Open implementation of Oracle's Java Development Kit, major version 26
description : |
    Open implementation of Oracle's Java Development Kit, major version 26. This package includes the JDK, the JRE is not separately provided.
license     :
    - GPL-2.0-or-later
networking  : true
builddeps   :
    - binary(awk)
    - binary(c++filt)
    - binary(git)
    - binary(gnu-sort)
    - binary(make)
    - binary(pandoc)
    - binary(sed)
    - binary(tar)
    - binary(unzip)
    - binary(zip)
    - pkgconfig(alsa)
    - pkgconfig(cups)
    - pkgconfig(fontconfig)
    - pkgconfig(freetype2)
    - pkgconfig(harfbuzz)
    - pkgconfig(ice)
    - pkgconfig(lcms2)
    - pkgconfig(libjpeg)
    - pkgconfig(libpng)
    - pkgconfig(xext)
    - pkgconfig(xrandr)
    - pkgconfig(xrender)
    - pkgconfig(xt)
    - pkgconfig(xtst)
    - pkgconfig(zlib)
    - giflib-devel
    # - openjdk-25
rundeps-exclude:
    - 'soname\(libjvm\.so\(.*\)\)'
setup       : |
    # Set to 1 to bootstrap
    _bootstrap=1

    # TODO package jtreg so we can run tests (post bootstrapping)
    # TODO at some point when we have conflicts it should be feasible to package the JRE

    # ccache needs to be enabled via conf option, not by setting the path
    if [[ " ${PATH[*]} " =~ "ccache" ]]; then
        export PATH="${PATH//\/usr\/lib\/ccache\/bin:/}"
        extra_conf_opts="--enable-ccache"
    fi

    if [[ ${_bootstrap} == "1" ]]; then
        extra_conf_opts+=" --with-boot-jdk='%(workdir)/bootstrap-jdk'"
    else
        extra_conf_opts+=" --with-boot-jdk='%(libdir)/openjdk-25'"
    fi

    # Git commit that corresponds to version
    GITCOMMIT=$(git ls-remote https://github.com/openjdk/jdk26u.git refs/tags/jdk-%(version)-ga^{} | awk '{print $1}')
    # Basically this finds the git tag with the same commit as the `version-ga` format and then
    # parses it with regex to extract the -build part (so `26-ga` to match `26-10` and the output is `10`)
    _version_build=$(git ls-remote https://github.com/openjdk/jdk26u.git | \
                            grep ${GITCOMMIT} | \
                            sed '/-ga^{}/d' | \
                            awk '{print $2}' | \
                            sed -nr "s/.*%(version)\+(.*)\^.*/\1/p")
    echo "Version build detected as ${_version_build}"

    chmod +x configure
    %configure \
        --prefix="%(installroot)%(prefix)" \
        --disable-warnings-as-errors \
        --disable-absolute-paths-in-output \
        --with-jvm-features=link-time-opt \
        --with-native-debug-symbols=internal \
        --with-stdc++lib=dynamic \
        --with-toolchain-type=clang \
        --with-version-build="${_version_build}" \
        --with-version-pre="" \
        --with-version-opt="aeryn" \
        --with-vendor-name=AerynOS \
        --with-vendor-url=https://AerynOS.com/ \
        --with-vendor-bug-url=https://github.com/AerynOS/recipes/issues \
        --with-vendor-vm-bug-url=https://github.com/AerynOS/recipes/issues \
        --with-freetype=system \
        --with-giflib=system \
        --with-harfbuzz=system \
        --with-lcms=system \
        --with-libjpeg=system \
        --with-libpng=system \
        --with-zlib=system \
        --with-extra-cflags="${CFLAGS}" \
        --with-extra-cxxflags="${CXXFLAGS}" \
        --with-extra-ldflags="${LDFLAGS}" \
        --with-jobs=%(jobs) \
        AR="${AR}" \
        NM="${NM}" \
        OBJCOPY="${OBJCOPY}" \
        OBJDUMP="llvm-objdump" \
        SORT="/usr/bin/gnu-sort" \
        STRIP="${STRIP}" \
        $extra_conf_opts
build       : |
    %ccache_zero

    make images test-image

    %ccache_stats
install     : |
    jvm_dir="%(libdir)/openjdk-26"
    _jdk_build="build/linux-$(uname -m)-server-release"
    %install_dir %(installroot)${jvm_dir}
    cp -ra ${_jdk_build}/images/jdk/* %(installroot)${jvm_dir}

    # Remove license files and demo files
    rm -rfv %(installroot)/${jvm_dir}/{legal,demo}/

    # System headers
    %install_dir %(installroot)/%(includedir)/openjdk-26
    mv %(installroot)/${jvm_dir}/include/* %(installroot)/%(includedir)/openjdk-26
    ln -srvf %(installroot)/%(includedir)/openjdk-26 %(installroot)/${jvm_dir}/include

    # Man pages
    %install_dir %(installroot)/%(datadir)
    mv %(installroot)/${jvm_dir}/man %(installroot)/%(datadir)
    find %(installroot)/%(mandir) -type f -print -exec rename -- ".1" "-26.1" {} \;

    # System JVM symlinks for applications that check for this path
    %install_dir %(installroot)/%(libdir)/jvm
    ln -srv %(installroot)/${jvm_dir} %(installroot)/%(libdir)/jvm/openjdk-26

    # Fix binary symlinks
    %install_dir %(installroot)%(bindir)
    pushd %(installroot)/${jvm_dir}/bin
    for bin in *; do
        ln -srv %(installroot)/${jvm_dir}/bin/${bin} %(installroot)%(bindir)/${bin}-26
    done
    popd
tuning      :
    - lto: false # Enabled by argument instead
