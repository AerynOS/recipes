name        : openvpn
version     : "2.7.1"
release     : 7
upstreams   :
    - https://swupdate.openvpn.net/community/releases/openvpn-2.7.1.tar.gz : 9858477ec2894a8a672974d8650dcb1af2eeffb468981a2b619f0fa387081167
homepage    : https://openvpn.net/community/
license     :
    - GPL-2.0-only
    - BSD-4-Clause
    - OpenSSL
    - Zlib
summary     : OpenVPN Client
description : |
    An easy-to-use, robust, and highly configurable VPN (Virtual Private Network)
builddeps   :
    - binary(rst2man)
    - pkgconfig(libcap-ng)
    - pkgconfig(liblz4)
    - pkgconfig(libnl-genl-3.0)
    - pkgconfig(libpkcs11-helper-1)
    - pkgconfig(libsystemd)
    - pkgconfig(lzo2)
    - pkgconfig(openssl)
    - pkgconfig(p11-kit-1)
    - pkgconfig(pam)
setup       : |
    %reconfigure \
        --enable-async-push \
        --enable-pkcs11 \
        --enable-systemd \
        --with-crypto-library=openssl
build       : |
    %make
install     : |
    %make_install
