name        : openvpn
version     : "2.7.2"
release     : 8
upstreams   :
    - https://swupdate.openvpn.net/community/releases/openvpn-2.7.2.tar.gz : 9c3e150a595fc9a375221f2fa9f10524a9c064536cf81c96e3ba66c735b86f26
homepage    : https://openvpn.net/community/
license     :
    - GPL-2.0-only
    - BSD-4-Clause
    - OpenSSL
    - Zlib
summary     : OpenVPN Client
description : |
    An easy-to-use, robust, and highly configurable VPN (Virtual Private Network)
builddeps   :
    - binary(rst2man)
    - pkgconfig(libcap-ng)
    - pkgconfig(liblz4)
    - pkgconfig(libnl-genl-3.0)
    - pkgconfig(libpkcs11-helper-1)
    - pkgconfig(libsystemd)
    - pkgconfig(lzo2)
    - pkgconfig(openssl)
    - pkgconfig(p11-kit-1)
    - pkgconfig(pam)
setup       : |
    %reconfigure \
        --enable-async-push \
        --enable-pkcs11 \
        --enable-systemd \
        --with-crypto-library=openssl
build       : |
    %make
install     : |
    %make_install
