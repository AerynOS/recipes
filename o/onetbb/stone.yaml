name        : onetbb
version     : "2023.1.0"
release     : 8
summary     : Thread Building Blocks library
license     : Apache-2.0 AND BSD-3-Clause
homepage    : https://uxlfoundation.github.io/oneTBB/
description : |
    The Threading Building Blocks library abstracts low-level threading details
upstreams   :
    - https://github.com/uxlfoundation/oneTBB/archive/refs/tags/v2023.1.0.tar.gz: 191288b52e1e6b17198000b64d77d194bb65e791be46ebc606e9b091781e2070
builddeps   :
    - pkgconfig(hwloc)
setup       : |
    %cmake \
        -DTBB_STRICT=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install
tuning      :
    - lto: full
packages    :
    - "%(name)-bind":
        summary: "NUMA support library for %(name)"
        description: |
            NUMA support library for %(name)
        paths:
            - /usr/lib/libtbbbind*.so.*

    - "%(name)-devel":
        rundeps:
            - "%(name)-bind"
