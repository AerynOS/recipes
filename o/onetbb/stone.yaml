name        : onetbb
version     : "2023.0.0"
release     : 7
summary     : Thread Building Blocks library
license     : Apache-2.0 AND BSD-3-Clause
homepage    : https://uxlfoundation.github.io/oneTBB/
description : |
    The Threading Building Blocks library abstracts low-level threading details
upstreams   :
    - https://github.com/uxlfoundation/oneTBB/archive/refs/tags/v2023.0.0.tar.gz: f8767b971ec6aea25dde58ae0f593e94e7aa75a739a86f67967012f69e2199b1
builddeps   :
    - pkgconfig(hwloc)
setup       : |
    %cmake \
        -DTBB_STRICT=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install
tuning      :
    - lto: full
packages    :
    - "%(name)-bind":
        summary: "NUMA support library for %(name)"
        description: |
            NUMA support library for %(name)
        paths:
            - /usr/lib/libtbbbind*.so.*

    - "%(name)-devel":
        rundeps:
            - "%(name)-bind"
