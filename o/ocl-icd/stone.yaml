name        : ocl-icd
version     : "2.3.5"
release     : 7
homepage    : https://github.com/KhronosGroup/OpenCL-Headers/
upstreams   :
    - https://github.com/OCL-dev/ocl-icd/archive/refs/tags/v2.3.5.tar.gz : cdd7984425fa92d37273eee4180b5f57b047eda6dd8fd623e58498f844b09b75
summary     : Vendor Neutral OpenCL Implementation
description : |
    Vendor Neutral OpenCL Implementation
license     : BSD-2-Clause
builddeps   :
    - binary(a2x)
    - binary(ruby)
    - binary(xmlto)
    - pkgconfig(OpenCL-Headers)
    - docbook
environment : |
    %export_docbook_catalogs
setup       : |
    %reconfigure \
        --disable-static \
        --enable-custom-vendordir=%(datadir)/OpenCL/vendors
build       : |
    %make
install     : |
    %make_install

    # From l/less
    %install_dir %(installroot)%(vendordir)/%(name)
    %install_file %(pkgdir)/10_default_VENDORS_ocl-icd.sh %(installroot)%(vendordir)/%(name)/
    %install_dir %(installroot)%(vendordir)/profile.d
    ln -srv %(installroot)%(vendordir)/%(name)/10_default_VENDORS_ocl-icd.sh %(installroot)%(vendordir)/profile.d/
packages    :
    - "%(name)-devel":
        paths:
            - /usr/bin/cllayerinfo
            - /usr/share/doc/ocl-icd/
