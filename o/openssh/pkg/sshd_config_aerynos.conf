# Default AerynOS SSHD configuration

# Do not modify this file. If you wish to make any changes please create
# your own configuration in /etc/ssh/sshd_config.d/ ending in .conf

UsePAM yes

AcceptEnv COLORTERM

# It is recommended to use pam_motd in /etc/pam.d/sshd instead of PrintMotd,
# as it is more configurable and versatile than the built-in version.	
PrintMotd no
