name        : openssh
version     : "10.3p1"
release     : 20
summary     : OpenSSH (OpenBSD Secure Shell)
license     :
    - BSD-2-Clause
    - BSD-3-Clause
    - ISC
    - MIT
homepage    : https://www.openssh.com/
description : |
    OpenSSH is a free version of secure shell tools developed by the OpenBSD project to help facilitate secure connections and communications.
upstreams   :
    - https://cdn.openbsd.org/pub/OpenBSD/OpenSSH/portable/openssh-10.3p1.tar.gz: 56682a36bb92dcf4b4f016fd8ec8e74059b79a8de25c15d670d731e7d18e45f4
builddeps   :
    - binary(groff)
    - pkgconfig(krb5-gssapi)
    - pkgconfig(libcrypt)
    - pkgconfig(libcrypto)
    - pkgconfig(libedit)
    - pkgconfig(libfido2)
    - pkgconfig(libldns)
    - pkgconfig(libsystemd)
    - pkgconfig(pam)
    - pkgconfig(zlib)
setup       : |
    %patch %(pkgdir)/stateless/0001-Make-SSH-stateless.patch
    %patch %(pkgdir)/stateless/0002-Stateless-moduli.patch
    %patch %(pkgdir)/security/0003-Increase-ECDSA-default-length-to-521.patch
    %patch %(pkgdir)/stateless/0004-Default-default-secure-ciphers.patch
    %patch %(pkgdir)/stateless/0005-Always-use-PAM-by-default.patch
    %patch %(pkgdir)/stateless/0006-Set-default-server-keep-alive.patch
    %patch %(pkgdir)/stateless/0007-Make-OpenSSH-print-a-MOTD-file-in-usr-share-defaults.patch
    %patch %(pkgdir)/stateless/0008-Update-sshd_config-to-reflect-UsePAM-yes-default.patch
    %patch %(pkgdir)/stateless/0001-stateless-config.patch

    # --disable-strip is specified because we want the build toolchain to do it instead
    %reconfigure \
        --sysconfdir=/etc/ssh \
        --with-pid-dir=/run \
        --with-kerberos5=/usr \
        --with-ldns \
        --with-libedit \
        --with-pam \
        --with-ssl-engine \
        --with-security-key-builtin \
        --disable-lastlog \
        --disable-strip
build       : |
    %make
install     : |
    %make_install

    # TODO ssh-copy-id, pass COLORTERM variable

    # systemd unit files (enabled by default)
    %install_file %(pkgdir)/sshd*.service -t %(installroot)/%(libdir)/systemd/system/

    # ssh-agent service
    %install_file %(pkgdir)/ssh-agent.{service,socket} -t %(installroot)/%(libdir)/systemd/user/
    
    # PAM configuration
    %install_file %(pkgdir)/sshd.pam %(installroot)/%(vendordir)/pam.d/sshd

    # Statelessness
    %install_dir %(installroot)/%(vendordir)/
    mv %(installroot)/etc/ssh %(installroot)/%(vendordir)/.
    rmdir %(installroot)/etc
    rmdir %(installroot)/var/empty
    rmdir %(installroot)/var/

    # sysusers configuration
    %sysusers '# SSHD privilege separation user'
    %sysusers 'g sshd 50 -'
    %sysusers 'u sshd 50 "SSH Daemon" /var/empty'
    mv %(installroot)/%(sysusersdir)/openssh.conf %(installroot)/%(sysusersdir)/openssh-server.conf

    # tmpfiles configuration
    %tmpfiles "# Create SSH directories directory"
    %tmpfiles "d /etc/ssh - - - -"
    %tmpfiles "D /var/empty - - - -"
    mv %(installroot)/%(tmpfilesdir)/openssh.conf %(installroot)/%(tmpfilesdir)/openssh-server.conf

    # preset for packaging operation override of systemd presets that disable sshd
    %install_file %(pkgdir)/90-openssh-server-vendor-enable.preset -t %(installroot)%(libdir)/systemd/system-preset/
packages    :
    - "%(name)-server":
        summary: OpenSSH - Server daemon
        description: |
            OpenSSH - Server daemon
        paths:
            - /usr/sbin/
            - /usr/lib/openssh/sshd-*
            - /usr/lib/openssh/sftp-server
            - /usr/lib/systemd/system/
            - /usr/lib/sysusers.d/openssh-server.conf
            - /usr/lib/tmpfiles.d/openssh-server.conf
            - /usr/share/defaults/pam.d/
            - /usr/share/defaults/ssh/moduli
            - /usr/share/defaults/ssh/sshd_config
            - /usr/share/man/*/moduli*
            - /usr/share/man/*/sshd*
            - /usr/share/man/*/sftp-*
    - "%(name)-server-systemd-preset-vendor-enable":
        summary: OpenSSH - Server daemon vendor-enabled systemd preset
        description: |
            Install this if you want to ensure that sshd is enabled and listens by default on your system.
        paths:
            - /usr/lib/systemd/system-preset/
