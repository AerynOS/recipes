name        : upower
version     : "1.91.3"
release     : 13
homepage    : https://upower.freedesktop.org/
upstreams   :
    - https://gitlab.freedesktop.org/upower/upower/-/archive/v1.91.3/upower-v1.91.3.tar.gz : 6cef641ce39f13efc09e12afbb889128d4e9b3596a1faeaaa1b619fdf72403a9
summary     : UPower is an abstraction for enumerating power devices, listening to device events and querying history and statistics.
description : |
    UPower is an abstraction for enumerating power devices, listening to device events and querying history and statistics. Any application or service on the system can access the org.freedesktop.UPower service via the system message bus.
license     :
    - GPL-2.0-or-later
builddeps   :
    - binary(gtkdoc-scan)
    - binary(msgfmt)
    - binary(xmlto)
    - binary(xsltproc)
    - pkgconfig(gio-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(gudev-1.0)
    - pkgconfig(libimobiledevice-1.0)
    - pkgconfig(libplist-2.0)
    - pkgconfig(polkit-gobject-1)
    - pkgconfig(systemd)
    - docbook-xsl
environment : |
    %export_docbook_catalogs
setup       : |
    %patch %(pkgdir)/0001-Support-an-entirely-stateless-configuration.patch
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
