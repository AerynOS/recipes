name        : union
version     : "6.7.3"
release     : 2
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.3/union-6.7.3.tar.xz : ee91e8ecf066d5bc72d653e5327cef0580d82aa60e0fce9b47f945804d399199
homepage    : https://kde.org/plasma-desktop/
license     :
    - LGPL-2.1-only
    - LGPL-3.0-only
summary     : A Qt style supporting both QtQuick and QtWidgets
description : |
    A Qt style supporting both QtQuick and QtWidgets
builddeps   :
    - cmake(Breeze)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6ColorScheme)
    - cmake(KF6CoreAddons)
    - cmake(KF6GuiAddons)
    - cmake(KF6IconThemes)
    - cmake(KF6KirigamiPlatform)
    - cmake(Qt6ShaderTools)
    - cmake(cxx-rust-cssparser)
rundeps     :
    - breeze
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6 \
        -DBUILD_OUTPUT_QTWIDGETS=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
