name        : utf8proc
version     : "2.11.3"
release     : 1
homepage    : https://github.com/JuliaStrings/utf8proc
upstreams   :
    - https://github.com/JuliaStrings/utf8proc/releases/download/v2.11.3/utf8proc-2.11.3.tar.gz : 415189fd2c85cd6ee5ff26af500fa387de9ada1e3e316e93f7338551481d557d
summary     : a clean C library for processing UTF-8 Unicode data 
description : |
    utf8proc is a small, clean C library that provides Unicode normalization, case-folding, and other operations for data in the UTF-8 encoding.
license     : MIT
setup       : |
    %cmake \
        -DBUILD_SHARED_LIBS=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
