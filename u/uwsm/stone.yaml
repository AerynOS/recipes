name        : uwsm
version     : "0.26.4"
release     : 1
homepage    : https://github.com/Vladimir-csp/uwsm
upstreams   :
    - https://github.com/Vladimir-csp/uwsm/archive/refs/tags/v0.26.4.tar.gz : b7eeb03ab3950db933d3561d229ee9da55235f7f9ff5e481d6e90b3288f52954
summary     : Universal Wayland Session Manager
description : |
    Provides a set of Systemd units and helpers to set up the environment and manage standalone Wayland compositor sessions.
license     :
    - MIT
rundeps     :
    - python-pyxdg
    - python-dbus
builddeps   :
    - python(dbus-python)
    - python(pyxdg)
    - pkgconfig(scdoc)
setup       : |
    %meson \
        -Duuctl=enabled \
        -Dfumon=enabled \
        -Duwsm-app=enabled \
        -Dttyautolock=enabled
build       : |
    %meson_build
install     : |
    %meson_install
