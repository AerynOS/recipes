name        : rssguard
version     : "5.0.4"
release     : 4
upstreams   :
    - https://github.com/martinrotter/rssguard/releases/download/5.0.4/rssguard-5.0.4-src.tar.gz : 0a8750da59a3c9c245db604bd71fa23aa7d10e4ce6d502eaee343f1796c9d1a1
homepage    : https://github.com/martinrotter/rssguard
license     : GPL-3.0-or-later
summary     : Simple (yet powerful) Qt feed reader
description : |
    Simple (yet powerful) Qt feed reader
builddeps   :
    - binary(go)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Designer)
    - cmake(Qt6Multimedia)
    - cmake(Qt6Qml)
    - cmake(Qt6Sql)
    - pkgconfig(mpv)
setup       : |
    %patch %(pkgdir)/0001-default-settings.patch

    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)":
        rundeps:
            - qt6-wayland
        paths:
            - /usr/lib/lib*.so
