name        : rssguard
version     : "5.2.1"
release     : 9
upstreams   :
    - https://github.com/martinrotter/rssguard/releases/download/5.2.1/rssguard-5.2.1-src.tar.gz : f7134fda8bbaf7bd87aeccf4e3473b2220a516ae99128f69e2ee6a017a403caf
homepage    : https://github.com/martinrotter/rssguard
license     : GPL-3.0-or-later
summary     : Simple (yet powerful) Qt feed reader
description : |
    Simple (yet powerful) Qt feed reader
builddeps   :
    - binary(go)
    # - cmake(Qt6CorePrivate) # This is listed as an optional dependency but only used on Windows
    - cmake(Qt6LinguistTools)
    - cmake(Qt6Multimedia)
    - cmake(Qt6Qml)
    - cmake(Qt6Sql)
    - cmake(Qt6WebEngineWidgets)
    - pkgconfig(mpv)
setup       : |
    %patch %(pkgdir)/0001-default-settings.patch

    %cmake \
        -DNO_UPDATE_CHECK=ON \
        -DREVISION_FROM_GIT=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install
tuning      :
    - golang-modflags: false
packages    :
    - "%(name)":
        rundeps:
            - qt6-wayland
        paths:
            - /usr/lib/lib*.so
