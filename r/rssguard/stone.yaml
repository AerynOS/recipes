name        : rssguard
version     : "5.1.0"
release     : 6
upstreams   :
    - https://github.com/martinrotter/rssguard/releases/download/5.1.0/rssguard-5.1.0-src.tar.gz : eb36e6bda7996901c3492c293461037067c45a6bae31efad29ff9e4ba55471fd
homepage    : https://github.com/martinrotter/rssguard
license     : GPL-3.0-or-later
summary     : Simple (yet powerful) Qt feed reader
description : |
    Simple (yet powerful) Qt feed reader
builddeps   :
    - binary(go)
    # - cmake(Qt6CorePrivate) # This is listed as an optional dependency but only used on Windows
    - cmake(Qt6LinguistTools)
    - cmake(Qt6Multimedia)
    - cmake(Qt6Qml)
    - cmake(Qt6Sql)
    - cmake(Qt6WebEngineWidgets)
    - pkgconfig(mpv)
setup       : |
    %patch %(pkgdir)/0001-default-settings.patch

    %cmake \
        -DNO_UPDATE_CHECK=ON \
        -DREVISION_FROM_GIT=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)":
        rundeps:
            - qt6-wayland
        paths:
            - /usr/lib/lib*.so
