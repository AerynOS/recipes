name        : rclone
version     : "1.74.1"
release     : 2
homepage    : https://rclone.org/
upstreams   :
    - https://github.com/rclone/rclone/archive/refs/tags/v1.74.1.tar.gz : aa0470151fe2e33d6bb96657892dfc4d56f92472a2dedebdda4ff296e87b79dc
summary     : Sync files to and from many cloud storage providers
description : |
    Rclone is a command line program to manage files on cloud storage. It is a feature-rich alternative to cloud vendors' web storage interfaces and supports more than 70 cloud storage products including S3 object stores, business & consumer file storage services, as well as standard transfer protocols.
license     :
    - MIT
networking  : true
builddeps   :
    - binary(go)
setup       : |
    go mod download
build       : |
    go build -v \
        -trimpath \
        -mod=readonly \
        -buildmode=pie \
        -tags noselfupdate \
        -ldflags "-s -w -X github.com/rclone/rclone/fs.Version=v%(version)"
    
    ./rclone genautocomplete bash rclone.bash_completion
    ./rclone genautocomplete zsh rclone.zsh_completion
    ./rclone genautocomplete fish rclone.fish_completion
install     : |
    %install_bin rclone

    # Mount helper symlinks
    %install_dir %(installroot)%(sbindir)
    ln -srv %(installroot)%(bindir)/rclone %(installroot)%(sbindir)/mount.rclone
    ln -srv %(installroot)%(bindir)/rclone %(installroot)%(sbindir)/rclonefs

    %install_file rclone.bash_completion %(installroot)%(bashcompletionsdir)/rclone
    %install_file rclone.zsh_completion %(installroot)%(zshcompletionsdir)/_rclone
    %install_file rclone.fish_completion %(installroot)%(fishcompletionsdir)/rclone.fish

    %install_file rclone.1 -t %(installroot)%(mandir)/man1
