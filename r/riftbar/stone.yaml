name        : riftbar
version     : "0.1.8"
release     : 2
homepage    : https://github.com/BinaryHarbinger/riftbar
upstreams   :
    - https://github.com/BinaryHarbinger/riftbar/archive/refs/tags/v0.1.8.tar.gz : 3db542d6e991f2371fe850820e3d924ff0dd7f579da981bd0bdc8825aeca9f26
summary     : Highly customizable GTK4 bar for Wayland written in Rust.
description : |
    Riftbar is a Waybar-like status bar writen in Rust designed to be fast, safe and modern.
license     :
    - GPL-3.0-or-later
builddeps   :
    - pkgconfig(cairo)
    - pkgconfig(cairo-gobject)
    - pkgconfig(dbus-1)
    - pkgconfig(gdk-pixbuf-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(graphene-gobject-1.0)
    - pkgconfig(gtk4)
    - pkgconfig(gtk4-layer-shell-0)
    - pkgconfig(pango)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %cargo_install
