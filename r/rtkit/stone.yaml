name        : rtkit
version     : "0.14"
release     : 4
homepage    : https://gitlab.freedesktop.org/pipewire/rtkit
upstreams   :
    - https://gitlab.freedesktop.org/pipewire/rtkit/-/archive/v0.14/rtkit-v0.14.tar.gz : 55dd379b11f52b81655e2dc676de9d602d050cb0beb18ef01f0f65569f0a5e59
summary     : Realtime Policy and Watchdog Daemon
description : |
    Realtime Policy and Watchdog Daemon
license     : GPL-3.0
builddeps   :
    - binary(sh)
    - binary(xxd)
    - pkgconfig(dbus-1)
    - pkgconfig(libcap)
    - pkgconfig(libsystemd)
    - pkgconfig(polkit-gobject-1)
    - pkgconfig(systemd)
setup       : |
    %meson \
        -Dinstalled_tests=false
build       : |
    %meson_build
install     : |
    %meson_install

    # userdb pls
    %install_file %(pkgdir)/rtkit.group %(installroot)%(libdir)/userdb/rtkit.group
    ln -s rtkit.group %(installroot)%(libdir)/userdb/133.group
    %install_file %(pkgdir)/rtkit.user %(installroot)%(libdir)/userdb/rtkit.user
    ln -s rtkit.user %(installroot)%(libdir)/userdb/133.user

    rm -v %(installroot)%(sysusersdir)/rtkit.conf
    rmdir -v %(installroot)%(sysusersdir)
