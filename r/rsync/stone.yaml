name        : rsync
version     : "3.4.2"
release     : 4
homepage    : https://rsync.samba.org/
upstreams   :
    - https://rsync.samba.org/ftp/rsync/src/rsync-3.4.2.tar.gz : ff10aa2c151cd4b2dbbe6135126dbc854046113d2dfb49572a348233267eb315
summary     : File transfer program to keep remote files in sync.
description : |
    Rsync is an open source utility that provides fast incremental file transfer.
license     : GPL-3.0+
builddeps   :
    - binary(python3)
    - pkgconfig(libacl)
    - pkgconfig(liblz4)
    - pkgconfig(libxxhash)
    - pkgconfig(libzstd)
    - pkgconfig(openssl)
    - pkgconfig(popt)
    - pkgconfig(zlib)
setup       : |
    %configure \
        --with-included-popt=no \
        --with-included-zlib=no
build       : |
    %make
install     : |
    %make_install
