name        : rsync
version     : "3.4.3"
release     : 5
homepage    : https://rsync.samba.org/
upstreams   :
    - https://rsync.samba.org/ftp/rsync/src/rsync-3.4.3.tar.gz : c72e63ca3021cbc80ba86ec30102773f4c5631fbc492b52e773b3958f82a53d3
summary     : File transfer program to keep remote files in sync.
description : |
    Rsync is an open source utility that provides fast incremental file transfer.
license     : GPL-3.0+
builddeps   :
    - binary(python3)
    - pkgconfig(libacl)
    - pkgconfig(liblz4)
    - pkgconfig(libxxhash)
    - pkgconfig(libzstd)
    - pkgconfig(openssl)
    - pkgconfig(popt)
    - pkgconfig(zlib)
setup       : |
    %configure \
        --with-included-popt=no \
        --with-included-zlib=no
build       : |
    %make
install     : |
    %make_install
