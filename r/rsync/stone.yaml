name        : rsync
version     : "3.4.4"
release     : 6
homepage    : https://rsync.samba.org/
upstreams   :
    - https://rsync.samba.org/ftp/rsync/src/rsync-3.4.4.tar.gz : bd88cf82fa653da32314fb229136407c5c90f80d1758d8f4b091767877d8fa96
summary     : File transfer program to keep remote files in sync.
description : |
    Rsync is an open source utility that provides fast incremental file transfer.
license     : GPL-3.0+
builddeps   :
    - binary(python3)
    - pkgconfig(libacl)
    - pkgconfig(liblz4)
    - pkgconfig(libxxhash)
    - pkgconfig(libzstd)
    - pkgconfig(openssl)
    - pkgconfig(popt)
    - pkgconfig(zlib)
setup       : |
    %configure \
        --with-included-popt=no \
        --with-included-zlib=no
build       : |
    %make
install     : |
    %make_install
