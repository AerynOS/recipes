name        : runc
version     : "1.5.0"
release     : 15
homepage    : https://runc.io/
upstreams   :
    - https://github.com/opencontainers/runc/archive/refs/tags/v1.5.0.tar.gz : 1bcd55af6081cf080557b148d906f64e6e4ca886d8345fe4b5510a90b52815d1
summary     : CLI tool for managing OCI compliant containers
description : |
    CLI tool for managing OCI compliant containers
license     :
    - Apache-2.0
networking  : true
builddeps   :
    - binary(go)
    - binary(go-md2man)
    - pkgconfig(libseccomp)
    - pkgconfig(pathrs)
setup       : |
    mkdir -p src/github.com/opencontainers/runc/
    find ./* -prune ! -name src -exec mv {} src/github.com/opencontainers/runc/ \;
build      : |
    export GOPATH="${PWD}"
    export BUILDTAGS='seccomp'
    export GOFLAGS="-trimpath -mod=readonly -modcacherw"
    export CGO_CFLAGS="${CFLAGS}"

    # Git SHA corresponding to the release tag
    export COMMIT=$(git ls-remote https://github.com/opencontainers/runc.git refs/tags/v%(version)^{} |awk '{print $1}')

    cd src/github.com/opencontainers/runc/
    %make runc man
install     : |
    cd src/github.com/opencontainers/runc/
    %install_bin runc

    %install_file contrib/completions/bash/runc -t %(installroot)%(completionsdir)

    %install_dir %(installroot)%(mandir)/man8
    %install_file man/man8/*.8 -t %(installroot)%(mandir)/man8
tune        :
    - lto: full
    - optimize: speed
# There's some compatibility issue with Clang and how CGO attempts to use variables provided by libpathrs
# /mason/gomodcache/cyphar.com/go-pathrs@v0.2.5/internal/libpathrs/libpathrs_linux.go:256:32: cannot use (_Ciconst_PATHRS_PROC_ROOT) (untyped int constant 18446744067006164835) as int64 value in variable declaration (overflows)
# There should be some way to fix that
toolchain: gnu
