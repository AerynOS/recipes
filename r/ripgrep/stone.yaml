name        : ripgrep
version     : "15.2.0"
release     : 5
homepage    : https://github.com/BurntSushi/ripgrep
upstreams   :
    - https://github.com/BurntSushi/ripgrep/archive/refs/tags/15.2.0.tar.gz : 7605249d3eb0d5f170e3414498e3344e26b1e7a147aec518b57090b80036a562
summary     : Recursive text search utility
description : |
    ripgrep recursively searches directories for a regex pattern while respecting your gitignore
license     : MIT
builddeps   :
    - pkgconfig(libpcre2-8)
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build --features 'pcre2'
install     : |
    %cargo_install rg

    # completions
    %(cargo_target_dir)/rg --generate complete-bash | %install_file /dev/stdin %(installroot)%(bashcompletionsdir)/rg
    %(cargo_target_dir)/rg --generate complete-fish | %install_file /dev/stdin %(installroot)%(fishcompletionsdir)/rg.fish
    %(cargo_target_dir)/rg --generate complete-zsh | %install_file /dev/stdin %(installroot)%(zshcompletionsdir)/_rg

    # man pages
    %(cargo_target_dir)/rg --generate man | %install_file /dev/stdin %(installroot)%(mandir)/man1/rg.1
check       : |
    %cargo_test --features 'pcre2'
