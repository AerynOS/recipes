name        : qt6-5compat
version     : "6.11.0"
release     : 13
homepage    : https://www.qt.io
upstreams   :
    - https://download.qt.io/official_releases/qt/6.11/6.11.0/submodules/qt5compat-everywhere-src-6.11.0.tar.xz : e62954646b2749723aa5c7db32faab407358734075590058a01e793382d4c63e
summary     : Qt 5 compatibility library for Qt 6
description : |
    The Qt 5 Core Compat module contains the Qt Core APIs which will be no longer supported in Qt 6 and therefore were removed from Qt 6. The module is provided to facilitate the transition to Qt 6.
license     :
    - GFDL-1.3-or-later
    - GPL-3.0-or-later
    - LGPL-3.0-or-later
builddeps   :
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
    - cmake(Qt6ShaderTools)
    - pkgconfig(icu-i18n)
setup       : |
    %cmake_qt6
build       : |
    %cmake_build
install     : |
    %cmake_install
