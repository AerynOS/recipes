name        : qt6-webview
version     : "6.11.0"
release     : 7
homepage    : https://www.qt.io
upstreams   :
    - https://download.qt.io/official_releases/qt/6.11/6.11.0/submodules/qtwebview-everywhere-src-6.11.0.tar.xz : cb0eaed94a12d5f650863d346c423e9f4383dbce1d05866869c40118c6e8c4b3
summary     : Qt6 WebView Library
description : |
    Qt WebView provides a way to display web content in a QML application without necessarily including a full web browser stack by using native APIs where it makes sense.
license     : LGPL-3.0-only
builddeps   :
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
    - cmake(Qt6WebEngineCore)
setup       : |
    %cmake_qt6
build       : |
    %cmake_build
install     : |
    %cmake_install
