name        : qqc2-breeze-style
version     : "6.7.3"
release     : 2
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.3/qqc2-breeze-style-6.7.3.tar.xz : e399daf4cee241e4bcaf77b69548f7b9f6b1550cc0f7dc5ce6f2ec4f99d82899
homepage    : https://kde.org/plasma-desktop/
license     :
    - GPL-2.0-or-later
summary     : Breeze Style for QQC2
description : |
    Breeze inspired QQC2 Style
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6ColorScheme)
    - cmake(KF6Config)
    - cmake(KF6GuiAddons)
    - cmake(KF6IconThemes)
    - cmake(KF6Kirigami)
    - cmake(Qt6Qml)
rundeps     :
    - kf6-kquickcharts
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
