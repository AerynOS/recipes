name        : qqc2-breeze-style
version     : "6.7.1"
release     : 1
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.1/qqc2-breeze-style-6.7.1.tar.xz : 0bd37f4a565b94aec7c2e677923a70551b953578f5b50c14bd6f449b749ac212
homepage    : https://kde.org/plasma-desktop/
license     :
    - GPL-2.0-or-later
summary     : Breeze Style for QQC2
description : |
    Breeze inspired QQC2 Style
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6ColorScheme)
    - cmake(KF6Config)
    - cmake(KF6GuiAddons)
    - cmake(KF6IconThemes)
    - cmake(KF6Kirigami)
    - cmake(Qt6Qml)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
