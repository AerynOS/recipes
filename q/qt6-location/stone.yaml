name        : qt6-location
version     : "6.11.0"
release     : 14
homepage    : https://www.qt.io
upstreams   :
    - https://download.qt.io/official_releases/qt/6.11/6.11.0/submodules/qtlocation-everywhere-src-6.11.0.tar.xz : 89b8386a8ae9e0b40a43fad398ac344f93a3b0d22f09bec4631f25d79135abef
