name        : qt6-svg
version     : "6.11.0"
release     : 11
homepage    : https://www.qt.io
upstreams   :
    - https://download.qt.io/official_releases/qt/6.11/6.11.0/submodules/qtsvg-everywhere-src-6.11.0.tar.xz : dfa8d653be07087d9407ed4a4ebae847f8953e0b7abd829f089803ab652a30e6
summary     : Qt6 SVG Module
description : |
    Scalable Vector Graphics (SVG) is an XML-based language for describing two-dimensional vector graphics. Qt provides classes for rendering and displaying SVG drawings in widgets and on other paint devices.
license     :
    - GFDL-1.3-or-later
    - GPL-3.0-or-later
    - LGPL-3.0-or-later
builddeps   :
    - cmake(Qt6CorePrivate)
setup       : |
    %cmake_qt6
build       : |
    %cmake_build
install     : |
    %cmake_install
