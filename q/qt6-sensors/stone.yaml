name        : qt6-sensors
version     : "6.11.0"
release     : 7
homepage    : https://www.qt.io
upstreams   :
    - https://download.qt.io/official_releases/qt/6.11/6.11.0/submodules/qtsensors-everywhere-src-6.11.0.tar.xz : 412829258bc9f42766ed13a4b9d66604f184d349510b3248ec065cf90e1fc3c7
summary     : Qt6 Sensors Module
description : |
    The Qt Sensors API provides access to sensor hardware via QML and C++ interfaces. The Qt Sensors API also provides a motion gesture recognition API for devices.
license     :
    - GFDL-1.3-or-later
    - GPL-3.0-or-later
    - LGPL-3.0-or-later
builddeps   :
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Quick)
    - cmake(Qt6Svg)
setup       : |
    %cmake_qt6
build       : |
    %cmake_build
install     : |
    %cmake_install
