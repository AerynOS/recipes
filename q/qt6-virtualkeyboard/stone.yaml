name        : qt6-virtualkeyboard
version     : "6.11.0"
release     : 8
homepage    : https://www.qt.io
upstreams   :
    - https://download.qt.io/official_releases/qt/6.11/6.11.0/submodules/qtvirtualkeyboard-everywhere-src-6.11.0.tar.xz : d88a4b1713a313e3ac06c32837b5d00724d1dcf7b44c2594f1029f7c74a8e686
summary     : Qt Virtual Keyboard
description : |
    Qt Virtual Keyboard is a virtual keyboard framework that consists of a C++ backend supporting custom input methods as well as a UI frontend implemented in QML.
license     :
    - GFDL-1.3-or-later
    - GPL-3.0-or-later
    - LGPL-3.0-or-later
builddeps   :
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Multimedia)
    - cmake(Qt6Quick)
    - cmake(Qt6Svg)
    - pkgconfig(hunspell)
setup       : |
    %cmake_qt6
build       : |
    %cmake_build
install     : |
    %cmake_install
