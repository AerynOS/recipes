name        : hyprwayland-scanner
version     : "0.4.6"
release     : 2
upstreams   :
    - https://github.com/hyprwm/hyprwayland-scanner/archive/refs/tags/v0.4.6.tar.gz : 05f55fd1a20d8ca81b5030980fdb7c87147749230145bdb3745af2741d617f5c
homepage    : https://github.com/hyprwm/hyprwayland-scanner
license     : BSD-3-Clause
summary     : A Hyprland implementation of wayland-scanner
description : |
    A Hyprland implementation of wayland-scanner, in and for C++.
builddeps   :
    - cmake(pugixml)
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    # Devel-only package
    - "%(name)":
        paths:
            - /usr/lib/pkgconfig/
            - /usr/lib/cmake/
