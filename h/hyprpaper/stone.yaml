name        : hyprpaper
version     : "0.8.4"
release     : 2
upstreams   :
    - https://github.com/hyprwm/hyprpaper/archive/refs/tags/v0.8.4.tar.gz : 4912c7aede303918f38a3fc6b294429e2d541b639ebba67bcab58d1d367ea360
homepage    : https://github.com/hyprwm/hyprpaper
license     : BSD-3-Clause
summary     : A blazing fast wallpaper utility for Hyprland
description : |
    Hyprpaper is a blazing fast wallpaper utility for Hyprland with the ability to dynamically change wallpapers through sockets. It will work on all wlroots-based compositors, though.
builddeps   :
    - pkgconfig(hyprlang)
    - pkgconfig(hyprtoolkit)
    - pkgconfig(hyprutils)
    - pkgconfig(hyprwayland-scanner)
    - pkgconfig(hyprwire)
    - pkgconfig(libdrm)
    - pkgconfig(libmagic)
    - pkgconfig(opengl)
    - pkgconfig(pixman-1)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-protocols)
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
