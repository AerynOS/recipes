name        : hyprpaper
version     : "0.8.3"
release     : 1
upstreams   :
    - https://github.com/hyprwm/hyprpaper/archive/refs/tags/v0.8.3.tar.gz : bfede471179adca93ed6d10e0132838c16dae364d828bd44f67819afc1a15594
homepage    : https://github.com/hyprwm/hyprpaper
license     : BSD-3-Clause
summary     : A blazing fast wallpaper utility for Hyprland
description : |
    Hyprpaper is a blazing fast wallpaper utility for Hyprland with the ability to dynamically change wallpapers through sockets. It will work on all wlroots-based compositors, though.
builddeps   :
    - pkgconfig(hyprlang)
    - pkgconfig(hyprtoolkit)
    - pkgconfig(hyprutils)
    - pkgconfig(hyprwayland-scanner)
    - pkgconfig(hyprwire)
    - pkgconfig(libdrm)
    - pkgconfig(libmagic)
    - pkgconfig(opengl)
    - pkgconfig(pixman-1)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-protocols)
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
