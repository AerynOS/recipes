name        : heroic-games-launcher
version     : "2.22.0"
release     : 1
homepage    : https://heroicgameslauncher.com 
upstreams   :
    - git|https://github.com/Heroic-Games-Launcher/HeroicGamesLauncher.git : 0411046a34eb25b84ea79513af6289f75af2384a
summary     : A games launcher for GOG, Amazon and Epic Games for Linux, Windows and macOS. 
description : |
    Heroic is an Open Source Game Launcher for Linux, Windows and macOS. Right now it supports launching games from the Epic Games Store using Legendary, GOG Games using our custom implementation with gogdl and Amazon Games using Nile.
license     : 
    - GPL-3.0-or-later
builddeps   :
    - binary(pnpm)
    - pkgconfig(alsa)
    - pkgconfig(cups)
    - pkgconfig(gbm)
    - pkgconfig(gtk+-3.0)
networking  : true
setup       : |
    # Fix Add-to-Steam
    %patch %(pkgdir)/fix-exec-heroic-add-to-steam.patch
    # Fix Desktop file
    %patch %(pkgdir)/fix-exec-heroic-desktop-file.patch
    pnpm install
    pnpm run download-helper-binaries
build       : |
    pnpm dist:linux dir
install     : |
    _heroic_root=%(libdir)/heroic
    _heroic_install=%(installroot)/$_heroic_root

    %install_dir $_heroic_install
    cp -R dist/linux-unpacked/* $_heroic_install

    %install_dir %(installroot)%(bindir)
    ln -rsv $_heroic_root/heroic %(installroot)%(bindir)/heroic

    # Desktop file, icon
    %install_file flatpak/com.heroicgameslauncher.hgl.desktop %(installroot)/%(datadir)/applications/com.heroicgameslauncher.hgl.desktop
    %install_file src/frontend/assets/heroic-icon.svg %(installroot)%(datadir)/icons/hicolor/scalable/apps/com.heroicgameslauncher.hgl.svg
