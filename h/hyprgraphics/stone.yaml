name        : hyprgraphics
version     : "0.5.0"
release     : 1
upstreams   :
    - https://github.com/hyprwm/hyprgraphics/archive/refs/tags/v0.5.0.tar.gz : bb37f611c1f50e58dcc0aa97ec1b39c186b78160807f109c5dd8833d58f8bc04
homepage    : https://github.com/hyprwm/hyprgraphics
license     : BSD-3-Clause
summary     : Hyprland graphics / resource utilities
description : |
    Hyprgraphics is a small C++ library with graphics / resource related utilities used across the hypr* ecosystem.
builddeps   :
    - pkgconfig(cairo)
    - pkgconfig(hyprutils)
    - pkgconfig(libheif)
    - pkgconfig(libjpeg)
    - pkgconfig(libjxl)
    - pkgconfig(libmagic)
    - pkgconfig(librsvg-2.0)
    - pkgconfig(libwebp)
    - pkgconfig(pangocairo)
    - pkgconfig(pixman-1)
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - pkgconfig(cairo)
