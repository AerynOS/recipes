name        : hyprcursor
version     : "0.1.13"
release     : 1
upstreams   :
    - https://github.com/hyprwm/hyprcursor/archive/refs/tags/v0.1.13.tar.gz : 82af8b2ce27242ffdd6baebaa71b3f6c8665dc25c52bfcfccc16912622896af8
homepage    : https://github.com/hyprwm/hyprcursor
license     : BSD-3-Clause
summary     : The hyprland cursor format, library and utilities.
description : |
    The hyprland cursor format, library and utilities.
builddeps   :
    - cmake(libzip)
    - cmake(tomlplusplus)
    - pkgconfig(cairo)
    - pkgconfig(hyprlang)
    - pkgconfig(librsvg-2.0)
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        paths:
            - /usr/bin/hyprcursor-util
