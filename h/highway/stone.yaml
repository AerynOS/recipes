name        : highway
version     : "1.3.0"
release     : 6
homepage    : https://github.com/google/highway
upstreams   :
    - https://github.com/google/highway/releases/download/1.3.0/highway-1.3.0.tar.gz : e8d696900b45f4123be8a9d6866f4e7b6831bf599f4b9c178964d968e6a58a69
    # - git|https://github.com/google/highway.git : 989a498fdf3e2b758c48998e87a2807a1a53e494
summary     : Performance-portable, length-agnostic SIMD with runtime dispatch
description : |
    Performance-portable, length-agnostic SIMD with runtime dispatch
license     :
    - Apache-2.0
    - BSD-3-Clause
builddeps   :
    - cmake(GTest)
setup       : |
    %patch %(pkgdir)/0001-workaround-for-inadvertent-SVE-codegen-on-GCC-14.-Fi.patch
    %patch %(pkgdir)/0002-Update-target-attributes-for-changed-clang-AVX10.2-p.patch
    %patch %(pkgdir)/0003-Enable-VQSORT-for-RISC-V.patch
    %patch %(pkgdir)/0004-fix-comment.patch
    %patch %(pkgdir)/0005-mark-avx10.2-broken-prior-to-gcc-15.2-clang-20.-Fixe.patch
    %patch %(pkgdir)/0006-Increase-the-clang-version-number-to-check-for-to-di.patch
    %patch %(pkgdir)/0007-Detect-clang-19-20-21-also-allow-user-override.patch
    %patch %(pkgdir)/0008-Adds-HWY_HAVE_EVEX512-define-to-allow-specifying-fro.patch
    %patch %(pkgdir)/0009-Disable-AVX10.2-as-further-fallout-from-llvm-llvm-pr.patch
    %patch %(pkgdir)/0010-GCC-15-removed-avx10.2-512-target.patch

    %cmake \
        -DBUILD_SHARED_LIBS=ON \
        -DHWY_FORCE_STATIC_LIBS=OFF \
        -DHWY_SYSTEM_GTEST=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
check       : |
    # Fail on the build server, succeed locally
    %cmake_test || true
packages    :
    - "%(name)-devel":
        paths:
            # We can move this back into the main package if non-dev packages end up depending on it
            - /usr/lib/libhwy_test.so.*
