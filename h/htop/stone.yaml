name        : htop
version     : "3.5.2"
release     : 11
homepage    : https://htop.dev/
upstreams   :
    - https://github.com/htop-dev/htop/releases/download/3.5.2/htop-3.5.2.tar.xz : 225128e697c4a8c8a878fd0078c965ff8bd5fb24913bfc8473b8edbd50f843f8
summary     : Interactive process viewer
description : |
    htop is an interactive process viewer that can show detailed information
    about CPU & memory usage on the console
license     : GPL-2.0-or-later
builddeps   :
    - pkgconfig(hwloc)
    - pkgconfig(libcap)
    - pkgconfig(libnl-3.0)
    - pkgconfig(ncursesw)
    - lm_sensors-devel
rundeps     :
    - lm_sensors
setup       : |
    %configure \
        --enable-hwloc \
        --enable-unicode
build       : |
    %make
install     : |
    %make_install
