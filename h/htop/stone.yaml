name        : htop
version     : "3.5.1"
release     : 10
homepage    : https://htop.dev/
upstreams   :
    - https://github.com/htop-dev/htop/releases/download/3.5.1/htop-3.5.1.tar.xz : 526cecd62870aa8d14d2a79a35ea197e4e2b5317d275b567cee0574b2ddb2e9a
summary     : Interactive process viewer
description : |
    htop is an interactive process viewer that can show detailed information
    about CPU & memory usage on the console
license     : GPL-2.0-or-later
builddeps   :
    - pkgconfig(hwloc)
    - pkgconfig(libcap)
    - pkgconfig(libnl-3.0)
    - pkgconfig(ncursesw)
    - lm_sensors-devel
rundeps     :
    - lm_sensors
setup       : |
    %configure \
        --enable-hwloc \
        --enable-unicode
build       : |
    %make
install     : |
    %make_install
