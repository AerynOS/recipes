name        : harfbuzz
version     : "14.2.1"
release     : 36
homepage    : https://harfbuzz.github.io/
upstreams   :
    - https://github.com/harfbuzz/harfbuzz/releases/download/14.2.1/harfbuzz-14.2.1.tar.xz : a54a5d8e9380a41fbb762ce367bcbf7704792dfca0d93f1bbca86c5a57902e0e
summary     : HarfBuzz text shaping engine
description : |
    HarfBuzz is a text shaping library. Using the HarfBuzz library allows programs to convert a sequence of Unicode input into properly formatted and positioned glyph output—for any writing system and language.
license     :
    - MIT
    - HPND
builddeps   :
    - binary(help2man)
    - pkgconfig(cairo)
    - pkgconfig(chafa)
    - pkgconfig(freetype2)
    - pkgconfig(gl)
    - pkgconfig(glew)
    - pkgconfig(glfw3)
    - pkgconfig(glib-2.0)
    - pkgconfig(gobject-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(graphite2)
    - pkgconfig(icu-uc)
tuning      :
    # When thread-exceptions is enabled, the build fails, this is specifically
    # because of the `-fexceptions` flag being passed to `clang` when linking.
    #
    # Specific error:
    #
    # ld.lld: error: undefined symbol: __cxa_begin_catch
    # >>> referenced by hb-aat-layout.cc
    # >>>               src/libharfbuzz.so.0.61421.0.p/libharfbuzz.so.0.61421.0.lto.hb-aat-layout.cc.o:(__clang_call_terminate)
    #
    # ld.lld: error: undefined symbol: std::terminate()
    # >>> referenced by hb-aat-layout.cc
    # >>>               src/libharfbuzz.so.0.61421.0.p/libharfbuzz.so.0.61421.0.lto.hb-aat-layout.cc.o:(__clang_call_terminate)
    #
    # ld.lld: error: undefined symbol: __gxx_personality_v0
    # >>> referenced by hb-aat-layout.cc
    # >>>               src/libharfbuzz.so.0.61421.0.p/libharfbuzz.so.0.61421.0.lto.hb-aat-layout.cc.o:(DW.ref.__gxx_personality_v0)
    # clang: error: linker command failed with exit code 1 (use -v to see invocation)
    - thread-exceptions: false
setup       : |
    %meson \
        -Dgraphite2=enabled \
        -Dintrospection=enabled
build       : |
    %meson_build
install     : |
    %meson_install
packages    :
    - "%(name)-cairo":
        summary: Harfbuzz cairo support library
        description: Harfbuzz cairo support library
        paths:
            - /usr/lib/libharfbuzz-cairo.so.*

    - "%(name)-gpu":
        summary: Harfbuzz GPU support library
        description: Harfbuzz GPU support library
        paths:
            - /usr/lib/libharfbuzz-gpu.so.*

    - "%(name)-icu":
        summary: Harfbuzz ICU support library
        description: Harfbuzz ICU support library
        paths:
            - /usr/lib/libharfbuzz-icu.so.*

    - "%(name)-raster":
        summary: Harfbuzz raster support library
        description: Harfbuzz raster support library
        paths:
            - /usr/lib/libharfbuzz-raster.so.*

    - "%(name)-vector":
        summary: Harfbuzz vector support library
        description: Harfbuzz vector support library
        paths:
            - /usr/lib/libharfbuzz-vector.so.*

    - "%(name)-devel":
        rundeps:
            - "%(name)-cairo"
            - "%(name)-gpu"
            - "%(name)-icu"
            - "%(name)-raster"
            - "%(name)-vector"
        paths:
            - /usr/bin/
            - /usr/share/man/
