name        : harfbuzz
version     : "13.0.1"
release     : 28
homepage    : https://harfbuzz.github.io/
upstreams   :
    - https://github.com/harfbuzz/harfbuzz/releases/download/13.0.1/harfbuzz-13.0.1.tar.xz : 3553d943401c34ab9b8c75f35cdb8452ca660233b0e9d4a22395ce5245484bd7
summary     : HarfBuzz text shaping engine
description : |
    HarfBuzz is a text shaping library. Using the HarfBuzz library allows programs to convert a sequence of Unicode input into properly formatted and positioned glyph output—for any writing system and language.
license     :
    - MIT
    - HPND
builddeps   :
    - binary(help2man)
    - pkgconfig(cairo)
    - pkgconfig(chafa)
    - pkgconfig(freetype2)
    - pkgconfig(glib-2.0)
    - pkgconfig(gobject-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(graphite2)
    - pkgconfig(icu-uc)
setup       : |
    %meson \
        -Dgraphite2=enabled \
        -Dintrospection=enabled
build       : |
    %meson_build
install     : |
    %meson_install
packages    :
    - "%(name)-cairo":
        summary: Harfbuzz cairo support library
        description: Harfbuzz cairo support library
        paths:
            - /usr/lib/libharfbuzz-cairo.so.*

    - "%(name)-icu":
        summary: Harfbuzz ICU support library
        description: Harfbuzz ICU support library
        paths:
            - /usr/lib/libharfbuzz-icu.so.*

    - "%(name)-raster":
        summary: Harfbuzz raster support library
        description: Harfbuzz raster support library
        paths:
            - /usr/lib/libharfbuzz-raster.so.*

    - "%(name)-vector":
        summary: Harfbuzz vector support library
        description: Harfbuzz vector support library
        paths:
            - /usr/lib/libharfbuzz-vector.so.*

    - "%(name)-devel":
        rundeps:
            - "%(name)-cairo"
            - "%(name)-icu"
            - "%(name)-raster"
            - "%(name)-vector"
        paths:
            - /usr/bin/
            - /usr/share/man/
