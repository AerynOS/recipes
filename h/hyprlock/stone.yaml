name        : hyprlock
version     : "0.9.4"
release     : 2
upstreams   :
    - https://github.com/hyprwm/hyprlock/archive/refs/tags/v0.9.4.tar.gz : b8fd512e54016632439c1a8e7e033846e64421e5203bdc3ad86663a4a152473a
homepage    : https://github.com/hyprwm/hyprlock
license     : BSD-3-Clause
summary     : Hyprland's simple, yet multi-threaded and GPU-accelerated screen locking utility.
description : |
    Hyprland's simple, yet multi-threaded and GPU-accelerated screen locking utility.
builddeps   :
    - pkgconfig(cairo)
    - pkgconfig(gbm)
    - pkgconfig(hyprgraphics)
    - pkgconfig(hyprlang)
    - pkgconfig(hyprutils)
    - pkgconfig(hyprwayland-scanner)
    - pkgconfig(libdrm)
    - pkgconfig(opengl)
    - pkgconfig(pam)
    - pkgconfig(pangocairo)
    - pkgconfig(sdbus-c++)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-egl)
    - pkgconfig(wayland-protocols)
    - pkgconfig(xkbcommon)
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install

    # Stateless
    %install_dir %(installroot)%(vendordir)/pam.d
    mv %(installroot)/etc/pam.d/hyprlock %(installroot)%(vendordir)/pam.d
    rmdir -v %(installroot)/etc/pam.d \
             %(installroot)/etc
