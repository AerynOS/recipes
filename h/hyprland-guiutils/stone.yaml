name        : hyprland-guiutils
version     : "0.2.2"
release     : 3
upstreams   :
    - https://github.com/hyprwm/hyprland-guiutils/archive/refs/tags/v0.2.2.tar.gz : 16f92a6c5a22ac58e1fc313f6b202c188da45e804e1f21ff57dfd0da5c1a01b7
