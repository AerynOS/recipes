name        : xfsprogs
version     : "7.1.1"
release     : 18
homepage    : https://xfs.wiki.kernel.org/
upstreams   :
    - https://mirrors.edge.kernel.org/pub/linux/utils/fs/xfs/xfsprogs/xfsprogs-7.1.1.tar.xz : 063edc31ba8e85c95c7faf9be465a04898bba7c6e622fdd9b146eed4ca5415e8
summary     : Filesystem utilities for xfs filesystems
description : |
    Filesystem utilities for xfs filesystems
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
builddeps   :
    - binary(file)
    - binary(msgfmt)
    - pkgconfig(blkid)
    - pkgconfig(devmapper)
    - pkgconfig(icu-i18n)
    - pkgconfig(inih)
    - pkgconfig(libedit)
    - pkgconfig(libsystemd)
    - pkgconfig(liburcu)
    - pkgconfig(uuid)
setup       : |
    %configure \
        --disable-static \
        --enable-editline=yes \
        --libexecdir=%(libdir)

    # Prevent rpath from ending up in the binaries
    sed -i 's|^hardcode_libdir_flag_spec=.*|hardcode_libdir_flag_spec=""|g' libtool
    sed -i 's|^runpath_var=LD_RUN_PATH|runpath_var=DIE_RPATH_DIE|g' libtool
build       : |
    %make
install     : |
    %make_install -j1 install install-dev \
        PKG_ROOT_SBIN_DIR=%(sbindir) PKG_LIB_DIR=%(libdir)
