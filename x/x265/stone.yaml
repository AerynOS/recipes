name        : x265
version     : "4.2"
release     : 3
upstreams   :
    - https://github.com/Multicorewareinc/x265/releases/download/4.2/x265_4.2.tar.gz : 40b1ea0453e0309f0eba934e0ddf533f8f6295966679e8894e8f1c1c8d5e1210
homepage    : https://www.x265.org/
license     : GPL-2.0-or-later
summary     : x265 is an open source HEVC encoder
description : |
    The primary objective of x265 is to become the best H.265/HEVC encoder available anywhere, offering the highest compression efficiency and the highest performance on a wide variety of hardware platforms.
builddeps   :
    - binary(nasm)
setup       : |
    %patch %(pkgdir)/ftbfs-libstdc-15.patch

    function x265_common() {
        %cmake \
            -S source \
            -DENABLE_HDR10_PLUS=TRUE \
            "$@"
    }
    function x265_hdr() {
        x265_common \
            -DENABLE_CLI=FALSE \
            -DENABLE_SHARED=FALSE \
            -DEXPORT_C_API=FALSE \
            -DHIGH_BIT_DEPTH=TRUE \
            "$@"
    }

    # HDR 10-bit and 12-bit support
    x265_hdr \
        -B build-10
    x265_hdr \
        -B build-12 \
        -DMAIN12=TRUE

    x265_common \
        -DENABLE_SHARED=TRUE \
        -DEXTRA_LIB='x265_main10.a;x265_main12.a' \
        -DEXTRA_LINK_FLAGS='-L .' \
        -DLINKED_10BIT=TRUE \
        -DLINKED_12BIT=TRUE
build       : |
    # 10 and 12-bit
    for i in 10 12; do
        %ccache_zero
        BUILDDIR=build-${i}
        env CCACHE_BASEDIR="${PWD}/build-${i}" %cmake_build
        %ccache_stats
        ln -srv build-${i}/libx265.a %(builddir)/libx265_main${i}.a
    done

    # Final build
    %ccache_zero
    BUILDDIR=%(builddir)
    env CCACHE_BASEDIR="${PWD}/%(builddir)" %cmake_build
    %ccache_stats
install     : |
    %cmake_install

    rm -rfv %(installroot)%(libdir)/*.a
tuning      :
    - lto: full
    - optimize: speed
packages    :
    - "%(name)-libs":
        summary: x265 video coding library
        paths:
            - /usr/lib/libx265.so.*
            - /usr/lib/libhdr10plus.so

    - "%(name)-devel":
        rundeps:
            - "%(name)-libs"
