name        : xz
version     : "5.8.3"
release     : 15
homepage    : https://tukaani.org/xz
upstreams   :
    - https://github.com/tukaani-project/xz/releases/download/v5.8.3/xz-5.8.3.tar.gz : 3d3a1b973af218114f4f889bbaa2f4c037deaae0c8e815eec381c3d546b974a0
summary     : Library and command line tools for XZ and LZMA compressed files
description : |
    Library and command line tools for XZ and LZMA compressed files
license     :
    - GPL-2.0-or-later
    - GPL-3.0-or-later
    - LGPL-2.1-or-later
emul32      : true
setup       : |
    %configure \
        --disable-static \
        --disable-rpath
build       : |
    %make
install     : |
    %make_install
workload    : |
    %make check || :
check       : |
    %make check || :
packages    :
    - "%(name)-docs":
        paths:
            - /usr/share/doc/*
