name        : xdg-desktop-portal-hyprland
version     : "1.4.0"
release     : 5
upstreams   :
    - https://github.com/hyprwm/xdg-desktop-portal-hyprland/archive/refs/tags/v1.4.0.tar.gz : 6f294ad8ffe7473c697e49611b4e3aa0980eed34b09dc264e0b43d05e9d07244
homepage    : https://github.com/hyprwm/xdg-desktop-portal-hyprland
license     : BSD-3-Clause
summary     : xdg-desktop-portal backend for hyprland
description : |
    xdg-desktop-portal backend for hyprland
builddeps   :
    - pkgconfig(Qt6Core)
    - pkgconfig(gbm)
    - pkgconfig(hyprland-protocols)
    - pkgconfig(hyprlang)
    - pkgconfig(hyprutils)
    - pkgconfig(hyprwayland-scanner)
    - pkgconfig(libdrm)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(libspa-0.2)
    - pkgconfig(sdbus-c++)
    - pkgconfig(uuid)
    - pkgconfig(wayland-protocols)
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
