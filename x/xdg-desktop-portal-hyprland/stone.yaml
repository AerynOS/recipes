name        : xdg-desktop-portal-hyprland
version     : "1.3.12"
release     : 3
upstreams   :
    - https://github.com/hyprwm/xdg-desktop-portal-hyprland/archive/refs/tags/v1.3.12.tar.gz : c30ffe6ce9569a222438cb403d426a58c84e3653f19c8de641673097a9acc3b0
homepage    : https://github.com/hyprwm/xdg-desktop-portal-hyprland
license     : BSD-3-Clause
summary     : xdg-desktop-portal backend for hyprland
description : |
    xdg-desktop-portal backend for hyprland
builddeps   :
    - pkgconfig(Qt6Core)
    - pkgconfig(gbm)
    - pkgconfig(hyprland-protocols)
    - pkgconfig(hyprlang)
    - pkgconfig(hyprutils)
    - pkgconfig(hyprwayland-scanner)
    - pkgconfig(libdrm)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(libspa-0.2)
    - pkgconfig(sdbus-c++)
    - pkgconfig(wayland-protocols)
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
