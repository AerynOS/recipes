name        : xdg-desktop-portal-hyprland
version     : "1.3.11"
release     : 1
upstreams   :
    - https://github.com/hyprwm/xdg-desktop-portal-hyprland/archive/refs/tags/v1.3.11.tar.gz : 8ba29b19d266d20e8c2611392b0e35b4c3373aeabc4f22c3907d915e553701d3
homepage    : https://github.com/hyprwm/xdg-desktop-portal-hyprland
license     : BSD-3-Clause
summary     : xdg-desktop-portal backend for hyprland
description : |
    xdg-desktop-portal backend for hyprland
builddeps   :
    - pkgconfig(Qt6Core)
    - pkgconfig(gbm)
    - pkgconfig(hyprland-protocols)
    - pkgconfig(hyprlang)
    - pkgconfig(hyprutils)
    - pkgconfig(hyprwayland-scanner)
    - pkgconfig(libdrm)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(libspa-0.2)
    - pkgconfig(sdbus-c++)
    - pkgconfig(wayland-protocols)
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
