name        : xwayland
version     : "24.1.13"
release     : 18
homepage    : https://www.x.org/pub/individual/xserver
upstreams   :
    - https://www.x.org/pub/individual/xserver/xwayland-24.1.13.tar.xz : 173aea3d6f79609164c04528e1c8e4c9b60fcd59391c3c9dad4667297d727fb6
summary     : Specialised X11 server for X11 client support under wayland
description : |
    Specialised X11 server for X11 client support under wayland
license     :
    - GPL-2.0
builddeps   :
    - binary(xmlto)
    - binary(xsltproc)
    - pkgconfig(bigreqsproto)
    - pkgconfig(compositeproto)
    - pkgconfig(damageproto)
    - pkgconfig(dri)
    - pkgconfig(dri3proto)
    - pkgconfig(epoxy)
    - pkgconfig(fixesproto)
    - pkgconfig(fontsproto)
    - pkgconfig(fontutil)
    - pkgconfig(gbm)
    - pkgconfig(inputproto)
    - pkgconfig(kbproto)
    - pkgconfig(libdecor-0)
    - pkgconfig(libdrm)
    - pkgconfig(libei-1.0)
    - pkgconfig(libgcrypt)
    - pkgconfig(liboeffis-1.0)
    - pkgconfig(libsystemd)
    - pkgconfig(libtirpc)
    - pkgconfig(libunwind)
    - pkgconfig(libxcvt)
    - pkgconfig(nettle)
    - pkgconfig(openssl)
    - pkgconfig(pixman-1)
    - pkgconfig(presentproto)
    - pkgconfig(randrproto)
    - pkgconfig(recordproto)
    - pkgconfig(renderproto)
    - pkgconfig(resourceproto)
    - pkgconfig(scrnsaverproto)
    - pkgconfig(videoproto)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-protocols)
    - pkgconfig(xcmiscproto)
    - pkgconfig(xdmcp)
    - pkgconfig(xextproto)
    - pkgconfig(xf86bigfontproto)
    - pkgconfig(xf86vidmodeproto)
    - pkgconfig(xfont2)
    - pkgconfig(xineramaproto)
    - pkgconfig(xkbcomp)
    - pkgconfig(xkbfile)
    - pkgconfig(xproto)
    - pkgconfig(xshmfence)
    - pkgconfig(xtrans)
    - pkgconfig(xwaylandproto)
    # - pkgconfig(wayland-eglstream-protocols)
    # - pkgconfig(xorg-sgml-doctools)
rundeps     :
    - binary(xhost)
    - binary(xkbcomp)
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install

    rm -v %(installroot)%(mandir)/man1/Xserver.1
packages    :
    - "%(name)-devel":
        paths:
            - /usr/lib/xorg/protocol.txt
