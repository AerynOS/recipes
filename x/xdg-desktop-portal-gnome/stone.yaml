name        : xdg-desktop-portal-gnome
version     : "50.0"
release     : 10
homepage    : https://gitlab.gnome.org/GNOME/xdg-desktop-portal-gnome
upstreams   :
    - https://download.gnome.org/sources/xdg-desktop-portal-gnome/50/xdg-desktop-portal-gnome-50.0.tar.xz : ceeef2fb68b34b3f66a3def0a332a22a70af272641fb6c50065b7a2fde3d5759
summary     : A backend implementation for xdg-desktop-portal for the GNOME desktop environment
description : |
    A backend implementation for xdg-desktop-portal that is using GTK and various pieces of GNOME infrastructure, such as the org.gnome.Shell.Screenshot or org.gnome.SessionManager D-Bus interfaces.
license     :
    - LGPL-2.1-or-later
builddeps   :
    - binary(msgfmt)
    - pkgconfig(gio-2.0)
    - pkgconfig(gnome-desktop-4)
    - pkgconfig(gsettings-desktop-schemas)
    - pkgconfig(libadwaita-1)
    - pkgconfig(systemd)
    - pkgconfig(xdg-desktop-portal)
rundeps     :
    - xdg-desktop-portal
    - xdg-desktop-portal-gtk
    - binary(nautilus) # Used for the file-picker portal
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
