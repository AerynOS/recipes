name        : xdg-user-dirs
version     : "0.20"
release     : 6
homepage    : http://user-dirs.freedesktop.org/releases
upstreams   :
    - https://gitlab.freedesktop.org/xdg/xdg-user-dirs/-/archive/v0.20/xdg-user-dirs-v0.20.tar.gz : 988d3f3274cb2b69796ace22ddbb0abfc2c0157fff65258045f055cfba024d6e
summary     : freedesktop.org compliant user directories
description : |
    xdg-user-dirs is a tool to help manage "well known" user directories like the desktop folder and the music folder. It also handles localization (i.e. translation) of the filenames.
license     : GPL-2.0
builddeps   :
    - binary(msgfmt)
    - binary(xsltproc)
    - pkgconfig(systemd)
    - docbook
    - docbook-xsl
environment : |
    %export_docbook_catalogs
setup       : |
    %patch %(pkgdir)/0001-Fallback-to-stateless-directories-ship-files-in-data.patch

    %meson
build       : |
    %meson_build
install     : |
    %meson_install

    rm -frv %(installroot)%(datadir)/xdg/autostart
    %install_file %(pkgdir)/60-xdg-user-dirs.preset %(installroot)%(libdir)/systemd/user-preset/60-xdg-user-dirs.preset
