name        : xdg-dbus-proxy
version     : "0.1.7"
release     : 2
upstreams   :
    - https://github.com/flatpak/xdg-dbus-proxy/releases/download/0.1.7/xdg-dbus-proxy-0.1.7.tar.xz : 3ad3d27ba574e178acb5e4d438ba36ace25e3564f899c36f31c56f82c7adbbe7
homepage    : https://github.com/flatpak/xdg-dbus-proxy
license     : LGPL-2.1-or-later
summary     : Filtering proxy for D-Bus connections.
description : |
    xdg-dbus-proxy is a filtering proxy for D-Bus connections. It was originally part of the flatpak project, but it has been broken out as a standalone module to facilitate using it in other contexts.
builddeps   :
    - binary(xsltproc)
    - pkgconfig(glib-2.0)
    - docbook
    - docbook-xsl
environment : |
    %export_docbook_catalogs
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
