name        : xdg-desktop-portal-cosmic
version     : "1.0.11.git+0917743"
release     : 39
summary     : Cosmic Desktop - XDG Portal Support
license     : GPL-3.0
homepage    : https://github.com/pop-os/xdg-desktop-portal-cosmic
upstreams   :
    - git|https://github.com/pop-os/xdg-desktop-portal-cosmic.git : 091774311845202e08ac49d2589043464798cc4f
description : |
    Cosmic Desktop - XDG Portal Support
builddeps   :
    - binary(just)
    - pkgconfig(gbm)
    - pkgconfig(glib-2.0)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(pipewire)
    - gvfs # Used for file services
    - xdg-desktop-portal
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %make_install TARGET=%(target_triple)/release prefix=%(prefix)
