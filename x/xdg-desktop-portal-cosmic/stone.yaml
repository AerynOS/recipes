name        : xdg-desktop-portal-cosmic
version     : "1.1.0"
release     : 45
summary     : Cosmic Desktop - XDG Portal Support
license     : GPL-3.0
homepage    : https://github.com/pop-os/xdg-desktop-portal-cosmic
upstreams   :
    - https://github.com/pop-os/xdg-desktop-portal-cosmic/archive/refs/tags/epoch-1.1.0.tar.gz : fc055d98c302de8ca309bcb37d3254af353fa6ea85dbd32f345f34db7ba16b79
description : |
    Cosmic Desktop - XDG Portal Support
builddeps   :
    - binary(just)
    - pkgconfig(gbm)
    - pkgconfig(glib-2.0)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(pipewire)
    - gvfs # Used for file services
    - xdg-desktop-portal
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %make_install TARGET=%(target_triple)/release prefix=%(prefix)
