name        : xdg-desktop-portal-cosmic
version     : "1.0.16"
release     : 44
summary     : Cosmic Desktop - XDG Portal Support
license     : GPL-3.0
homepage    : https://github.com/pop-os/xdg-desktop-portal-cosmic
upstreams   :
    - https://github.com/pop-os/xdg-desktop-portal-cosmic/archive/refs/tags/epoch-1.0.16.tar.gz : 4d87ec9508844102fef8e1ca5c7c5a0e779abe0c7fd2f871a9d74e2c9f09c534
description : |
    Cosmic Desktop - XDG Portal Support
builddeps   :
    - binary(just)
    - pkgconfig(gbm)
    - pkgconfig(glib-2.0)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(pipewire)
    - gvfs # Used for file services
    - xdg-desktop-portal
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %make_install TARGET=%(target_triple)/release prefix=%(prefix)
