name        : xdg-desktop-portal-cosmic
version     : "1.2.0"
release     : 46
summary     : Cosmic Desktop - XDG Portal Support
license     : GPL-3.0
homepage    : https://github.com/pop-os/xdg-desktop-portal-cosmic
upstreams   :
    - https://github.com/pop-os/xdg-desktop-portal-cosmic/archive/refs/tags/epoch-1.2.0.tar.gz : e76453f878d7c8b9e72aec8e2c82a9a6f1423fee5f3c0079fa35d99ac506ac06
description : |
    Cosmic Desktop - XDG Portal Support
builddeps   :
    - binary(just)
    - pkgconfig(gbm)
    - pkgconfig(glib-2.0)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(pipewire)
    - gvfs # Used for file services
    - xdg-desktop-portal
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    CARGO_TARGET_DIR="target/%(target_triple)" just rootdir=%(installroot) install
