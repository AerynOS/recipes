name        : vhs
version     : "0.11.0"
release     : 2
homepage    : https://github.com/charmbracelet/vhs
upstreams   :
    - https://github.com/charmbracelet/vhs/archive/refs/tags/v0.11.0.tar.gz : c08b8502989fe7e9626c02938f3fc512c2a4ba21f839f455d20d7eb1da7bc39f
summary     : Your CLI home video recorder
description : |
    Write terminal GIFs as code for integration testing and demoing your CLI tools.
license     :
    - JSON
    - MIT
    - Xnet
builddeps   :
    - binary(go)
rundeps     :
    - binary(ffmpeg)
    - binary(ttyd)
networking  : true
setup       : |
    go mod vendor
build       : |
    # Update themes -- it appears they get compiled in.
    %make all

    go build -v -ldflags "-linkmode=external -X main.Version=%(version)" -o vhs .

    # Generate shell completions and manual page artifacts.
    ./vhs completion bash > vhs.bash
    ./vhs completion zsh > _vhs
    ./vhs completion fish > vhs.fish
    ./vhs manual > vhs.1
install     : |
    %install_bin vhs

    # Install licenses
    %install_file LICENSE -t %(installroot)%(datadir)/licenses/%(name)/

    # Install documentation
    %install_file vhs.1 -t %(installroot)%(mandir)/man1/

    # Completions
    %install_file vhs.bash %(installroot)%(bashcompletionsdir)/vhs
    %install_file _vhs %(installroot)%(zshcompletionsdir)/_vhs
    %install_file vhs.fish %(installroot)%(fishcompletionsdir)/vhs.fish
