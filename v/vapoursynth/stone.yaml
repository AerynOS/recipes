name        : vapoursynth
version     : "76"
release     : 1
homepage    : https://github.com/vapoursynth/vapoursynth
upstreams   :
    - https://github.com/vapoursynth/vapoursynth/archive/refs/tags/R76.tar.gz : 8c51aedc26a5fa2b79b5716bfe1160ffa45c69035c728b7e8740785cf790454b
summary     : A video processing framework with the future in mind
description : |
    A video processing framework with simplicity in mind
license     :
    - LGPL-2.1-or-later
    - OFL-1.1
builddeps   :
    - binary(bison)
    - binary(cython)
    - binary(flex)
    - binary(patchelf)
    - binary(readelf)
    - pkgconfig(python3)
    - pkgconfig(zimg)
    - libstdc++-static
rundeps     :
    - binary(python)
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install

    export PYTHONPATH=$(python -c 'import site; print(site.getsitepackages()[0])')

    ln -srv %(installroot)${PYTHONPATH}/%(name)/libvapoursynth.so.4         %(installroot)%(libdir)/libvapoursynth.so.4
    ln -srv %(installroot)${PYTHONPATH}/%(name)/libvsscript.so              %(installroot)%(libdir)/libvapoursynth-script.so.0
    ln -srv %(installroot)%(libdir)/libvapoursynth.so.4                     %(installroot)%(libdir)/libvapoursynth.so
    ln -srv %(installroot)%(libdir)/libvapoursynth-script.so.0              %(installroot)%(libdir)/libvapoursynth-script.so

    %install_dir %(installroot)%(prefix)/{include,lib/pkgconfig}
    ln -srv %(installroot)${PYTHONPATH}/%(name)/include                     %(installroot)%(includedir)/%(name)
    ln -srv %(installroot)${PYTHONPATH}/%(name)/pkgconfig/vapoursynth.pc    %(installroot)%(libdir)/pkgconfig/vapoursynth.pc

    %install_file %(pkgdir)/vapoursynth.xml -t                              %(installroot)%(datadir)/mime/packages/
