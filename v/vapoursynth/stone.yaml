name        : vapoursynth
version     : "77"
release     : 1
homepage    : https://www.vapoursynth.com
upstreams   :
    - https://github.com/vapoursynth/vapoursynth/archive/refs/tags/R77.tar.gz : f71653355983fc245ef811a64d2b8f5b0ba131c0bb330b3346d435e1926187e2
summary     : A video processing framework with the future in mind
description : |
    A video processing framework with simplicity in mind
license     :
    - LGPL-2.1-or-later
    - OFL-1.1
builddeps   :
    - binary(bison)
    - binary(cython)
    - binary(flex)
    - binary(patchelf)
    - binary(readelf)
    - pkgconfig(python3)
    - pkgconfig(zimg)
    - python(meson-python)
rundeps     :
    - binary(python)
build       : |
    %pyproject_build
install     : |
    %pyproject_install

    export PYTHONPATH=$(python -c 'import site; print(site.getsitepackages()[0])')

    ln -srv %(installroot)${PYTHONPATH}/%(name)/libvapoursynth.so.4         %(installroot)%(libdir)/libvapoursynth.so.4
    ln -srv %(installroot)${PYTHONPATH}/%(name)/libvsscript.so              %(installroot)%(libdir)/libvapoursynth-script.so.0
    ln -srv %(installroot)%(libdir)/libvapoursynth.so.4                     %(installroot)%(libdir)/libvapoursynth.so
    ln -srv %(installroot)%(libdir)/libvapoursynth-script.so.0              %(installroot)%(libdir)/libvapoursynth-script.so

    # Headers
    %install_dir %(installroot)%(includedir)
    mv %(installroot)${PYTHONPATH}/%(name)/include                          %(installroot)%(includedir)/%(name)
    ln -srv %(installroot)%(includedir)/%(name)                             %(installroot)${PYTHONPATH}/%(name)/include

    # .pc file
    %install_dir %(installroot)%(libdir)/pkgconfig
    ln -srv %(installroot)${PYTHONPATH}/%(name)/pkgconfig/vapoursynth.pc    %(installroot)%(libdir)/pkgconfig/vapoursynth.pc

    # VSSCRIPT_PATH export to recreate `vapoursynth register-install` (from l/less)
    %install_dir %(installroot)%(vendordir)/%(name)
    cat << EOF > %(installroot)%(vendordir)/%(name)/10_vsscript_path.sh
    export VSSCRIPT_PATH="${PYTHONPATH}/%(name)/libvsscript.so"
    EOF

    %install_dir %(installroot)%(vendordir)/profile.d
    ln -srv %(installroot)%(vendordir)/%(name)/10_vsscript_path.sh          %(installroot)%(vendordir)/profile.d/

    %install_file %(pkgdir)/vapoursynth.xml -t                              %(installroot)%(datadir)/mime/packages/

packages    :
    - "%(name)":
        provides-exclude:
            # We want these to be provided by the devel package
            - 'pkgconfig\(vapoursynth\)'
