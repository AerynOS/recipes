name        : virtiofsd
version     : "1.14.0"
release     : 4
homepage    : https://gitlab.com/virtio-fs/virtiofsd
upstreams   :
    - https://gitlab.com/virtio-fs/virtiofsd/-/archive/v1.14.0/virtiofsd-v1.14.0.tar.gz : 52b66e449ca583b4f050a2bff327ff812211a2c349b4130279fcfc6a64540f04
summary     : Vhost-user virtio-fs device backend
description : |
    Vhost-user virtio-fs device backend written in Rust
license     :
    - Apache-2.0
    - BSD-3-Clause
networking  : true
builddeps   :
    - pkgconfig(libcap-ng)
    - pkgconfig(libseccomp)
setup       : |
    %patch %(pkgdir)/0001-downstream-Use-correct-libexec.patch

    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %install_exe %(cargo_target_dir)/virtiofsd -t %(installroot)%(libdir)/qemu/
    %install_file 50-virtiofsd.json %(installroot)/usr/share/qemu/vhost-user/50-virtiofsd.json
check       : |
    %cargo_test
