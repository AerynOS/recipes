name        : zls
version     : "0.16.0"
release     : 3
homepage    : https://github.com/zigtools/zls
upstreams   :
    - https://github.com/zigtools/zls/archive/refs/tags/0.16.0.tar.gz : e7c5936f5b3a057ce851be0876e4e259b5c4d02f9aae038cd24a5d6b586b029f
summary     : A language server for Zig supporting developers with features like autocomplete and goto definition
description : |
  ZLS is a non-official implementation of the Language Server Protocol for Zig in Zig. It provides developers with IDE features in their editor
license     :
  - MIT
networking  : true
builddeps   :
  - binary(zig-0.16)
build       : |
  zig-0.16 build \
    --summary all \
    --verbose \
    -Doptimize=ReleaseFast \
    -Dstrip=false \
    -Dcpu=x86_64_v2
install     : |
  %install_bin zig-out/bin/zls
  %install_dir %(installroot)%(datadir)/licenses/%(name)
  %install_file LICENSE %(installroot)%(datadir)/licenses/%(name)/LICENSE
