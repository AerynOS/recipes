name        : zulip-desktop
version     : "5.12.4"
release     : 5
upstreams   :
    - https://github.com/zulip/zulip-desktop/archive/refs/tags/v5.12.4.tar.gz : 2db95b7fe239dde54470d269150185118515ee232ef52684345db55a42c9edfd
homepage    : https://zulipchat.com
license     : Apache-2.0
summary     : Desktop client for Zulip
description : |
    Real-time team chat based on the email threading model
networking  : true
builddeps   :
    - binary(pnpm)
rundeps     :
    - binary(xdg-open)
setup       : |
    %patch %(pkgdir)/0001-Disable-auto-update.patch
    %patch %(pkgdir)/0001-linux-Fix-Wayland-app-ID.patch

    pnpm install
build       : |
    pnpm run pack
install     : |
    zulipdir=%(libdir)/%(name)

    %install_dir %(installroot)$zulipdir
    cp -a dist/linux-unpacked/* %(installroot)$zulipdir

    %install_file %(pkgdir)/org.zulip.Zulip.desktop -t %(installroot)%(datadir)/applications
    %install_file build/zulip.png %(installroot)%(datadir)/icons/hicolor/512x512/apps/org.zulip.Zulip.png

    %install_dir %(installroot)%(bindir)
    ln -srv %(installroot)${zulipdir}/zulip %(installroot)%(bindir)/zulip
