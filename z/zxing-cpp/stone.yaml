name        : zxing-cpp
version     : "3.0.2"
release     : 4
upstreams   :
    - https://github.com/zxing-cpp/zxing-cpp/releases/download/v3.0.2/zxing-cpp-3.0.2.tar.gz : e957f13e2ad4e31badb3d9af3f6ba8999a3ca3c9cc4d6bafc98032f9cce1a090
homepage    : https://github.com/zxing-cpp/zxing-cpp
license     : Apache-2.0
summary     : ZXing-C++ ("zebra crossing") is an open-source, multi-format linear/matrix barcode image processing library implemented in C++
description : |
    ZXing-C++ ("zebra crossing") is an open-source, multi-format linear/matrix barcode image processing library implemented in C++. It was originally ported from the Java ZXing Library but has been developed further and now includes many improvements in terms of quality and performance. It can both read and write barcodes in a number of formats.
builddeps   :
    - binary(make)
    - binary(patchelf)
    - cmake(pybind11)
    - cmake(zint)
    - pkgconfig(python3)
    - python(pybind11)
    - python(setuptools)
# TODO STB so this can be de-vendored
# This is the only package that uses STB currently, so open up networking so it can just download it
networking  : true
setup       : |
    # we don't need cmake as a python dependency
    sed -r -i '/cmake/d' wrappers/python/pyproject.toml
    sed -i 's/pybind11\[global\]/pybind11/' wrappers/python/pyproject.toml

    # ZXING_PYTHON_MODULE=ON builds the Python shared library but not the metadata, so we still need to build the wheel with pyproject
    %cmake \
        -DZXING_EXAMPLES=OFF \
        -DZXING_PYTHON_MODULE=ON \
        -DZXING_USE_BUNDLED_ZINT=OFF
build       : |
    %cmake_build

    pushd wrappers/python
    export VERBOSE=1
    %pyproject_build
    popd
install     : |
    %cmake_install

    pushd wrappers/python
    %pyproject_install
    popd

    # Substitute the python shared library built by pyproject which is statically linked with the shared one built by cmake
    python_version=$(python -c 'import sys; print(".".join(map(str, sys.version_info[:2])))')
    pushd %(installroot)%(libdir)/python${python_version}/site-packages/
    python_lib=$(find . -type f -iname "zxingcpp.cpython*")
    rm -v ${python_lib}
    mv -f %(installroot)%(libdir)/${python_lib:2} .
    patchelf --remove-rpath ${python_lib}
packages    :
    - "python-%(name)":
        summary: Python bindings for %(name)
        description: Python bindings for %(name)
        paths:
            - /usr/lib/python3.*/site-packages
