name        : zoxide
version     : "0.10.0"
release     : 7
homepage    : https://github.com/ajeetdsouza/zoxide
upstreams   :
    - https://github.com/ajeetdsouza/zoxide/archive/refs/tags/v0.10.0.tar.gz : 4fcd4272b013a10b637dbcc299c58a9924b94470a9042677ca1a204cc2e9150e
summary     : A smarter cd command
description : |
    zoxide is a smarter cd command, inspired by z and autojump.
    It remembers which directories you use most frequently,
    so you can "jump" to them in just a few keystrokes.
license     : MIT
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %cargo_install

    %install_file contrib/completions/_zoxide %(installroot)%(zshcompletionsdir)/_zoxide
    %install_file contrib/completions/zoxide.bash %(installroot)%(bashcompletionsdir)/zoxide.bash
    %install_file contrib/completions/zoxide.fish %(installroot)%(fishcompletionsdir)/zoxide.fish

    %install_file man/man1/*.1 -t %(installroot)%(mandir)/man1
check       : |
    %cargo_test
