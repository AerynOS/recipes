name        : zsh
version     : "5.9.2"
release     : 9
homepage    : https://zsh.sourceforge.io
upstreams   :
    - https://sourceforge.net/projects/zsh/files/zsh/5.9.2/zsh-5.9.2.tar.xz : 36fa734374b44783582cec09bcd67822e2f992c779ec1624ab5596df078d2f81
summary     : Extensible shell designed for interactive use
description : |
    Zsh is a shell designed for interactive use, although it is also a powerful scripting language. Many of the useful features of bash, ksh, and tcsh were incorporated into zsh; many original features were added.
license     : MIT
builddeps   :
    - binary(nroff)
    - pkgconfig(libcap)
    - pkgconfig(libpcre2-8)
    - pkgconfig(ncursesw)
    - gdbm-devel
setup       : |
    # Various patches for newer PCRE2 and GCC (please for the love of god just release a new version)
    %patch %(pkgdir)/patches/upstream/0001-51207-fix-for-read-d-when-the-delimiter-is-a-byte-0x.patch
    %patch %(pkgdir)/patches/upstream/0002-51214-handle-read-d-and-a-delimiter-that-can-t-be-de.patch
    %patch %(pkgdir)/patches/upstream/0003-51483-Enable-assignment-and-expansion-of-parameters-.patch
    %patch %(pkgdir)/patches/upstream/0004-51484-Extend-named-reference-handling-for-special-pa.patch

    # Use the default Aeryn path as fallback
    %patch %(pkgdir)/patches/0001-downstream-Update-default-PATH.patch

    %reconfigure \
        --enable-cap \
        --enable-etcdir=%(vendordir)/zsh \
        --enable-fndir=%(prefix)/share/zsh/functions \
        --enable-gdbm \
        --enable-pcre \
        --enable-scriptdir=%(prefix)/share/zsh/scripts \
        --enable-zlogin=%(vendordir)/zsh/zlogin \
        --enable-zlogout=%(vendordir)/zsh/zlogout \
        --enable-zprofile=%(vendordir)/zsh/zprofile \
        --enable-zshenv=%(vendordir)/zsh/zshenv
build       : |
    %make
install     : |
    %make_install
    install -Dm00644 %(pkgdir)/z* -t %(installroot)/%(vendordir)/zsh
