name        : zenity
version     : "4.2.2"
release     : 7
homepage    : https://wiki.gnome.org/Projects/Zenity
upstreams   :
    - https://download.gnome.org/sources/zenity/4.2/zenity-4.2.2.tar.xz : 019186a996096ef4fc356e21577b5673f5baa3a29ac8e3d608b753371c18018d
summary     : Display graphical dialog boxes from shell scripts
description : |
    Display graphical dialog boxes from shell scripts
license     : GPL-3.0-or-later
builddeps   :
    - binary(help2man)
    - binary(itstool)
    - binary(msgfmt)
    - pkgconfig(libadwaita-1)
    - pkgconfig(webkitgtk-6.0)
setup       : |
    %meson \
        -Dwebkitgtk=true
build       : |
    %meson_build
install     : |
    %meson_install
