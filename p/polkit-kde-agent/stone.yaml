name        : polkit-kde-agent
version     : "6.6.2"
release     : 14
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.2/polkit-kde-agent-1-6.6.2.tar.xz : 2659f0e2882e0b013b30ca9e23e3f69062998f358815e7d3736fc35f4fcdb812
homepage    : https://kde.org/plasma-desktop/
license     : GPL-2.0-or-later
summary     : Daemon providing a polkit authentication for KDE
description : |
    Daemon providing a polkit authentication for KDE
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6DBusAddons)
    - cmake(KF6I18n)
    - cmake(KF6Notifications)
    - cmake(KF6WindowSystem)
    - cmake(PolkitQt6-1)
    - cmake(Qt6Quick)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
