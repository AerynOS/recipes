name        : polkit-kde-agent
version     : "6.7.2"
release     : 20
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.2/polkit-kde-agent-1-6.7.2.tar.xz : 751dec0dcd5d2c52f97a613916185493e55861afccef9e939a05e9950ea69818
homepage    : https://kde.org/plasma-desktop/
license     : GPL-2.0-or-later
summary     : Daemon providing a polkit authentication for KDE
description : |
    Daemon providing a polkit authentication for KDE
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6DBusAddons)
    - cmake(KF6I18n)
    - cmake(KF6Notifications)
    - cmake(KF6WindowSystem)
    - cmake(PolkitQt6-1)
    - cmake(Qt6Quick)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
