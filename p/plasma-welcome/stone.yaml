name        : plasma-welcome
version     : "6.6.4"
release     : 22
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.4/plasma-welcome-6.6.4.tar.xz : f05c53bae317e482fbb141bb61a8ad868b08a93f625599c2289cdfb0b79c1fba
homepage    : https://kde.org/plasma-desktop/
license     :
    - BSD-3-Clause
    - GPL-2.0-or-later
summary     : Plasma Welcome
description : |
    A Friendly onboarding wizard for Plasma.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6ConfigWidgets)
    - cmake(KF6DBusAddons)
    - cmake(KF6I18n)
    - cmake(KF6JobWidgets)
    - cmake(KF6KCMUtils)
    - cmake(KF6KIO)
    - cmake(KF6Kirigami)
    - cmake(KF6KirigamiAddons)
    - cmake(KF6NewStuff)
    - cmake(KF6Service)
    - cmake(KF6Svg)
    - cmake(KF6UserFeedback)
    - cmake(KF6WindowSystem)
    - cmake(Plasma)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
    - cmake(Qt6Svg)
rundeps     :
    - kf6-kirigami
    - kf6-kirigami-addons
    - kf6-kuserfeedback
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install

    # ?
    rm -fv %(installroot)%(libdir)/libplasma*.a
