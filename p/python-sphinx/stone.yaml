name        : python-sphinx
version     : "9.0.4"
release     : 2
homepage    : https://www.sphinx-doc.org
upstreams   :
    - https://pypi.debian.net/Sphinx/sphinx-9.0.4.tar.gz : 594ef59d042972abbc581d8baa577404abe4e6c3b04ef61bd7fc2acbd51f3fa3
summary     : Python documentation generator
description : |
    Python documentation generator
license     : BSD-2-Clause
builddeps   :
    - binary(make)
    - python(alabaster)
    - python(babel)
    - python(docutils)
    - python(flit-core)
    - python(imagesize)
    - python(jinja2)
    - python(pygments)
    - python(requests)
    - python(roman-numerals)
    - python(snowballstemmer)
rundeps     :
    - binary(python3)
# checkdeps   :
#     - python(babel)
#     - python(docutils)
#     - python(imagesize)
#     - python(jinja2)
#     - python(pygments)
#     - python(pytest)
#     - python(requests)
#     - python(roman-numerals)
#     - python(snowballstemmer)
# TODO: needs defusedxml or whatever that is for tests
setup       : |
    %patch %(pkgdir)/contribhelp-optional.patch
build       : |
    %pyproject_build

    export PYTHONPATH="$PWD"

    cd doc
    make man SPHINXBUILD="python ../sphinx/cmd/build.py"
install     : |
    %pyproject_install

    cd doc
    %install_dir %(installroot)%(mandir)/man1
    for f in _build/man/sphinx-*.1;
    do
        cp -p $f %(installroot)%(mandir)/man1/$(basename $f)
    done
# check       : |
