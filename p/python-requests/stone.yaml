name        : python-requests
version     : "2.33.1"
release     : 3
homepage    : https://requests.readthedocs.io/en/latest/
upstreams   :
    - https://pypi.debian.net/requests/requests-2.33.1.tar.gz : 18817f8c57c6263968bc123d237e3b8b08ac046f5456bd1e307ee8f4250d3517
summary     : Python HTTP for Humans
description : |
    Requests allows you to send organic, grass-fed HTTP/1.1 requests, without the need for manual labor. There's no need to manually add query strings to your URLs, or to form-encode your POST data. Keep-alive and HTTP connection pooling are 100% automatic, thanks to urllib3.
license     : Apache-2.0
builddeps   :
    - python(setuptools)
rundeps     :
    - python-libs
# checkdeps   :
#     - python(certifi)
#     - python(pytest)
#     - python(idna)
#     - python(urllib3)
    # TODO add httpbin for tests (at least)
build       : |
    %pyproject_build
install     : |
    %pyproject_install
