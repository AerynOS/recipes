name        : pimcommon
version     : "26.04.2"
release     : 20
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/pimcommon-26.04.2.tar.xz : a3558fb4cf677b07f73ac3e5f0c74c179c898b455115a62e6f44cb064cfe2f62
homepage    : https://kde.org
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
summary     : Common libraries for KDE PIM
description : |
    Pimcommon library, used by several KDE PIM applications
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(KF6Codecs)
    - cmake(KF6Config)
    - cmake(KF6Contacts)
    - cmake(KF6ItemModels)
    - cmake(KF6JobWidgets)
    - cmake(KF6KCMUtils)
    - cmake(KF6KIO)
    - cmake(KF6NewStuff)
    - cmake(KF6Purpose)
    - cmake(KF6TextAutoCorrectionWidgets)
    - cmake(KF6XmlGui)
    - cmake(KPim6Akonadi)
    - cmake(KPim6AkonadiContactWidgets)
    - cmake(KPim6AkonadiSearch)
    - cmake(KPim6IMAP)
    - cmake(KPim6LdapWidgets)
    - cmake(KPim6Libkdepim)
    - cmake(PlasmaActivities)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KF6Contacts)
            - cmake(KF6TextAutoCorrectionWidgets)
            - cmake(KPim6Akonadi)
            - cmake(KPim6AkonadiContactWidgets)
            - cmake(KPim6IMAP)
            - cmake(KPim6Libkdepim)
            - cmake(PlasmaActivities)
