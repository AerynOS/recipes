name        : pangomm-2.46
version     : "2.46.5"
release     : 4
homepage    : https://www.cairographics.org
upstreams   :
    - https://download.gnome.org/sources/pangomm/2.46/pangomm-2.46.5.tar.xz : 38ca0b050b065de4e3da0c182df657437757063bbf0c4b6c9567ddba019b1d68
summary     : C++ bindings for Pango
description : |
    pangomm is the C++ binding for the Pango library.
license     : LGPL-2.1-or-later
builddeps   :
    - binary(m4)
    - binary(mm-common-get)
    - binary(perl)
    - binary(python3)
    - binary(xsltproc)
    - pkgconfig(cairomm-1.0)
    - pkgconfig(glibmm-2.4)
    - pkgconfig(pangocairo)
packages    :
    - "%(name)-devel":
        paths:
            - /usr/lib/*/proc/*
            - /usr/lib/*/include/*
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
