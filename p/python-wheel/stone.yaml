name        : python-wheel
version     : "0.46.3"
release     : 7
homepage    : https://github.com/pypa/wheel
upstreams   :
    - https://pypi.debian.net/wheel/wheel-0.46.3.tar.gz : e3e79874b07d776c40bd6033f8ddf76a7dad46a7b8aa1b2787a83083519a1803
summary     : The official binary distribution format for Python
description : |
    python-wheel is the reference implementation of the Python wheel packaging standard, as defined in PEP 427.
license     : MIT
builddeps   :
    - python(flit-core)
rundeps     :
    - binary(python)
# TODO: Setup this for Python major update bootstrapping
build       : |
    %pyproject_build
install     : |
    %pyproject_install
