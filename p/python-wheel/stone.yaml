name        : python-wheel
version     : "0.47.0"
release     : 10
homepage    : https://github.com/pypa/wheel
upstreams   :
    - https://pypi.debian.net/wheel/wheel-0.47.0.tar.gz:
        hash: cc72bd1009ba0cf63922e28f94d9d83b920aa2bb28f798a31d0691b02fa3c9b3
        rename: wheel.tar.gz

    # Comment out if not bootstrapping
    # - git|https://gitlab.archlinux.org/archlinux/python-bootstrap.git:
    #     ref: 461514b135c5ef77f572037d79b58b9e321d38e9
summary     : The official binary distribution format for Python
description : |
    python-wheel is the reference implementation of the Python wheel packaging standard, as defined in PEP 427.
license     : MIT
builddeps   :
    - python(flit-core)
rundeps     :
    - binary(python)
environment : |
    # set to 1 if bootstrapping against a new python
    _bootstrap=0

    if [[ ${_bootstrap} == "1" ]]; then
        cd ../python-bootstrap.git
    fi
setup      : |
    if [[ ${_bootstrap} == "1" ]]; then
        rm -rf external/wheel

        mkdir external/wheel
        bsdtar-static -xf %(sourcedir)/wheel.tar.gz --strip-components=1 -C external/wheel
    fi
build       : |
    if [[ ${_bootstrap} == "1" ]]; then
        python -m bootstrap.build
    else
        %pyproject_build
    fi
install     : |
    if [[ ${_bootstrap} == "1" ]]; then
        python -m bootstrap.install dist/wheel-*-py3-none-any.whl -d "%(installroot)"
    else
        %pyproject_install
    fi
