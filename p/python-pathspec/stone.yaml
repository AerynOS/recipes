name        : python-pathspec
version     : "1.1.1"
release     : 8
homepage    : https://pypi.org/project/pathspec
upstreams   :
    - https://pypi.debian.net/pathspec/pathspec-1.1.1.tar.gz : 17db5ecd524104a120e173814c90367a96a98d07c45b2e10c2f3919fff91bf5a
summary     : Utility library for gitignore style pattern matching of file paths.
description : |
    pathspec is a utility library for pattern matching of file paths. So far this only includes Git's wildmatch pattern matching which itself is derived from Rsync's wildmatch. Git uses wildmatch for its gitignore files.
license     :
    - MPL-2.0-no-copyleft-exception
builddeps   :
    - binary(python3)
    - python(flit-core)
rundeps     :
    - binary(python3)
build       : |
    %pyproject_build
install     : |
    %pyproject_install
