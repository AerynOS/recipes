name        : perl-xml-parser
version     : "2.59"
release     : 5
homepage    : https://metacpan.org/pod/XML::Parser
upstreams   :
    - https://cpan.metacpan.org/authors/id/T/TO/TODDR/XML-Parser-2.59.tar.gz : a358fd7c49f5e27717a644a9102bd21dc7fc25a415983279c59b1580e2b62a58
summary     : A perl module for parsing XML documents
description : |
    A perl module for parsing XML documents
license     : Artistic-1.0-Perl
builddeps   :
    - pkgconfig(expat)
    - perl-devel
    - perl-file-sharedir-install
checkdeps   :
    - perl-file-sharedir
rundeps     :
    - binary(perl)
    - perl-file-sharedir
setup       : |
    %perl_setup
build       : |
    %make
install     : |
    %make_install
check       : |
    %make test
packages    :
    - "%(name)":
        paths:
            - /usr/share/man/man3
