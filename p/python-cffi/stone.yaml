name        : python-cffi
version     : "2.0.0"
release     : 4
homepage    : https://cffi.readthedocs.org/
upstreams   :
    - https://pypi.debian.net/cffi/cffi-2.0.0.tar.gz : 44d1b5909021139fe36001ae048dbdde8214afa20200eda0f64c068cac5d5529
summary     : Foreign Function Interface for Python calling C code
description : |
    Foreign Function Interface for Python calling C code
license     : MIT
builddeps   :
    - pkgconfig(libffi)
    - pkgconfig(python3)
    - python(setuptools)
rundeps     :
    - python-libs
# checkdeps   :
#     - binary(pytest)
#     - python(pycparser)
build       : |
    %pyproject_build
install     : |
    %pyproject_install
