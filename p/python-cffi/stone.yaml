name        : python-cffi
version     : "2.1.0"
release     : 6
homepage    : https://cffi.readthedocs.org/
upstreams   :
    - https://pypi.debian.net/cffi/cffi-2.1.0.tar.gz : efc1cdd798b1aaf39b4610bba7aad28c9bea9b910f25c784ccf9ec1fa719d1f9
summary     : Foreign Function Interface for Python calling C code
description : |
    Foreign Function Interface for Python calling C code
license     : MIT
builddeps   :
    - pkgconfig(libffi)
    - pkgconfig(python3)
    - python(setuptools)
rundeps     :
    - binary(python)
# checkdeps   :
#     - binary(pytest)
#     - python(pycparser)
build       : |
    %pyproject_build
install     : |
    %pyproject_install
