name        : python-charset-normalizer
version     : "3.4.7"
release     : 5
homepage    : https://github.com/ousret/charset_normalizer
upstreams   :
    - https://pypi.debian.net/charset-normalizer/charset_normalizer-3.4.7.tar.gz : ae89db9e5f98a11a4bf50407d4363e7b09b31e55bc117b4f7d80aab97ba009e5
summary     : Truly universal encoding detector in pure Python
description : |
    The Real First Universal Charset Detector. Open, modern and actively maintained alternative to Chardet.
license     : MIT
builddeps   :
    - python(mypy)
    - python(setuptools)
    - python(setuptools-scm)
rundeps     :
    - binary(python3)
checkdeps   :
    - python(pytest)
setup       : |
    # TODO: Remove in future version
    sed -i "s|setuptools>=68,<=82.0.0|setuptools>=68,<=83.0.0|g" pyproject.toml
build       : |
    %pyproject_build
install     : |
    %pyproject_install
check       : |
    # TODO replace with pytest macro
    PYTHONPATH="$PWD"/build/lib pytest
