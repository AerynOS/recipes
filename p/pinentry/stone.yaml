name        : pinentry
version     : "1.3.3"
release     : 13
homepage    : https://gnupg.org/related_software/pinentry
upstreams   :
    - https://gnupg.org/ftp/gcrypt/pinentry/pinentry-1.3.3.tar.bz2 : c2970f16d6afb66ecddfca767d743936c86239bff936eed7fd7597a678414b63
summary     : Collection of dialog programs that allow GnuPG to read passphrases and PINs
description : |
    %(name) is a small collection of dialog programs that allow GnuPG to read passphrases and PIN numbers in a secure manner.
license     :
    - GPL-2.0-or-later
builddeps   :
    - cmake(KF6GuiAddons)
    - cmake(KF6WindowSystem)
    - pkgconfig(Qt6Core)
    - pkgconfig(gcr-4)
    - pkgconfig(libassuan)
    - pkgconfig(libsecret-1)
    - pkgconfig(ncursesw)
    - pkgconfig(x11)
rundeps     :
    - binary(bash)
    - binary(ldd)
rundeps-exclude:
    # These are soname dependencies of -gnome and -qt which are not present in -curses and -tty
    - 'soname\(libKF6.*.so.*\)'
    - 'soname\(libQt6.*.so.*\)'
    - 'soname\(libgcr.*.so.*\)'
    - 'soname\(libgio.*.so.*\)'
    - 'soname\(libgobject.*.so.*\)'
setup       : |
    export LDFLAGS="${LDFLAGS} -lassuan"

    %configure \
        --enable-fallback-curses \
        --enable-pinentry-curses \
        --enable-pinentry-gnome3 \
        --enable-pinentry-qt \
        --enable-pinentry-tty \
        --enable-libsecret
build       : |
    %make AR=%(ar)
install     : |
    %make_install

    %install_exe %(pkgdir)/pinentry %(installroot)%(bindir)/pinentry
