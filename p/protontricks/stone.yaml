name        : protontricks
version     : "1.14.1"
release     : 4
upstreams   :
    - https://pypi.debian.net/protontricks/protontricks-1.14.1.tar.gz : db242c0249948d3595dd33ffbd0f6850461fbd43665aff40e11ec6ea94e11bc4
homepage    : https://github.com/Matoking/protontricks
license     : GPL-3.0-or-later
summary     : A simple wrapper that does winetricks things for Proton enabled games
description : |
    A simple wrapper that does winetricks things for Proton enabled games
builddeps   :
    - python(setuptools)
    - python(setuptools-scm)
rundeps     :
    - binary(winetricks)
    - binary(zenity)
    # TODO: Use YAD instead of zenity
setup       : |
    # Remove vendored vdf
    %patch %(pkgdir)/drop-vendored-vdf.patch -R
    rm -rf ./src/protontricks/_vdf
build       : |
    %pyproject_build
install     : |
    %pyproject_install
