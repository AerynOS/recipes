name        : plezy
version     : "2.7.1"
release     : 1
homepage    : https://github.com/edde746/plezy
upstreams   :
    - https://github.com/edde746/plezy/archive/refs/tags/2.7.1.tar.gz:
        hash: a28feb6c72eed2805294dbb017ea4b768b278c32bb030bac75edf9f2b480eed3
        rename: plezy
    - https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.44.0-stable.tar.xz:
        hash: e1ec95e6c550458a34de93580cb85dac24da0e9bedb9bb42811f050ac5a0c7d5
        unpackdir: plezy/flutter
summary     : Modern cross-platform Plex & Jellyfin client built with Flutter
description : |
    A modern client for Plex and Jellyfin on desktop, mobile, and TV. Built with Flutter for native performance and a clean interface.
license     : GPL-3.0-or-later
networking  : true
builddeps   :
    - binary(cmake)
    - binary(magick)
    - binary(ninja)
    - binary(which)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(libcurl)
    - pkgconfig(libevdev)
    - pkgconfig(mpv)
    - openjdk-21-devel
environment: |
    # Flutter
    export PATH="$PATH:${PWD}/flutter/bin"
    export JAVA_HOME=%(libdir)/openjdk-21
setup       : |
    # Everything below translated from AUR PKGBUILD
    flutter --disable-analytics
    flutter pub get
build       : |
    flutter build linux --release

    for i in 16 32 48 64 128 256 512; do
      magick "assets/%(name).png" -resize "${i}x${i}" "assets/%(name)_${i}x${i}.png"
    done
install     : |
    _build_folder=build/linux/x64/release/bundle

    %install_dir %(installroot)%(libdir)/%(name)
    %install_exe ${_build_folder}/%(name) -t %(installroot)%(libdir)/%(name)
    cp -R ${_build_folder}/* %(installroot)%(libdir)/%(name)

    %install_file linux/packaging/com.edde746.%(name).desktop -t %(installroot)%(datadir)/applications/
    %install_file assets/%(name).svg -t %(installroot)%(datadir)/icons/hicolor/scalable/apps/
    for i in 16 32 48 64 128 256 512; do
      %install_file assets/%(name)_${i}x${i}.png -t %(installroot)%(datadir)/icons/hicolor/${i}x${i}/apps/%(name).png
    done

    %install_dir %(installroot)%(bindir)
    ln -srvf %(installroot)%(libdir)/%(name)/%(name) %(installroot)%(bindir)/%(name)
