name        : perl-yaml-libyaml
version     : "0.910.0"
release     : 4
homepage    : https://metacpan.org/dist/YAML-LibYAML
upstreams   :
    - https://cpan.metacpan.org/authors/id/T/TI/TINITA/YAML-LibYAML-v0.910.0.tar.gz : 04310e9840b918383a5b9ae9ca4b3bde1b2771ec786c758bd2fffd79d409332b
summary     : Perl YAML Serialization using XS and libyaml
description : |
    Perl YAML Serialization using XS and libyaml
license     : Artistic-1.0-Perl
builddeps   :
    - pkgconfig(yaml-0.1)
    - perl-devel
rundeps     :
    - binary(perl)
setup       : |
    %patch %(pkgdir)/unbundle-libyaml.patch
    for file in api.c dumper.c emitter.c loader.c parser.c reader.c scanner.c \
        writer.c yaml.h yaml_private.h; do
        rm LibYAML/$file
        sed -i -e "/^LibYAML\/$file/d" MANIFEST
    done

    %perl_setup
build       : |
    %make
install     : |
    %make_install
check       : |
    # needs unpackaged Test::Warnings
    rm -f t/oop/15-various.t
    %make test
packages    :
    - "%(name)":
        paths:
            - /usr/share/man/man3
