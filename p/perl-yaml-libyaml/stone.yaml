name        : perl-yaml-libyaml
version     : "0.907.0"
release     : 3
homepage    : https://metacpan.org/dist/YAML-LibYAML
upstreams   :
    - https://cpan.metacpan.org/authors/id/T/TI/TINITA/YAML-LibYAML-v0.907.0.tar.gz : 6ba087224911389e76fa198b149cec83f065b0ac75ddc52618f3490942cd9506
summary     : Perl YAML Serialization using XS and libyaml
description : |
    Perl YAML Serialization using XS and libyaml
license     : Artistic-1.0-Perl
builddeps   :
    - pkgconfig(yaml-0.1)
    - perl-devel
rundeps     :
    - binary(perl)
setup       : |
    %patch %(pkgdir)/unbundle-libyaml.patch
    for file in api.c dumper.c emitter.c loader.c parser.c reader.c scanner.c \
        writer.c yaml.h yaml_private.h; do
        rm LibYAML/$file
        sed -i -e "/^LibYAML\/$file/d" MANIFEST
    done

    %perl_setup
build       : |
    %make
install     : |
    %make_install
packages    :
    - "%(name)":
        paths:
            - /usr/share/man/man3
