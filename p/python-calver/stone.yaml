name        : python-calver
version     : "2025.10.20"
release     : 5
homepage    : https://pypi.org/project/calver
upstreams   :
    - https://pypi.debian.net/calver/calver-2025.10.20.tar.gz : c98b376c2424642224d456b2f70c51402343e008c63d204634665e1a2a2835f5
summary     : Calendar-based versionining for Python packages
description : |
    The calver package is a setuptools extension for automatically defining your Python package version as a calendar version.
license     :
    - Apache-2.0
builddeps   :
    - python(setuptools)
rundeps     :
    - python-libs
build       : |
    %pyproject_build
install     : |
    %pyproject_install
