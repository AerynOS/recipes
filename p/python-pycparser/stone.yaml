name        : python-pycparser
version     : "3.0"
release     : 5
homepage    : https://github.com/eliben/pycparser
upstreams   :
    - https://pypi.debian.net/pycparser/pycparser-3.0.tar.gz : 600f49d217304a5902ac3c37e1281c9fe94e4d0489de643a9504c5cdfdfc6b29
summary     : C parser and AST generator written in Python
description : |
    C parser and AST generator written in Python
license     : BSD-3-Clause
builddeps   :
    - python(setuptools)
rundeps     :
    - python-libs
checkdeps   :
    - binary(clang-cpp)
build       : |
    %pyproject_build
install     : |
    %pyproject_install
check       : |
    python -m unittest discover
