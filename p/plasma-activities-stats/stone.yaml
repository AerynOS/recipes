name        : plasma-activities-stats
version     : "6.6.4"
release     : 16
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.4/plasma-activities-stats-6.6.4.tar.xz : 8b1a6a93afee6876d5050d874927912f32e52c60ff3c67bcded477f4f7c9cd45
homepage    : https://kde.org/plasma-desktop/
license     :
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
summary     : library for accessing the usage data collected by the activities system
description : |
    library for accessing the usage data collected by the activities system
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(PlasmaActivities)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
