name        : python-lxml
version     : "6.0.3"
release     : 8
homepage    : https://lxml.de/
upstreams   :
    - https://pypi.debian.net/lxml/lxml-6.0.3.tar.gz : a1664c5139755df44cab3834f4400b331b02205d62d3fdcb1554f63439bf3372
summary     : XML and HTML with Python
description : |
    lxml is the most feature-rich and easy-to-use library for processing XML and HTML in the Python language. It's also very fast and memory friendly, just so you know.
license     :
    - BSD-3-Clause
    - MIT
    - GPL-2.0-or-later
    - ZPL-2.0
builddeps   :
    - binary(cython)
    - pkgconfig(libxml-2.0)
    - pkgconfig(libxslt)
    - python(setuptools)
rundeps     :
    - python-libs
build       : |
    export WITH_CYTHON=true
    %pyproject_build
install     : |
    %pyproject_install
