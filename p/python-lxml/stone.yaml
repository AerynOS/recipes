name        : python-lxml
version     : "6.1.1"
release     : 10
homepage    : https://lxml.de/
upstreams   :
    - https://pypi.debian.net/lxml/lxml-6.1.1.tar.gz : ba96ae44888e0185281e937633a743ea90d5a196c6000f82565ebb0580012d40
summary     : XML and HTML with Python
description : |
    lxml is the most feature-rich and easy-to-use library for processing XML and HTML in the Python language. It's also very fast and memory friendly, just so you know.
license     :
    - BSD-3-Clause
    - MIT
    - GPL-2.0-or-later
    - ZPL-2.0
builddeps   :
    - binary(cython)
    - pkgconfig(libxml-2.0)
    - pkgconfig(libxslt)
    - python(setuptools)
rundeps     :
    - python-libs
build       : |
    export WITH_CYTHON=true
    %pyproject_build
install     : |
    %pyproject_install
