name        : python-lxml
version     : "6.1.0"
release     : 9
homepage    : https://lxml.de/
upstreams   :
    - https://pypi.debian.net/lxml/lxml-6.1.0.tar.gz : bfd57d8008c4965709a919c3e9a98f76c2c7cb319086b3d26858250620023b13
summary     : XML and HTML with Python
description : |
    lxml is the most feature-rich and easy-to-use library for processing XML and HTML in the Python language. It's also very fast and memory friendly, just so you know.
license     :
    - BSD-3-Clause
    - MIT
    - GPL-2.0-or-later
    - ZPL-2.0
builddeps   :
    - binary(cython)
    - pkgconfig(libxml-2.0)
    - pkgconfig(libxslt)
    - python(setuptools)
rundeps     :
    - python-libs
build       : |
    export WITH_CYTHON=true
    %pyproject_build
install     : |
    %pyproject_install
