name        : python-build
version     : "1.5.0"
release     : 13
homepage    : https://github.com/pypa/build
upstreams   :
    - https://pypi.debian.net/build/build-1.5.0.tar.gz:
        hash: 302c22c3ba2a0fd5f3911918651341ebb3896176cbdec15bd421f80b1afc7647
        rename: build.tar.gz

    # Comment out if not bootstrapping
    # - git|https://gitlab.archlinux.org/archlinux/python-bootstrap.git:
    #     ref: 461514b135c5ef77f572037d79b58b9e321d38e9
summary     : Simple and correct PEP 517 build frontend
description : |
    python-build is a simple and correct PEP 517 build frontend.
license     :
    - MIT
builddeps   :
    - python(flit-core)
    - python(pyproject-hooks)
rundeps     :
    - binary(python)
environment : |
    # set to 1 if bootstrapping against a new python
    _bootstrap=0

    if [[ ${_bootstrap} == "1" ]]; then
        cd ../python-bootstrap.git
    fi
setup      : |
    if [[ ${_bootstrap} == "1" ]]; then
        rm -rf external/build

        mkdir external/build
        bsdtar-static -xf %(sourcedir)/build.tar.gz --strip-components=1 -C external/build
    fi
build       : |
    if [[ ${_bootstrap} == "1" ]]; then
        python -m bootstrap.build
    else
        %pyproject_build
    fi
install     : |
    if [[ ${_bootstrap} == "1" ]]; then
        python -m bootstrap.install dist/build-*-py3-none-any.whl -d "%(installroot)"
    else
        %pyproject_install
    fi
