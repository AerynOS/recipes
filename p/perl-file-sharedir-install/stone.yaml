name        : perl-file-sharedir-install
version     : "0.14"
release     : 1
homepage    : https://metacpan.org/pod/File::ShareDir::Install
upstreams   :
    - https://cpan.metacpan.org/authors/id/E/ET/ETHER/File-ShareDir-Install-0.14.tar.gz : 8f9533b198f2d4a9a5288cbc7d224f7679ad05a7a8573745599789428bc5aea0
summary     : Install shared files
description : |
    File::ShareDir::Install allows you to install read-only data files from a
    distribution. It is typically used from Makefile.PL.
license     : Artistic-1.0-Perl
rundeps     :
    - binary(perl)
setup       : |
    %perl_setup
build       : |
    %make
install     : |
    %make_install
check       : |
    %make test
packages    :
    - "%(name)":
        paths:
            - /usr/share/man/man3
