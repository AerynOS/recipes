name        : python-meson-python
version     : "0.20.0"
release     : 2
homepage    : https://pypi.debian.net/meson-python
upstreams   :
    - https://pypi.debian.net/meson-python/meson_python-0.20.0.tar.gz : 6d9726ae6cd37e22f210c74b364b30180a68c20442e97ff09f3c566a414af738
summary     : Meson PEP 517 Python build backend
description : |
    meson-python is a Python build back-end built on top of the Meson build system. It enables using Meson for the configuration and build steps of Python packages.
license     :
    - MIT
builddeps   :
    - binary(meson)
    - binary(ninja)
    - binary(patchelf)
    - binary(python)
    - python(packaging)
    - python(pyproject-metadata)
rundeps     :
    - binary(meson)
    - python-libs
setup       : |
    sed -e '/ninja/d' -i pyproject.toml
build       : |
    %pyproject_build
install     : |
    %pyproject_install
