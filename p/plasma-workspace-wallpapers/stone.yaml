name        : plasma-workspace-wallpapers
version     : "6.6.2"
release     : 13
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.2/plasma-workspace-wallpapers-6.6.2.tar.xz : c42482fa84c325bcf033db0f8d9a01c54a7b1697c5d6d5cc3078a5d814a5c24d
homepage    : https://kde.org/plasma-desktop/
license     : 
    - GPL-2.0-or-later
    - LGPL-3.0-or-later
summary     : Wallpapers for Plasma Workspaces
description : |
    Wallpapers for Plasma Workspaces
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
