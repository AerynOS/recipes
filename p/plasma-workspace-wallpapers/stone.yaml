name        : plasma-workspace-wallpapers
version     : "6.7.1"
release     : 18
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.1/plasma-workspace-wallpapers-6.7.1.tar.xz : b3cbb7faa66a384f137c34f9384eef0514f3325421b449b187b57b5e065d699a
homepage    : https://kde.org/plasma-desktop/
license     :
    - GPL-2.0-or-later
    - LGPL-3.0-or-later
summary     : Wallpapers for Plasma Workspaces
