name        : plasma-workspace-wallpapers
version     : "6.7.2"
release     : 19
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.2/plasma-workspace-wallpapers-6.7.2.tar.xz : 9d9c95832ac0b478ee94cb49fcadfbbf8d581bf0d44f4d6c72e12e39a8048b98
