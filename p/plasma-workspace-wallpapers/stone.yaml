name        : plasma-workspace-wallpapers
version     : "6.7.0"
release     : 17
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.0/plasma-workspace-wallpapers-6.7.0.tar.xz : 0e92220c0ae0b7c42644ebed6fe159fb0097a892e640cb1242047c929931ea0a
homepage    : https://kde.org/plasma-desktop/
license     :
    - GPL-2.0-or-later
    - LGPL-3.0-or-later
summary     : Wallpapers for Plasma Workspaces
