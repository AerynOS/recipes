name        : plasma-workspace-wallpapers
version     : "6.6.3"
release     : 14
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.3/plasma-workspace-wallpapers-6.6.3.tar.xz : 73854af7129707a75f8b131edfd42c440410b8f219babb6173314a22cce915dd
homepage    : https://kde.org/plasma-desktop/
license     : 
    - GPL-2.0-or-later
    - LGPL-3.0-or-later
summary     : Wallpapers for Plasma Workspaces
description : |
    Wallpapers for Plasma Workspaces
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
