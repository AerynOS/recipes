name        : pipewire
version     : "1.6.6"
release     : 34
homepage    : https://pipewire.org/
upstreams   :
   - https://gitlab.freedesktop.org/pipewire/pipewire/-/archive/1.6.6/pipewire-1.6.6.tar.gz : b2a0a8de6946b8145a453639c936555beb0cbf2f2486e0b1c676cffdaaf029d9
summary     : Linux audio + video multiplexing
description : |
    PipeWire is a project that aims to greatly improve handling of audio and video under Linux. It provides a low-latency, graph-based processing engine on top of audio and video devices that can be used to support the use cases currently handled by both PulseAudio and JACK. PipeWire was designed with a powerful security model that makes interacting with audio and video devices from containerized applications easy, with support for Flatpak applications being the primary goal.
license     : MIT
builddeps   :
    - binary(doxygen)
    - binary(gettext)
    - binary(openal-info)
    - cmake(VulkanHeaders)
    - pkgconfig(alsa)
    - pkgconfig(avahi-client)
    - pkgconfig(bluez)
    - pkgconfig(dbus-1)
    - pkgconfig(fdk-aac)
    - pkgconfig(fftw3f)
    - pkgconfig(gio-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(gstreamer-1.0)
    - pkgconfig(gstreamer-video-1.0)
    - pkgconfig(lc3)
    - pkgconfig(ldacBT-enc)
    - pkgconfig(libavcodec)
    - pkgconfig(libavfilter)
    - pkgconfig(libavformat)
    - pkgconfig(libcanberra)
    - pkgconfig(libcap)
    - pkgconfig(libdrm)
    - pkgconfig(libebur128)
    - pkgconfig(libfreeaptx)
    - pkgconfig(libmysofa)
    - pkgconfig(libpulse)
    - pkgconfig(libswscale)
    - pkgconfig(libsystemd)
    - pkgconfig(libusb-1.0)
    - pkgconfig(lilv-0)
    - pkgconfig(ncursesw)
    - pkgconfig(openssl)
    - pkgconfig(opus)
    - pkgconfig(readline)
    - pkgconfig(sbc)
    - pkgconfig(sdl2-compat)
    - pkgconfig(sndfile)
    - pkgconfig(systemd)
    - pkgconfig(vulkan)
    - pkgconfig(webrtc-audio-processing-2)
    - pkgconfig(x11-xcb)
    - pkgconfig(xfixes)
    # libffado?
    # lc3plus
    # libcamera
    # ldacbt-dec
    # libapparmor
    # libselinux
setup       : |
    # `jack` means integration with a separate JACK server, not the built-in JACK server (`pipewire-jack`)
    %meson \
        -Dbluez5=enabled \
        -Dffmpeg=enabled \
        -Dgstreamer=enabled \
        -Djack=disabled \
        -Djack-devel=true \
        -Dlibjack-path=%(libdir) \
        -Dman=enabled \
        -Dpipewire-jack=enabled \
        -Dsession-managers=[] \
        -Dudev=enabled \
        -Dudevrulesdir=%(libdir)/udev/rules.d \
        -Dvulkan=enabled
build       : |
    %meson_build
install     : |
    %meson_install

    %install_dir %(installroot)%(vendordir)/security/limits.d
    mv %(installroot)%(sysconfdir)/security/limits.d/* %(installroot)%(vendordir)/security/limits.d
    rmdir -v %(installroot)%(sysconfdir)/security/limits.d \
             %(installroot)%(sysconfdir)/security/ \
             %(installroot)%(sysconfdir)/
packages    :
    - "%(name)-libs":
        summary: "Library files for %(name)"
        description: |
            Library files for %(name), typically pulled in as a dependency of another package.
        paths:
            - /usr/lib/libpipewire-0.3.so.*
            - /usr/lib/spa-0.2/libspa.so

    # Hack for moss not handling this migration correctly
    - "%(name)":
        rundeps:
            - "%(name)-libs"
            - rtkit

    - "gstreamer-plugin-pipewire":
        summary: GStreamer pipewire plugin
        description: GStreamer pipewire plugin
        paths:
            - /usr/lib/gstreamer-1.0/

    - "libjack3":
        summary: "JACK library files for %(name)"
        description: "JACK library files for %(name)"
        paths:
            - /usr/bin/pw-jack
            - /usr/lib/libjack.so.*
            - /usr/lib/libjacknet.so.*
            - /usr/share/man/man1/pw-jack.1*
            - /usr/share/man/man5/pipewire-jack.conf.5*

    - "libjack3-devel":
        summary: "JACK library files for %(name) - Devel"
        description: "JACK library files for %(name) - Devel"
        rundeps:
            - "libjack3"
        paths:
            - /usr/include/jack/
            - /usr/lib/libjack.so
            - /usr/lib/libjacknet.so
            - /usr/lib/pkgconfig/jack.pc
