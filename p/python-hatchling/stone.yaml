name        : python-hatchling
version     : "1.30.1"
release     : 9
homepage    : https://pypi.org/project/hatchling/
upstreams   :
    - https://pypi.debian.net/hatchling/hatchling-1.30.1.tar.gz : eee4fd45357f72ebb3d7a42e5d72cfb5e29ed426d79e8836288926c4258d5f2e
