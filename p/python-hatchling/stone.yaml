name        : python-hatchling
version     : "1.29.0"
release     : 7
homepage    : https://pypi.org/project/hatchling/
upstreams   :
    - https://pypi.debian.net/hatchling/hatchling-1.29.0.tar.gz : 793c31816d952cee405b83488ce001c719f325d9cda69f1fc4cd750527640ea6
summary     : Modern, extensible Python build backend
description : |
    Modern, extensible Python build backend, as used by Hatch
license     :
    - MIT
builddeps   :
    - python(packaging)
    - python(pathspec)
    - python(pluggy)
    - python(trove-classifiers)
rundeps     :
    - binary(python3)
build       : |
    %pyproject_build
install     : |
    %pyproject_install
