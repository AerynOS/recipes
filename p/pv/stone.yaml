name        : pv
version     : "1.10.5"
release     : 4
homepage    : https://www.ivarch.com/programs/pv.shtml
upstreams   :
    - https://www.ivarch.com/programs/sources/pv-1.10.5.tar.gz : ab21b4f8662280646b6a02e1b9f096790918f89c952bbe0d06fef75d3b52fb15
summary     : Pipe Viewer
description : |
    pv (Pipe Viewer) allows a user to see the progress of data through a pipeline, by giving information such as time elapsed, percentage completed (with progress bar), current throughput rate, total data transferred, and ETA.
license     : GPL-3.0-or-later
builddeps   :
    - binary(msgfmt)
setup       : |
    %configure
build       : |
    %make
install     : |
    %make_install
