name        : plasma-activities
version     : "6.7.3"
release     : 28
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.3/plasma-activities-6.7.3.tar.xz : 3a9fbf0039464270238b84344b1064c57fb11a6aa5d7900f08a0a868063a62ea
homepage    : https://kde.org/plasma-desktop/
license     : GPL-2.0-or-later
summary     : Core components for the KDE Activity concept
description : |
    Core components for the KDE Activity concept
builddeps   :
    - cmake(Boost)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
