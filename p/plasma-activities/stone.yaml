name        : plasma-activities
version     : "6.6.2"
release     : 18
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.2/plasma-activities-6.6.2.tar.xz : 1315b11497b682a1881ae99c40d7af43177046dda3fff76e7b5bbcb598d9b3ef
homepage    : https://kde.org/plasma-desktop/
license     : GPL-2.0-or-later
summary     : Core components for the KDE Activity concept
description : |
    Core components for the KDE Activity concept
builddeps   :
    - cmake(Boost)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
