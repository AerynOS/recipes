name        : plasma-activities
version     : "6.6.4"
release     : 21
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.4/plasma-activities-6.6.4.tar.xz : a1973821797c703177d51e698f8abfd8294796a9396316440b14dca958bb57e5
homepage    : https://kde.org/plasma-desktop/
license     : GPL-2.0-or-later
summary     : Core components for the KDE Activity concept
description : |
    Core components for the KDE Activity concept
builddeps   :
    - cmake(Boost)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
