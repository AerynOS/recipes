name        : plasma-activities
version     : "6.6.3"
release     : 20
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.3/plasma-activities-6.6.3.tar.xz : ac15123637ea067ab646cde091d69c84fc24742fd7308e5418bf99298ab9717a
homepage    : https://kde.org/plasma-desktop/
license     : GPL-2.0-or-later
summary     : Core components for the KDE Activity concept
description : |
    Core components for the KDE Activity concept
builddeps   :
    - cmake(Boost)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
