name        : plasma-activities
version     : "6.7.1"
release     : 26
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.1/plasma-activities-6.7.1.tar.xz : d9e38efa6a0ab8b50c208c08acac7bfe23c9e8f7cafcc180a164724ad6819804
homepage    : https://kde.org/plasma-desktop/
license     : GPL-2.0-or-later
summary     : Core components for the KDE Activity concept
description : |
    Core components for the KDE Activity concept
builddeps   :
    - cmake(Boost)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
