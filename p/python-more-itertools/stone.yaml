name        : python-more-itertools
version     : "10.8.0"
release     : 4
homepage    : https://github.com/more-itertools/more-itertools
upstreams   :
    - https://pypi.debian.net/more-itertools/more_itertools-10.8.0.tar.gz : f638ddf8a1a0d134181275fb5d58b086ead7c6a72429ad725c67503f13ba30bd
