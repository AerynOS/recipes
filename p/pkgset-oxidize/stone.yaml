name        : pkgset-oxidize
version     : "2026.04"
release     : 1
homepage    : https://github.com/christian-bendiksen/oxidize
# No upstream
summary     : pkgset virtual packages - Oxidize theme manager
description : |
    pkgset virtual packages - Oxidize theme manager with Wayland compositor support
license     : MIT
install     : |
    for i in mango niri hyprland; do
        %install_dir %(installroot)%(docdir)/%(name)-${i}
        echo "This file will disappear when virtual packages are introduced" > %(installroot)%(docdir)/%(name)-${i}/README
    done
packages    :
    - "%(name)-mango":
        summary: Oxidize theme manager with Mango Wayland Compositor
        description: |
            Oxidize theme manager with Mango Wayland Compositor and all supporting tools
        rundeps:
            - binary(awww)
            - binary(bluetui)
            - binary(btop)
            - binary(elephant)
            - binary(grim)
            - binary(gpu-screen-recorder)
            - binary(hx)
            - binary(hypridle)
            - binary(hyprlock)
            - binary(impala)
            - binary(kitty)
            - binary(mako)
            - binary(mango)
            - binary(oxidize)
            - binary(pkaction)
            - binary(slurp)
            - binary(sddm)
            - binary(swayosd-client)
            - binary(walker)
            - binary(waybar)
            - binary(wl-clip)
            - binary(wlsunset)
            - pkgset-aeryn-base-desktop
            - polkit-kde-agent
            - xdg-desktop-portal
            - xdg-desktop-portal-gtk
            - xdg-desktop-portal-wlr
        paths:
            - /usr/share/doc/%(name)-mango/README

    - "%(name)-niri":
        summary: Oxidize theme manager with Niri Wayland Compositor
        description: |
            Oxidize theme manager with Niri scrollable-tiling compositor and all supporting tools
        rundeps:
            - binary(awww)
            - binary(bluetui)
            - binary(btop)
            - binary(elephant)
            - binary(grim)
            - binary(gpu-screen-recorder)
            - binary(hx)
            - binary(hypridle)
            - binary(hyprlock)
            - binary(impala)
            - binary(kitty)
            - binary(mako)
            - binary(niri)
            - binary(oxidize)
            - binary(pkaction)
            - binary(slurp)
            - binary(sddm)
            - binary(swayosd-client)
            - binary(walker)
            - binary(waybar)
            - binary(wl-clip)
            - binary(wlsunset)
            - pkgset-aeryn-base-desktop
            - polkit-kde-agent
            - xdg-desktop-portal
            - xdg-desktop-portal-gtk
            - xdg-desktop-portal-wlr
        paths:
            - /usr/share/doc/%(name)-niri/README

    - "%(name)-hyprland":
        summary: Oxidize theme manager with Hyprland Wayland Compositor
        description: |
            Oxidize theme manager with Hyprland compositor and all supporting tools
        rundeps:
            - binary(awww)
            - binary(bluetui)
            - binary(btop)
            - binary(elephant)
            - binary(grim)
            - binary(gpu-screen-recorder)
            - binary(hx)
            - binary(hypridle)
            - binary(hyprland)
            - binary(hyprlock)
            - binary(impala)
            - binary(kitty)
            - binary(mako)
            - binary(oxidize)
            - binary(pkaction)
            - binary(slurp)
            - binary(sddm)
            - binary(swayosd-client)
            - binary(walker)
            - binary(waybar)
            - binary(wl-clip)
            - binary(wlsunset)
            - pkgset-aeryn-base-desktop
            - polkit-kde-agent
            - xdg-desktop-portal
            - xdg-desktop-portal-gtk
            - xdg-desktop-portal-wlr
        paths:
            - /usr/share/doc/%(name)-hyprland/README
