name        : python-httplib2
version     : "0.31.2"
release     : 5
upstreams   :
    - https://github.com/httplib2/httplib2/archive/refs/tags/v0.31.2.tar.gz : 08beffe11d145296d361dedb65ccd89138c5e7da872c0f92309cfb69820d448f
homepage    : https://github.com/httplib2/httplib2
license     : MIT
summary     : Small, fast HTTP client library for Python
description : |
    Small, fast HTTP client library for Python. Features persistent connections, cache, Appengine support.
builddeps   :
    - python(setuptools)
rundeps     :
    - python-libs
setup       : |
    %patch %(pkgdir)/system-certs.patch
build       : |
    %pyproject_build
install     : |
    %pyproject_install
