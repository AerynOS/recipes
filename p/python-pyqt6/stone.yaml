name        : python-pyqt6
version     : "6.11.0"
release     : 1
homepage    : https://www.riverbankcomputing.com/software/pyqt/
upstreams   :
    - https://pypi.debian.net/PyQt6/pyqt6-6.11.0.tar.gz : 45dd60aa69976de1918b5ced6b4e7b6a25abd2a919ecef5fd5826ecc76718889
summary     : A set of Python bindings for Qt6
description : |
    Python bindings for the Qt6 cross platform application toolkit.
license     : GPL-3.0-or-later
builddeps   :
    - binary(qmake6)
    - binary(sip-build)
    - cmake(Qt6Bluetooth)
    - cmake(Qt6Designer)
    - cmake(Qt6Help)
    - cmake(Qt6Multimedia)
    - cmake(Qt6MultimediaWidgets)
    - cmake(Qt6Nfc)
    - cmake(Qt6Positioning)
    - cmake(Qt6Qml)
    - cmake(Qt6Pdf)
    - cmake(Qt6PdfWidgets)
    - cmake(Qt6Quick)
    - cmake(Qt6Quick3D)
    - cmake(Qt6QuickWidgets)
    - cmake(Qt6Sensors)
    - cmake(Qt6SerialPort)
    - cmake(Qt6SpatialAudio)
    - cmake(Qt6Svg)
    - cmake(Qt6SvgWidgets)
    - cmake(Qt6TextToSpeech)
    - cmake(Qt6WebChannel)
    - cmake(Qt6WebSockets)
    # Unknown if we want the dbus mainloop support yet
    # - pkgconfig(dbus-1)
    # - pkgconfig(dbus-python)
    - pkgconfig(python3)
    - python(pyqt-builder)
    # Qt6-remoteobjects, Qt6-scxml (statemachine)
setup       : |
    sip-build \
        --build-dir=%(builddir) \
        --confirm-license \
        --no-make \
        --pep484-pyi \
        --qmake=%(bindir)/qmake6 \
        --qt-shared \
        --verbose
build       : |
    %make -C %(builddir)
install     : |
    %make_install -C %(builddir) INSTALL_ROOT="%(installroot)"
    # TODO add python_compile when it's fixed
packages    :
    # This package is roughly structured in that each subpackage should correspond to a different Qt6 package

    # All known uses of pyqt6 are GUI applications so for simplicity we combine support for qt6-base and qt6-base-gui into one package
    - "%(name)":
        rundeps:
            - python-libs

    - "%(name)-connectivity":
        rundeps:
            - "%(name)"
        paths:
            - /usr/lib/python3.*/site-packages/PyQt6/QtBluetooth.*
            - /usr/lib/python3.*/site-packages/PyQt6/QtNfc.*

    - "%(name)-declarative":
        rundeps:
            - "%(name)"
        paths:
            - /usr/lib/qt6/plugins/PyQt6/libpyqt6qmlplugin.so
            - /usr/lib/python3.*/site-packages/PyQt6/QtQml.*
            - /usr/lib/python3.*/site-packages/PyQt6/QtQuick.*
            - /usr/lib/python3.*/site-packages/PyQt6/QtQuickWidgets.*

    - "%(name)-multimedia":
        rundeps:
            - "%(name)"
        paths:
            - /usr/lib/python3.*/site-packages/PyQt6/QtMultimedia.*
            - /usr/lib/python3.*/site-packages/PyQt6/QtMultimediaWidgets.*
            - /usr/lib/python3.*/site-packages/PyQt6/QtSpatialAudio.*

    - "%(name)-pdf":
        rundeps:
            - "%(name)"
        paths:
            - /usr/lib/python3.*/site-packages/PyQt6/QtPdf.*
            - /usr/lib/python3.*/site-packages/PyQt6/QtPdfWidgets.*

    - "%(name)-positioning":
        rundeps:
            - "%(name)"
        paths:
            - /usr/lib/python3.*/site-packages/PyQt6/QtPositioning.*

    - "%(name)-quick3d":
        rundeps:
            - "%(name)"
            - "%(name)-declarative"
        paths:
            - /usr/lib/python3.*/site-packages/PyQt6/QtQuick3D.*

    - "%(name)-sensors":
        rundeps:
            - "%(name)"
        paths:
            - /usr/lib/python3.*/site-packages/PyQt6/QtSensors.*

    - "%(name)-serialport":
        rundeps:
            - "%(name)"
        paths:
            - /usr/lib/python3.*/site-packages/PyQt6/QtSerialPort.*

    - "%(name)-speech":
        rundeps:
            - "%(name)"
        paths:
            - /usr/lib/python3.*/site-packages/PyQt6/QtTextToSpeech.*

    - "%(name)-svg":
        rundeps:
            - "%(name)"
        paths:
            - /usr/lib/python3.*/site-packages/PyQt6/QtSvg.*
            - /usr/lib/python3.*/site-packages/PyQt6/QtSvgWidgets.*

    - "%(name)-tools":
        rundeps:
            - "%(name)"
        paths:
            - /usr/lib/qt6/plugins/designer/libpyqt6.so
            - /usr/lib/python3.*/site-packages/PyQt6/QtDesigner.*
            - /usr/lib/python3.*/site-packages/PyQt6/QtHelp.*

    - "%(name)-webchannel":
        rundeps:
            - "%(name)"
        paths:
            - /usr/lib/python3.*/site-packages/PyQt6/QtWebChannel.*

    - "%(name)-websockets":
        rundeps:
            - "%(name)"
        paths:
            - /usr/lib/python3.*/site-packages/PyQt6/QtWebSockets.*

    - "%(name)-devel":
        rundeps:
            - "%(name)-connectivity"
            - "%(name)-declarative"
            - "%(name)-multimedia"
            - "%(name)-pdf"
            - "%(name)-positioning"
            - "%(name)-quick3d"
            - "%(name)-sensors"
            - "%(name)-serialport"
            - "%(name)-speech"
            - "%(name)-svg"
            - "%(name)-tools"
            - "%(name)-webchannel"
            - "%(name)-websockets"
        paths:
            - /usr/bin/
            - /usr/lib/python3.*/site-packages/PyQt6/bindings/
            - /usr/lib/python3.*/site-packages/PyQt6/lupdate/
            - /usr/lib/python3.*/site-packages/PyQt6/uic/
