name        : protobuf
version     : "35.1"
release     : 13
homepage    : https://github.com/protocolbuffers/protobuf
upstreams   :
    - https://github.com/protocolbuffers/protobuf/releases/download/v35.1/protobuf-35.1.tar.gz : f0b6838e7522a8da96126d487068c959bc624926368f3024ac8fd03abd0a1ac4
summary     : Protocol Buffers - Google's data interchange format
description : |
    Protocol Buffers - Google's data interchange format
license     : BSD-3-Clause
builddeps   :
    - cmake(absl)
    - pkgconfig(zlib)
    # bazelisk/bazel for Python bindings
setup       : |
    %cmake \
        -DBUILD_SHARED_LIBS=ON \
        -DCMAKE_SKIP_INSTALL_RPATH=ON \
        -DCMAKE_SKIP_RPATH=ON \
        -Dprotobuf_ABSL_PROVIDER=package \
        -Dprotobuf_BUILD_TESTS=OFF \
        -Dprotobuf_LOCAL_DEPENDENCIES_ONLY=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        paths:
            - /usr/bin/*

    - "%(name)-staticlib":
        summary: Static libs for %(name)
        description: Static libs for %(name)
        rundeps:
            - "%(name)-devel"
        paths:
            - /usr/lib/lib*.a
