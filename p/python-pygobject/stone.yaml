name        : python-pygobject
version     : "3.56.1"
release     : 13
homepage    : https://wiki.gnome.org/Projects/PyGObject
upstreams   :
    - https://download.gnome.org/sources/pygobject/3.56/pygobject-3.56.1.tar.gz : 2ec1cc8c55c7ffeebb97e58a9bba7aa1e74611f1173628084685446804a8881a
summary     : PyGObject is a Python package which provides bindings for GObject based libraries
description : |
    PyGObject is a Python package which provides bindings for GObject based libraries such as GTK, GStreamer, WebKitGTK, GLib, GIO and many more.
license     :
    - LGPL-2.1-or-later
builddeps   :
    - binary(patchelf)
    - pkgconfig(cairo)
    - pkgconfig(cairo-gobject)
    - pkgconfig(gio-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(gmodule-2.0)
    - pkgconfig(gobject-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(libffi)
    - pkgconfig(py3cairo)
    - pkgconfig(python3)
    - python(build)
    - python(installer)
    - python(packaging)
    - python(wheel)
rundeps     :
    - gobject-introspection-runtime
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
