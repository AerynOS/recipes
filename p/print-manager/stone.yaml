name        : print-manager
version     : "6.7.2"
release     : 27
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.2/print-manager-6.7.2.tar.xz : a4c55001f104634012c8107faa3e12132ae4c8e30ab00b46b419ef0b0144ead1
homepage    : https://kde.org/plasma-desktop/
license     : GPL-2.0-or-later
summary     : Tool for managing print jobs and printers
description : |
    Tool for managing print jobs and printers
builddeps   :
    - binary(smbspool)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6ConfigWidgets)
    - cmake(KF6CoreAddons)
    - cmake(KF6DBusAddons)
    - cmake(KF6I18n)
    - cmake(KF6KCMUtils)
    - cmake(KF6KIO)
    - cmake(KF6Kirigami)
    - cmake(KF6KirigamiAddons)
    - cmake(KF6Notifications)
    - cmake(KF6WidgetsAddons)
    - cmake(KF6WindowSystem)
    - cmake(Plasma)
    - cmake(Qt6CorePrivate)
    - pkgconfig(cups)
    - kf6-kdeclarative
    - kf6-kitemmodels
rundeps     :
    - binary(smbspool)
    - cups
    - kf6-kdeclarative
    - kf6-kitemmodels
    - plasma-workspace
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)":
        paths:
            - /usr/lib/libkcups.so
