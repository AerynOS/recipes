name        : pango
version     : "1.58.0"
release     : 13
homepage    : https://pango.gnome.org/
upstreams   :
    - https://download.gnome.org/sources/pango/1.58/pango-1.58.0.tar.xz : bc5bad6213ad4886a47d1e80292fd850b64159b50db67917a43d9ea80ee2298a
summary     : Pango is a library for layout and rendering of text, with an emphasis on internationalization
description : |
    Pango is a library for layout and rendering of text, with an emphasis on internationalization. Pango can be used anywhere that text layout is needed; however, most of the work on Pango so far has been done using the GTK widget toolkit as a test platform. Pango forms the core of text and font handling for GTK.
license     :
    - Apache-2.0
    - CC-BY-SA-3.0
    - CC0-1.0
    - GPL-2.0-or-later
    - GPL-3.0-or-later
    - LGPL-2.0-or-later
    - MIT
    - MPL-1.1
    - OFL-1.1
builddeps   :
    - binary(gi-docgen)
    - binary(rst2man)
    - pkgconfig(cairo)
    - pkgconfig(fontconfig)
    - pkgconfig(freetype2)
    - pkgconfig(fribidi)
    - pkgconfig(gio-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(gobject-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(harfbuzz)
    - pkgconfig(libthai)
    - pkgconfig(sysprof-capture-4)
    - pkgconfig(xft)
    - pkgconfig(xrender)
setup       : |
    %meson \
        -Dintrospection=enabled \
        -Dman-pages=true \
        -Dsysprof=enabled
build       : |
    %meson_build
install     : |
    %meson_install
check       : |
    %meson_test || :
workload    : |
    %meson_test || :
tuning      :
    - lto : full
