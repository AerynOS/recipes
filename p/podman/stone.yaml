name        : podman
version     : "6.0.2"
release     : 4
homepage    : https://podman.io/
upstreams   :
    - https://github.com/containers/podman/archive/refs/tags/v6.0.2.tar.gz : 0895a541aeb7aa8e99133ed2b328c1bb40fd397b7c3b01e083396c90e8628756
summary     : A tool for managing OCI containers and pods
description : |
    Podman (the POD MANager) is a tool for managing containers and images, volumes mounted into those containers, and pods made from groups of containers.
license     : Apache-2.0
builddeps   :
    - binary(go)
    - binary(man)
    - pkgconfig(gpgme)
    - pkgconfig(libseccomp)
    - pkgconfig(sqlite3)
    - pkgconfig(systemd)
rundeps     :
    - binary(crun)
    - binary(pasta)
    - conmon
    - containers-common
    - netavark
tuning      :
    # Vendored build; -mod=readonly would skip vendor/ and need the network.
    - golang-modflags: false
build       : |
    %make EXTRA_LDFLAGS='-compressdwarf=false' PREFIX=%(prefix)
install     : |
    %make_install install.completions DESTDIR=%(installroot) PREFIX=%(prefix) LIBEXECDIR=%(libdir)

    %install_bin bin/podman
    %install_bin bin/podman-remote
    %install_bin bin/podmansh
