name        : plasma-nano
version     : "6.7.3"
release     : 2
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.3/plasma-nano-6.7.3.tar.xz : cb585738f3bff48e24bc6025bb32e3fc1771ebbfce95459d4308f445302e2201
homepage    : https://kde.org/plasma-desktop/
license     :
    - GPL-2.0-or-later
summary     : KDE Plasma nano
description : |
    A minimal Plasma shell package intended for embedded devices
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6ItemModels)
    - cmake(KF6Service)
    - cmake(KF6Svg)
    - cmake(KF6WindowSystem)
    - cmake(KWayland)
    - cmake(Plasma)
    - cmake(Qt6Core5Compat)
    - cmake(Qt6Qml)
    - cmake(Qt6Svg)
rundeps     :
    - libplasma
    - qt6-5compat
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
