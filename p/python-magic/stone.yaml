name        : python-magic
version     : "0.4.27"
release     : 2
homepage    : https://github.com/ahupp/python-magic
upstreams   :
    - https://github.com/ahupp/python-magic/archive/refs/tags/0.4.27.tar.gz : 3978a25d43d9a7b8a89ae9d726bd4962fc90dc4f69ae852e399f3c56d4b0bd63
summary     : A python wrapper for libmagic
description : |
    A python wrapper for libmagic
license     : MIT
builddeps   :
    - python(setuptools)
rundeps     :
    - python-libs
    - soname(libmagic.so.1(x86_64))
checkdeps   :
    - python(pytest)
    - soname(libmagic.so.1(x86_64))
setup       : |
    %patch %(pkgdir)/file-5.45.patch
build       : |
    %pyproject_build
install     : |
    %pyproject_install
