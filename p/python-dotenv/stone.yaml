name        : python-dotenv
version     : "1.2.2"
release     : 2
homepage    : https://github.com/theskumar/python-dotenv
upstreams   :
    - https://github.com/theskumar/python-dotenv/archive/refs/tags/v1.2.2.tar.gz : 58f0f1016f35872bf90649f28d8777ee4897bb88f9075c315f71dc485410002a
summary     : Reads key-value pairs from a .env file and can set them as environment variables.
description : |
    python-dotenv reads key-value pairs from a .env file and can set them as environment variables. It helps in the development of applications following the 12-factor principles.
license     : BSD-3-Clause
builddeps   :
    - python(setuptools)
build       : |
    %pyproject_build
install     : |
    %pyproject_install
