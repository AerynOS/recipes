name        : p8-platform
version     : "2.1.0.1"
release     : 1
upstreams   :
    - https://github.com/Pulse-Eight/platform/archive/p8-platform-2.1.0.1.tar.gz : 064f8d2c358895c7e0bea9ae956f8d46f3f057772cb97f2743a11d478a0f68a0
license     : GPL-2.0-or-later
homepage    : https://github.com/Pulse-Eight/platform
summary     : Platform support library used by libCEC and binary add-ons for Kodi
description : |
    Platform support library used by libCEC and binary add-ons for Kodi
tuning      :
    - lto: full
setup       : |
    %cmake \
        -DBUILD_SHARED_LIBS=TRUE \
        -DCMAKE_INSTALL_PREFIX=%(prefix) \
        -DCMAKE_INSTALL_LIBDIR=%(libdir) \
        -DCMAKE_INSTALL_LIBDIR_NOARCH=%(libdir) \
        -DCMAKE_POLICY_VERSION_MINIMUM=3.5
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        paths:
            - /usr/lib/p8-platform/p8-platform-config.cmake
