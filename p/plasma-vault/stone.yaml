name        : plasma-vault
version     : "6.7.3"
release     : 2
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.3/plasma-vault-6.7.3.tar.xz : 8c5d91ad776cee1ef1eca2fb39b5da82d129567b46d2494c3171e17a3e923a27
homepage    : https://kde.org/plasma-desktop/
license     :
    - BSD-3-Clause
    - GPL-2.0-or-later
summary     : Plasma Vault
description : |
    Plasma applet and services for creating encrypted vaults
builddeps   :
    - binary(gocryptfs)
    - binary(python3)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - cmake(KF6DBusAddons)
    - cmake(KF6ItemModels)
    - cmake(KF6Kirigami)
    - cmake(KF6NetworkManagerQt)
    - cmake(KF6KIO)
    - cmake(KF6I18n)
    - cmake(KSysGuard)
    - cmake(Plasma)
    - cmake(PlasmaActivities)
    - cmake(Qt6Quick)
    - pkgconfig(gio-2.0)
    - pkgconfig(libnm)
rundeps     :
    - binary(gocryptfs)
    - kf6-kirigami
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
