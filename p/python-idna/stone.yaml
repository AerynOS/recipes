name        : python-idna
version     : "3.18"
release     : 5
homepage    : https://github.com/kjd/idna
upstreams   :
    - https://pypi.debian.net/idna/idna-3.18.tar.gz : ffb385a7e039654cef1ab9ef32c6fafe283c0c0467bba1d9029738ce4a14a848
