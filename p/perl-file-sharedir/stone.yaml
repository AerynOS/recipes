name        : perl-file-sharedir
version     : "1.118"
release     : 1
homepage    : https://metacpan.org/pod/File::ShareDir
upstreams   :
    - https://cpan.metacpan.org/authors/id/R/RE/REHSACK/File-ShareDir-1.118.tar.gz : 3bb2a20ba35df958dc0a4f2306fc05d903d8b8c4de3c8beefce17739d281c958
summary     : Locate per-dist and per-module shared files
description : |
    File::ShareDir allows you to access read-only data files that have been
    installed by a CPAN distribution as shared files.
license     : Artistic-1.0-Perl
builddeps   :
    - perl-file-sharedir-install
checkdeps   :
    - perl-class-inspector
rundeps     :
    - binary(perl)
    - perl-class-inspector
setup       : |
    %perl_setup
build       : |
    %make
install     : |
    %make_install
check       : |
    %make test
packages    :
    - "%(name)":
        paths:
            - /usr/share/man/man3
