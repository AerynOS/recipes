name        : pulseaudio-qt
version     : "1.8.1"
release     : 3
homepage    : https://invent.kde.org/libraries/pulseaudio-qt
upstreams   :
    - https://download.kde.org/stable/pulseaudio-qt/pulseaudio-qt-1.8.1.tar.xz : 79619c55b94808aa7d307fb234ad39a1096d088f21f806be0e788be79a76b3c9
summary     : Qt framework C++ bindings library for the PulseAudio sound system
description : |
    Qt framework C++ bindings library for the PulseAudio sound system
license     : LGPL-3.0-only
builddeps   :
    - cmake(ECM)
    - cmake(Qt6Qml)
    - pkgconfig(libpulse)
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-qt6":
        paths:
            - /usr/lib/libKF6PulseAudioQt.so.*

    - "%(name)-qt6-devel":
        rundeps:
            - "%(name)-qt6"
        paths:
            - /usr/include/KF6/
            - /usr/lib/cmake/KF6PulseAudioQt/
            - /usr/lib/pkgconfig/KF6PulseAudioQt.pc
            - /usr/lib/libKF6PulseAudioQt.so
