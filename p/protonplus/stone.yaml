name: protonplus
version: "0.5.20"
release: 1
homepage: https://github.com/Vysp3r/ProtonPlus
upstreams:
  - https://github.com/Vysp3r/ProtonPlus/archive/refs/tags/v0.5.20.tar.gz:
      hash: 824c7918636f2ba97b68f004cea3bf1da876dab6b39a80c049fc66e51621b660
summary: A modern compatibility tools manager for Linux
description: |
  ProtonPlus is a modern compatibility tools manager for Linux. It allows you to easily manage and update various compatibility tools like Proton, Wine, DXVK, and VKD3D across different launchers.
license:
  - GPL-3.0-or-later
  - GPL-3.0-only
builddeps:
  - binary(vala)
  - binary(msgfmt)
  - binary(update-desktop-database)
  - pkgconfig(gtk4)
  - pkgconfig(libadwaita-1)
  - pkgconfig(json-glib-1.0)
  - pkgconfig(libsoup-3.0)
  - pkgconfig(libarchive)
  - pkgconfig(gee-0.8)
setup: |
  %meson
build: |
  %meson_build
install: |
  %meson_install
