name        : gmmlib
version     : "22.10.0"
release     : 6
homepage    : https://github.com/intel/gmmlib/
upstreams   :
    - https://github.com/intel/gmmlib/archive/refs/tags/intel-gmmlib-22.10.0.tar.gz : 893e3c5a24b408ac312a0318b70f38f427f297646e323f31e79d3a06a92c1543
summary     : Intel(R) Graphics Memory Management Library
description : |
    Intel(R) Graphics Memory Management Library
license     : MIT
checkdeps   :
    - libgcc
setup       : |
    # This runs the test suite after the install for some odd reason
    %cmake \
        -DRUN_TEST_SUITE=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
tuning      :
    - lto: full
    - optimize: speed
