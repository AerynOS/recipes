name        : gnome-clocks
version     : "50.0"
release     : 5
homepage    : https://apps.gnome.org/Clocks/
upstreams   :
    - https://download.gnome.org/sources/gnome-clocks/50/gnome-clocks-50.0.tar.xz : bf167f7f44f4f2fb424d4716652c9ba1f29e16e49071e26a1bb833f8dce794c6
summary     : Keep track of time
description : |
    A simple and elegant clock application. It includes world clocks, alarms, a stopwatch, and timers.

    - Show the time in different cities around the world
    - Set alarms to wake you up
    - Measure elapsed time with an accurate stopwatch
    - Set timers to properly cook your food
license     : GPL-2.0-or-later
builddeps   :
    - binary(itstool)
    - binary(msgfmt)
    - binary(oggenc)
    - binary(update-desktop-database)
    - binary(valac)
    - pkgconfig(geocode-glib-2.0)
    - pkgconfig(gio-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(gnome-desktop-4)
    - pkgconfig(gobject-2.0)
    - pkgconfig(gtk4)
    - pkgconfig(gweather4)
    - pkgconfig(icu-i18n)
    - pkgconfig(icu-uc)
    - pkgconfig(libadwaita-1)
    - pkgconfig(libgeoclue-2.0)
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
