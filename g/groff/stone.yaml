name        : groff
version     : "1.24.1"
release     : 8
homepage    : https://www.gnu.org/software/groff/
upstreams   :
    - https://mirrors.rit.edu/gnu/groff/groff-1.24.1.tar.gz : 74e2819795b6aff431aeac983d63a9c8968eeaba2a2eba7df8ba4c7b41e7cfd8
summary     : groff (Typesetting package to read formatted files)
description : |
    groff (GNU troff) is a typesetting package which reads plain text mixed with formatting commands and produces formatted output
license     :
    - GPL-3.0-or-later
builddeps   :
    - binary(bison)
    - binary(lp)
    - binary(makeinfo)
setup       : |
    %configure
build       : |
    %make AR=llvm-ar
install     : |
    %make_install
    rm -rf %(installroot)/usr/share/info/dir
