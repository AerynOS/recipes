name        : groff
version     : "1.24.0"
release     : 7
homepage    : https://www.gnu.org/software/groff/
upstreams   :
    - https://mirrors.rit.edu/gnu/groff/groff-1.24.0.tar.gz : e79bbcd8ff3ed0200e7ac55d3962a15e118c1229990213025f2fc8b264727570
summary     : groff (Typesetting package to read formatted files)
description : |
    groff (GNU troff) is a typesetting package which reads plain text mixed with formatting commands and produces formatted output
license     :
    - GPL-3.0-or-later
builddeps   :
    - binary(bison)
    - binary(lp)
    - binary(makeinfo)
setup       : |
    %configure
build       : |
    %make AR=llvm-ar
install     : |
    %make_install
    rm -rf %(installroot)/usr/share/info/dir
