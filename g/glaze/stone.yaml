name        : glaze
version     : "7.8.4"
release     : 11
upstreams   :
    - https://github.com/stephenberry/glaze/archive/refs/tags/v7.8.4.tar.gz : 65331a8f8ffa56a3c5990eb31119db8afc1cec0b48de57b4ebbc9c1286ea74a3
