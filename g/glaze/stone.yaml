name        : glaze
version     : "7.8.2"
release     : 9
upstreams   :
    - https://github.com/stephenberry/glaze/archive/refs/tags/v7.8.2.tar.gz : a315bdc20bbdf23b0baae6c844818283aaab7c8ff0f88987f248bec51494d259
homepage    : https://github.com/stephenberry/glaze
license     : MIT
