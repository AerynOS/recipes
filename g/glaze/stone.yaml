name        : glaze
version     : "7.8.3"
release     : 10
upstreams   :
    - https://github.com/stephenberry/glaze/archive/refs/tags/v7.8.3.tar.gz : b10b9e932faf63eb6cbd16583f5673baf1fc0414fa1a775ddce4e8cf302542b7
homepage    : https://github.com/stephenberry/glaze
license     : MIT
summary     : Extremely fast, in memory, JSON and interface library for modern C++
description : |
    Extremely fast, in memory, JSON and interface library for modern C++
setup       : |
    # TODO: Get tests building
    %cmake \
        -DBUILD_TESTING=OFF
build       : |
    %cmake_build
