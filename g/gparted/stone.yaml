name        : gparted
version     : "1.8.1"
release     : 10
homepage    : https://gparted.org/
upstreams   :
    - https://sourceforge.net/projects/gparted/files/gparted/gparted-1.8.1/gparted-1.8.1.tar.gz : 67388ac405f9fe92a40636cb03b0e1e0bb6403ad89ccc174b2ff190ef6f32349
summary     : GParted is a free partition editor for graphically managing your disk partitions
description : |
    GParted is a free partition editor for graphically managing your disk partitions
license     : GPL-2.0-or-later
builddeps   :
    - binary(gettext)
    - binary(itstool)
    - binary(pkexec)
    - pkgconfig(gthread-2.0)
    - pkgconfig(gtkmm-3.0)
    - pkgconfig(libparted)
    - pkgconfig(polkit-agent-1) # Gettext ITS rules
    - pkgconfig(uuid)
rundeps     :
    - binary(mkfs.btrfs)
    - binary(xhost)
    - sysbinary(mkfs.bcachefs)
    - sysbinary(mkfs.exfat)
    - sysbinary(mkfs.ext4)
    - sysbinary(mkfs.f2fs)
    - sysbinary(mkfs.vfat)
    - sysbinary(mkfs.xfs)
setup       : |
    %configure \
        --enable-xhost-root
build       : |
    %make
install     : |
    %make_install
