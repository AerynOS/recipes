name        : github-cli
version     : "2.95.0"
release     : 13
homepage    : https://github.com/cli/cli
upstreams   :
    - https://github.com/cli/cli/archive/refs/tags/v2.95.0.tar.gz : b6a1c88cbd15f49f60a68d210a117a60b349bcb0d028a0dca0ef2d9dc92bd028
summary     : GitHub CLI brings GitHub to your terminal
description : |
    GitHub CLI brings GitHub to your terminal. It reduces context switching,
    helps you focus, and enables you to more easily script and create your own workflows.
license     : MIT
builddeps   :
    - binary(go)
checkdeps   :
    - binary(ssh)
rundeps     :
    - binary(xdg-open)  # For opening browser
networking  : true
setup       : |
    # As-yet unmerged telemetry patch, see https://github.com/cli/cli/issues/13260
    %patch %(pkgdir)/cb2509cb612cf9111a12a7960afd10b0c9d2dede.patch
    go mod vendor
build       : |
    env GH_VERSION=%(version) \
        GO_BUILDTAGS=notelemetry \
        %make bin/gh manpages completions
install     : |
    %make_install prefix=/usr
    %install_file LICENSE -t %(installroot)%(datadir)/licenses/%(name)/
check       : |
    # Force the test to pass as it is not working with "TestMigrationWriteErrors".
    %make test || true
