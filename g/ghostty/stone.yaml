name        : ghostty
version     : "1.3.0"
release     : 3
homepage    : https://github.com/ghostty-org/ghostty
upstreams   :
    - https://github.com/ghostty-org/ghostty/archive/refs/tags/v1.3.0.tar.gz : 3d05cbdb712ec19ecdc720a2757a09ebf79aaa8d90ae2ae5c0ddd5536ef31be6
summary     : Ghostty is a fast, feature-rich, and cross-platform terminal emulator that uses platform-native UI and GPU acceleration
description : |
    Ghostty is a terminal emulator that differentiates itself by being fast, feature-rich, and native. While there are many excellent terminal emulators available, they all force you to choose between speed, features, or native UIs. Ghostty provides all three.
license     : MIT
networking  : true
builddeps   :
    - binary(gettext)
    - binary(tic)
    - binary(pandoc)
    - binary(zig)
    - pkgconfig(blueprint-compiler)
    - pkgconfig(freetype2)
    - pkgconfig(gtk4)
    - pkgconfig(gtk4-layer-shell-0)
    - pkgconfig(harfbuzz)
    - pkgconfig(libadwaita-1)
    - pkgconfig(libhwy)
    - pkgconfig(libpng)
    - pkgconfig(libxml-2.0)
    - pkgconfig(oniguruma)
    - pkgconfig(zlib)
    - glslang-devel
environment : |
    export ZIG_GLOBAL_CACHE_DIR=%(builddir)/zig-cache
    export DESTDIR=%(installroot)
setup       : |
    ./nix/build-support/fetch-zig-cache.sh
build       : |
    zig build \
      -j%(jobs) \
      --prefix %(prefix) \
      --system "$ZIG_GLOBAL_CACHE_DIR/p" \
      --summary all \
      --verbose \
      -Doptimize=ReleaseFast \
      -Dcpu=x86_64_v2 \
      -Dversion-string="%(version)"
install     : |
    # `g/ghostty` already provided by ncurses
    rm -rv %(installroot)/usr/share/terminfo/g
