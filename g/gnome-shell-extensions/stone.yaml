name        : gnome-shell-extensions
version     : "50.1"
release     : 12
homepage    : https://apps.gnome.org/Extensions/
upstreams   :
    - https://download.gnome.org/sources/gnome-shell-extensions/50/gnome-shell-extensions-50.1.tar.xz : 46a5e4a5e6c458d39fb4235a6d8833cbdfbc6be60b09e0f0d780f1be6d5a1261
summary     : Manage your GNOME Extensions
description : |
    GNOME Extensions handles updating extensions, configuring extension preferences and removing or disabling unwanted extensions.
license     : GPL-2.0-or-later
builddeps   :
    - binary(msgfmt)
rundeps     :
    - gnome-menus # apps menu ext
    - libgtop # system monitor ext
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
