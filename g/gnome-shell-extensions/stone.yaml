name        : gnome-shell-extensions
version     : "50.2"
release     : 13
homepage    : https://apps.gnome.org/Extensions/
upstreams   :
    - https://download.gnome.org/sources/gnome-shell-extensions/50/gnome-shell-extensions-50.2.tar.xz : a1f1d6c528d2d2926e874dbe9db16ebbb9d189564f8a5dbef9b316ab048fa1d1
summary     : Manage your GNOME Extensions
description : |
    GNOME Extensions handles updating extensions, configuring extension preferences and removing or disabling unwanted extensions.
license     : GPL-2.0-or-later
builddeps   :
    - binary(msgfmt)
rundeps     :
    - gnome-menus # apps menu ext
    - libgtop # system monitor ext
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
