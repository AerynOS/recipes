name        : gnome-shell-extensions
version     : "50.0"
release     : 11
homepage    : https://apps.gnome.org/Extensions/
upstreams   :
    - https://download.gnome.org/sources/gnome-shell-extensions/50/gnome-shell-extensions-50.0.tar.xz : bb8b0ca4f27efb5f962caf5ea49d8b7ca7b5a9e7e44b3501fc9dde2fde27c067
summary     : Manage your GNOME Extensions
description : |
    GNOME Extensions handles updating extensions, configuring extension preferences and removing or disabling unwanted extensions.
license     : GPL-2.0-or-later
builddeps   :
    - binary(msgfmt)
rundeps     :
    - gnome-menus # apps menu ext
    - libgtop # system monitor ext
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
