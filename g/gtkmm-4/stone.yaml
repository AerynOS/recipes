name        : gtkmm-4
version     : "4.22.0"
release     : 10
homepage    : https://gtkmm.org
upstreams   :
    - https://download.gnome.org/sources/gtkmm/4.22/gtkmm-4.22.0.tar.xz : 2e8a21b4b0725f620e33aaee0cd343ed121b533275b632896619b1c89e96de67
summary     : gtkmm is the official C++ interface for the popular GUI library GTK
description : |
    gtkmm is the official C++ interface for the popular GUI library GTK. Highlights include typesafe callbacks, and a comprehensive set of widgets that are easily extensible via inheritance. You can create user interfaces either in code or with the Cambalache User Interface designer, using Gtk::Builder.
license     : LGPL-2.1-or-later
builddeps   :
    - binary(doxygen)
    - binary(m4)
    - binary(perl)
    - binary(python3)
    - binary(xsltproc)
    - pkgconfig(epoxy)
    - pkgconfig(gtk4)
    - pkgconfig(mm-common-libstdc++)
    - pkgconfig(pangomm-2.48)
    - pkgconfig(vulkan)
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
packages    :
    - "%(name)-devel":
        paths:
            - /usr/lib/gtkmm-4.0/
