name        : gnome-remote-desktop
version     : "50.1"
release     : 20
homepage    : https://gitlab.gnome.org/GNOME/gnome-remote-desktop
upstreams   :
    - https://download.gnome.org/sources/gnome-remote-desktop/50/gnome-remote-desktop-50.1.tar.xz : 089049119e1f2442fe9773f0285365cedc207f4cbc7ce9af388e153668e2b171
summary     : Remote desktop daemon for GNOME using pipewire
description : |
    Remote desktop server which allows you to connect to your machine remotely
license     :
    - GPL-2.0-or-later
builddeps   :
    - binary(a2x)
    - binary(glslc)
    - binary(msgfmt)
    - binary(mutter)
    - binary(spirv-opt)
    - pkgconfig(cairo)
    - pkgconfig(dbus-1)
    - pkgconfig(epoxy)
    - pkgconfig(fdk-aac)
    - pkgconfig(ffnvcodec)
    - pkgconfig(freerdp-client3)
    - pkgconfig(freerdp-server3)
    - pkgconfig(freerdp3)
    - pkgconfig(fuse3)
    - pkgconfig(gbm)
    - pkgconfig(gio-2.0)
    - pkgconfig(gio-unix-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(gudev-1.0)
    - pkgconfig(libdrm)
    - pkgconfig(libei-1.0)
    - pkgconfig(libnotify)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(libsecret-1)
    - pkgconfig(libva)
    - pkgconfig(libvncclient)
    - pkgconfig(opus)
    - pkgconfig(polkit-gobject-1)
    - pkgconfig(systemd)
    - pkgconfig(tss2-esys)
    - pkgconfig(tss2-mu)
    - pkgconfig(tss2-rc)
    - pkgconfig(tss2-tctildr)
    - pkgconfig(vulkan)
    - pkgconfig(winpr3)
    - pkgconfig(wireplumber-0.5)
    - pkgconfig(xkbcommon)
    - docbook
rundeps     :
    - binary(pipewire)
environment : |
    %export_docbook_catalogs
setup       : |
    %meson \
        -Drdp=true \
        -Dsystemd=true \
        -Dvnc=true
build       : |
    %meson_build
install     : |
    %meson_install
