name        : gtkmm
version     : "3.24.11"
release     : 5
homepage    : https://www.gtkmm.org
upstreams   :
    - https://download.gnome.org/sources/gtkmm/3.24/gtkmm-3.24.11.tar.xz : 19e383c82d5dd89db275e00b82864e90414d4c3fb3d100b2f996bcc2338a4cc7
summary     : C++ bindings for GTK
description : |
    gtkmm is the C++ binding for the GTK library.
license     : LGPL-2.1-or-later
builddeps   :
    - binary(m4)
    - binary(mm-common-get)
    - binary(perl)
    - binary(python3)
    - binary(xsltproc)
    - pkgconfig(atkmm-1.6)
    - pkgconfig(cairomm-1.0)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(pangomm-1.4)
packages    :
    - "%(name)-devel":
        paths:
            - /usr/lib/*/proc/*
            - /usr/lib/*/include/*
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
