name        : gpu-screen-recorder
version     : "5.12.5"
release     : 2
homepage    : https://git.dec05eba.com/gpu-screen-recorder/about/
license     : GPL-3.0-only
summary     : An extremely fast hardware-accelerated screen recorder
description : |
    GPU Screen Recorder is a high-performance screen recorder for Linux that
    minimizes system overhead by leveraging GPU hardware encoding. It can be
    used for local recording, streaming, and instant-replay workflows.
upstreams   :
    - https://dec05eba.com/snapshot/gpu-screen-recorder.git.5.12.5.tar.gz:
        hash: 3207bef976d130f8df465f4290304e226f82ce0c226b6a8cb9756e6316e15b79
        stripdirs: 0
builddeps   :
    - pkgconfig(dbus-1)
    - pkgconfig(libavcodec)
    - pkgconfig(libavfilter)
    - pkgconfig(libavformat)
    - pkgconfig(libcap)
    - pkgconfig(libdrm)
    - pkgconfig(libglvnd)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(libpulse)
    - pkgconfig(libva)
    - pkgconfig(vulkan)
    - pkgconfig(wayland-client)
    - pkgconfig(x11)
    - pkgconfig(xcomposite)
    - pkgconfig(xdamage)
    - pkgconfig(xrandr)
setup       : |
    %meson \
        -Dcapabilities=false
build       : |
    %meson_build
install     : |
    %meson_install
