name        : gamescope
version     : "3.16.25"
release     : 10
homepage    : https://github.com/ValveSoftware/gamescope
upstreams   :
    - git|https://github.com/ValveSoftware/gamescope.git : 17baf4abd1ab3353fb705e4d0d023f84e870f7e8
    - git|https://github.com/misyltoad/GamescopeShaders.git : 64d7a0570e15dc5c9aeef084278b9eb4cc1abb25
summary     : SteamOS session compositing window manager
description : |
    In an embedded session usecase, gamescope does the same thing as steamcompmgr, but with less extra copies and latency.
license     :
    - BSD-2-Clause
    - GPL-3.0-only
networking  : true
builddeps   :
    - binary(glslangValidator)
    - pkgconfig(catch2-with-main)
    - pkgconfig(egl)
    - pkgconfig(gbm)
    - pkgconfig(glesv2)
    - pkgconfig(hwdata)
    - pkgconfig(jsoncpp)
    - pkgconfig(lcms2)
    - pkgconfig(libcap)
    - pkgconfig(libdecor-0)
    - pkgconfig(libdisplay-info)
    - pkgconfig(libdrm)
    - pkgconfig(libeis-1.0)
    - pkgconfig(libinput)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(libseat)
    - pkgconfig(libudev)
    - pkgconfig(luajit)
    - pkgconfig(pixman-1)
    - pkgconfig(sdl2)
    - pkgconfig(vulkan)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-protocols)
    - pkgconfig(x11)
    - pkgconfig(xcb-errors)
    - pkgconfig(xcb-ewmh)
    - pkgconfig(xcomposite)
    - pkgconfig(xcursor)
    - pkgconfig(xdamage)
    - pkgconfig(xkbcommon)
    - pkgconfig(xmu)
    - pkgconfig(xres)
    - pkgconfig(xtst)
    - pkgconfig(xwayland)
    - pkgconfig(xxf86vm)
    # TODO: Use system glm
rundeps     :
    - binary(Xwayland)
setup       : |
    # Needed to populate the source properly. Otherwise we have errors due to empty source folders.
    git submodule init src/reshade
    git submodule init thirdparty/SPIRV-Headers
    git -c protocol.file.allow=always submodule update

    %meson \
        --wrap-mode=default \
        -Dforce_fallback_for="glm,libliftoff,stb,vkroots,wlroots" \
        -Dpipewire=enabled
build       : |
    %meson_build
install     : |
    %install_dir %(installroot)/usr/share/gamescope/reshade
    cp -rv %(workdir)/../GamescopeShaders.git/* %(installroot)/usr/share/gamescope/reshade/
    %meson_install --skip-subprojects

    # TODO: Add capabilities
packages    :
    - "%(name)":
        paths:
            - /usr/lib/*.so
