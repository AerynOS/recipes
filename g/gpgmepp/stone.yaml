name        : gpgmepp
version     : "2.1.0"
release     : 5
homepage    : https://gnupg.org/software/gpgme/index.html
upstreams   :
    - https://www.gnupg.org/ftp/gcrypt/gpgmepp/gpgmepp-2.1.0.tar.xz : 57f804468f0204504b172c6b139cb05124b4263be7ad514932c7c4c5062a16e2
summary     : GnuPG Made Easy library (C++ bindings)
description : |
    GnuPG Made Easy (GPGME) is a library designed to make access to GnuPG easier
    for applications. It provides a High-Level Crypto API for encryption,
    decryption, signing, signature verification and key management.
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
builddeps   :
    - pkgconfig(gpg-error)
    - pkgconfig(gpgme)
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
