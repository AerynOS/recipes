name        : gupnp
version     : "1.6.10"
release     : 3
upstreams   :
    - https://download.gnome.org/sources/gupnp/1.6/gupnp-1.6.10.tar.xz : a1ee07b7b12673c32d7fc73ca158a50c1a4dc69ab35b65e94d24d38ac875345e
homepage    : https://gitlab.gnome.org/GNOME/gupnp
license     : LGPL-2.1-or-later
summary     : GUPnP is an object-oriented open source framework for creating UPnP devices and control points.
description : |
    GUPnP is an object-oriented open source framework for creating UPnP devices and control points, written in C using GObject and libsoup. The GUPnP API is intended to be easy to use, efficient and flexible. It provides the same set of features as libupnp, but shields the developer from most of UPnP's internals.
builddeps   :
    - binary(gi-docgen)
    - binary(vapigen)
    - binary(xsltproc)
    - pkgconfig(gio-unix-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(gssdp-1.6)
    - pkgconfig(libxml-2.0)
    - docbook
    - docbook-xsl
environment : |
    %export_docbook_catalogs
setup       : |
    %meson \
        -Dcontext_manager=network-manager
build       : |
    %meson_build
install     : |
    %meson_install
packages    :
    - "%(name)-devel":
        paths:
            - /usr/bin/gupnp-binding-tool*
            - /usr/share/man/man1/gupnp-binding-tool-1*
            - /usr/share/vala/
