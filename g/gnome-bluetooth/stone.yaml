name        : gnome-bluetooth
version     : "47.2"
release     : 11
homepage    : https://gitlab.gnome.org/GNOME/gnome-bluetooth
upstreams   :
    - https://download.gnome.org/sources/gnome-bluetooth/47/gnome-bluetooth-47.2.tar.xz : 41f20e6d6176b72590af63552b232d83f2fffdd77ecfaa5eaf32c5a4a86fad64
summary     : GNOME library for interacting with bluez over D-BUS
description : |
    GNOME library for interacting with bluez over D-BUS
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
builddeps   :
    - binary(msgfmt)
    - pkgconfig(gio-2.0)
    - pkgconfig(gio-unix-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(gsound)
    - pkgconfig(gtk4)
    - pkgconfig(libadwaita-1)
    - pkgconfig(libnotify)
    - pkgconfig(libudev)
    - pkgconfig(upower-glib)
rundeps     :
    - bluez
    - bluez-obexd
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
