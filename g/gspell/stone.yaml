name        : gspell
version     : "1.14.4"
release     : 2
homepage    : https://gitlab.gnome.org/GNOME/gspell
upstreams   :
    - https://download.gnome.org/sources/gspell/1.14/gspell-1.14.4.tar.xz : e73a89d68c70f8748aefb6b0f5cfdfec3ff173cf4449837fd6cb17d1e9fcf486
summary     : Spell-checking library for GTK+ applications
description : |
    Spell-checking library for GTK+ applications
license     :
    - LGPL-2.1-or-later
builddeps   :
    - binary(gtkdoc-scan)
    - binary(vapigen)
    - pkgconfig(enchant-2)
    - pkgconfig(gio-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(gtk+-3.0)
    - docbook-xsl
environment : |
    %export_docbook_catalogs
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
