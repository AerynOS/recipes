name        : gspell
version     : "1.14.3"
release     : 1
homepage    : https://gitlab.gnome.org/GNOME/gspell
upstreams   :
    - git|https://gitlab.gnome.org/GNOME/gspell.git : 4781a91e2fa81f56f47b206cc1755d4053dc4d06
summary     : Spell-checking library for GTK+ applications
description : |
    Spell-checking library for GTK+ applications
license     :
    - LGPL-2.1-or-later
builddeps   :
    - binary(gtkdoc-scan)
    - binary(vapigen)
    - pkgconfig(enchant-2)
    - pkgconfig(gio-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(gtk+-3.0)
    - docbook-xsl
environment : |
    %export_docbook_catalogs
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
