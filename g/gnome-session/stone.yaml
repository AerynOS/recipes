name        : gnome-session
version     : "50.1"
release     : 30
homepage    : https://gitlab.gnome.org/GNOME/gnome-session
upstreams   :
    - https://download.gnome.org/sources/gnome-session/50/gnome-session-50.1.tar.xz : 6289b6afa44d3e4c999ce5761ff8b2c10ba309f55f9425f2b13f98208c81f6fb
summary     : GNOME session manager
description : |
    gnome-session contains the GNOME session manager, as well as a configuration program to choose applications starting on login.
license     :
    - GPL-2.0-or-later
builddeps   :
    - binary(msgfmt)
    - binary(xmlto)
    - binary(xsltproc)
    - pkgconfig(gnome-desktop-4)
    - pkgconfig(gtk4)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(upower-glib)
    - docbook
    - docbook-xsl
rundeps    :
    - binary(boltctl)
    - binary(gnome-keyring)
    - binary(switcherooctl)
    - binary(update-desktop-database)
    - binary(update-mime-database)
    - binary(xdg-open)
    - binary(xdg-user-dirs-gtk-update)
    - pciutils
    - power-profiles-daemon
    - sound-theme-freedesktop
    - wireplumber
environment : |
    %export_docbook_catalogs
setup      : |
    %meson
build      : |
    %meson_build
install    : |
    %meson_install

    # Default mimeapps for GNOME
    %install_file %(pkgdir)/gnome-mimeapps.list -t %(installroot)/usr/share/applications
