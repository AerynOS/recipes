name        : gtk-doc
version     : "1.36.0"
release     : 9
homepage    : https://download.gnome.org/sources/gtk-doc/1.34
upstreams   :
    - https://download.gnome.org/sources/gtk-doc/1.36/gtk-doc-1.36.0.tar.xz : 3b84bac36efbe59017469040dfee58f17cf0853b5f54dfae26347daf55b6d337
summary     : Documentation generator for C code
description : |
    GTK-Doc is used to document C code. It is typically used to document the public
    API of libraries, such as GLib-based libraries, but it can also be used to
    document application code.
license     : FDL-1.1
builddeps   :
    # binary(dblatex)
    # binary(fop)
    - binary(itstool)
    - binary(msgmerge)
    - binary(xsltproc)
    - pkgconfig(glib-2.0)
    - python(parameterized)
    - python(pygments)
rundeps     :
    - binary(xsltproc)
    - python(pygments)
    - docbook
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
paths       :
    - /*
