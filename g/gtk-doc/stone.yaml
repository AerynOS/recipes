name        : gtk-doc
version     : "1.36.1"
release     : 10
homepage    : https://gitlab.gnome.org/GNOME/gtk-doc
upstreams   :
    - https://download.gnome.org/sources/gtk-doc/1.36/gtk-doc-1.36.1.tar.xz : 0e517a5f97069831181be177516bde8aa8b3922398f2bdb09e265d22aecadbc5
summary     : Documentation generator for C code
description : |
    GTK-Doc is used to document C code. It is typically used to document the public
    API of libraries, such as GLib-based libraries, but it can also be used to
    document application code.
license     : FDL-1.1
builddeps   :
    # binary(dblatex)
    # binary(fop)
    - binary(itstool)
    - binary(msgmerge)
    - binary(xsltproc)
    - pkgconfig(glib-2.0)
    - python(parameterized)
    - python(pygments)
rundeps     :
    - binary(xsltproc)
    - python(pygments)
    - docbook
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
paths       :
    - /*
