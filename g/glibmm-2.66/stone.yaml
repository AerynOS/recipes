name        : glibmm-2.66
version     : "2.66.9"
release     : 5
homepage    : https://www.gtkmm.org
upstreams   :
    - https://download.gnome.org/sources/glibmm/2.66/glibmm-2.66.9.tar.xz : 5a026e5602085307c7dcb72b71b07261c40f80914277bef5f8d7f2ecab739bec
summary     : C++ bindings for GLib
description : |
    glibmm is the C++ binding for the GLib library.
license     : LGPL-2.1-or-later
builddeps   :
    - binary(m4)
    - binary(mm-common-get)
    - binary(perl)
    - binary(python3)
    - binary(xsltproc)
    - pkgconfig(gio-2.0)
    - pkgconfig(gio-unix-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(gmodule-2.0)
    - pkgconfig(gobject-2.0)
    - pkgconfig(sigc++-2.0)
packages    :
    - "%(name)-devel":
        paths:
            - /usr/lib/*/proc/*
            - /usr/lib/*/include/*
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
