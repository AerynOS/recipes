name        : gdm
version     : "50.0"
release     : 29
homepage    : https://gitlab.gnome.org/GNOME/gdm
upstreams   :
    - https://download.gnome.org/sources/gdm/50/gdm-50.0.tar.xz : 646f53d68f2d2d147146ffaeb85047ded8b813dcb1c104d8f0ec36ca609eb5bf
summary     : GNOME Display Manager
description : |
    Login/lock and session management with the GNOME Display Manager
license     :
    - GPL-2.0-or-later
builddeps   :
    - binary(itstool)
    - binary(msgmerge)
    - pkgconfig(accountsservice)
    - pkgconfig(check)
    - pkgconfig(dconf)
    - pkgconfig(gio-2.0)
    - pkgconfig(gio-unix-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(gobject-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(gudev-1.0)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(libkeyutils)
    - pkgconfig(pam)
    - pkgconfig(ply-boot-client)
    - pkgconfig(systemd)
    - pkgconfig(udev)
    - pkgconfig(xau)
    # - pkgconfig(audit)
rundeps     :
    - binary(gnome-session)
    - binary(gnome-shell)
    - gnome-settings-daemon
setup       : |
    %meson \
        -Ddbus-sys=%(datadir)/dbus-1/system.d \
        -Ddefault-pam-config=lfs \
        -Ddefault-path="/usr/local/bin:/usr/local/sbin:/usr/bin:/usr/sbin" \
        -Dgdm-xsession=true \
        -Dpam-mod-dir=%(libdir)/security \
        -Dpam-prefix=%(vendordir) \
        -Dplymouth=enabled \
        -Dx11-support=false
build       : |
    %meson_build
install     : |
    %meson_install

    # TODO: Finish stateless + dependencies
    %install_file %(pkgdir)/gdm.group %(installroot)%(libdir)/userdb/gdm.group
    ln -s gdm.group %(installroot)%(libdir)/userdb/21.group

    # TODO: Remove this
    # %install_file %(pkgdir)/gdm.user %(installroot)%(libdir)/userdb/gdm.user
    # ln -s gdm.user %(installroot)%(libdir)/userdb/21.user

    rm -v %(installroot)%(vendordir)/pam.d/*
    %install_file %(pkgdir)/pam/gdm-* -t %(installroot)%(vendordir)/pam.d/
    %install_file %(pkgdir)/org.gnome.login-screen.gschema.override %(installroot)/usr/share/glib-2.0/schemas/org.gnome.login-screen.gschema.override
packages    :
    - "%(name)":
        rundeps:
            - "%(name)-libs"

    - "%(name)-libs":
        paths:
            - /usr/lib/girepository-1.0/Gdm-1.0.typelib
            - /usr/lib/libgdm.so.*
            - /usr/share/glib-2.0/schemas/org.gnome.login-screen.gschema.*
