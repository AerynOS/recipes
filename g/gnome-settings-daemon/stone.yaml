name        : gnome-settings-daemon
version     : "50.0"
release     : 16
homepage    : https://gitlab.gnome.org/GNOME/gnome-settings-daemon
upstreams   :
    - https://download.gnome.org/sources/gnome-settings-daemon/50/gnome-settings-daemon-50.0.tar.xz : d82b50336c98a2ed713e9716c372125bb31bdfc2dae9d95baaef4d769d614fb6
summary     : Configures parameters of a GNOME session.
description : |
    The GNOME Settings Daemon is responsible for setting various parameters of a GNOME Session and the applications that run under it.
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
builddeps   :
    - binary(msgfmt)
    - binary(perl)
    - pkgconfig(alsa)
    - pkgconfig(colord)
    - pkgconfig(cups)
    - pkgconfig(gcr-4)
    - pkgconfig(geocode-glib-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(gnome-desktop-4)
    - pkgconfig(gsettings-desktop-schemas)
    - pkgconfig(gudev-1.0)
    - pkgconfig(gweather4)
    - pkgconfig(libcanberra)
    - pkgconfig(libgeoclue-2.0)
    - pkgconfig(libnm)
    - pkgconfig(libnotify)
    - pkgconfig(libpulse-mainloop-glib)
    - pkgconfig(libwacom)
    - pkgconfig(mm-glib)
    - pkgconfig(pango)
    - pkgconfig(polkit-gobject-1)
    - pkgconfig(systemd)
    - pkgconfig(upower-glib)
    - pkgconfig(wayland-client)
    - pkgconfig(x11)
    - pkgconfig(xfixes)
rundeps     :
    - cups-filters
setup       : |
    %patch %(pkgdir)/0001-Make-path-to-gnome-session-ctl-configurable.patch

    %meson \
        -Dgnomesessionpath=%(libdir)/gnome-session/gnome-session-ctl \
        -Dusb-protection=false
build       : |
    %meson_build
install     : |
    %meson_install

    %install_dir %(installroot)/usr/share/xdg/
    mv %(installroot)/etc/xdg/* %(installroot)/usr/share/xdg/
    rm -frv %(installroot)/etc
