name        : kdiff3
version     : "1.12.4"
release     : 4
upstreams   :
    - https://download.kde.org/stable/kdiff3/kdiff3-1.12.4.tar.xz : 4690a35aa933b192751dd590a6b4f53fef3aa950246371112ad6e872f6b26ecb
homepage    : https://apps.kde.org/kdiff3/
license     : GPL-2.0-or-later
summary     : Utility for comparing and merging files and directories
description : |
    kdiff3 is a 3-way text editor from KDE capable of comparing and merging two or three input files or directories. It is a supported git mergetool.
builddeps   :
    - cmake(Boost)
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6DocTools)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(KF6WidgetsAddons)
    - cmake(KF6XmlGui)
    - pkgconfig(icu-i18n)
    - pkgconfig(icu-uc)
rundeps     :
    - qt6-wayland
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-docs":
        paths:
            - /usr/share/doc
