name        : kmag
version     : "26.04.3"
release     : 12
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/kmag-26.04.3.tar.xz : 42a0245819c671f3ef23f80b1d75666045c9830bb287114fc73b3bd702d085ec
homepage    : https://apps.kde.org/kmag/
license     :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
summary     : KMag is a screen magnifier
description : |
    KMag is a screen magnifier
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Crash)
    - cmake(KF6DocTools)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(KF6XmlGui)
    - cmake(QAccessibilityClient6)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-docs":
        paths:
            - /usr/share/doc
