name        : kmag
version     : "26.04.0"
release     : 9
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.0/src/kmag-26.04.0.tar.xz : 4e38f67cf82797095fcab49fc8a0093c65e4948e15cbebded242288f28615b55
homepage    : https://apps.kde.org/kmag/
license     :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
summary     : KMag is a screen magnifier
description : |
    KMag is a screen magnifier
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Crash)
    - cmake(KF6DocTools)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(KF6XmlGui)
    - cmake(QAccessibilityClient6)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-docs":
        paths:
            - /usr/share/doc
