name        : kmag
version     : "25.12.3"
release     : 8
upstreams   :
    - https://download.kde.org/stable/release-service/25.12.3/src/kmag-25.12.3.tar.xz : fad2b53162bf0cd1bb751fcf6d6c88b1cd2f8ff43c7257657eeb0802646227ac
homepage    : https://apps.kde.org/kmag/
license     :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
summary     : KMag is a screen magnifier
description : |
    KMag is a screen magnifier
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Crash)
    - cmake(KF6DocTools)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(KF6XmlGui)
    - cmake(QAccessibilityClient6)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-docs":
        paths:
            - /usr/share/doc
