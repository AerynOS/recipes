name        : kvantum
version     : "1.1.8"
release     : 5
upstreams   :
    - https://github.com/tsujan/Kvantum/releases/download/V1.1.8/Kvantum-1.1.8.tar.xz : 7aa9099345e48048ebdad768f583944ac042f87b216fa0b26a169c7e05425047
homepage    : https://github.com/tsujan/Kvantum
license     : GPL-3.0-or-later
summary     : A Linux SVG-based theme engine for Qt6
description : |
    A Linux SVG-based theme engine for Qt6
builddeps   :
    - cmake(KF6WindowSystem)
    - cmake(Qt6Core)
    - cmake(Qt6LinguistTools)
    - cmake(Qt6Svg)
environment : |
    cd Kvantum
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
