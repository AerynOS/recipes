name        : kf6-kdoctools
version     : "6.25.0"
release     : 19
upstreams   :
    - https://download.kde.org/stable/frameworks/6.25/kdoctools-6.25.0.tar.xz : 2c5866257edda20f33c35f64a8bcab08de3dddb4e751bbbc2e09e941df979918
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
    - LGPL-2.1-only
summary     : Create documentation from DocBook
description : |
    Create documentation from DocBook
builddeps   :
