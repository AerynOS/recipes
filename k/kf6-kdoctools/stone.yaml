name        : kf6-kdoctools
version     : "6.24.0"
release     : 18
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/kdoctools-6.24.0.tar.xz : aee351c52f783813c6c114ade520c8578c570ee6dc25ecbd64c83e3d2d9660d4
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
    - LGPL-2.1-only
summary     : Create documentation from DocBook
description : |
    Create documentation from DocBook
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(KF6I18n)
    - pkgconfig(libxslt)
    - docbook
    - docbook-xsl
    - perl-uri
rundeps     :
    - docbook
    - docbook-xsl
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
