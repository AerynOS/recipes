name        : kf6-kdoctools
version     : "6.28.0"
release     : 22
upstreams   :
    - https://download.kde.org/stable/frameworks/6.28/kdoctools-6.28.0.tar.xz : 024914031fba7a9b79982d02736b21399d9a0d09ad81323d58e17d6b2216c7b0
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
    - LGPL-2.1-only
summary     : Create documentation from DocBook
