name        : kitty
version     : "0.46.2"
release     : 8
homepage    : https://github.com/kovidgoyal/kitty
upstreams   :
    - https://github.com/kovidgoyal/kitty/archive/refs/tags/v0.46.2.tar.gz : 25ca6725da2b09d574e571cad44292adaa278d154a89221207bdb598884c133e
summary     : Cross-platform, fast, feature-rich, GPU based terminal
description : |
    kitty the fast, feature-rich, GPU based terminal emulator
license     :
    - GPL-3.0-or-later
networking  : true
builddeps   :
    - binary(go)
    - binary(sphinx-build)
    - binary(tic)
    - pkgconfig(dbus-1)
    - pkgconfig(gl)
    - pkgconfig(harfbuzz)
    - pkgconfig(lcms2)
    - pkgconfig(libcrypto)
    - pkgconfig(libxxhash)
    - pkgconfig(python3)
    - pkgconfig(simde)
    - pkgconfig(wayland-protocols)
    - pkgconfig(wayland-scanner)
    - pkgconfig(xcursor)
    - pkgconfig(xi)
    - pkgconfig(xinerama)
    - pkgconfig(xkbcommon)
    - pkgconfig(xkbcommon-x11)
    - pkgconfig(xrandr)
    - python(pip)
    - font-symbols-nerd
build       : |
    export CGO_CPPFLAGS="${CPPFLAGS}"
    export CGO_CFLAGS="${CFLAGS}"
    export CGO_CXXFLAGS="${CXXFLAGS}"
    export CGO_LDFLAGS="${LDFLAGS}"
    export GOFLAGS="-buildmode=pie -trimpath -ldflags=-linkmode=external -mod=readonly -modcacherw"

    python -m pip install -r docs/requirements.txt
    %make
    %make linux-package
install     : |
    linux-package/bin/kitten __complete__ setup bash | %install_file /dev/stdin %(installroot)%(bashcompletionsdir)/kitty
    linux-package/bin/kitten __complete__ setup fish | %install_file /dev/stdin %(installroot)%(fishcompletionsdir)/kitty.fish
    linux-package/bin/kitten __complete__ setup zsh  | %install_file /dev/stdin %(installroot)%(zshcompletionsdir)/_kitty

    %install_dir %(installroot)%(prefix)
    cp -r linux-package/* %(installroot)%(prefix)

    %install_dir %(installroot)%(datadir)/licenses/%(name)
    %install_file LICENSE %(installroot)%(datadir)/licenses/%(name)/LICENSE
