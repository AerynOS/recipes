name        : kitty
version     : "0.47.2"
release     : 13
homepage    : https://github.com/kovidgoyal/kitty
upstreams   :
    - https://github.com/kovidgoyal/kitty/releases/download/v0.47.2/kitty-0.47.2.tar.xz : 810d9eaec88fb2d877330b21badf4ee4d72ffcab0a16572874bdd6ae13f4995a
summary     : Cross-platform, fast, feature-rich, GPU based terminal
description : |
    kitty the fast, feature-rich, GPU based terminal emulator
license     : GPL-3.0-or-later
networking  : true
builddeps   :
    - binary(go)
    - binary(python3)
    - binary(sphinx-build)
    - binary(tic)
    - pkgconfig(dbus-1)
    - pkgconfig(gl)
    - pkgconfig(harfbuzz)
    - pkgconfig(lcms2)
    - pkgconfig(libcrypto)
    - pkgconfig(libxxhash)
    - pkgconfig(python3)
    - pkgconfig(simde)
    - pkgconfig(wayland-protocols)
    - pkgconfig(wayland-scanner)
    - pkgconfig(xcursor)
    - pkgconfig(xi)
    - pkgconfig(xinerama)
    - pkgconfig(xkbcommon)
    - pkgconfig(xkbcommon-x11)
    - pkgconfig(xrandr)
    - python(sphinx-copybutton)
    - python(sphinx-inline-tabs)
    - font-symbols-nerd
build       : |
    export CGO_CFLAGS="${CFLAGS}"
    export CGO_CXXFLAGS="${CXXFLAGS}"
    export CGO_LDFLAGS="${LDFLAGS}"
    export GOFLAGS="-buildmode=pie -trimpath -ldflags=-linkmode=external -mod=readonly -modcacherw"

    python3 setup.py linux-package \
        --skip-building-kitten \
        --update-check-interval=0 \
        --verbose
    
    go build -o _build/bin/kitten ./tools/cmd
install     : |
    %install_exe _build/bin/kitten -t %(installroot)%(bindir)

    cp -r linux-package/. %(installroot)%(prefix)
    
    _build/bin/kitten __complete__ setup bash | %install_file /dev/stdin %(installroot)%(bashcompletionsdir)/kitty
    _build/bin/kitten __complete__ setup fish | %install_file /dev/stdin %(installroot)%(fishcompletionsdir)/kitty.fish
    _build/bin/kitten __complete__ setup zsh  | %install_file /dev/stdin %(installroot)%(zshcompletionsdir)/_kitty

    %install_dir %(installroot)%(datadir)/licenses/%(name)
    %install_file LICENSE %(installroot)%(datadir)/licenses/%(name)/LICENSE
packages     :
    - "%(name)":
        rundeps:
            - "terminfo-%(name)"

    - "terminfo-%(name)":
        summary: Terminfo for %(name)
        description: Terminfo for %(name), split out so that it can be used from ncurses
        paths:
            - /usr/share/terminfo/
