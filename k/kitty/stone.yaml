name        : kitty
version     : "0.48.0"
release     : 17
homepage    : https://sw.kovidgoyal.net/kitty/
upstreams   :
    - https://github.com/kovidgoyal/kitty/releases/download/v0.48.0/kitty-0.48.0.tar.xz : ef62a622fd40c3f51f7719a9bc18764b9c5e4e2babcadb7fb95d6c1d8ba68f82
summary     : Cross-platform, fast, feature-rich, GPU based terminal
description : |
    kitty the fast, feature-rich, GPU based terminal emulator
license     : GPL-3.0-or-later
networking  : true
builddeps   :
    - binary(go)
    - binary(python3)
    - binary(sphinx-build)
    - binary(tic)
    - pkgconfig(dbus-1)
    - pkgconfig(gl)
    - pkgconfig(harfbuzz)
    - pkgconfig(lcms2)
    - pkgconfig(libcrypto)
    - pkgconfig(libxxhash)
    - pkgconfig(python3)
    - pkgconfig(simde)
    - pkgconfig(wayland-protocols)
    - pkgconfig(wayland-scanner)
    - pkgconfig(xcursor)
    - pkgconfig(xi)
    - pkgconfig(xinerama)
    - pkgconfig(xkbcommon)
    - pkgconfig(xkbcommon-x11)
    - pkgconfig(xrandr)
    - python(sphinx-copybutton)
    - python(sphinx-inline-tabs)
    - font-symbols-nerd
setup       : |
    %go_mod
build       : |
    python3 setup.py linux-package \
        --skip-building-kitten \
        --update-check-interval=0 \
        --verbose

    go build -o _build/bin/kitten ./tools/cmd
install     : |
    %install_exe _build/bin/kitten -t %(installroot)%(bindir)

    cp -r linux-package/. %(installroot)%(prefix)
    
    _build/bin/kitten __complete__ setup bash | %install_file /dev/stdin %(installroot)%(bashcompletionsdir)/kitty
    _build/bin/kitten __complete__ setup fish | %install_file /dev/stdin %(installroot)%(fishcompletionsdir)/kitty.fish
    _build/bin/kitten __complete__ setup zsh  | %install_file /dev/stdin %(installroot)%(zshcompletionsdir)/_kitty

    %install_file LICENSE -t %(installroot)%(datadir)/licenses/%(name)/
packages     :
    - "%(name)":
        rundeps:
            - "terminfo-%(name)"

    - "terminfo-%(name)":
        summary: Terminfo for %(name)
        description: Terminfo for %(name), split out so that it can be used from ncurses
        paths:
            - /usr/share/terminfo/
