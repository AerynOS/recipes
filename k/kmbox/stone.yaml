name        : kmbox
version     : "26.04.2"
release     : 15
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/kmbox-26.04.2.tar.xz : 27e796610b7e7a2249b4673fd8a27b59c92d5a6fe1a9af9e35ecd6308cde8f15
homepage    : https://kde.org
license     : LGPL-2.1-or-later
summary     : KMBox provides API to access emails in storages in the MBox format
description : |
    KMBox provides API to access emails in storages in the MBox format.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KPim6Mime)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KPim6Mime)
