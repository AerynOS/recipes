name        : kmbox
version     : "26.04.3"
release     : 17
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/kmbox-26.04.3.tar.xz : ff39d6616f9d56a318cbb4e029bd42960f8a115579bdce7785e0af6f1fe5ee59
homepage    : https://kde.org
license     : LGPL-2.1-or-later
summary     : KMBox provides API to access emails in storages in the MBox format
description : |
    KMBox provides API to access emails in storages in the MBox format.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Mime)
setup       : |
    %patch %(pkgdir)/kf6kmime.patch
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KF6Mime)
