name        : kmbox
version     : "25.12.3"
release     : 12
upstreams   :
    - https://download.kde.org/stable/release-service/25.12.3/src/kmbox-25.12.3.tar.xz : 088e88b85686374da855215351e0e5248464921c8b546531d91b8dcef952ff93
homepage    : https://kde.org
license     : LGPL-2.1-or-later
summary     : KMBox provides API to access emails in storages in the MBox format
description : |
    KMBox provides API to access emails in storages in the MBox format.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KPim6Mime)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KPim6Mime)
