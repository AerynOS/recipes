name        : kf6-knewstuff
version     : "6.24.0"
release     : 23
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/knewstuff-6.24.0.tar.xz : 9759f4e158d1f466030131443201441b2f7cff12638a24f6184bdae4b08e2a05
homepage    : https://community.kde.org/Frameworks
license     :
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
summary     : Framework for downloading and sharing additional application data.
description : |
    Framework for downloading and sharing additional application data.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(KF6Attica)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6Kirigami2)
    - cmake(KF6Package)
    - cmake(KF6Syndication)
    - cmake(KF6WidgetsAddons)
    - cmake(Qt6CorePrivate)
rundeps     :
    - kf6-kirigami
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KF6Attica)
            - cmake(KF6CoreAddons)
