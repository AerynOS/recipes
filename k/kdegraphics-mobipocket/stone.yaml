name        : kdegraphics-mobipocket
version     : "25.12.3"
release     : 11
upstreams   :
    - https://download.kde.org/stable/release-service/25.12.3/src/kdegraphics-mobipocket-25.12.3.tar.xz : fbe6c0a2a15c124fa8f6052ec44329d3de2850018f4c25edbef8c163626b1e56
homepage    : https://invent.kde.org/graphics/kdegraphics-mobipocket
license     : GPL-2.0-or-later
summary     : Plugins for mobipocket
description : |
    A collection of plugins to handle mobipocket files.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Qt6Core5Compat)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
