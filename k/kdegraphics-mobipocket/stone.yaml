name        : kdegraphics-mobipocket
version     : "26.04.2"
release     : 14
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/kdegraphics-mobipocket-26.04.2.tar.xz : 118819389efd2d254e4e6586fd086ff3c4061199d77a873490cd2cc8c761e39a
homepage    : https://invent.kde.org/graphics/kdegraphics-mobipocket
license     : GPL-2.0-or-later
summary     : Plugins for mobipocket
description : |
    A collection of plugins to handle mobipocket files.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Qt6Core5Compat)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
