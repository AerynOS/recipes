name        : kdegraphics-mobipocket
version     : "26.04.3"
release     : 15
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/kdegraphics-mobipocket-26.04.3.tar.xz : 26cf058d441ec1a23768a47026960a0b7b77ca40dc7de51c89a9b4d463851f92
homepage    : https://invent.kde.org/graphics/kdegraphics-mobipocket
license     : GPL-2.0-or-later
summary     : Plugins for mobipocket
description : |
    A collection of plugins to handle mobipocket files.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Qt6Core5Compat)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
