name        : kdegraphics-mobipocket
version     : "26.04.0"
release     : 12
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.0/src/kdegraphics-mobipocket-26.04.0.tar.xz : 78b48775544dd4bc2bbec8c13c479eaa1668e50e420e8249b5eafd6f8f7311f9
homepage    : https://invent.kde.org/graphics/kdegraphics-mobipocket
license     : GPL-2.0-or-later
summary     : Plugins for mobipocket
description : |
    A collection of plugins to handle mobipocket files.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Qt6Core5Compat)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
