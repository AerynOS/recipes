name        : kitinerary
version     : "26.04.3"
release     : 29
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/kitinerary-26.04.3.tar.xz : 2a072650508a95a99647d0ad7d23e658d092270412573f5f819372149cb49f8c
homepage    : https://invent.kde.org/pim/kitinerary
license     : LGPL-2.1-or-later
summary     : Data Model and Extraction System for Travel Reservation information
description : |
    A library containing itinerary data model and itinerary extraction code.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CalendarCore)
    - cmake(KF6Contacts)
    - cmake(KF6I18n)
    - cmake(KF6Mime)
    - cmake(KPim6PkPass)
    - cmake(Qt6Qml)
    - cmake(libphonenumber)
    - pkgconfig(libxml-2.0)
    - pkgconfig(openssl)
    - pkgconfig(poppler)
    - pkgconfig(poppler-cpp)
    - pkgconfig(shared-mime-info)
    - pkgconfig(zlib)
    - pkgconfig(zxing)
setup       : |
    %patch %(pkgdir)/kf6kmime.patch
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
