name        : kitinerary
version     : "25.12.3"
release     : 20
upstreams   :
    - https://download.kde.org/stable/release-service/25.12.3/src/kitinerary-25.12.3.tar.xz : dd8374be2e4c488902f6c0b4b9fd12ad7f808de23b7df4561ef30b3f79b44d13
homepage    : https://invent.kde.org/pim/kitinerary
license     : LGPL-2.1-or-later
summary     : Data Model and Extraction System for Travel Reservation information
description : |
    A library containing itinerary data model and itinerary extraction code.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Contacts)
    - cmake(KF6CalendarCore)
    - cmake(KF6I18n)
    - cmake(KPim6Mime)
    - cmake(KPim6PkPass)
    - cmake(Qt6Qml)
    - pkgconfig(libxml-2.0)
    - pkgconfig(openssl)
    - pkgconfig(poppler)
    - pkgconfig(poppler-cpp)
    - pkgconfig(shared-mime-info)
    - pkgconfig(zxing)
    - pkgconfig(zlib)
    # TODO:
    # - libphonenumber
setup       : |
    %patch %(pkgdir)/ftbfs-poppler-26.04.patch
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
