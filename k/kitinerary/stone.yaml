name        : kitinerary
version     : "26.04.0"
release     : 22
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.0/src/kitinerary-26.04.0.tar.xz : 75a310debea448774265e312a71b5f3043d4e52d6f6f88a75aa4740bf3446f05
homepage    : https://invent.kde.org/pim/kitinerary
license     : LGPL-2.1-or-later
summary     : Data Model and Extraction System for Travel Reservation information
description : |
    A library containing itinerary data model and itinerary extraction code.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Contacts)
    - cmake(KF6CalendarCore)
    - cmake(KF6I18n)
    - cmake(KPim6Mime)
    - cmake(KPim6PkPass)
    - cmake(Qt6Qml)
    - cmake(libphonenumber)
    - pkgconfig(libxml-2.0)
    - pkgconfig(openssl)
    - pkgconfig(poppler)
    - pkgconfig(poppler-cpp)
    - pkgconfig(shared-mime-info)
    - pkgconfig(zxing)
    - pkgconfig(zlib)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
