name        : kitinerary
version     : "26.04.2"
release     : 26
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/kitinerary-26.04.2.tar.xz : 86eea983c969fa1fed2bdc22a46f800c02b66c512087da6f0072324d28e6d5c6
homepage    : https://invent.kde.org/pim/kitinerary
license     : LGPL-2.1-or-later
summary     : Data Model and Extraction System for Travel Reservation information
description : |
    A library containing itinerary data model and itinerary extraction code.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CalendarCore)
    - cmake(KF6Contacts)
    - cmake(KF6I18n)
    - cmake(KPim6Mime)
    - cmake(KPim6PkPass)
    - cmake(Qt6Qml)
    - cmake(libphonenumber)
    - pkgconfig(libxml-2.0)
    - pkgconfig(openssl)
    - pkgconfig(poppler)
    - pkgconfig(poppler-cpp)
    - pkgconfig(shared-mime-info)
    - pkgconfig(zlib)
    - pkgconfig(zxing)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
