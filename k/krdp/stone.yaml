name        : krdp
version     : "6.7.2"
release     : 26
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.2/krdp-6.7.2.tar.xz : 58c0cd6af601a37118999c3e0cabde25715521cbdd915244bf806b8439392659
homepage    : https://kde.org/plasma-desktop/
license     : LGPL-2.1-or-later
summary     : Library and examples for creating an RDP server
description : |
    Library and examples for creating an RDP server
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(FreeRDP)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6DBusAddons)
    - cmake(KF6GuiAddons)
    - cmake(KF6I18n)
    - cmake(KF6KCMUtils)
    - cmake(KF6StatusNotifierItem)
    - cmake(KPipeWire)
    - cmake(PlasmaWaylandProtocols)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Keychain)
    - cmake(Qt6Quick)
    - cmake(Qt6WaylandClient)
    - pkgconfig(pam)
    - kf6-kirigami-addons
rundeps     :
    - binary(openssl)
    - kf6-kirigami-addons
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
