name        : krdp
version     : "6.7.0"
release     : 24
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.0/krdp-6.7.0.tar.xz : e65ca56cf2f966994510dccecd53892922e261ad7dba9911d2f374060293c6db
homepage    : https://kde.org/plasma-desktop/
license     : LGPL-2.1-or-later
summary     : Library and examples for creating an RDP server
description : |
    Library and examples for creating an RDP server
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(FreeRDP)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6DBusAddons)
    - cmake(KF6GuiAddons)
    - cmake(KF6I18n)
    - cmake(KF6KCMUtils)
    - cmake(KF6StatusNotifierItem)
    - cmake(KPipeWire)
    - cmake(PlasmaWaylandProtocols)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Keychain)
    - cmake(Qt6Quick)
    - cmake(Qt6WaylandClient)
    - pkgconfig(pam)
    - kf6-kirigami-addons
rundeps     :
    - binary(openssl)
    - kf6-kirigami-addons
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
