name        : ksanecore
version     : "26.04.2"
release     : 11
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/ksanecore-26.04.2.tar.xz : 8f84a08f984055ced7a1a2051b9a2044d15c0a9523121a56aca66bfe5ab269d9
homepage    : https://invent.kde.org/libraries/ksanecore
license     :
    - LGPL-2.1-only
    - LGPL-3.0-only
summary     : Library providing logic to interface scanners
description : |
    KSaneCore is a library that provides a Qt interface for the SANE library for scanner hardware.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6I18n)
    - pkgconfig(sane-backends)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
