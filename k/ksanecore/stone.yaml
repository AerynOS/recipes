name        : ksanecore
version     : "26.04.3"
release     : 12
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/ksanecore-26.04.3.tar.xz : e5c96840ba21e7afa6e0635b21cc117552898b14628d9555f2a600c77884747d
homepage    : https://invent.kde.org/libraries/ksanecore
license     :
    - LGPL-2.1-only
    - LGPL-3.0-only
summary     : Library providing logic to interface scanners
description : |
    KSaneCore is a library that provides a Qt interface for the SANE library for scanner hardware.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6I18n)
    - pkgconfig(sane-backends)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
