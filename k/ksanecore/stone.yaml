name        : ksanecore
version     : "25.12.3"
release     : 8
upstreams   :
    - https://download.kde.org/stable/release-service/25.12.3/src/ksanecore-25.12.3.tar.xz : 60476b5e7ad764142cf69af1f827e9f7af8883eae3cbd3faa6d1a42d635ee282
homepage    : https://invent.kde.org/libraries/ksanecore
license     :
    - LGPL-2.1-only
    - LGPL-3.0-only
summary     : Library providing logic to interface scanners
description : |
    KSaneCore is a library that provides a Qt interface for the SANE library for scanner hardware.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6I18n)
    - pkgconfig(sane-backends)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
