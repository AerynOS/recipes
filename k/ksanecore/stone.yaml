name        : ksanecore
version     : "26.04.0"
release     : 9
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.0/src/ksanecore-26.04.0.tar.xz : 35091dc0b3ad4963e30aaecd63d76ba9a964c9817cf37a6506c2150138c3421a
homepage    : https://invent.kde.org/libraries/ksanecore
license     :
    - LGPL-2.1-only
    - LGPL-3.0-only
summary     : Library providing logic to interface scanners
description : |
    KSaneCore is a library that provides a Qt interface for the SANE library for scanner hardware.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6I18n)
    - pkgconfig(sane-backends)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
