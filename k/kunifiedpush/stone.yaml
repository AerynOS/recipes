    - cmake(KF6I18n)
    - cmake(KF6KCMUtils)
    - cmake(KF6Service)
    - cmake(KF6Solid)
    - cmake(Qt6WebSockets)
    - pkgconfig(openssl)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
