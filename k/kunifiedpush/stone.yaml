name        : kunifiedpush
version     : "26.04.2"
release     : 14
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/kunifiedpush-26.04.2.tar.xz : 15b6c7c463953b0d3b0ae8dfdde9dea41ae7eac77d036ca95db6f87d1a8a8fe1
homepage    : https://invent.kde.org/libraries/kunifiedpush
license     : LGPL-2.0-or-later
summary     : UnifiedPush client library
description : |
    UnifiedPush client library and distributor daemon
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6I18n)
    - cmake(KF6KCMUtils)
    - cmake(KF6Service)
    - cmake(KF6Solid)
    - cmake(Qt6WebSockets)
    - pkgconfig(openssl)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
