name        : kunifiedpush
version     : "26.04.0"
release     : 12
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.0/src/kunifiedpush-26.04.0.tar.xz : 0756dfc94de2bc065542e5c1e366dec2226615bfecc2993381a45051b1c24f03
homepage    : https://invent.kde.org/libraries/kunifiedpush
license     : LGPL-2.0-or-later
summary     : UnifiedPush client library
description : |
    UnifiedPush client library and distributor daemon
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6I18n)
    - cmake(KF6KCMUtils)
    - cmake(KF6Service)
    - cmake(KF6Solid)
    - cmake(Qt6WebSockets)
    - pkgconfig(openssl)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
