name        : kpmcore
version     : "26.04.0"
release     : 12
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.0/src/kpmcore-26.04.0.tar.xz : 085781d0dc68c9142fca11be0c746c4f4937fa49dcc4d6f97e20add117622b1a
homepage    : https://invent.kde.org/system/kpmcore
license     : GPL-3.0-or-later
summary     : Library for managing partitions
description : |
    Common code for KDE Partition Manager and other projects. Library for managing partitions.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6WidgetsAddons)
    - cmake(PolkitQt6-1)
    - pkgconfig(blkid)
# rundeps     :
#     - qt6-wayland
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
