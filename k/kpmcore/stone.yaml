name        : kpmcore
version     : "25.12.3"
release     : 11
upstreams   :
    - https://download.kde.org/stable/release-service/25.12.3/src/kpmcore-25.12.3.tar.xz : 2e6ff446448b6640e7290784519e19ad326d56f93f8e83cacd11d033197f3e62
homepage    : https://invent.kde.org/system/kpmcore
license     : GPL-3.0-or-later
summary     : Library for managing partitions
description : |
    Common code for KDE Partition Manager and other projects. Library for managing partitions.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6WidgetsAddons)
    - cmake(PolkitQt6-1)
    - pkgconfig(blkid)
# rundeps     :
#     - qt6-wayland
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
