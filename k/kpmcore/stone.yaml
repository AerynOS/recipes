name        : kpmcore
version     : "26.04.2"
release     : 14
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/kpmcore-26.04.2.tar.xz : 38ad9c1b52115858cd78fe76355d81bb4db84ad2c31b0933bcf58f4c85b51023
homepage    : https://invent.kde.org/system/kpmcore
license     : GPL-3.0-or-later
summary     : Library for managing partitions
description : |
    Common code for KDE Partition Manager and other projects. Library for managing partitions.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6WidgetsAddons)
    - cmake(PolkitQt6-1)
    - pkgconfig(blkid)
# rundeps     :
#     - qt6-wayland
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
