name        : kalk
version     : "26.04.0"
release     : 17
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.0/src/kalk-26.04.0.tar.xz : e1e3159cf6f34a8df65c53e81f9f69ce3d2a316596fb45b766fe8e7484f3f09e
homepage    : https://apps.kde.org/kalk/
license     :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
    - GPL-3.0-or-later
summary     : Convergent calculator for Plasma
description : |
    Convergent calculator for Plasma
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6Kirigami)
    - cmake(KF6UnitConversion)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
    - pkgconfig(libqalculate)
rundeps     :
    - kf6-kirigami
    - kf6-kirigami-addons
    - kf6-qqc2-desktop-style
    - kf6-sonnet
    - qt6-5compat
    - qt6-wayland
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
