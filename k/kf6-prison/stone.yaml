name        : kf6-prison
version     : "6.25.0"
release     : 20
upstreams   :
    - https://download.kde.org/stable/frameworks/6.25/prison-6.25.0.tar.xz : 9f4a8fa5732e45142c9ba2e35a38904d44193efc050e1ca20a414445c3a98b34
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - MIT
summary     : Qt api to produce QRCode barcode
description : |
    Qt api to produce QRCode barcode
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Multimedia)
    - cmake(Qt6Quick)
    - pkgconfig(libdmtx)
    - pkgconfig(libqrencode)
    - pkgconfig(zxing)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
