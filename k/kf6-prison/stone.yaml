name        : kf6-prison
version     : "6.28.0"
release     : 24
upstreams   :
    - https://download.kde.org/stable/frameworks/6.28/prison-6.28.0.tar.xz : ad24dd64b5150ec9ebc4df9734b4c2a58c27a588eafeb4239cdcef01629fe696
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - MIT
summary     : Qt api to produce QRCode barcode
description : |
    Qt api to produce QRCode barcode
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Multimedia)
    - cmake(Qt6Quick)
    - pkgconfig(libdmtx)
    - pkgconfig(libqrencode)
    - pkgconfig(zxing)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
