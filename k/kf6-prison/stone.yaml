name        : kf6-prison
version     : "6.27.0"
release     : 23
upstreams   :
    - https://download.kde.org/stable/frameworks/6.27/prison-6.27.0.tar.xz : 760903e9ae401f8bcdb9efc9ad6548982642e7411a223c8ceb41e5491a6b1135
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - MIT
summary     : Qt api to produce QRCode barcode
description : |
    Qt api to produce QRCode barcode
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Multimedia)
    - cmake(Qt6Quick)
    - pkgconfig(libdmtx)
    - pkgconfig(libqrencode)
    - pkgconfig(zxing)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
