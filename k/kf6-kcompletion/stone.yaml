name        : kf6-kcompletion
version     : "6.25.0"
release     : 17
upstreams   :
    - https://download.kde.org/stable/frameworks/6.25/kcompletion-6.25.0.tar.xz : e4138d525eb9e27a9222d655e412c0de8b4bd7b34289d1c7ca5a808e20b53238
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
summary     : Powerful completion framework, including completion-enabled lineedit and combobox.
description : |
    Powerful completion framework, including completion-enabled lineedit and combobox.
builddeps   :
