name        : kf6-kcompletion
version     : "6.24.0"
release     : 16
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/kcompletion-6.24.0.tar.xz : 1bdfb8f2dcb8da558d7210d7f21f054c4f0d934d69e86aed36675755ded370d5
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
summary     : Powerful completion framework, including completion-enabled lineedit and combobox.
description : |
    Powerful completion framework, including completion-enabled lineedit and combobox.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Codecs)
    - cmake(KF6Config)
    - cmake(KF6WidgetsAddons)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
