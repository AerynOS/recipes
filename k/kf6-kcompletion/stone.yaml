name        : kf6-kcompletion
version     : "6.28.0"
release     : 20
upstreams   :
    - https://download.kde.org/stable/frameworks/6.28/kcompletion-6.28.0.tar.xz : 8aa9cbc36139adfa8e3b2c744cc94714afe154d21cef8a3a2d5f4d311be7cc3c
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - LGPL-2.0-or-later
