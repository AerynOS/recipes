name        : kcalc
version     : "26.04.0"
release     : 13
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.0/src/kcalc-26.04.0.tar.xz : 5ea9601ada9752c8b10d0267b0322383f0f1d62fb7431163ba7cf99db4399a0e
homepage    : https://apps.kde.org/kcalc/
license     : GPL-2.0-or-later
summary     : Scientific calculator by KDE
description : |
    KCalc is a calculator which offers many more mathematical functions than meet the eye on a first glance.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6ColorScheme)
    - cmake(KF6Config)
    - cmake(KF6ConfigWidgets)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6DocTools)
    - cmake(KF6GuiAddons)
    - cmake(KF6I18n)
    - cmake(KF6IconThemes)
    - cmake(KF6Notifications)
    - cmake(KF6XmlGui)
    - pkgconfig(gmp)
    - pkgconfig(mpc)
    - pkgconfig(mpfr)
rundeps     :
    - qt6-wayland
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-docs":
        paths:
            - /usr/share/doc
