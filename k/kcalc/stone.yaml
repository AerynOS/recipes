name        : kcalc
version     : "26.04.2"
release     : 15
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/kcalc-26.04.2.tar.xz : dbdf29db1774d884e2d7ee543c6b919cd0f578dbd517a449a794bf854509b30d
homepage    : https://apps.kde.org/kcalc/
license     : GPL-2.0-or-later
summary     : Scientific calculator by KDE
description : |
    KCalc is a calculator which offers many more mathematical functions than meet the eye on a first glance.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6ColorScheme)
    - cmake(KF6Config)
    - cmake(KF6ConfigWidgets)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6DocTools)
    - cmake(KF6GuiAddons)
    - cmake(KF6I18n)
    - cmake(KF6IconThemes)
    - cmake(KF6Notifications)
    - cmake(KF6XmlGui)
    - pkgconfig(gmp)
    - pkgconfig(mpc)
    - pkgconfig(mpfr)
rundeps     :
    - qt6-wayland
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-docs":
        paths:
            - /usr/share/doc
