name        : kldap
version     : "26.04.2"
release     : 14
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/kldap-26.04.2.tar.xz : 5988a3e160ee7c5e4edffd442225a4685a55bbe8d81a7b12c290fb980899120f
homepage    : https://kde.org
license     : LGPL-2.1-or-later
summary     : Allows LDAP accessing with a convenient Qt style C++ API
description : |
    Allows LDAP accessing with a convenient Qt style C++ API.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6DocTools)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(Qt6Keychain)
    - pkgconfig(ldap)
    - pkgconfig(libsasl2)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
