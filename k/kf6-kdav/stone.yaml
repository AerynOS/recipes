name        : kf6-kdav
version     : "6.25.0"
release     : 11
upstreams   :
    - https://download.kde.org/stable/frameworks/6.25/kdav-6.25.0.tar.xz : a16c4cc1b21cdf2739e1ba20b77a5212b9daabc7e395259771dd077f5200f14b
homepage    : https://community.kde.org/Frameworks
