name        : kio-gdrive
version     : "26.04.2"
release     : 16
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/kio-gdrive-26.04.2.tar.xz : 69ffb8de72b97deec4986756d6a2cee50b3fdc0385a88a72b3927bbad18a3e3c
homepage    : https://apps.kde.org/kio_gdrive/
license     : GPL-2.0-only
summary     : KIO access for Google Drive
description : |
    KIO GDrive enables KIO-aware applications (such as Dolphin, Kate or Gwenview) to access and edit Google Drive files on the cloud.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KAccounts6)
    - cmake(KF6DocTools)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(KF6Notifications)
    - cmake(KF6Purpose)
    - cmake(KPim6GAPI)
rundeps     :
    - kaccounts-providers
    - accounts-qml-module-qt6 # QML dep
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
