name        : kscreenlocker
version     : "6.7.3"
release     : 25
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.3/kscreenlocker-6.7.3.tar.xz : 76d4bbb1201102e1b5dd34142c55006bf27f3ced39fa64c97a7f44bb1e534dfe
homepage    : https://kde.org/plasma-desktop/
license     : GPL-2.0-or-later
summary     : Library and components for secure lock screen architecture
description : |
    Library and components for secure lock screen architecture
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Crash)
    - cmake(KF6GlobalAccel)
    - cmake(KF6I18n)
    - cmake(KF6IdleTime)
    - cmake(KF6KCMUtils)
    - cmake(KF6KIO)
    - cmake(KF6Notifications)
    - cmake(KF6Package)
    - cmake(KF6Screen)
    - cmake(KF6Solid)
    - cmake(KF6Svg)
    - cmake(KF6WindowSystem)
    - cmake(KF6XmlGui)
    - cmake(LayerShellQt)
    - cmake(PlasmaQuick)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Quick)
    - pkgconfig(pam)
    - pkgconfig(wayland-server)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        paths:
            - /usr/share/dbus-1/interfaces
