name        : kf6-karchive
version     : "6.24.0"
release     : 18
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/karchive-6.24.0.tar.xz : b68faa1c9012e40bbed516d8bb6be21e743af5aafb0249a84c29a7d9ff150d0d
homepage    : https://community.kde.org/Frameworks
license     : LGPL-2.0-or-later
summary     : Reading, creating, and manipulating file archives.
description : |
    Reading, creating, and manipulating file archives.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - pkgconfig(bzip2)
    - pkgconfig(liblzma)
    - pkgconfig(openssl)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
