name        : kf6-karchive
version     : "6.27.0"
release     : 21
upstreams   :
    - https://download.kde.org/stable/frameworks/6.27/karchive-6.27.0.tar.xz : 434edf78df8f4c9f25000d107ad1520d7ac14db580a202047bf19cbf77376522
homepage    : https://community.kde.org/Frameworks
license     : LGPL-2.0-or-later
summary     : Reading, creating, and manipulating file archives.
description : |
    Reading, creating, and manipulating file archives.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - pkgconfig(bzip2)
    - pkgconfig(liblzma)
    - pkgconfig(openssl)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
