name        : kf6-karchive
version     : "6.28.0"
release     : 22
upstreams   :
    - https://download.kde.org/stable/frameworks/6.28/karchive-6.28.0.tar.xz : ff36137e6b171906b4bde4006558739c5d7771dc30b9a037b65e62b2674a1b13
homepage    : https://community.kde.org/Frameworks
license     : LGPL-2.0-or-later
summary     : Reading, creating, and manipulating file archives.
description : |
    Reading, creating, and manipulating file archives.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - pkgconfig(bzip2)
    - pkgconfig(liblzma)
    - pkgconfig(openssl)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
