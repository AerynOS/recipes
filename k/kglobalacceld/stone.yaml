name        : kglobalacceld
version     : "6.7.0"
release     : 24
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.0/kglobalacceld-6.7.0.tar.xz : ff5e36dcbcb8182f1b695062993a9ea2cc73d267536b2f5926de039fa7732c65
homepage    : https://kde.org/plasma-desktop/
license     :
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
summary     : Daemon providing Global Keyboard Shortcut (Accelerator) functionality
description : |
    Daemon providing Global Keyboard Shortcut (Accelerator) functionality
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6DBusAddons)
    - cmake(KF6GlobalAccel)
    - cmake(KF6KIO)
    - cmake(KF6Service)
    - cmake(KF6WindowSystem)
    - cmake(Qt6CorePrivate)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
