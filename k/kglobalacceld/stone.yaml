name        : kglobalacceld
version     : "6.7.1"
release     : 25
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.1/kglobalacceld-6.7.1.tar.xz : 0f2712ff1f5a4c443e2e1df703fb074e2d75da55f1fe039a0eec38a58708e7a7
homepage    : https://kde.org/plasma-desktop/
license     :
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
summary     : Daemon providing Global Keyboard Shortcut (Accelerator) functionality
description : |
    Daemon providing Global Keyboard Shortcut (Accelerator) functionality
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6DBusAddons)
    - cmake(KF6GlobalAccel)
    - cmake(KF6KIO)
    - cmake(KF6Service)
    - cmake(KF6WindowSystem)
    - cmake(Qt6CorePrivate)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
