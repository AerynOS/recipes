name        : kf6-kservice
version     : "6.27.0"
release     : 21
upstreams   :
    - https://download.kde.org/stable/frameworks/6.27/kservice-6.27.0.tar.xz : 3736c6d6cd389efc89adbcb64fe7ba25ffc9d62eb8eaf6393f42bb85f655a8c7
