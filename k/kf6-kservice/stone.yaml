name        : kf6-kservice
version     : "6.24.0"
release     : 18
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/kservice-6.24.0.tar.xz : f7b3e5fab52949d16c0fce96afc5aaeb1cc94b47536e024d580750ffb1739723
homepage    : https://community.kde.org/Frameworks
license     :
    - GPL-2.0-only
    - LGPL-2.0-only
    - LGPL-2.0-or-later
summary     : Plugin framework for desktop services.
description : |
    Plugin framework for desktop services.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6DocTools)
    - cmake(KF6I18n)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
