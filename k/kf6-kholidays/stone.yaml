name        : kf6-kholidays
version     : "6.25.0"
release     : 17
upstreams   :
    - https://download.kde.org/stable/frameworks/6.25/kholidays-6.25.0.tar.xz : 13c345422f802bd157aaea18b2ccb5270eb5e3de44915bcce70f1a4234e1497b
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-2-Clause
    - BSD-3-Clause
    - GPL-3.0-or-later
    - LGPL-2.0-or-later
summary     : KDE library for regional holiday information
description : |
    KDE library for regional holiday information
builddeps   :
    - binary(bison)
    - binary(flex)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Qt6Qml)
    - cmake(Qt6CorePrivate)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
