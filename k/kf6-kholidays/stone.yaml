name        : kf6-kholidays
version     : "6.28.0"
release     : 21
upstreams   :
    - https://download.kde.org/stable/frameworks/6.28/kholidays-6.28.0.tar.xz : 6960e2040c148d878466f40c1c3bdcfa8c84fff456f4c8ce7456065bd0745d6c
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-2-Clause
    - BSD-3-Clause
    - GPL-3.0-or-later
    - LGPL-2.0-or-later
summary     : KDE library for regional holiday information
