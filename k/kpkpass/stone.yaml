name        : kpkpass
version     : "26.04.2"
release     : 17
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/kpkpass-26.04.2.tar.xz : 75e5d6a591d35edb56ff5a03793d50be7c62790b2cfccb88d72ecc68742323d0
homepage    : https://invent.kde.org/pim/kpkpass
license     : LGPL-2.1-or-later
summary     : Apple Wallet Pass reader
description : |
    Library to deal with Apple Wallet pass files.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(Qt6Qml)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KF6Archive)
