name        : kpkpass
version     : "25.12.3"
release     : 14
upstreams   :
    - https://download.kde.org/stable/release-service/25.12.3/src/kpkpass-25.12.3.tar.xz : f916bdc37c11740cc527ee76a1326d3457ed9bf153d609cdb5ea7bb581885df9
homepage    : https://invent.kde.org/pim/kpkpass
license     : LGPL-2.1-or-later
summary     : Apple Wallet Pass reader
description : |
    Library to deal with Apple Wallet pass files.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(Qt6Qml)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KF6Archive)
