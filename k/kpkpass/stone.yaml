name        : kpkpass
version     : "26.04.0"
release     : 15
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.0/src/kpkpass-26.04.0.tar.xz : b083a39b141cf292b762d8bf2d2a0b390d92659748e09e686f070e16efdc6cc0
homepage    : https://invent.kde.org/pim/kpkpass
license     : LGPL-2.1-or-later
summary     : Apple Wallet Pass reader
description : |
    Library to deal with Apple Wallet pass files.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(Qt6Qml)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KF6Archive)
