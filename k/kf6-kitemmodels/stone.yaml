name        : kf6-kitemmodels
version     : "6.24.0"
release     : 15
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/kitemmodels-6.24.0.tar.xz : 6636bf47de0df2464a94691a1092340efba2abc91fb305253bbb9058af959727
homepage    : https://community.kde.org/Frameworks
license     :
    - LGPL-2.0-or-later
