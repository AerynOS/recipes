name        : kmime
version     : "26.04.2"
release     : 16
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/kmime-26.04.2.tar.xz : 7473522f42d84684cd71fe7549cc668a1fcfd91716a72860dc9bcbaa8569ed6d
homepage    : https://kde.org
license     : LGPL-2.1-or-later
summary     : KMime is a library for handling mail messages and newsgroup articles
description : |
    KMime is a library for handling mail messages and newsgroup articles.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Codecs)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install

    # Temporary, make co-installable with kmime
    rm -rfv %(installroot)%(datadir)/locale \
            %(installroot)%(datadir)/qlogg*
    find %(installroot) -type d -empty -print -delete
packages    :
    - "%(name)":
        rundeps:
            - kf6-kmime

    - "%(name)-devel":
        rundeps:
            - kf6-kmime-devel
            - cmake(KF6Codecs)
