name        : kmime
version     : "26.04.3"
release     : 17
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/kmime-26.04.3.tar.xz : a118b0d3b3ad2ebb35f73c675cffff575cd1b36ff5875d4f9fd4bce884bbae8a
homepage    : https://kde.org
license     : LGPL-2.1-or-later
summary     : KMime is a library for handling mail messages and newsgroup articles
description : |
    KMime is a library for handling mail messages and newsgroup articles.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Codecs)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install

    # Temporary, make co-installable with kmime
    rm -rfv %(installroot)%(datadir)/locale \
            %(installroot)%(datadir)/qlogg*
    find %(installroot) -type d -empty -print -delete
packages    :
    - "%(name)":
        rundeps:
            - kf6-kmime

    - "%(name)-devel":
        rundeps:
            - kf6-kmime-devel
            - cmake(KF6Codecs)
