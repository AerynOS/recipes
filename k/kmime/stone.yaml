name        : kmime
version     : "26.04.0"
release     : 13
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.0/src/kmime-26.04.0.tar.xz : ce8d5c95f8beaa1dc11201d1ee903689955455247c76cdaf8ef17400bffd4ad1
homepage    : https://kde.org
license     : LGPL-2.1-or-later
summary     : KMime is a library for handling mail messages and newsgroup articles
description : |
    KMime is a library for handling mail messages and newsgroup articles.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Codecs)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KF6Codecs)
