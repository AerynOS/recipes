name        : kdecoration
version     : "6.7.1"
release     : 21
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.1/kdecoration-6.7.1.tar.xz : 3a5d8f57bab452eabd1aadc45088b95a669a951626c7e601f6a0ef36030684bf
homepage    : https://kde.org/plasma-desktop/
license     : LGPL-2.1-only
summary     : Plugin based library to create window decorations
