name        : kdecoration
version     : "6.7.3"
release     : 23
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.3/kdecoration-6.7.3.tar.xz : 69690713d2216323dae96d61d74e087bd9e5e5b3effcf1c54f7a3e823672d0e7
homepage    : https://kde.org/plasma-desktop/
license     : LGPL-2.1-only
summary     : Plugin based library to create window decorations
description : |
    Plugin based library to create window decorations
