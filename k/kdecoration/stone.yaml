name        : kdecoration
version     : "6.6.3"
release     : 17
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.3/kdecoration-6.6.3.tar.xz : 0760e182234d79b3a693d12920284c9b864c437f797dbcd526188d761b7de3e9
homepage    : https://kde.org/plasma-desktop/
license     : LGPL-2.1-only
summary     : Plugin based library to create window decorations
description : |
    Plugin based library to create window decorations
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6I18n)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
