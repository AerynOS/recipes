name        : kdecoration
version     : "6.7.2"
release     : 22
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.2/kdecoration-6.7.2.tar.xz : c82e28e59d2cc2e31ae38e3bc48579528214ba3da2d13a2b71a65bdc0dc47771
homepage    : https://kde.org/plasma-desktop/
license     : LGPL-2.1-only
summary     : Plugin based library to create window decorations
description : |
    Plugin based library to create window decorations
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6I18n)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
