name        : kdecoration
version     : "6.7.0"
release     : 20
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.0/kdecoration-6.7.0.tar.xz : acfe5657d889bf0dd5b8b50132bbe9c62f48b5074fcba8265a1cb84d6c227b5d
homepage    : https://kde.org/plasma-desktop/
license     : LGPL-2.1-only
summary     : Plugin based library to create window decorations
description : |
    Plugin based library to create window decorations
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6I18n)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
