name        : kdecoration
version     : "6.6.2"
release     : 16
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.2/kdecoration-6.6.2.tar.xz : e7f761edb07d31afeae6c013db641a9807277137db2c7121b6c3374777374250
homepage    : https://kde.org/plasma-desktop/
license     : LGPL-2.1-only
summary     : Plugin based library to create window decorations
description : |
    Plugin based library to create window decorations
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6I18n)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
