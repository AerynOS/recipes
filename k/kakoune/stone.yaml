name        : kakoune
version     : "2026.05.21"
release     : 6
homepage    : https://kakoune.org
upstreams   :
    - https://github.com/mawww/kakoune/releases/download/v2026.05.21/kakoune-2026.05.21.tar.bz2 : be1deb3fe9808a0733ab1057309da380bb757307e8fdbb22dc478b674b6bad34
summary     : mawww's experiment for a better code editor
description : |
    mawww's experiment for a better code editor
license     : Unlicense
rundeps     :
    - binary(find)
    - binary(sed)
setup       : |
    %patch %(pkgdir)/libexec.patch
build       : |
    %make \
        CXX="%(cxx)" \
        CXXFLAGS-debug-no=""
install     : |
    %make_install \
        PREFIX=/usr \
        libexecdir="%(installroot)%(libdir)/kak"
