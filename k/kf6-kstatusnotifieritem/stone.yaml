name        : kf6-kstatusnotifieritem
version     : "6.24.0"
release     : 18
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/kstatusnotifieritem-6.24.0.tar.xz : f76c77dcc27a60007330329a6d6c60298c11ddddba82f710a90715ec81f886ff
homepage    : https://community.kde.org/Frameworks
license     : LGPL-2.0-or-later
summary     : Implementation of Status Notifier Items
description : |
    Implementation of Status Notifier Items
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6WindowSystem)
setup       : |
    %cmake_kf6 -DBUILD_PYTHON_BINDINGS=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        paths:
            - /usr/share/dbus-1/interfaces/
