name        : kclock
version     : "26.04.2"
release     : 23
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/kclock-26.04.2.tar.xz : 9f5c998462316df456a7e9413b039300003f421e72ad40b3b393e43f6c958558
homepage    : https://apps.kde.org/kclock/
license     : GPL-2.0-or-later
summary     : Clock app for KDE Plasma
description : |
    A convergent clock for KDE Plasma desktop and mobile
    Features
        - Alarms
        - Stopwatch
        - World Clocks
        - Timers
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6DBusAddons)
    - cmake(KF6I18n)
    - cmake(KF6JobWidgets)
    - cmake(KF6KIO)
    - cmake(KF6Kirigami)
    - cmake(KF6KirigamiAddons)
    - cmake(KF6Notifications)
    - cmake(KF6StatusNotifierItem)
    - cmake(KF6Svg)
    - cmake(Plasma)
    - cmake(PlasmaWaylandProtocols)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Multimedia)
    - cmake(Qt6QuickControls2)
    - cmake(Qt6Svg)
    - pkgconfig(wayland-protocols)
rundeps     :
    - kf6-kirigami-addons
    - qt6-wayland
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
