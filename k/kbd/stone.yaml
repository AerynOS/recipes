name        : kbd
version     : "2.10.0"
release     : 10
homepage    : https://kbd-project.org/
upstreams   :
    - https://mirrors.edge.kernel.org/pub/linux/utils/kbd/kbd-2.10.0.tar.xz : 6e5ca4f8d76ee9e3a8db700b667f13e12aac9933828a64e1aaad93d26be9b479
summary     : Linux keyboard tools
description : |
    The kbd project contains utilities for managing Linux console (Linux console, virtual terminals, keyboard, etc.)
license     : GPL-2.0-or-later
builddeps   :
    - binary(bison)
    - binary(doxygen)
    - binary(flex)
    - binary(gzip)
    - binary(msgfmt)
    - binary(xgettext)
    - pkgconfig(bzip2)
    - pkgconfig(liblzma)
    - pkgconfig(libzstd)
    - pkgconfig(pam)
    - pkgconfig(xkbcommon)
    - pkgconfig(zlib)
rundeps     :
    - binary(gzip)
    - terminus-font
setup       : |
    # TODO: This now supports zstd compression (dlopening the shared lib). Switch to that (requires changes to the kernel recipes)
    %configure \
        --datadir=%(datadir)/kbd
build       : |
    %make
install     : |
    %make_install

    # PAM configuration
    %install_file %(pkgdir)/vlock.pam %(installroot)/%(vendordir)/pam.d/vlock
