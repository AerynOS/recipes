name        : kf6-kiconthemes
version     : "6.24.0"
release     : 22
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/kiconthemes-6.24.0.tar.xz : 5fee1141ac94693b94b6f80e52eb26ed99c81816c64eb520abffa0e1e7ed5956
homepage    : https://community.kde.org/Frameworks
license     :
    - GPL-2.0-only
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
summary     : Icon GUI utilities.
description : |
    Icon GUI utilities.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(KF6BreezeIcons)
    - cmake(KF6ColorScheme)
    - cmake(KF6I18n)
    - cmake(KF6WidgetsAddons)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
    - cmake(Qt6Svg)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
