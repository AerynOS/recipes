name        : kjournald
version     : "25.12.3"
release     : 12
upstreams   :
    - https://download.kde.org/stable/release-service/25.12.3/src/kjournald-25.12.3.tar.xz : 246ac352318d3febacc2b64ff0638982996ec91524abcb3d19c9757199bfd5e4
homepage    : https://apps.kde.org/kjournaldbrowser/
license     : GPL-2.0-or-later
summary     : Framework for interacting with systemd-journald
description : |
    Framework for interacting with systemd-journald
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6I18n)
    - cmake(KF6Kirigami)
    - cmake(KF6KirigamiAddons)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
    - pkgconfig(libsystemd)
rundeps     :
    - kf6-qqc2-desktop-style
    - qt6-wayland
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)":
        paths:
            - /usr/lib/libkjournald.so
