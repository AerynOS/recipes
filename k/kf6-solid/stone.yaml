name        : kf6-solid
version     : "6.25.0"
release     : 25
upstreams   :
    - https://download.kde.org/stable/frameworks/6.25/solid-6.25.0.tar.xz : 8177fa8f139b855856e171426c5f2adb96d727e62e6ec536675da11aa157b33e
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - LGPL-2.1-only
    - LGPL-2.1-or-later
summary     : Desktop hardware abstraction.
description : |
    Desktop hardware abstraction.
builddeps   :
    - binary(bison)
    - binary(flex)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Qt6CorePrivate)
    - pkgconfig(libimobiledevice-1.0)
    - pkgconfig(libplist-2.0)
    - pkgconfig(mount)
    # TODO add mediaplayerinfo
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)":
        rundeps:
            - udisks
            - udisks-btrfs
            - udisks-lvm2
            - upower
