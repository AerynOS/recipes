name        : kf6-kmime
version     : "6.28.0"
release     : 2
upstreams   :
    - https://download.kde.org/stable/frameworks/6.28/kmime-6.28.0.tar.xz : e5c5910b4ae0e9bd56a805f7c14767ce4f301f2b99d142decc2088c58bab419a
homepage    : https://kde.org
license     : LGPL-2.1-or-later
summary     : KMime is a library for handling mail messages and newsgroup articles
description : |
    KMime is a library for handling mail messages and newsgroup articles.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Codecs)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KF6Codecs)
