name        : kf6-kpty
version     : "6.24.0"
release     : 15
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/kpty-6.24.0.tar.xz : 27aff14f8211a8873008fd528998727523d98bb5d5018f48a0509ef5792b8319
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
summary     : Interfacing with pseudo terminal devices
description : |
    Interfacing with pseudo terminal devices
builddeps   :
