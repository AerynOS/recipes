name        : kf6-kcrash
version     : "6.27.0"
release     : 18
upstreams   :
    - https://download.kde.org/stable/frameworks/6.27/kcrash-6.27.0.tar.xz : f8e1083863dac2c07068b10614ca7d4b52c6920df0228854cfc37e0d6578d902
homepage    : https://community.kde.org/Frameworks
