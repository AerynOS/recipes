name        : kf6-kcrash
version     : "6.28.0"
release     : 19
upstreams   :
    - https://download.kde.org/stable/frameworks/6.28/kcrash-6.28.0.tar.xz : ddcc14c0c40e24f4c0dc04246b87d11b650e6fd8be2cb00e4f2cc2ee9e605702
