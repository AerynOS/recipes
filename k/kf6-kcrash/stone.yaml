name        : kf6-kcrash
version     : "6.24.0"
release     : 15
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/kcrash-6.24.0.tar.xz : 4544428c3c96587e46342daf5b1f083dd7950c7bc940d7bc7921300600ef8074
homepage    : https://community.kde.org/Frameworks
license     : LGPL-2.0-or-later
summary     : Graceful handling of application crashes.
description : |
    Graceful handling of application crashes.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - pkgconfig(x11)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
