name        : kf6-breeze-icons
version     : "6.28.0"
release     : 21
upstreams   :
    - https://download.kde.org/stable/frameworks/6.28/breeze-icons-6.28.0.tar.xz : 45de8138ead0f3ff24de886fbe61d588ecd7f66dde6f8cf6f2906279254d094d
homepage    : https://community.kde.org/Frameworks
license     : LGPL-3.0-or-later
summary     : Breeze icon theme
description : |
    Breeze-icons is a freedesktop.org compatible icon theme.
builddeps   :
    - binary(gtk-update-icon-cache)
    - binary(python3)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - python(lxml)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install

    for i in %(installroot)%(datadir)/icons/*/; do
        gtk-update-icon-cache -f $i
    done
packages    :
    # Separate out the icons because in the future KF7 could be providing the icon theme while we still build the KF6 library
    - "breeze-icons":
        paths:
            - /usr/share/icons/
    - "%(name)":
        rundeps:
            - breeze-icons
