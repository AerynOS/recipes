name        : kf6-kirigami
version     : "6.24.0"
release     : 25
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/kirigami-6.24.0.tar.xz : 7b3247dfe349867d44244335beb8d549ad4a8f6b3179d1736d231512dea5b0ce
homepage    : https://community.kde.org/Frameworks
license     : LGPL-2.0-or-later
summary     : QtQuick components for mobile and desktop UI development.
description : |
    Kirigami is a set of QtQuick components for the creation of applications that look and feel great on mobile as well as desktop devices and follow the Kirigami Human Interface Guidelines.
builddeps   :
    - binary(bzip2)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Quick)
    - cmake(Qt6ShaderTools)
    - cmake(Qt6Svg)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        paths:
            - /usr/share/kdevappwizard
