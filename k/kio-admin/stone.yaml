name        : kio-admin
version     : "26.04.0"
release     : 9
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.0/src/kio-admin-26.04.0.tar.xz : 843d321ca5bf902462f3906fb94768ab799aa354a31841761f71d090c5cbcdc0
homepage    : https://invent.kde.org/system/kio-admin
license     : GPL-2.0-or-later
summary     : Manage files as administrator using the admin:// KIO protocol.
description : |
    Manage files as administrator using the admin:// KIO protocol.
builddeps   :
