name        : kio-admin
version     : "25.12.3"
release     : 8
upstreams   :
    - https://download.kde.org/stable/release-service/25.12.3/src/kio-admin-25.12.3.tar.xz : b85d0c63d5dc032049e2bc52ddb21322ecf596e1ab47a764cca28f457e4daee0
homepage    : https://invent.kde.org/system/kio-admin
license     : GPL-2.0-or-later
summary     : Manage files as administrator using the admin:// KIO protocol.
description : |
    Manage files as administrator using the admin:// KIO protocol.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(PolkitQt6-1)
    - libatomic
setup       : |
    %cmake_kf6 \
        -DQT_MAJOR_VERSION=6
build       : |
    %cmake_build
install     : |
    %cmake_install
