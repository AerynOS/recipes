name        : kaccounts-providers
version     : "26.04.3"
release     : 18
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/kaccounts-providers-26.04.3.tar.xz : 7b364e75a562052932d8b2e8faecb7cd8716a35e7177e409e36e3e631e1f6775
homepage    : https://kde.org/
license     : GPL-2.0-or-later
summary     : KDE Providers
description : |
    KDE providers for accounts sign-on Provides additional configuration files for libaccounts and libsignon to recognize online services such as Facebook and Google.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KAccounts6)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(KF6Package)
    - cmake(QCoro6)
    - cmake(Qt6Qml)
    - cmake(Qt6WebEngineQuick)
rundeps     :
    - binary(signon-ui)
    - signon-plugin-oauth2 # Google provider
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install

    # Presumably unused config files (no reference in any related source project)
    rm -rfv %(installroot)/etc/signon-ui
    rmdir -v %(installroot)/etc
