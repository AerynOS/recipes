name        : kontactinterface
version     : "26.04.0"
release     : 18
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.0/src/kontactinterface-26.04.0.tar.xz : ff55c854955e93418ef2afb72b060e928e71b5d3c5f92b8e0e75ee8a59ff57b7
homepage    : https://kde.org
license     : LGPL-2.1-or-later
summary     : Kontact Plugin Interface Library
description : |
    Kontact Plugin Interface Library.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6Parts)
    - cmake(KF6WindowSystem)
    - cmake(KF6XmlGui)
    - cmake(Qt6CorePrivate)
    - pkgconfig(x11)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KF6Parts)
