name        : kontactinterface
version     : "26.04.2"
release     : 21
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/kontactinterface-26.04.2.tar.xz : c19001670dea36f6182f65e7cdd5d61c57f88ad3ac5ae99416023d0d151e7ff8
homepage    : https://kde.org
license     : LGPL-2.1-or-later
summary     : Kontact Plugin Interface Library
description : |
    Kontact Plugin Interface Library.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6Parts)
    - cmake(KF6WindowSystem)
    - cmake(KF6XmlGui)
    - cmake(Qt6CorePrivate)
    - pkgconfig(x11)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KF6Parts)
