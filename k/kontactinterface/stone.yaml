name        : kontactinterface
version     : "25.12.3"
release     : 16
upstreams   :
    - https://download.kde.org/stable/release-service/25.12.3/src/kontactinterface-25.12.3.tar.xz : 5e39b97021293811346a659926bbe8830d40fe8349d5cb7f9e8b63a180d78790
homepage    : https://kde.org
license     : LGPL-2.1-or-later
summary     : Kontact Plugin Interface Library
description : |
    Kontact Plugin Interface Library.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6Parts)
    - cmake(KF6WindowSystem)
    - cmake(KF6XmlGui)
    - cmake(Qt6CorePrivate)
    - pkgconfig(x11)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KF6Parts)
