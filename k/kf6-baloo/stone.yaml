name        : kf6-baloo
version     : "6.24.0"
release     : 22
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/baloo-6.24.0.tar.xz : 1f72676817b9636b80c971934fb7f2c5d396da4758c33998abc4b9ae82195ce4
homepage    : https://community.kde.org/Frameworks
license     :
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
summary     : Baloo provides file searching and indexing
description : |
    Baloo provides file searching and indexing
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6DBusAddons)
    - cmake(KF6FileMetaData)
    - cmake(KF6I18n)
    - cmake(KF6IdleTime)
    - cmake(KF6KIO)
    - cmake(KF6Solid)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
    - lmdb-devel
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KF6FileMetaData)
