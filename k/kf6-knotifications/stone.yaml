name        : kf6-knotifications
version     : "6.25.0"
release     : 23
upstreams   :
    - https://download.kde.org/stable/frameworks/6.25/knotifications-6.25.0.tar.xz : 0884add69f26a455cb8b6327bf89dc7ad3a0e4397c43c202fcf7ff73204ec695
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
summary     : Desktop notifications.
description : |
    Desktop notifications.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
    - pkgconfig(libcanberra)
    # TODO package pyside bindings, note that they need to be subpackaged. Let's wait till something needs them
setup       : |
    %cmake_kf6 -DBUILD_PYTHON_BINDINGS=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install
