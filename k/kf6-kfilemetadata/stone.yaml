    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(KF6Codecs)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(QMobipocket6)
    - cmake(exiv2)
    - cmake(taglib)
    - pkgconfig(libattr)
    - pkgconfig(libavcodec)
    - pkgconfig(libavformat)
    - pkgconfig(poppler-qt6)
    - ebook-tools-devel
    # Todo:
    # - libappimage
    # - CatDoc
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
