name        : kf6-kfilemetadata
version     : "6.24.0"
release     : 18
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/kfilemetadata-6.24.0.tar.xz : 2efdc2ebacf9af1f66f611fe95d776023590e9dcf97525aa93eaad7f1aa2ce23
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - LGPL-2.1-only
    - LGPL-2.1-or-later
summary     : Simple library for extracting the text and metadata
description : |
    Simple library for extracting the text and metadata
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(KF6Codecs)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(QMobipocket6)
    - cmake(exiv2)
    - cmake(taglib)
    - pkgconfig(libattr)
    - pkgconfig(libavcodec)
    - pkgconfig(libavformat)
    - pkgconfig(poppler-qt6)
    - ebook-tools-devel
    # Todo:
    # - libappimage
    # - CatDoc
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
