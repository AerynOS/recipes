name        : kf6-kfilemetadata
version     : "6.27.0"
release     : 21
upstreams   :
    - https://download.kde.org/stable/frameworks/6.27/kfilemetadata-6.27.0.tar.xz : 27f68558259394ad84d357aa316821672ee66481fa851ddf2a6109f668a6c6a3
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - LGPL-2.1-only
