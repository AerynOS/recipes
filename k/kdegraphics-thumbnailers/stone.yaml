name        : kdegraphics-thumbnailers
version     : "26.04.2"
release     : 13
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/kdegraphics-thumbnailers-26.04.2.tar.xz : 82d7d8ae6345bdce56b39562e673c69324a3252ba3ae575e6094bf810c84a46f
homepage    : https://apps.kde.org/kdegraphics_thumbnailers/
license     : GPL-2.0-or-later
summary     : Thumbnailers for various graphics file formats
description : |
    Thumbnailers for various graphics file formats
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KDcrawQt6)
    - cmake(KExiv2Qt6)
    - cmake(KF6Archive)
    - cmake(KF6KIO)
    - cmake(QMobipocket6)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
