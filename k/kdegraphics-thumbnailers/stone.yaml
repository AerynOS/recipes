name        : kdegraphics-thumbnailers
version     : "26.04.0"
release     : 11
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.0/src/kdegraphics-thumbnailers-26.04.0.tar.xz : 2ca5bc167146a22f6a11e152f5ea756c5a973d9ee50916ccc6afaa420af5eca1
homepage    : https://apps.kde.org/kdegraphics_thumbnailers/
license     : GPL-2.0-or-later
summary     : Thumbnailers for various graphics file formats
description : |
    Thumbnailers for various graphics file formats
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KDcrawQt6)
    - cmake(KExiv2Qt6)
    - cmake(KF6Archive)
    - cmake(KF6KIO)
    - cmake(QMobipocket6)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
