name        : kquickimageeditor
version     : "0.6.2"
release     : 13
upstreams   :
    - https://download.kde.org/stable/kquickimageeditor/kquickimageeditor-0.6.2.tar.xz : dfa8d0c8e41404937f3361c41b19cf541bb746e1b4b6970886de639122f1c9bb
homepage    : https://invent.kde.org/libraries/kquickimageeditor
license     :
    - BSD-2-Clause
    - CC0-1.0
    - LGPL-2.1-or-later
summary     : KQuickImageEditor is a set of QtQuick components providing basic image editing capabilities.
description : |
    KQuickImageEditor is a set of QtQuick components providing basic image editing capabilities.
builddeps   :
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(OpenCV)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
setup       : |
    %cmake \
        -DWITH_OPENCV=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
