name        : kquickimageeditor
version     : "0.6.2.1"
release     : 14
upstreams   :
    - https://download.kde.org/stable/kquickimageeditor/kquickimageeditor-0.6.2.1.tar.xz : 6d37a479463dcd16e4746d8b43d4adb05640e8b49056baabc82c865e2e1a4c85
homepage    : https://invent.kde.org/libraries/kquickimageeditor
license     :
    - BSD-2-Clause
    - CC0-1.0
    - LGPL-2.1-or-later
summary     : KQuickImageEditor is a set of QtQuick components providing basic image editing capabilities.
description : |
    KQuickImageEditor is a set of QtQuick components providing basic image editing capabilities.
builddeps   :
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(OpenCV)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
setup       : |
    %cmake \
        -DWITH_OPENCV=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
