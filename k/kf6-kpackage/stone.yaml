name        : kf6-kpackage
version     : "6.25.0"
release     : 16
upstreams   :
    - https://download.kde.org/stable/frameworks/6.25/kpackage-6.25.0.tar.xz : bd465c0f1c11ec4c6767c985ebd144cc1efd6b6f249e7d19bf2cc04b956a663e
homepage    : https://community.kde.org/Frameworks
license     :
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
summary     : Installation and loading of additional content as packages
description : |
    Installation and loading of additional content (scripts, images...) as packages.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(KF6CoreAddons)
    - cmake(KF6DocTools)
    - cmake(KF6I18n)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
