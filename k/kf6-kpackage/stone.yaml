name        : kf6-kpackage
version     : "6.27.0"
release     : 18
upstreams   :
    - https://download.kde.org/stable/frameworks/6.27/kpackage-6.27.0.tar.xz : 5fa4b07f729c3ff6b7f362d318374810fa55b13a922d2b240462eb8efc1045e8
homepage    : https://community.kde.org/Frameworks
license     :
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
summary     : Installation and loading of additional content as packages
description : |
    Installation and loading of additional content (scripts, images...) as packages.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(KF6CoreAddons)
    - cmake(KF6DocTools)
    - cmake(KF6I18n)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
