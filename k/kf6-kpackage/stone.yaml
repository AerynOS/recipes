name        : kf6-kpackage
version     : "6.28.0"
release     : 19
upstreams   :
    - https://download.kde.org/stable/frameworks/6.28/kpackage-6.28.0.tar.xz : 2d04bcbc3492229cfc240884b04e7b220fa2022019c8f9d87f9f7814ea94c382
homepage    : https://community.kde.org/Frameworks
license     :
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
summary     : Installation and loading of additional content as packages
description : |
    Installation and loading of additional content (scripts, images...) as packages.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(KF6CoreAddons)
    - cmake(KF6DocTools)
    - cmake(KF6I18n)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
