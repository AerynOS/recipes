name        : kf6-kdeclarative
version     : "6.24.0"
release     : 23
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/kdeclarative-6.24.0.tar.xz : d00d697aa8ce7a5a16864e92bc74f52adb2b3008881d6e12b66155a80b136915
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - GPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - MIT
summary     : Integration of QML and KDE work spaces
description : |
    Integration of QML and KDE work spaces
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6GlobalAccel)
    - cmake(KF6GuiAddons)
    - cmake(KF6I18n)
    - cmake(KF6WidgetsAddons)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6ShaderTools)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
