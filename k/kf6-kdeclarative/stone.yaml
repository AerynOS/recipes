name        : kf6-kdeclarative
version     : "6.25.0"
release     : 24
upstreams   :
    - https://download.kde.org/stable/frameworks/6.25/kdeclarative-6.25.0.tar.xz : 7692ccdffd55826976e916927b59aeb2d24a77b16af967fb265e9fe0cde387fa
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - GPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - MIT
summary     : Integration of QML and KDE work spaces
