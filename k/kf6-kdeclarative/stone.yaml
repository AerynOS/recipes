    - cmake(KF6GlobalAccel)
    - cmake(KF6GuiAddons)
    - cmake(KF6I18n)
    - cmake(KF6WidgetsAddons)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6ShaderTools)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
