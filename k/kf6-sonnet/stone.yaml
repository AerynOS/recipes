name        : kf6-sonnet
version     : "6.27.0"
release     : 25
upstreams   :
    - https://download.kde.org/stable/frameworks/6.27/sonnet-6.27.0.tar.xz : f8dcbba58d3479dfa4922146270f6ecb7ce0d987d82edc59b0c7c27ff965f65a
