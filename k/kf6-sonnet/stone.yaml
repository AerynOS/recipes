name        : kf6-sonnet
version     : "6.24.0"
release     : 21
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/sonnet-6.24.0.tar.xz : f5f107bd4d154c93bbacc717ec3411bcebce3513df103945e202ffa1f0ee9ae7
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
summary     : Multi-language spell checker
description : |
    Multi-language spell checker
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
    - pkgconfig(hunspell)
    # TODO Add voikko, aspell, and/or hspell
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
