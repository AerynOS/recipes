name        : keepassxc
version     : "2.7.12"
release     : 8
homepage    : https://keepassxc.org/
upstreams   :
    - https://github.com/keepassxreboot/keepassxc/archive/refs/tags/2.7.12.tar.gz : 8a6812a6e24484af77a75bdc9cf36aaa4c5f6852c2ea664180fe6a5c0dbada6e
summary     : Cross-platform community-driven port of Keepass password manager
description : |
    Cross-platform community-driven port of Keepass password manager
license     : 
    - GPL-2.0
    - GPL-3.0
    - LGPL-2.1
builddeps   :
    - binary(asciidoctor)
    - pkgconfig(Qt5Core)
    - pkgconfig(Qt5Qml)
    - pkgconfig(Qt5Svg)
    - pkgconfig(Qt5UiTools)
    - pkgconfig(Qt5X11Extras)
    - pkgconfig(botan-3)
    - pkgconfig(libargon2)
    - pkgconfig(libpcsclite)
    - pkgconfig(libqrencode)
    - pkgconfig(libusb-1.0)
    - pkgconfig(minizip)
    - pkgconfig(readline)
    - pkgconfig(xtst)
rundeps     :
    - qt5-wayland
setup       : |
    %cmake \
        -DKEEPASSXC_BUILD_TYPE=Release \
        -DWITH_GUI_TESTS=ON \
        -DWITH_XC_ALL=ON \
        -DWITH_XC_UPDATECHECK=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install
