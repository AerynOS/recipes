name        : kwrited
version     : "6.7.1"
release     : 18
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.1/kwrited-6.7.1.tar.xz : 4158d138596e2dd52dafc87cdfbd0970f50c98e424076dd729aa2c6c09236251
homepage    : https://kde.org/plasma-desktop/
license     : GPL-2.0-or-later
summary     : KDE daemon listening for wall and write messages
description : |
    KDE daemon listening for wall and write messages.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6Notifications)
    - cmake(KF6Pty)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
