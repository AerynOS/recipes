name        : kwrited
version     : "6.6.2"
release     : 13
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.2/kwrited-6.6.2.tar.xz : 4be13e36b6858208835e21bda3d7f704d992187fec4c63c21c1a6fe2782de11b
homepage    : https://kde.org/plasma-desktop/
license     : GPL-2.0-or-later
summary     : KDE daemon listening for wall and write messages
description : |
    KDE daemon listening for wall and write messages.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6Notifications)
    - cmake(KF6Pty)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
