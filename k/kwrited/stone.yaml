name        : kwrited
version     : "6.6.4"
release     : 15
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.4/kwrited-6.6.4.tar.xz : 22543f56e124e76c96666e162b70d88d9dfdaf4000e732fca3ffc34a2ed36196
homepage    : https://kde.org/plasma-desktop/
license     : GPL-2.0-or-later
summary     : KDE daemon listening for wall and write messages
description : |
    KDE daemon listening for wall and write messages.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6Notifications)
    - cmake(KF6Pty)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
