    - cmake(Qt6WaylandClient)
    - pkgconfig(wayland-protocols)
    - pkgconfig(x11)
    - pkgconfig(xext)
    - pkgconfig(xscrnsaver)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
