name        : kf6-kidletime
version     : "6.24.0"
release     : 16
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/kidletime-6.24.0.tar.xz : be8ce0c791900a1f55e9973bf5faefbe172740424ac9f254ba541552ba3ccb06
homepage    : https://community.kde.org/Frameworks
license     :
    - GPL-2.0-or-later
    - LGPL-2.0-only
    - MIT
summary     : Reporting of idle time of user and system
description : |
    Reporting of idle time of user and system
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(PlasmaWaylandProtocols)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6WaylandClient)
    - pkgconfig(wayland-protocols)
    - pkgconfig(x11)
    - pkgconfig(xext)
    - pkgconfig(xscrnsaver)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
