name        : kf6-modemmanager-qt
version     : "6.25.0"
release     : 12
upstreams   :
    - https://download.kde.org/stable/frameworks/6.25/modemmanager-qt-6.25.0.tar.xz : 1f1c3ef493445a3f9215462dd86d25e2e4355ffbce9a70016288be04c537b91b
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - GPL-2.0-only
    - LGPL-2.1-only
summary     : Qt wrapper for ModemManager DBus API
description : |
    Qt wrapper for ModemManager DBus API
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - pkgconfig(ModemManager)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - pkgconfig(ModemManager)
