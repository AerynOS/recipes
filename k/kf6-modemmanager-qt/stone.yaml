name        : kf6-modemmanager-qt
version     : "6.27.0"
release     : 14
upstreams   :
    - https://download.kde.org/stable/frameworks/6.27/modemmanager-qt-6.27.0.tar.xz : a893a169dd40c430c51d39326b1af0aab2a9d6c20adc34f2b8e6332c152f6234
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - GPL-2.0-only
    - LGPL-2.1-only
summary     : Qt wrapper for ModemManager DBus API
description : |
    Qt wrapper for ModemManager DBus API
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - pkgconfig(ModemManager)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - pkgconfig(ModemManager)
