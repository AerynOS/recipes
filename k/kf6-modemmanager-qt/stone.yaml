name        : kf6-modemmanager-qt
version     : "6.24.0"
release     : 11
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/modemmanager-qt-6.24.0.tar.xz : c658ff8e19e27c9d7980552d4094233fbe0ad286f5a6927fa687255e84e80ed2
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - GPL-2.0-only
    - LGPL-2.1-only
summary     : Qt wrapper for ModemManager DBus API
description : |
    Qt wrapper for ModemManager DBus API
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - pkgconfig(ModemManager)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - pkgconfig(ModemManager)
