name        : kscreen
version     : "6.6.4"
release     : 22
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.4/kscreen-6.6.4.tar.xz : 2f123691ac25da7f5166894ebaddda9615ddbaf949ebbb6c9829196b0615c250
homepage    : https://kde.org/plasma-desktop/
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-only
summary     : KDE Plasma screen management
description : |
    KDE Plasma screen management
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6Crash)
    - cmake(KF6DBusAddons)
    - cmake(KF6I18n)
    - cmake(KF6ImageFormats)
    - cmake(KF6KCMUtils)
    - cmake(KF6Screen)
    - cmake(KF6Svg)
    - cmake(KF6XmlGui)
    - cmake(LayerShellQt)
    - cmake(Plasma)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6WaylandClient)
    - pkgconfig(wayland-protocols)
    - pkgconfig(xi)
rundeps     :
    - kf6-kimageformats # Required to load HDR test image
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
