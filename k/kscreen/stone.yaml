name        : kscreen
version     : "6.7.2"
release     : 28
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.2/kscreen-6.7.2.tar.xz : a67fbbb8c2fa2a875f29d056d72453d340143219b08062a932c7b1f1501add48
homepage    : https://kde.org/plasma-desktop/
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-only
summary     : KDE Plasma screen management
description : |
    KDE Plasma screen management
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6Crash)
    - cmake(KF6DBusAddons)
    - cmake(KF6I18n)
    - cmake(KF6ImageFormats)
    - cmake(KF6ItemModels)
    - cmake(KF6KCMUtils)
    - cmake(KF6Screen)
    - cmake(KF6Svg)
    - cmake(KF6XmlGui)
    - cmake(LayerShellQt)
    - cmake(Plasma)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6WaylandClient)
    - pkgconfig(wayland-protocols)
    - pkgconfig(xi)
    - plasma5support # QML dep
rundeps     :
    - kf6-kimageformats # Required to load HDR test image
    - kf6-kirigami # QML dep for HDR calibrator
    - plasma5support # QML dep
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
