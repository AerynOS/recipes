version     : "6.24.0"
release     : 16
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/kwidgetsaddons-6.24.0.tar.xz : dfe563e58b0d8c72e8a1da4f379f03610552d8663eac613e47a2a6a384c20107
