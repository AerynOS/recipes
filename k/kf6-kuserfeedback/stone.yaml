name        : kf6-kuserfeedback
version     : "6.24.0"
release     : 21
upstreams   :
    - https://download.kde.org/stable/frameworks/6.24/kuserfeedback-6.24.0.tar.xz : 3004be541acf03b6e2203b5eafede7f9d9a8fe41d77cdd2aee35e03f13929a30
homepage    : https://community.kde.org/Frameworks
license     : MIT
summary     : Framework for collecting user feedback for applications via telemetry and surveys
description : |
    Framework for collecting user feedback for applications via telemetry and surveys
builddeps   :
    - binary(bison)
    - binary(flex)
    - binary(php)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
setup       : |
    %cmake_kf6 -DENABLE_CONSOLE=ON \
               -DENABLE_CLI=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
