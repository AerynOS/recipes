name        : linux-kvm
version     : "0.0.0"
release     : 72
homepage    : https://kernel.org/
upstreams   :
    - https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.9.12.tar.xz : 5ae7cc4e0e2f6b9ba630f643985ba0522c7d5e5b9571ba478a3cb513edd4cf22
summary     : Linux Kernel - KVM Guest build
description : |
    Minimalist kernel configuration supporting KVM host and not much else
license     :
    - GPL-2.0-only
install     : |
    for i in %(name) %(name)-devel; do
        %install_dir %(installroot)%(docdir)/${i}
        echo "DEPRECATED" > %(installroot)%(docdir)/${i}/README
    done
packages    :
    - "%(name)":
        rundeps:
            - linux-stable
        paths:
            - /usr/share/doc/linux-kvm

    - "%(name)-devel":
        rundeps:
            - linux-stable-devel
        paths:
            - /usr/share/doc/linux-kvm-devel
