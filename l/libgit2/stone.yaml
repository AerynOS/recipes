name        : libgit2
version     : "1.9.6"
release     : 10
homepage    : https://libgit2.org
upstreams   :
    - https://github.com/libgit2/libgit2/archive/refs/tags/v1.9.6.tar.gz : a88a42a4ea9bdab7aa8686eead3bf7d9c6dd74529caca16ab22eaa92433d31d9
summary    : libgit2 is a portable, pure C implementation of the Git core methods.
description: |
    libgit2 is a portable, pure C implementation of the Git core methods provided as a linkable library with a solid API, allowing to build Git functionality into your application.
license     : GPL-2.0-or-later
builddeps   :
    - pkgconfig(libcurl)
    - pkgconfig(libpcre2-posix)
    - pkgconfig(libssh2)
    - pkgconfig(openssl)
setup       : |
    %cmake \
        -DBUILD_TESTS=OFF \
        -DREGEX_BACKEND=pcre2 \
        -DUSE_THREADS:BOOL=ON \
        -DUSE_SSH:BOOL=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - pkgconfig(libssh2)
