name        : libglib-testing
version     : "0.2.0"
release     : 1
homepage    : https://gitlab.gnome.org/pwithnall/libglib-testing
upstreams   :
    - https://gitlab.gnome.org/pwithnall/libglib-testing/-/archive/0.2.0/libglib-testing-0.2.0.tar.gz : f5110420ad3f03156e237357996365a9f2a8b48ac00a9c99a2fd221cc1d16a4c
summary     : Test harnesses and mock classes for GLib
description : |
    libglib-testing is a test library providing test harnesses and mock classes which complement the classes provided by GLib. It is intended to be used by any project which uses GLib and which wants to write internal unit tests.
license     : LGPL-2.1-or-later
networking  : true
builddeps   :
    #- binary(gtkdoc-scan)
    - pkgconfig(gio-2.0)
setup       : |
    %patch %(pkgdir)/disable-docs.patch
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
