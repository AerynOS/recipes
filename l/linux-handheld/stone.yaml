name        : linux-handheld
version     : "0.0.0"
release     : 57
homepage    : https://kernel.org/
summary     : The Linux Kernel for handheld systems
description : |
    The Linux Kernel for handheld systems

    This package provides the Linux Kernel for handheld systems. It is built with
    the LLVM compiler and the LLD linker, and is configured for handheld systems.
license     :
    - GPL-2.0-only
install     : |
    for i in %(name) %(name)-devel; do
        %install_dir %(installroot)%(docdir)/${i}
        echo "DEPRECATED" > %(installroot)%(docdir)/${i}/README
    done
packages    :
    - "%(name)":
        rundeps:
            - linux-gaming
        paths:
            - /usr/share/doc/linux-handheld

    - "%(name)-devel":
        rundeps:
            - linux-gaming-devel
        paths:
            - /usr/share/doc/linux-handheld-devel
