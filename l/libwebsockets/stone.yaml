name        : libwebsockets
version     : "4.5.3"
release     : 4
homepage    : https://github.com/warmcat/libwebsockets
upstreams   :
    - https://github.com/warmcat/libwebsockets/archive/refs/tags/v4.5.3.tar.gz : af8f67cf00dc31ac49e0a8404d7be68cbd44292d93c176a8b2ba9de2912da745
summary     : Lightweight C networking library
description : |
    Libwebsockets (LWS) is a flexible, lightweight pure C library for implementing modern network protocols easily with a tiny footprint, using a nonblocking event loop.
license     :
    - Apache-2.0
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - MIT
    - OFL-1.1
    - Zlib
builddeps   :
    - pkgconfig(libuv)
    - pkgconfig(openssl)
    - pkgconfig(zlib)
setup       : |
    # Ensure openssl.cnf can be found in %(vendordir)
    %patch %(pkgdir)/stateless-openssl.cnf-location.patch
    
    %cmake \
        -DLWS_WITH_LIBUV=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
packages:
    - "%(name)":
        paths:
            # This is not a development library
            - /usr/lib/libwebsockets-evlib_uv.so
