name        : libkdcraw
version     : "26.04.3"
release     : 17
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/libkdcraw-26.04.3.tar.xz : 7bc63591e1fc1352177849a6998030dca2fca98e902a55186afec55add326f4f
homepage    : https://kde.org/
license     :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
summary     : C++ interface to LibRaw
description : |
    Libkdcraw is a C++ interface around LibRaw library used to decode RAW picture files.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - pkgconfig(libraw)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
