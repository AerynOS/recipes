name        : libkdcraw
version     : "25.12.3"
release     : 13
upstreams   :
    - https://download.kde.org/stable/release-service/25.12.3/src/libkdcraw-25.12.3.tar.xz : 23b220f14bbaa21858b6f8e18169499389835b6693e73a877f8e0d788f4499af
homepage    : https://kde.org/
license     :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
summary     : C++ interface to LibRaw
description : |
    Libkdcraw is a C++ interface around LibRaw library used to decode RAW picture files.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - pkgconfig(libraw)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
