name        : libmysofa
version     : "1.3.5"
release     : 3
upstreams   :
    - https://github.com/hoene/libmysofa/archive/refs/tags/v1.3.5.tar.gz : f29508c335c83d8703f943ffc9ca783ac39aca84e851357f13a55af0f8143137
homepage    : https://github.com/hoene/libmysofa/
license     : BSD-3-Clause
summary     : C functions for reading HRTFs
description : |
    This is a simple set of C functions to read AES SOFA files, if they
    contain HRTFs stored according to the AES69-2015 standard.
builddeps   :
    - pkgconfig(zlib)
checkdeps   :
    - pkgconfig(cunit)
setup       : |
    %cmake \
        -DBUILD_STATIC_LIBS=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "mysofa":
        summary: Tools for %(name)
        description: Tools for %(name)
        paths:
            - /usr/bin/mysofa2json
            - /usr/share/libmysofa/
