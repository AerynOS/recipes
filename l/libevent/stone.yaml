name        : libevent
version     : "2.1.13"
release     : 5
homepage    : https://github.com/libevent/libevent
upstreams   :
    - https://github.com/libevent/libevent/releases/download/release-2.1.13-stable/libevent-2.1.13-stable.tar.gz : f7e9383b8c0baa81b687e5b5eecc01beefaf1b19b64151d95ed61647fe7a315c
summary     : Event notification library
description : |
    The libevent API provides a mechanism to execute a callback function when a specific event occurs on a file descriptor or after a timeout has been reached. Furthermore, libevent also support callbacks due to signals or regular timeouts.
license     :
    - BSD-3-Clause
builddeps   :
    - pkgconfig(openssl)
    - pkgconfig(zlib)
setup       : |
    %patch %(pkgdir)/EVENT__SIZEOF_TIME_T.patch
    %patch %(pkgdir)/ftbfs-cmake-4.patch

    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        paths:
            - /usr/bin/
