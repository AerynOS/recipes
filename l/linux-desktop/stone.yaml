name        : linux-desktop
version     : "0.0.0"
release     : 139
homepage    : https://kernel.org/
upstreams   :
    - https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.18.21.tar.xz : 1c38214fb137bae85b82b82537b5987358621b915ab2a8e4f09e60697c19474f
summary     : The Linux Kernel for desktop systems
description : |
    The Linux Kernel for desktop systems

    This package provides the Linux Kernel for desktop systems. It is built with
    the LLVM compiler and the LLD linker, and is configured for desktop systems.
license     :
    - GPL-2.0-only
install     : |
    for i in %(name) %(name)-devel; do
        %install_dir %(installroot)%(docdir)/${i}
        echo "DEPRECATED" > %(installroot)%(docdir)/${i}/README
    done
packages    :
    - "%(name)":
        rundeps:
            - linux-stable
        paths:
            - /usr/share/doc/linux-desktop

    - "%(name)-devel":
        rundeps:
            - linux-stable-devel
        paths:
            - /usr/share/doc/linux-desktop-devel
 