name        : libfido2
version     : "1.17.0"
release     : 5
homepage    : https://developers.yubico.com/libfido2/
upstreams   :
    - https://github.com/Yubico/libfido2/archive/refs/tags/1.17.0.tar.gz : ace062d14a482ff9325410ff63d06c8b5fe87e79ebc18dda07add2bc0188c77f
summary     : Provides library functionality for FIDO2, including communication with a device over USB or NFC.
description : |
    Provides library functionality to communicate with a FIDO device over USB or
    NFC, and to verify attestation and assertion signatures.
license     : BSD-2-Clause
builddeps   :
    - pkgconfig(hidapi-hidraw)
    - pkgconfig(libcbor)
    - pkgconfig(libpcsclite)
    - pkgconfig(libudev)
    - pkgconfig(openssl)
    - pkgconfig(zlib)
setup       : |
    %cmake \
        -DBUILD_EXAMPLES=OFF \
        -DBUILD_STATIC_LIBS=OFF \
        -DUSE_HIDAPI=ON \
        -DUSE_PCSC=ON \
        -DUDEV_RULES_DIR=/usr/lib/udev/rules.d
build       : |
    %cmake_build
install     : |
    %cmake_install
    %sysusers 'g plugdev - -'
check       : |
    %cmake_test
packages    :
    - "%(name)-devel":
        paths:
            - /usr/share/man/man3
    - "%(name)-tools":
        summary: Command-line tools for FIDO2
        description: |
            Provides command-line tools to communicate with a FIDO device over
            USB or NFC, and to verify attestation and assertion signatures.
        paths:
            - /usr/bin
            - /usr/share/man/man1
