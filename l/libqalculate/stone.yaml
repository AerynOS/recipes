name        : libqalculate
version     : "5.11.0"
release     : 11
upstreams   :
    - https://github.com/Qalculate/libqalculate/releases/download/v5.11.0/libqalculate-5.11.0.tar.gz : 6217a634eeb9659ebb4080c265dfab47d8f8dd4c33394b48fd5a1f83ef4538c4
homepage    : https://qalculate.github.io/
license     : GPL-2.0-or-later
summary     : Qalculate! library
description : |
    Qalculate! library
builddeps   :
    - binary(doxygen)
    - binary(intltool-update)
    - binary(msgfmt)
    - pkgconfig(gmp)
    - pkgconfig(icu-uc)
    - pkgconfig(libcurl)
    - pkgconfig(libxml-2.0)
    - pkgconfig(mpfr)
    - pkgconfig(readline)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %configure \
        CC_FOR_BUILD=${CC} \
        CXX_FOR_BUILD=${CXX}
build       : |
    %make
install     : |
    %make_install
packages    :
    - "qalculate":
        summary: Multi-purpose calculator, text mode interface
        description: Multi-purpose calculator, text mode interface
        paths:
            - /usr/bin/qalc
            - /usr/share/man/man1/qalc*

    - "%(name)-devel":
        rundeps:
            - pkgconfig(gmp)
            - pkgconfig(mpfr)

    - "%(name)-docs":
        paths:
            - /usr/share/doc
