name        : libqalculate
version     : "5.10.0"
release     : 10
upstreams   :
    - https://github.com/Qalculate/libqalculate/releases/download/v5.10.0/libqalculate-5.10.0.tar.gz : 904592d33a98ed4a26a59fa34c855578e096144fb91965b8afc90e06797dba8e
homepage    : https://qalculate.github.io/
license     : GPL-2.0-or-later
summary     : Qalculate! library
description : |
    Qalculate! library
builddeps   :
    - binary(doxygen)
    - binary(intltool-update)
    - binary(msgfmt)
    - pkgconfig(gmp)
    - pkgconfig(icu-uc)
    - pkgconfig(libcurl)
    - pkgconfig(libxml-2.0)
    - pkgconfig(mpfr)
    - pkgconfig(readline)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %configure \
        CC_FOR_BUILD=${CC} \
        CXX_FOR_BUILD=${CXX}
build       : |
    %make
install     : |
    %make_install
packages    :
    - "qalculate":
        summary: Multi-purpose calculator, text mode interface
        description: Multi-purpose calculator, text mode interface
        paths:
            - /usr/bin/qalc
            - /usr/share/man/man1/qalc*
    
    - "%(name)-devel":
        rundeps:
            - pkgconfig(gmp)
            - pkgconfig(mpfr)

    - "%(name)-docs":
        paths:
            - /usr/share/doc
