name        : libtorrent-rasterbar
version     : "2.1.0"
release     : 9
upstreams   :
    - https://github.com/arvidn/libtorrent/releases/download/v2.1.0/libtorrent-rasterbar-2.1.0.tar.gz : ceed657606b8df453ec5e775326e3c759a2779e1202fa04abe42ed262e7bf0b6
homepage    : https://libtorrent.org/
license     : BSD-2-Clause
summary     : libtorrent is a C++ implementation of the BitTorrent protocol
description : |
    libtorrent is a C++ implementation of the BitTorrent protocol.
builddeps   :
    - cmake(Boost)
    - pkgconfig(openssl)
    - pkgconfig(python3)
    - python(setuptools)
tuning      :
    - fortify: lvl2 # https://github.com/arvidn/libtorrent/issues/7519
setup       : |
    %cmake \
        -Dpython-bindings=ON \
        -Dpython-egg-info=ON \
        -Dpython-install-system-dir=ON \
        -Dwebtorrent=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        paths:
            - /usr/share/cmake/

    - "python-libtorrent":
        summary: Python bindings for %(name)
        description: Python bindings for %(name)
        paths:
            - /usr/lib/python*/site-packages
