name        : libtorrent-rasterbar
version     : "2.0.12"
release     : 5
upstreams   :
    - https://github.com/arvidn/libtorrent/releases/download/v2.0.12/libtorrent-rasterbar-2.0.12.tar.gz : 25b898d02e02e43ee9a8ea5480c20007f129091b5754d0283f94e4d51d11a19e
homepage    : https://libtorrent.org/
license     : BSD-2-Clause
summary     : libtorrent is a C++ implementation of the BitTorrent protocol
description : |
    libtorrent is a C++ implementation of the BitTorrent protocol.
builddeps   :
    - cmake(Boost)
    - pkgconfig(openssl)
    - pkgconfig(python3)
    - python(setuptools)
setup       : |
    %cmake \
        -Dpython-bindings=on \
        -Dpython-egg-info=on \
        -Dpython-install-system-dir=on
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        paths:
            - /usr/share/cmake/

    - "python-libtorrent":
        summary: Python bindings for %(name)
        description: Python bindings for %(name)
        paths:
            - /usr/lib/python*/site-packages
