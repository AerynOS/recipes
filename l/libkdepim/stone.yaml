name        : libkdepim
version     : "25.12.3"
release     : 11
upstreams   :
    - https://download.kde.org/stable/release-service/25.12.3/src/libkdepim-25.12.3.tar.xz : 5b2ffc63f30ffdf513061b634db3df6019ab4aad56b1c11f50dadec081b8cf43
homepage    : https://kde.org
license     : GPL-2.0-or-later
summary     : Libraries for KDE PIM applications
description : |
    Libraries for KDE PIM applications.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Completion)
    - cmake(KF6I18n)
    - cmake(KF6WidgetsAddons)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
