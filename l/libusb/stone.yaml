name        : libusb
version     : "1.0.30"
release     : 5
homepage    : https://libusb.info/
upstreams   :
    - https://github.com/libusb/libusb/releases/download/v1.0.30/libusb-1.0.30.tar.bz2 : fea36f34f9156400209595e300840767ab1a385ede1dc7ee893015aea9c6dbaf
summary     : A cross-platform library to access USB devices
description : |
    libusb is a library for USB device access from Linux, macOS, Windows, OpenBSD/NetBSD, Haiku, Solaris userspace, and WebAssembly via WebUSB.
license     :
    - LGPL-2.1-or-later
builddeps   :
    - pkgconfig(libudev)
setup       : |
    %configure \
        --disable-static
build       : |
    %make
install     : |
    %make_install
