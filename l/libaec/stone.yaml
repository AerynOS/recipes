name        : libaec
version     : "1.1.7"
release     : 4
upstreams   :
    - https://gitlab.dkrz.de/-/project/117/uploads/d5f804a519d8781de4ab9ce239892ab9/libaec-1.1.7.tar.gz : cc7b93be9002e25a88b45d6b8d5f6120756cb5e1000613f91d803ce0beba24d9
homepage    : https://gitlab.dkrz.de/dkrz-sw/libaec
license     : LicenseRef-Callaway-BSD
summary     : Adaptive Entropy Coding library
description : |
    Libaec provides fast loss-less compression of 1 up to 32 bit wide
    signed or unsigned integers (samples). The library achieves best
    results for low entropy data as often encountered in space imaging
    instrument data or numerical model output from weather or climate
    simulations. While floating point representations are not directly
    supported, they can also be efficiently coded by grouping exponents
    and mantissa.

    Libaec implements Golomb Rice coding as defined in the Space Data
    System Standard documents 121.0-B-2 and 120.0-G-2.

    Libaec includes a free drop-in replacement for the SZIP
    library (http://www.hdfgroup.org/doc_resource/SZIP).
setup       : |
    %cmake \
        -DBUILD_STATIC_LIBS=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install
