name        : libdwarf
version     : "2.3.2"
release     : 2
upstreams   :
    - https://github.com/davea42/libdwarf-code/releases/download/v2.3.2/libdwarf-2.3.2.tar.xz : 7992e7b9019ebfabdda5773e86243517c48cf89fafed3209e853692bc9573efd
homepage    : https://www.prevanders.net/dwarf.html
license     : LGPL-2.1-only AND BSD-2-Clause-FreeBSD
summary     : Library to access the DWARF Debugging file format
description : |
    Library to access the DWARF Debugging file format
builddeps   :
    - binary(python3)
    - pkgconfig(libzstd)
    - pkgconfig(zlib)
setup       : |
    %meson \
        -Ddwarfgen=true
build       : |
    %meson_build
install     : |
    %meson_install
check       : |
    %meson_test
packages    :
    - "%(name)-tools":
        summary: Tools for accessing DWARF debugging information
        description: Tools for accessing DWARF debugging information
        paths:
            - /usr/bin/
            - /usr/share/dwarfdump/
            - /usr/share/man/
