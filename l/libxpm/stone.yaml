name        : libxpm
version     : "3.5.19"
release     : 4
homepage    : https://gitlab.freedesktop.org/xorg/lib/libxpm
upstreams   :
    - https://www.x.org/releases/individual/lib/libXpm-3.5.19.tar.gz : f241f705c607fba1a53338f7e1c12005d6da326b5cb55a11a10847781b4578c0
summary     : X Pixmap (XPM) image file format library
description : |
    libXpm provides support and common operations for the XPM pixmap format, which is commonly used in legacy X applications. XPM is an extension of the monochrome XBM bitmap specified in the X protocol.
license     : MIT
builddeps  :
    - binary(xgettext)
    - pkgconfig(x11)
    - pkgconfig(xext)
    - pkgconfig(xextproto)
    - pkgconfig(xorg-macros)
    - pkgconfig(xproto)
    - pkgconfig(xt)
checkdeps  :
    - pkgconfig(glib-2.0)
setup       : |
    %configure \
        --disable-open-zfile \
        --disable-static \
        --enable-unit-tests
build       : |
    %make
install     : |
    %make_install
check      : |
    %make check
packages   :
    - "%(name)-devel":
        paths:
            - /usr/bin/
            - /usr/share/man/
