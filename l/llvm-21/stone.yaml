            - /usr/lib/llvm-21/lib/libLTO.so
            - /usr/lib/llvm-21/lib/libRemarks.so
        rundeps:
            - pkgconfig(libedit)
            - pkgconfig(libzstd)

    - "clang-21-libs":
        summary: "Library files for clang"
        description: |
            Library files for clang, typically pulled in as a dependency of another package.

            This package contains the core clang libraries as well as the intrinsics compiler headers.
        paths:
            - /usr/lib/libclang.so.*
            - /usr/lib/libclang-cpp.so.*
            - /usr/lib/llvm-21/lib/libclang.so.*
            - /usr/lib/llvm-21/lib/libclang-cpp.so.*
            - /usr/lib/llvm-21/lib/clang/*/include/*

    - "clang-21":
        summary: "Clang compiler front-end (LLVM)"
        description: |
            Clang compiler front-end built as part of the LLVM compiler infrastructure project.

            This package contains the clang compiler, the compiler-rt object files for building
            64bit applications, and the 64bit compiler-rt sanitizer libraries.
        rundeps:
            # GNU bits and bobs
            - binary(gcc) # This is used to locate the compiler built-ins and libstdc++ headers
            - libatomic
            - libgcc-static
            - libstdc++-devel
            - glibc-devel

            # LLVM toolchain bits
            - compiler-rt-21 # This is generally not used since we default to GCC built-ins but it is used for PGO
            - lld-21
            - llvm-21
            - openmp-devel
        paths:
            - /usr/bin/*clang*-21
            - /usr/lib/llvm-21/bin/*clang*
            - /usr/lib/llvm-21/lib/clang/*/bin/*
            - /usr/lib/llvm-21/lib/clang/*/lib/linux/*x86_64*
            - /usr/lib/llvm-21/lib/clang/*/share/*
            - /usr/lib/llvm-21/share/clang/bash-autocomplete.sh

    - "clang-tools-21":
