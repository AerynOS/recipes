            - /usr/lib/llvm-21/lib/clang/*/include/sanitizer/
            - /usr/lib/llvm-21/lib/clang/*/include/xray/
            - /usr/lib/llvm-21/lib/clang/*/share/*.txt
            - /usr/lib/llvm-21/lib/clang/*/lib/linux/clang_rt.*
            - /usr/lib/llvm-21/lib/clang/*/lib/linux/libclang_rt.*
            - /usr/lib/llvm-21/lib/clang/*/lib/linux/liborc_rt*

    - "compiler-rt-21-32bit":
        summary: LLVM "compiler-rt" runtime libraries - 32bit
        description: |
            The compiler-rt project is a part of the LLVM project. It provides
            implementation of the low-level target-specific hooks required by
            code generation, sanitizer runtimes and profiling library for code
            instrumentation, and Blocks C language extension.
        rundeps:
            - compiler-rt-21
        paths:
            - /usr/lib/llvm-21/lib/clang/*/lib/linux/*i386*

    - "lld-21-libs":
        summary: "Library files for lld"
        description: |
            Library files for lld, typically pulled in as a dependency of another package.
        paths:
            - /usr/lib/liblld*.so.*
            - /usr/lib/llvm-21/lib/liblld*.so.*

    - "lld-21":
        summary: "LLVM-based linker"
        description: |
            A high-performance linker
        paths:
            - /usr/bin/*lld*
            - /usr/bin/wasm-ld-21
            - /usr/lib/llvm-21/bin/*lld*
            - /usr/lib/llvm-21/bin/wasm-ld

    - "lld-21-devel":
        summary: "Development files for lld"
        description: |
            Install this package if you intend to build software against
            the lld package.
        paths:
            - /usr/lib/llvm-21/lib/cmake/lld
            - /usr/lib/llvm-21/lib/liblld*.so
            - /usr/lib/llvm-21/include/lld/*
        rundeps:
            - "%(name)-devel"
            - lld-21
