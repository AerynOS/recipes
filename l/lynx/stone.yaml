name        : lynx
version     : "2.9.3"
release     : 5
homepage    : https://lynx.invisible-island.net
upstreams   :
    - https://invisible-island.net/archives/lynx/tarballs/lynx2.9.3.tar.gz : 6e99e46980974a6d89eceefbb26ca8c7aa7702b78ecb5bad383b859af225d052
summary     : Lynx is the text web browser
description : |
    Lynx is the oldest text web browser still actively developed.
license     :
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
builddeps   :
    - binary(bison)
    - binary(msginit)
    - pkgconfig(bzip2)
    - pkgconfig(libbrotlidec)
    - pkgconfig(libidn2)
    - pkgconfig(ncursesw)
    - pkgconfig(openssl)
    - pkgconfig(zlib)
setup       : |
    %patch %(pkgdir)/0001-Try-to-load-stateless-path-for-lynx-configs.patch
    %configure \
        --enable-default-colors \
        --enable-externs \
        --enable-ipv6 \
        --enable-nls \
        --with-ssl=/usr \
        --with-screen=ncursesw
build       : |
    %make
install     : |
    %make_install

    # Stateless config
    %install_file lynx.cfg %(installroot)%(vendordir)/lynx/lynx.cfg
    %install_file samples/lynx.lss %(installroot)%(vendordir)/lynx/lynx.lss

    # Install licenses
    %install_file COPYHEADER COPYING -t %(installroot)%(datadir)/licenses/%(name)/
