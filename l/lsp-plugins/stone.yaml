name        : lsp-plugins
version     : "1.2.33"
release     : 12
homepage    : https://lsp-plug.in
upstreams   :
    - https://github.com/sadko4u/lsp-plugins/releases/download/1.2.33/lsp-plugins-src-1.2.33.tar.gz : 2b6922105118ac87bd942b0ff3e7bf3c8180227b2ab5c4e50e48deb90ac689bd
summary     : Linux Studio Plugins Project
description : |
    Linux Studio Plugins Project
license     : LGPL-3.0-only
builddeps   :
    - pkgconfig(cairo)
    - pkgconfig(sndfile)
    - pkgconfig(gl)
    - pkgconfig(gstreamer-1.0)
    - pkgconfig(gstreamer-audio-1.0)
    - pkgconfig(jack)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(xrandr)
setup       : |
    make config \
        PREFIX=%(prefix) \
        LIBDIR=%(libdir) \
        ARTIFACT_EXPORT_HEADERS=0 \
        FEATURES="gst jack pipewire launcher standalone lv2 ui xdg" \
        VERBOSE=1
build       : |
    %make
install     : |
    %make_install

    # Nothing builds against this currently
    rm -rfv %(installroot)%(libdir)/*.a \
            %(installroot)%(libdir)/pkgconfig/*.pc

    find %(installroot) -empty -type d -delete -print
packages    :
    - "%(name)-gstreamer":
        summary: Linux Studio Plugins - gstreamer format
        description: Linux Studio Plugins - gstreamer format
        paths:
            - /usr/lib/gstreamer-1.0
            - /usr/lib/lsp-plugins/liblsp-plugins-gstreamer*.so

    - "%(name)-lv2":
        summary: Linux Studio Plugins - LV2 format
        description: Linux Studio Plugins - LV2 format
        paths:
            - /usr/lib/lv2

    - "%(name)-lv2-ui":
        summary: Linux Studio Plugins - LV2 format - GUI
        description: Linux Studio Plugins - LV2 format - GUI
        rundeps:
            - "%(name)-lv2"
            - "%(name)-standalone"
        paths:
            - /usr/lib/lv2/lsp-plugins.lv2/lsp-plugins-lv2ui.so

    - "%(name)-standalone":
        summary: Linux Studio Plugins - Standalone
        description: Linux Studio Plugins - Standalone
        paths:
            - /usr/bin/lsp-plugins*
            - /usr/lib/liblsp-r3d-glx-lib*.so
            # TODO: Maybe these could be subpackaged. Doesn't really matter since Pipewire provides both
            - /usr/lib/liblsp-audio-jack-lib*.so
            - /usr/lib/liblsp-audio-pipewire-lib*.so
            - /usr/lib/lsp-plugins/liblsp-plugins-standalone*.so
            - /usr/share/icons/
            - /usr/share/applications/lsp-plugins.desktop
