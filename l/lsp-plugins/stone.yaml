name        : lsp-plugins
version     : "1.2.29"
release     : 11
homepage    : https://lsp-plug.in
upstreams   :
    - https://github.com/sadko4u/lsp-plugins/releases/download/1.2.29/lsp-plugins-src-1.2.29.tar.gz : 404297c3add879c508db06d5119e11efc1d0473527d2a69ed39ec77c1d1972f2
summary     : Linux Studio Plugins Project
description : |
    Linux Studio Plugins Project
license     : LGPL-3.0-only
builddeps   :
    - pkgconfig(cairo)
    - pkgconfig(sndfile)
    - pkgconfig(gl)
    - pkgconfig(gstreamer-1.0)
    - pkgconfig(gstreamer-audio-1.0)
    - pkgconfig(jack)
    - pkgconfig(xrandr)
setup       : |
    make config \
        PREFIX=%(prefix) \
        LIBDIR=%(libdir) \
        FEATURES="gst jack lv2 xdg"
build       : |
    %make
install     : |
    %make_install

    find %(installroot) -empty -type d -delete -print
packages    :
    - "%(name)-gstreamer":
        summary: Linux Studio Plugins - gstreamer format
        description: Linux Studio Plugins - gstreamer format
        paths:
            - /usr/lib/gstreamer-1.0
            - /usr/lib/lsp-plugins/liblsp-plugins-gstreamer*.so

    - "%(name)-lv2":
        summary: Linux Studio Plugins - LV2 format
        description: Linux Studio Plugins - LV2 format
        paths:
            - /usr/lib/lv2

    - "%(name)-standalone":
        summary: Linux Studio Plugins - LV2 format
        description: Linux Studio Plugins - LV2 format
        paths:
            - /usr/bin/lsp-plugins*
            - /usr/lib/lsp-plugins/liblsp-plugins-jack*.so
            - /usr/share/icons/
            - /usr/share/applications/lsp-plugins.desktop
