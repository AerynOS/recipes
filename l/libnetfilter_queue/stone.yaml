name        : libnetfilter_queue
version     : "1.0.5"
release     : 1
homepage    : https://www.netfilter.org/projects/libnetfilter_queue/
upstreams   :
    - https://netfilter.org/pub/libnetfilter_queue/libnetfilter_queue-1.0.5.tar.bz2 : f9ff3c11305d6e03d81405957bdc11aea18e0d315c3e3f48da53a24ba251b9f5
summary     : Netfilter userspace packet queuing library
description : |
    libnetfilter_queue is a userspace library providing an API to packets
    that have been queued by the kernel packet filter via NFQUEUE target.
license     : GPL-2.0-or-later
builddeps   :
    - pkgconfig(libmnl)
    - pkgconfig(libnfnetlink)
setup       : |
    %configure
build       : |
    %make
install     : |
    %make_install
tuning      :
    - lto: full
    - nosemantic
    - optimize: speed
    - sections
