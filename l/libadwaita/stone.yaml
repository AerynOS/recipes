name        : libadwaita
version     : "1.9.1"
release     : 25
homepage    : https://gitlab.gnome.org/GNOME/libadwaita
upstreams   :
    - https://download.gnome.org/sources/libadwaita/1.9/libadwaita-1.9.1.tar.xz : 2ae34dbb3ea56d270925707cefa36050482ec88a741f1810b7619a5377c41a66
summary     : Building blocks for modern GNOME applications
description : |
    Building blocks for modern GNOME applications
license     :
    - LGPL-2.1-only
builddeps   :
    - binary(msgfmt)
    - binary(sassc)
    - binary(vapigen)
    - pkgconfig(appstream)
    - pkgconfig(glib-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(gtk4)
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
packages    :
    - "%(name)-demos":
        paths:
            - /usr/bin/adwaita-1-demo
            - /usr/share/applications/
            - /usr/share/icons/hicolor/
            - /usr/share/metainfo/

    - "%(name)-devel":
        paths:
            - /usr/share/vala/
