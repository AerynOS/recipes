name        : libfyaml
version     : "0.9.6"
release     : 6
upstreams   :
    - https://github.com/pantoniou/libfyaml/releases/download/v0.9.6/libfyaml-0.9.6.tar.gz : a59cc3331e2eb903ec36933ad52a45888041cac31e44f553a00511131242c483
homepage    : https://github.com/pantoniou/libfyaml
license     : MIT
summary     : Fully feature complete YAML parser and emitter
description : |
    Fully feature complete YAML parser and emitter, supporting the latest YAML spec and passing the full YAML testsuite
builddeps   :
    - binary(jq)
    # - binary(sphinx-build)
    # - cmake(Clang) libllvm is a pretty heavy dependency, only add it if strictly necessary
    - pkgconfig(check)
    - pkgconfig(yaml-0.1)
setup       : |
    # TODO: Fix build with sphinx (needs linuxdoc?)
    %cmake \
        -DENABLE_NETWORK=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-tools":
        paths:
            - /usr/bin/
            - /usr/share/man/man1/
