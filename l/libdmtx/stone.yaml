name        : libdmtx
version     : "0.7.8"
release     : 1
upstreams   :
    - https://github.com/dmtx/libdmtx/archive/refs/tags/v0.7.8.tar.gz : 2394bf1d1d693a5a4ca3cfcc1bb28a4d878bdb831ea9ca8f3d5c995d274bdc39
