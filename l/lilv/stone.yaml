name        : lilv
version     : "0.28.0"
release     : 7
homepage    : https://gitlab.com/lv2/lilv
upstreams   :
    - https://gitlab.com/lv2/lilv/-/archive/v0.28.0/lilv-v0.28.0.tar.gz : 006065dcb59ccaad5463e6bb4598160e41dd6474a959838e74820f60a849bfdb
summary     : LV2 host library
description : |
    LV2 host library
license     :
    - 0BSD
    - BSD-3-Clause
    - ISC
builddeps   :
    - binary(doxygen)
    - binary(sphinx-build)
    - pkgconfig(lv2)
    - pkgconfig(serd-0)
    - pkgconfig(sndfile)
    - pkgconfig(sord-0)
    - pkgconfig(sratom-0)
    - pkgconfig(zix-0)
    # sphinxygen for docs
setup       : |
    %meson \
        -Ddocs=disabled
build       : |
    %meson_build
install     : |
    %meson_install

    # Stateless
    %install_dir %(installroot)/%(completionsdir)
    mv %(installroot)/etc/bash_completion.d/lilv %(installroot)/%(completionsdir)
packages    :
    - "%(name)-libs":
        summary: "Library files for %(name)"
        description: |
            Library files for %(name), typically pulled in as a dependency of another package.
        paths:
            - /usr/lib/liblilv-0.so.*
    - "python-%(name)":
        summary: "LV2 host library - Python library"
        description: |
            LV2 host library - Python Library
        rundeps:
            - binary(python3)
            - "%(name)-libs"
        paths:
            - /usr/lib/python*
