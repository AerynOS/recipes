name        : libvpl
version     : "2.17.0"
release     : 5
homepage    : https://intel.github.io/libvpl
upstreams   :
    - https://github.com/intel/libvpl/archive/refs/tags/v2.17.0.tar.gz : 4de3e2faf1e8307fb282e4a43f443191810f6a6b0a484fffa7995ba1c814c6ec
summary     : Intel Video Processing Library (libVPL) dispatcher
description : |
    Intel Video Processing Library (libVPL) dispatcher
license     : MIT
setup       : |
    %cmake \
        -DCMAKE_INSTALL_SYSCONFDIR=%(vendordir) \
        -DBUILD_TESTS=ON \
        -DBUILD_EXAMPLES=OFF \
        -DINSTALL_EXAMPLES=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install

    # CI script as far as I can tell
    rm -rfv %(installroot)%(vendordir)
check       : |
    %cmake_test
