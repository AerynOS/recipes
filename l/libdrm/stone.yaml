name        : libdrm
version     : "2.4.134"
release     : 18
homepage    : https://gitlab.freedesktop.org/mesa/drm
upstreams   :
    - https://dri.freedesktop.org/libdrm/libdrm-2.4.134.tar.xz : ac5e74d157830eb8bee44c6a6bf3ad49774ef0dd2a72bdad74a8f20308b52a95
summary     : Simplifies the interaction with the Linux DRM subsystem
description : |
    libdrm provides wrapper functions for the ioctls to avoid exposing the kernel interface directly.
license     : MIT
builddeps   :
    - binary(nm)
    - binary(rst2man)
    # Intel support
    - pkgconfig32(pciaccess)
emul32      : true
setup       : |
    %meson -Dudev=true
build       : |
    %meson_build
install     : |
    %meson_install
packages    :
    - "%(name)":
        paths:
            # DLopened by SteamVR
            - /usr/lib/libdrm*.so

    - "%(name)-32bit":
        paths:
            - /usr/lib32/libdrm*.so
