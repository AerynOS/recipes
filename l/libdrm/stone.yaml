name        : libdrm
version     : "2.4.133"
release     : 17
homepage    : https://gitlab.freedesktop.org/mesa/drm
upstreams   :
    - https://dri.freedesktop.org/libdrm/libdrm-2.4.133.tar.xz : fc68f9d0ba2ea63c9432a299e14fea09fad7a8a66e8039fcd7802ca59f77b4f5
summary     : Simplifies the interaction with the Linux DRM subsystem
description : |
    libdrm provides wrapper functions for the ioctls to avoid exposing the kernel interface directly.
license     : MIT
builddeps   :
    - binary(nm)
    - binary(rst2man)
    # Intel support
    - pkgconfig32(pciaccess)
emul32      : true
setup       : |
    %meson -Dudev=true
build       : |
    %meson_build
install     : |
    %meson_install
packages    :
    - "%(name)":
        paths:
            # DLopened by SteamVR
            - /usr/lib/libdrm*.so

    - "%(name)-32bit":
        paths:
            - /usr/lib32/libdrm*.so
