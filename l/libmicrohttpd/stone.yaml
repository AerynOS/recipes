name        : libmicrohttpd
version     : "1.0.5"
release     : 9
homepage    : https://www.gnu.org/software/libmicrohttpd
upstreams   :
    - https://ftp.gnu.org/gnu/libmicrohttpd/libmicrohttpd-1.0.5.tar.gz : b46d00f58efa6f497b97d2e782c4ee66301d412ddd855dd3068518b3a2cd3ea2
summary     : C library supposed to make it easy to run an embedded HTTP server
description : |
    GNU libmicrohttpd is a small C library that is supposed to make it easy to run an HTTP server as part of another application. GNU Libmicrohttpd is free software and part of the GNU project.
license     : LGPL-2.1-or-later
builddeps   :
    - pkgconfig(gnutls)
#checkdeps   :
#    - pkgconfig(libcurl)
setup       : |
    %configure \
        --disable-static
build       : |
    %make
install     : |
    %make_install
#check       : |
#    %make check
