name        : libmicrohttpd
version     : "1.0.3"
release     : 7
homepage    : https://www.gnu.org/software/libmicrohttpd
upstreams   :
    - https://ftp.gnu.org/gnu/libmicrohttpd/libmicrohttpd-1.0.3.tar.gz : 7816b57aae199cf5c3645e8770e1be5f0a4dfafbcb24b3772173dc4ee634126a
summary     : C library supposed to make it easy to run an embedded HTTP server
description : |
    GNU libmicrohttpd is a small C library that is supposed to make it easy to run an HTTP server as part of another application. GNU Libmicrohttpd is free software and part of the GNU project.
license     : LGPL-2.1-or-later
builddeps   :
    - pkgconfig(gnutls)
#checkdeps   :
#    - pkgconfig(libcurl)
setup       : |
    %configure \
        --disable-static
build       : |
    %make
install     : |
    %make_install
#check       : |
#    %make check
# Fails because "network is unreachable"
