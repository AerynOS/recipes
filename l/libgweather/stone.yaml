name        : libgweather
version     : "4.6.0"
release     : 9
homepage    : https://wiki.gnome.org/Projects/LibGWeather
upstreams   :
    - https://download.gnome.org/sources/libgweather/4.6/libgweather-4.6.0.tar.xz : 7f5d0e8c9685ef2ff46c2f3a57cae48d7bf3540b2d83921f889ef28e6a876788
summary     : Location and time zone database, and weather-lookup library
description : |
    libgweather is a library to access weather information from online services for numerous locations.
license     :
    - GPL-2.0-or-later
builddeps   :
    - binary(g-ir-scanner)
    - binary(gi-docgen)
    - binary(msgfmt)
    - pkgconfig(geocode-glib-2.0)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(libsoup-3.0)
    - pkgconfig(libxml-2.0)
    - pkgconfig(vapigen)
    - pkgconfig(gweather-locations)
setup       : |
    %meson \
        -Denable_vala=true \
        -Dintrospection=true
build       : |
    %meson_build
install     : |
    %meson_install
packages    :
    - "%(name)":
        rundeps:
            - gweather-locations

    - "%(name)-devel":
        paths:
            - /usr/share/vala/vapi

    - "%(name)-docs":
        paths:
            - /usr/share/doc
