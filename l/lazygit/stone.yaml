name        : lazygit
version     : "0.63.0"
release     : 9
homepage    : https://github.com/jesseduffield/lazygit
upstreams   :
    - https://github.com/jesseduffield/lazygit/archive/refs/tags/v0.63.0.tar.gz : 56f028ad7700cbe4474e5fb09a617649a82d0963820d38757f61a93b31832610
summary     : A simple terminal UI for git commands
description : |
    A simple terminal UI for git commands
license     : MIT
builddeps   :
    - binary(go)
build       : |
    go build -v \
        -gcflags='all=-N -l' \
        -ldflags "\
        -X main.version=%(version) \
        -X main.commit=v%(version) \
        "
install     : |
    %install_bin lazygit
    %install_file LICENSE -t %(installroot)%(datadir)/licenses/%(name)/
tuning      :
    - golang-modflags: false
