name        : lazygit
version     : "0.63.1"
release     : 10
homepage    : https://github.com/jesseduffield/lazygit
upstreams   :
    - https://github.com/jesseduffield/lazygit/archive/refs/tags/v0.63.1.tar.gz : 227ff262138440ff68e893f6c95c4e586e954c46913106d84fff78d220e18b6c
summary     : A simple terminal UI for git commands
description : |
    A simple terminal UI for git commands
license     : MIT
builddeps   :
    - binary(go)
build       : |
    go build -v \
        -gcflags='all=-N -l' \
        -ldflags "\
        -X main.version=%(version) \
        -X main.commit=v%(version) \
        "
install     : |
    %install_bin lazygit
    %install_file LICENSE -t %(installroot)%(datadir)/licenses/%(name)/
tuning      :
    - golang-modflags: false
