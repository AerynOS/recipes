name        : lazygit
version     : "0.62.2"
release     : 7
homepage    : https://github.com/jesseduffield/lazygit
upstreams   :
    - https://github.com/jesseduffield/lazygit/archive/refs/tags/v0.62.2.tar.gz : 0bd1cdbaf1a584d2eb2fd14f068a8eaaeaeb80d3e2713c72005de9e4feaf6844
summary     : A simple terminal UI for git commands
description : |
    A simple terminal UI for git commands
license     : MIT
builddeps   :
    - binary(go)
build       : |
    go build -v \
        -gcflags='all=-N -l' \
        -ldflags "\
        -X main.version=%(version) \
        -X main.commit=v%(version) \
        "
install     : |
    %install_bin lazygit
    %install_file LICENSE -t %(installroot)%(datadir)/licenses/%(name)/
