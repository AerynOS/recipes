name        : level-zero
version     : "1.28.2"
release     : 2
homepage    : https://github.com/oneapi-src/level-zero
upstreams   :
    - https://github.com/oneapi-src/level-zero/archive/refs/tags/v1.28.2.tar.gz : 8133525fbf9a089ea633f6fa1f5a93a36848ec6572e255415643de031ed14429
summary     : oneAPI Level Zero Specification Headers and Loader
description : |
    The oneAPI Level Zero (Level Zero) provides low-level direct-to-metal interfaces that are tailored to the devices in a oneAPI platform. This package includes the Level Zero headers, loader, and validation layer
license     :
    - MIT
builddeps   :
    - cmake(spdlog)
    - pkgconfig(OpenCL-Headers)
checkdeps   :
    - cmake(GTest)
setup       : |
    %patch %(pkgdir)/use-system-GTest.patch

    # Remove this patch in next update
    # https://github.com/oneapi-src/level-zero/commit/b62852e90dfd0e7e388c2141a8495b9b42eafd76
    %patch %(pkgdir)/b62852e90dfd0e7e388c2141a8495b9b42eafd76.patch

    %cmake \
        -DSYSTEM_SPDLOG=ON \
        -DBUILD_L0_LOADER_TESTS=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
check       : |
    export ZEL_LIBRARY_PATH=%(workdir)/%(builddir)/lib
    %cmake_test
