name        : level-zero
version     : "1.28.6"
release     : 3
homepage    : https://github.com/oneapi-src/level-zero
upstreams   :
    - https://github.com/oneapi-src/level-zero/archive/refs/tags/v1.28.6.tar.gz : 02b26cc37181e792a39cef5c962e9732550fa767737b9932f6f1da137e1c2ac4
summary     : oneAPI Level Zero Specification Headers and Loader
description : |
    The oneAPI Level Zero (Level Zero) provides low-level direct-to-metal interfaces that are tailored to the devices in a oneAPI platform. This package includes the Level Zero headers, loader, and validation layer
license     :
    - MIT
builddeps   :
    - cmake(spdlog)
    - pkgconfig(OpenCL-Headers)
checkdeps   :
    - cmake(GTest)
setup       : |
    %patch %(pkgdir)/use-system-GTest.patch

    %cmake \
        -DSYSTEM_SPDLOG=ON \
        -DBUILD_L0_LOADER_TESTS=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
check       : |
    export ZEL_LIBRARY_PATH=%(workdir)/%(builddir)/lib
    %cmake_test
