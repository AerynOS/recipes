name        : libxfont2
version     : "2.0.8"
release     : 4
homepage    : https://gitlab.freedesktop.org/xorg/lib/libxfont
upstreams   :
    - https://www.x.org/archive//individual/lib/libXfont2-2.0.8.tar.xz : f556c0e1093a4e6911cc90bc4b106d201902ee187fd74af206ff162f7e6a24d5
summary     : X font handling library for server & utilities
description : |
    X font handling library for server & utilities
license     :
    - MIT
builddeps   :
    - pkgconfig(fontenc)
    - pkgconfig(fontsproto)
    - pkgconfig(freetype2)
    - pkgconfig(x11)
    - pkgconfig(xproto)
    - pkgconfig(xtrans)
setup       : |
    %configure --disable-static
build       : |
    %make
install     : |
    %make_install
