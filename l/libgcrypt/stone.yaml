name        : libgcrypt
version     : "1.12.2"
release     : 11
homepage    : https://gnupg.org/software/libgcrypt
upstreams   :
    - https://gnupg.org/ftp/gcrypt/libgcrypt/libgcrypt-1.12.2.tar.bz2 : 7ce33c2492221a0436f96a8500215e9f3e3dcb5fd26a757cd415e7a843babd5e
summary     : General purpose cryptographic library originally based on code from GnuPG
description : |
    %(name) is a general purpose cryptographic library originally based on code from GnuPG. It provides functions for all cryptograhic building blocks.
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
builddeps   :
    - pkgconfig(gpg-error)
checkdeps   :
    - soname(libgcc_s.so.1(x86_64))
setup       : |
    %configure
build       : |
    %make
install     : |
    %make_install
check       : |
    %make check
packages    :
    - "%(name)-devel":
        paths:
            - /usr/bin/
            - /usr/share/info/
            - /usr/share/man/
