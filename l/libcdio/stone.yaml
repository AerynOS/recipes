name        : libcdio
version     : "2.3.0"
release     : 2
upstreams   :
    - https://github.com/libcdio/libcdio/releases/download/2.3.0/libcdio-2.3.0.tar.gz : 37bcb13296febbcff9dc4485834bac09212cb463c31fcea52f70ee1dd3a5a5de
homepage    : https://github.com/libcdio/libcdio
license     : GPL-3.0-or-later
summary     : A library to encapsulate CD-ROM reading and control
description : |
    This library provides an interface for CD-ROM access. It can be used by applications that need OS- and device-independent access to CD-ROM devices.
builddeps   :
    - pkgconfig(libcddb)
    - pkgconfig(ncurses)
setup       : |
    %configure \
        --disable-static
build       : |
    %make
install     : |
    %make_install
