name        : libebml
version     : "1.4.6"
release     : 2
homepage    : https://github.com/Matroska-Org/libebml
upstreams   :
    - https://github.com/Matroska-Org/libebml/archive/refs/tags/release-1.4.6.tar.gz : b697f4d492fac2e0af610eb0ad340ddcab2aedbc3e07086378135efbdce2d61e
summary     : A C++ library to parse EBML files
description : |
    A C++ library to parse EBML files.
license     : LGPL-2.1-or-later
builddeps   :
    - cmake(utf8cpp)
setup       : |
    %patch %(pkgdir)/0001-ftbfs-utf8cpp.patch
    %cmake \
        -DBUILD_SHARED_LIBS=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
