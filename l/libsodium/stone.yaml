name        : libsodium
version     : "1.0.22+git.2ce4d906"
release     : 6
homepage    : https://libsodium.org
upstreams   :
    - git|https://github.com/jedisct1/libsodium.git : 2ce4d906a68eae82b27b4867f3d4172ec508cb27 # Should be the latest of the stable branch, or a specific version branch if we're holding this back
summary     : A modern, portable, easy to use crypto library
description : |
    An easy-to-use software library for encryption, decryption, signatures, password hashing, and more.

    It is a portable, cross-compilable, installable, packageable fork of NaCl, with a compatible API, and an extended API to improve usability even further.

    Its goal is to provide all of the core operations needed to build higher-level cryptographic tools.
license     : ISC
setup       : |
    %configure
build       : |
    %make
install     : |
    %make_install
