name        : libcbor
version     : "0.14.0"
release     : 6
homepage    : https://github.com/PJK/libcbor
upstreams   :
    - https://github.com/PJK/libcbor/archive/refs/tags/v0.14.0.tar.gz : a8c1516e741562cf95aa4479c64916c3d4d2623e24fdc35e414e2320e7300aae
summary     : CBOR protocol implementation for C
description : |
    C library for parsing and generating CBOR, the general-purpose schema-less
    binary data format.
license     : MIT
builddeps   :
    - pkgconfig(cmocka)
setup       : |
    %cmake \
        -DBUILD_SHARED_LIBS=ON \
        -DWITH_TESTS=ON \
        -DWITH_EXAMPLES=OFF
build       : |
    %ninja
install     : |
    %ninja_install
check       : |
    %ninja_test
