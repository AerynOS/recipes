name        : luajit
version     : "2.1-20260415"
release     : 6
homepage    : https://luajit.org/
upstreams   :
    - https://github.com/openresty/luajit2/archive/refs/tags/v2.1-20260415.tar.gz : b4477219ae6fea510a371027c494ad0939114d1dff5e84049369a8a59f1c86ab
summary     : Just-in-time compiler and drop-in replacement for Lua 5.1
description : |
    LuaJIT is a Just-In-Time (JIT) compiler for the Lua programming language.
license     : MIT
tuning      :
    - icf: false
build       : |
    # Stupid build system
    %make amalg \
        CC="${CC}" \
        TARGET_CFLAGS="${CFLAGS}" \
        TARGET_LDFLAGS="${CFLAGS} ${LDFLAGS}" \
        TARGET_SHLDFLAGS="${CFLAGS} ${LDFLAGS}" \
        PREFIX=/usr \
        BUILDMODE=dynamic \
        TARGET_STRIP=: \
        Q= E=@:
install     : |
    %make_install PREFIX=/usr
