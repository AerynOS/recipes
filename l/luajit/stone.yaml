name        : luajit
version     : "2.1-20260606"
release     : 7
homepage    : https://luajit.org/
upstreams   :
    - https://github.com/openresty/luajit2/archive/refs/tags/v2.1-20260606.tar.gz : 8f075a15bfdd2bfefc6f54fec0d35eedccb9b7fbc6ed5dba8ccb03da1f157c5c
summary     : Just-in-time compiler and drop-in replacement for Lua 5.1
description : |
    LuaJIT is a Just-In-Time (JIT) compiler for the Lua programming language.
license     : MIT
tuning      :
    - icf: false
build       : |
    # Stupid build system
    %make amalg \
        CC="${CC}" \
        TARGET_CFLAGS="${CFLAGS}" \
        TARGET_LDFLAGS="${CFLAGS} ${LDFLAGS}" \
        TARGET_SHLDFLAGS="${CFLAGS} ${LDFLAGS}" \
        PREFIX=/usr \
        BUILDMODE=dynamic \
        TARGET_STRIP=: \
        Q= E=@:
install     : |
    %make_install PREFIX=/usr
