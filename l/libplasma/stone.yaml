name        : libplasma
version     : "6.7.0"
release     : 28
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.0/libplasma-6.7.0.tar.xz : 8a85e4c9eb2c3c00b5683cce3aa2c949d06b956c88789c1b1c110b6abae20312
homepage    : https://kde.org/plasma-desktop/
license     :
    - BSD-3-Clause
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
summary     : Plasma library and runtime components
description : |
    Plasma library and runtime components
builddeps   :
    - binary(bzip2)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(KF6ColorScheme)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6GlobalAccel)
    - cmake(KF6GuiAddons)
    - cmake(KF6I18n)
    - cmake(KF6IconThemes)
    - cmake(KF6KIO)
    - cmake(KF6KirigamiPlatform)
    - cmake(KF6Notifications)
    - cmake(KF6Package)
    - cmake(KF6Svg)
    - cmake(KF6WindowSystem)
    - cmake(PlasmaActivities)
    - cmake(PlasmaWaylandProtocols)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
    - cmake(Qt6Quick)
    - cmake(Qt6Svg)
    - cmake(Qt6WaylandClient)
    - pkgconfig(wayland-protocols)
    - kf6-kirigami
    - qt6-5compat
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)":
        rundeps:
            - kf6-kirigami
            - qt6-5compat

    - "%(name)-devel":
        rundeps:
            - cmake(KF6CoreAddons)
            - cmake(KF6KirigamiPlatform)
            - cmake(KF6Package)
            - cmake(KF6WindowSystem)
        paths:
            - /usr/share/kdevappwizard
