name        : ly
version     : "1.4.1"
release     : 4
homepage    : https://github.com/fairyglade/ly
upstreams   :
    - https://codeberg.org/fairyglade/ly/archive/v1.4.1.tar.gz : 16fe5f07cc7a23930880b14d905883644cdc4b574d1c146629f6b98ee8fbbab9
summary     : TUI display manager
description : |
    Ly is a lightweight TUI display manager for Linux.
license     : WTFPL
networking  : true
builddeps   :
    - binary(zig-0.16)
    - pkgconfig(pam)
    - pkgconfig(xcb)
environment : |
    _zig=zig-0.16
build       : |
    # *Look* for configuration stuff in /etc/ly
    ${_zig} build \
        --summary all \
        --verbose \
        -Doptimize=ReleaseFast \
        -Dcpu=x86_64_v2 \
        -Ddest_directory=%(installroot) \
        -Dprefix_directory=%(prefix) \
        -Dconfig_directory=%(sysconfdir) \
        -Dinit_system=systemd
install     : |
    # *Install* configuration stuff in /usr/share/defaults/ly (= stateless config dir)
    ${_zig} build installexe \
        -Ddest_directory=%(installroot) \
        -Dprefix_directory=%(prefix) \
        -Dconfig_directory=%(vendordir) \
        -Dinit_system=systemd

    # Ensure that /etc/ly points to /usr/share/defaults/ly where defaults were installed
    %tmpfiles "# Create /etc/ly symlink pointing to stateless vendor ly display manager config"
    %tmpfiles "L? %(sysconfdir)/ly - - - - %(vendordir)/ly"

    ## The below blocks are being kept for reference;
    ## due to the "trick" of configuring with %(sysconfdir)
    ## but installing with %(vendordir), they are no longer necessary.
    ## (verified by building with the commented out blocks and checking jsonc manifest)

    # Config files /etc/ly → /usr/share/defaults/ly/
    # %install_dir %(installroot)%(vendordir)/ly/lang
    # %install_file %(pkgdir)/config.ini -t %(installroot)%(vendordir)/ly/
    # %install_exe  %(pkgdir)/startup.sh -t %(installroot)%(vendordir)/ly/
    # %install_exe  res/setup.sh %(installroot)%(vendordir)/ly/setup.sh

    # PAM (AerynOS: /usr/share/defaults/pam.d/)
    # %install_dir %(installroot)%(vendordir)/pam.d
    # %install_file res/pam.d/ly-linux %(installroot)%(vendordir)/pam.d/ly
    # %install_file res/pam.d/ly-linux-autologin %(installroot)%(vendordir)/pam.d/ly-autologin
