name        : libuv
version     : "1.52.1"
release     : 8
homepage    : https://libuv.org/
upstreams   :
    - https://dist.libuv.org/dist/v1.52.1/libuv-v1.52.1.tar.gz : 66d511b9e6e334c0e62279eb234fbfb2b3110b1479c09b95b44c7afca8cff9e7
summary     : Cross-platform asynchronous I/O library
description : |
    libuv is a multi-platform support library with a focus on asynchronous I/O.
license     :
    - BSD-2-Clause
    - ISC
    - MIT
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
    rm -v %(installroot)%(libdir)/pkgconfig/libuv-static.pc
    rm -v %(installroot)%(libdir)/libuv.a
tuning      :
    - lto
    - optimize: speed
