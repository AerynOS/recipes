name        : lact
version     : "0.9.0"
release     : 2
upstreams   :
    - https://github.com/ilya-zlobintsev/LACT/archive/refs/tags/v0.9.0.tar.gz : 4a422ef394351704b6506d97e1a8ff262b8cd9af4b81ef1e096bc60c22797bf8
homepage    : https://github.com/ilya-zlobintsev/LACT
license     : MIT
summary     : Linux GPU Configuration Tool
description : |
    Linux GPU Configuration Tool
networking  : true
builddeps   :
    - binary(cargo)
    - binary(vulkaninfo)
    - pkgconfig(OpenCL)
    - pkgconfig(gobject-2.0)
    - pkgconfig(graphene-gobject-1.0)
    - pkgconfig(libadwaita-1)
    - pkgconfig(libdrm)
rundeps     :
    - binary(vulkaninfo)
    - hwdata
setup       : |
    %patch %(pkgdir)/863.patch
build       : |
    %make build-release
install     : |
    %make_install PREFIX=%(prefix)
    %install_file %(pkgdir)/kernel-lact.cmdline %(installroot)%(libdir)/kernel/cmdline.d/70-lact.cmdline

    # Enable system-wide upon install
    %install_file %(pkgdir)/60-lact.preset -t %(installroot)/%(libdir)/systemd/system-preset
