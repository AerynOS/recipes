name        : libsrtp
version     : "2.8.0"
release     : 2
upstreams   :
    - https://github.com/cisco/libsrtp/archive/v2.8.0.tar.gz : d123dcff5c56d4f1a9006f2b311ea99a85016cbf3bb24b1007885d422237db85
homepage    : https://github.com/cisco/libsrtp
license     : BSD-3-Clause
summary     : Secure Real-Time Transport Protocol
description : |
    This package provides an implementation of the Secure Real-time Transport Protocol (SRTP), the Universal Security Transform (UST), and a supporting cryptographic kernel.
builddeps   :
    - binary(doxygen)
    - pkgconfig(libcrypto)
    - pkgconfig(libpcap)
setup       : |
    %meson \
        -Dcrypto-library=openssl
build       : |
    %meson_build
install     : |
    %meson_install
