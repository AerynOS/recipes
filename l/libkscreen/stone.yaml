name        : libkscreen
version     : "6.6.4"
release     : 21
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.4/libkscreen-6.6.4.tar.xz : 18f8cf65fcc788a7188d72a17d6e0f107e044e07623d5c012d063d901d67b59d
homepage    : https://kde.org/plasma-desktop/
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-only
summary     : KDE's screen management software
description : |
    KDE's screen management software
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(PlasmaWaylandProtocols)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6WaylandClient)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
