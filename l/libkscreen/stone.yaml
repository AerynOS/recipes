name        : libkscreen
version     : "6.6.3"
release     : 20
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.3/libkscreen-6.6.3.tar.xz : 408110fc5342a8fe1ff43f026613e0b5ad94e925e85c195a24eac142e74fd179
homepage    : https://kde.org/plasma-desktop/
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-only
summary     : KDE's screen management software
description : |
    KDE's screen management software
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(PlasmaWaylandProtocols)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6WaylandClient)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
