name        : libkscreen
version     : "6.7.3"
release     : 27
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.3/libkscreen-6.7.3.tar.xz : 26dfe23f20eaf95b5d4fa2595d55a9c740d1356d5e317b48edeb10975ea6359e
homepage    : https://kde.org/plasma-desktop/
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-only
summary     : KDE's screen management software
description : |
    KDE's screen management software
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(PlasmaWaylandProtocols)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6WaylandClient)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
