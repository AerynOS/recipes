name        : libkscreen
version     : "6.7.2"
release     : 26
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.2/libkscreen-6.7.2.tar.xz : 408dc2753001a689cadfc77bdcc4a968baa385cae8dd8abce6c3ce422284d078
homepage    : https://kde.org/plasma-desktop/
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-only
summary     : KDE's screen management software
description : |
    KDE's screen management software
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(PlasmaWaylandProtocols)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6WaylandClient)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
