name        : libkscreen
version     : "6.6.2"
release     : 18
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.2/libkscreen-6.6.2.tar.xz : 2bc247268fdbbea584af33f8a67c9fd1e891aba1e174f272c71a42a1787929d8
homepage    : https://kde.org/plasma-desktop/
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-only
summary     : KDE's screen management software
description : |
    KDE's screen management software
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(PlasmaWaylandProtocols)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6WaylandClient)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
