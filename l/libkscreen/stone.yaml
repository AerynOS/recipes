name        : libkscreen
version     : "6.7.0"
release     : 24
upstreams   :
    - https://download.kde.org/stable/plasma/6.7.0/libkscreen-6.7.0.tar.xz : 6efba58057a2635da6f1855ba6b08e57e636c976421ba5e3f5f667e6a57b0ce1
homepage    : https://kde.org/plasma-desktop/
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-only
summary     : KDE's screen management software
description : |
    KDE's screen management software
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(PlasmaWaylandProtocols)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6WaylandClient)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
