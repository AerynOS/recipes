name        : librsvg
version     : "2.62.0"
release     : 17
homepage    : https://gitlab.gnome.org/GNOME/librsvg
upstreams   :
    - https://download.gnome.org/sources/librsvg/2.62/librsvg-2.62.0.tar.xz : 4278ddc1195ab82f4fd834ac1f5aa75ac1685f3cc5484bb0eaebe03a790b8d82
summary     : Library to render SVG files using Cairo
description : |
    A small library to render Scalable Vector Graphics (SVG), associated with the GNOME Project. It renders SVG files to Cairo surfaces. Cairo is the 2D, antialiased drawing library that GNOME uses to draw things to the screen or to generate output for printing.
license     :
    - LGPL-2.1-or-later
networking  : true
builddeps   :
    - binary(cargo)
    - binary(cargo-cbuild)
    - binary(gi-docgen)
    - binary(python3)
    - binary(rst2man)
    - pkgconfig(cairo)
    - pkgconfig(cairo-gobject)
    - pkgconfig(dav1d)
    - pkgconfig(fontconfig)
    - pkgconfig(gdk-pixbuf-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(libpng)
    - pkgconfig(libxml-2.0)
    - pkgconfig(pango)
    - pkgconfig(vapigen)
    - pkgconfig(xdamage)
    - pkgconfig(xshmfence)
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
check       : |
    %meson_test || :
packages    :
    - "%(name)-tools":
        paths:
            - /usr/bin/rsvg-convert
            - /usr/share/man/man1/rsvg-convert.1*

    - "%(name)-devel":
        paths:
            - /usr/share/vala/vapi/

    - "%(name)-docs":
        paths:
            - /usr/share/doc/
