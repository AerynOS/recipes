name        : libraw
version     : "0.22.2"
release     : 7
upstreams   :
    - https://www.libraw.org/data/LibRaw-0.22.2.tar.gz : de86b035655accff8d4010f1a221fdf50d353cb7b1422ba26f14a0db92612cfa
homepage    : https://www.libraw.org/
license     :
    - CDDL-1.0
    - LGPL-2.1-or-later
summary     : LibRaw is a library for reading RAW files from digital cameras
description : |
    LibRaw is a library for reading RAW files from digital cameras
builddeps   :
    - pkgconfig(lcms2)
    - pkgconfig(libjpeg)
    - pkgconfig(zlib)
setup       : |
    %configure \
        --disable-static
build       : |
    %make
install     : |
    %make_install
packages    :
    - "%(name)-samples":
        summary: LibRaw sample programs
        description: LibRaw sample programs
        paths:
            - /usr/bin/
