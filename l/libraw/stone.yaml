name        : libraw
version     : "0.22.1"
release     : 6
upstreams   :
    - https://www.libraw.org/data/LibRaw-0.22.1.tar.gz : a789dc4e2409e2901d93793a4e0b80c7b49d0d97cf6ad71c850eb7616acfd786
homepage    : https://www.libraw.org/
license     :
    - CDDL-1.0
    - LGPL-2.1-or-later
summary     : LibRaw is a library for reading RAW files from digital cameras
description : |
    LibRaw is a library for reading RAW files from digital cameras
builddeps   :
    - pkgconfig(lcms2)
    - pkgconfig(libjpeg)
    - pkgconfig(zlib)
setup       : |
    %configure \
        --disable-static
build       : |
    %make
install     : |
    %make_install
packages    :
    - "%(name)-samples":
        summary: LibRaw sample programs
        description: LibRaw sample programs
        paths:
            - /usr/bin/
