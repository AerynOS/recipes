name        : libdovi
version     : "3.4.0"
release     : 3
upstreams   :
    - https://github.com/quietvoid/dovi_tool/archive/refs/tags/libdovi-3.4.0.tar.gz : 8eac4d1c3134f53e8eb216db6450307a737425844113e480d1e9713c142a9fa2
homepage    : https://github.com/quietvoid/dovi_tool
license     : MIT
summary     : Library to read & write Dolby Vision metadata
description : |
    Library to read & write Dolby Vision metadata.
builddeps   :
    - cargo-c
networking  : true
setup       : |
    pushd dolby_vision
    %cargo_fetch
build       : |
    pushd dolby_vision
    cargo cbuild \
        --frozen \
        --library-type=cdylib \
        --prefix=%(prefix) \
        --release
install     : |
    pushd dolby_vision
    cargo cinstall \
        --destdir=%(installroot) \
        --frozen \
        --libdir=%(libdir) \
        --library-type=cdylib \
        --prefix=%(prefix)
