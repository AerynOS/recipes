    - cmake(KF6ColorScheme)
    - cmake(KF6CoreAddons)
    - cmake(KF6DocTools)
    - cmake(KF6I18n)
    - cmake(KF6IconThemes)
    - cmake(KF6KIO)
    - cmake(KF6Mime)
    - cmake(KF6NewStuff)
    - cmake(KF6Sonnet)
    - cmake(KF6SyntaxHighlighting)
    - cmake(KF6TextAddonsWidgets)
    - cmake(KF6TextAutoGenerateText)
    - cmake(KF6TextCustomEditor)
    - cmake(KF6TextEditTextToSpeech)
    - cmake(KF6TextUtils)
    - cmake(KPim6IdentityManagementCore)
    - cmake(KPim6IMAP)
    - cmake(KPim6Libkdepim)
    - cmake(KPim6MailTransport)
    - cmake(KPim6PimCommon)
    - cmake(Qt6WebEngineWidgets)
    - pkgconfig(libsasl2)
setup       : |
