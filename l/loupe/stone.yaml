name        : loupe
version     : "50.0"
release     : 17
homepage    : https://apps.gnome.org/Loupe/
upstreams   :
    - https://download.gnome.org/sources/loupe/50/loupe-50.0.tar.xz : 7ae4fbae5e19316aa640c56f80dc5a791448a62dd8f0ff06e29a58bad813a994
summary     : Image Viewer
description : |
    Browse through your images and inspect their metadata with:
    - Fast GPU accelerated image rendering
    - Tiled rendering for vector graphics
    - Extendable and sandboxed image decoding
    - Accessible presentation of the most important metadata.
license     :
    - GPL-3.0-or-later
networking  : true
builddeps   :
    - binary(cargo)
    - binary(itstool)
    - binary(msgfmt)
    - binary(update-desktop-database)
    - pkgconfig(gtk4)
    - pkgconfig(gweather4)
    - pkgconfig(lcms2)
    - pkgconfig(libadwaita-1)
    - pkgconfig(libseccomp)
rundeps     :
    - glycin-loaders
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
check       : |
    %meson_test
