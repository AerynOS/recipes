name        : libgravatar
version     : "26.04.2"
release     : 14
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/libgravatar-26.04.2.tar.xz : 84bf34bf05b0823534b9cb40cef8803ae2e654a9c7aa5e823296edc4a002bc6c
homepage    : https://kde.org
license     :
    - GPL-2.0-only
    - LGPL-2.1-or-later
summary     : KDE PIM library providing Gravatar support
description : |
    KDE PIM library providing Gravatar support.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6ConfigWidgets)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6WidgetsAddons)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
