name        : libgravatar
version     : "26.04.3"
release     : 15
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/libgravatar-26.04.3.tar.xz : 4e46acbd21c2a817247fea5ff66a89ebab2b824466e8939e7dc565f299dd9a81
homepage    : https://kde.org
license     :
    - GPL-2.0-only
    - LGPL-2.1-or-later
summary     : KDE PIM library providing Gravatar support
description : |
    KDE PIM library providing Gravatar support.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6ConfigWidgets)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6WidgetsAddons)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
