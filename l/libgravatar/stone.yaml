name        : libgravatar
version     : "25.12.3"
release     : 11
upstreams   :
    - https://download.kde.org/stable/release-service/25.12.3/src/libgravatar-25.12.3.tar.xz : 3a7388ad15f0da3556e36be0b9ae604b3e5b1a6bb1424220122767bc0d3c88a6
homepage    : https://kde.org
license     :
    - GPL-2.0-only
    - LGPL-2.1-or-later
summary     : KDE PIM library providing Gravatar support
description : |
    KDE PIM library providing Gravatar support.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6ConfigWidgets)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6WidgetsAddons)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
