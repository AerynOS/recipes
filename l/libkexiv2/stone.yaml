name        : libkexiv2
version     : "26.04.2"
release     : 14
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/libkexiv2-26.04.2.tar.xz : fdd8b2ca473339281676bccd1be1d6bf7df2f7644822c52a5cb73af8535a854e
homepage    : https://kde.org/
license     : GPL-2.0-or-later
summary     : Exiv2 library interface for KDE
description : |
    Libkexiv2 is a wrapper around Exiv2 library to manipulate pictures metadata as EXIF/IPTC and XMP.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(exiv2)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install

    # remove docs
    rm -rf %(installroot)/%(datadir)/doc
