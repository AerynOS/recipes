name        : libkexiv2
version     : "26.04.3"
release     : 15
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/libkexiv2-26.04.3.tar.xz : dd5ddbf107dd9a51454ae83b0537ca80ce31e65da649c0a8db745e356d0d0064
homepage    : https://kde.org/
license     : GPL-2.0-or-later
summary     : Exiv2 library interface for KDE
description : |
    Libkexiv2 is a wrapper around Exiv2 library to manipulate pictures metadata as EXIF/IPTC and XMP.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(exiv2)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install

    # remove docs
    rm -rf %(installroot)/%(datadir)/doc
