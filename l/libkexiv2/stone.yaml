name        : libkexiv2
version     : "26.04.0"
release     : 12
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.0/src/libkexiv2-26.04.0.tar.xz : be2057aa2b5287d9f64c9c64260f9d125827abaf10fe4b786b39f59de3b2c319
homepage    : https://kde.org/
license     : GPL-2.0-or-later
summary     : Exiv2 library interface for KDE
description : |
    Libkexiv2 is a wrapper around Exiv2 library to manipulate pictures metadata as EXIF/IPTC and XMP.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(exiv2)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install

    # remove docs
    rm -rf %(installroot)/%(datadir)/doc
