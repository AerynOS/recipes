name        : lame
version     : "4.0"
release     : 7
homepage    : https://lame.sourceforge.io/
upstreams   :
    - https://sourceforge.net/projects/lame/files/lame/4.0/lame-4.0.tar.gz :
        hash: 3df5124d5ad3a98312ffd7ba6a9b36230e4f8a3e66d3ce0f425e336c32d216eb
        rename: lame.tar.gz
summary     : LAME is a high quality MPEG Audio Layer III (MP3) encoder
description : |
    LAME is a high quality MPEG Audio Layer III (MP3) encoder licensed under the LGPL.
license     : LGPL-2.0-or-later
builddeps   :
    - binary(dot)
    - binary(nasm)
    - pkgconfig(libmpg123)
    - pkgconfig(ncursesw)
setup       : |
    # glibc 2.43 build failure, remove in future version
    export CFLAGS+=" -Wno-error=incompatible-pointer-types"

    # Fix rpath without reconfiguring
    sed -i -e 's/^\(\s*hardcode_libdir_flag_spec\s*=\).*/\1/' configure

    %patch %(pkgdir)/ftbfs.patch

    %configure \
        --disable-rpath \
        --disable-static \
        --enable-nasm \
        --enable-expopt=full
build       : |
    %make
install     : |
    %make_install
packages    :
    - "%(name)-libs":
        paths:
            - /usr/lib/libmp3lame.so.*

    - "%(name)-docs":
        paths:
            - /usr/share/doc
