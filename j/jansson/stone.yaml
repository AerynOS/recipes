name        : jansson
version     : "2.15.1"
release     : 6
summary     : C library for encoding, decoding and manipulating JSON data
license     : MIT
homepage    : https://digip.org/jansson/
description : |
    C library for encoding, decoding and manipulating JSON data.
upstreams   :
    - https://github.com/akheron/jansson/releases/download/v2.15.1/jansson-2.15.1.tar.gz: 0c7114dc0b2d22a670724a1f95922029d7077c19dbf79a584cb8084d2f267f2f
emul32      : true
profiles    :
    - emul32:
        setup: |
            %patch %(pkgdir)/emul32.diff

            %cmake \
                -DJANSSON_BUILD_SHARED_LIBS=ON
setup       : |
    %cmake \
        -DJANSSON_BUILD_SHARED_LIBS=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
