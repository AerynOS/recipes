name        : jpegxl
version     : "0.12.0"
release     : 10
homepage    : https://github.com/libjxl/libjxl
upstreams   :
    - https://github.com/libjxl/libjxl/archive/refs/tags/v0.12.0.tar.gz : 03e9be69a30be4011f559da75328b6d7cea8ad921fabfbd551ce10bf45cdc992
    - git|https://github.com/webmproject/sjpeg.git : 94e0df6d0f8b44228de5be0ff35efb9f946a13c9
    - git|https://skia.googlesource.com/skcms.git : 96d9171c94b937a1b5f0293de7309ac16311b722
summary     : JPEG XL image format reference implementation
description : |
    JPEG XL image format reference implementation
license     : BSD-3-Clause
builddeps   :
    - binary(asciidoc)
    - binary(doxygen)
    - binary(patchelf)
    - binary(sphinx-build)
    - pkgconfig(OpenEXR)
    - pkgconfig(gl)
    - pkgconfig(glut)
    - pkgconfig(lcms2)
    - pkgconfig(libbrotlidec)
    - pkgconfig(libhwy)
    - pkgconfig(libjpeg)
    - pkgconfig(libpng)
    - pkgconfig(zlib)
    - docbook
    - giflib-devel
    # gimp-2.0
    # NOTE: Do not re-enable pixbuf loader. It is now superceded by a glycin plugin
environment : |
    %export_docbook_catalogs
setup       : |
    rm -rf third_party/{sjpeg,skcms}
    ln -s ../../sjpeg.git third_party/sjpeg
    ln -s ../../skcms.git third_party/skcms

    %cmake \
        -DBUILD_TESTING=OFF \
        -DJPEGXL_ENABLE_BENCHMARK=OFF \
        -DJPEGXL_ENABLE_PLUGINS=ON \
        -DJPEGXL_ENABLE_PLUGIN_MIME=ON \
        -DJPEGXL_ENABLE_PLUGIN_GDKPIXBUF=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install

    # This is obviously not ABI compatible but _boulder doesn't know that_
    for i in libjxl libjxl_cms libjxl_threads; do
        cp %(installroot)%(libdir)/${i}.so.0.12 %(installroot)%(libdir)/${i}.so.0.11
        cp %(installroot)%(libdir)/${i}.so.0.12.0 %(installroot)%(libdir)/${i}.so.0.11.2
        patchelf --set-soname ${i}.so.0.11 %(installroot)%(libdir)/${i}.so.0.11.2
    done

    %install_dir %(installroot)%(docdir)/jxl-pixbuf-loader
    echo "DEPRECATED" > %(installroot)%(docdir)/jxl-pixbuf-loader/README
tuning      :
    - optimize: speed
packages    :
    - "libjxl":
        summary: Library files for JPEG-XL
        description: Library files for JPEG-XL
        paths:
            - /usr/lib/libjxl*.so.*
            - /usr/share/mime/packages/image-jxl.xml

    - "libjxl-devel":
        summary: Library files for JPEG-XL - Development headers
        description: Library files for JPEG-XL - Development headers
        rundeps:
            - "libjxl"
        paths:
            - /usr/include/jxl/
            - /usr/lib/pkgconfig/libjxl*.pc
            - /usr/lib/libjxl*.a
            - /usr/lib/libjxl*.so

    - "jxl-pixbuf-loader":
        summary: JPEG-XL image loader for GTK+ applications
        description: JPEG-XL image loader for GTK+ applications
        paths:
            - /usr/share/doc/jxl-pixbuf-loader/README

    - "libjxl-utils":
        summary: Utilities for manipulating JPEG XL images
        description: Utilities for manipulating JPEG XL images
        paths:
            - /usr/bin/cjxl
            - /usr/bin/djxl
            - /usr/bin/jxlinfo
            - /usr/bin/jxltran
            - /usr/share/man/man1/cjxl.1*
            - /usr/share/man/man1/djxl.1*
# TODO: enable tests
