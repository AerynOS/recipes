name        : nnn
version     : "5.2"
release     : 5
homepage    : https://github.com/jarun/nnn
upstreams   :
    - https://github.com/jarun/nnn/archive/refs/tags/v5.2.tar.gz : f166eda5093ac8dcf8cbbc6224123a32c53cf37b82c5c1cb48e2e23352754030
summary     : The unorthodox terminal file manager
description : |
     Full-featured terminal file manager. It's tiny, nearly 0-config and incredibly fast.
     It is designed to be unobtrusive with smart workflows to match the trains of thought.
license     : BSD-2-Clause
builddeps   :
   - pkgconfig(ncursesw)
   - pkgconfig(readline)
rundeps     :
   - binary(tar)
build       : |
    %make
install     : |
    %make_install PREFIX=/usr
