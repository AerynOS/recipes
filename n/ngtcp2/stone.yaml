name        : ngtcp2
version     : "1.23.0"
release     : 2
upstreams   :
    - https://github.com/ngtcp2/ngtcp2/releases/download/v1.23.0/ngtcp2-1.23.0.tar.gz : 364d539c064d37ce0d9a595785d36eecb09926ec308813a6b6550c8adf4a50a4
homepage    : https://nghttp2.org/ngtcp2/
license     : MIT
summary     : QUIC protocol implementation
description : |
    ngtcp2 project is an effort to implement IETF QUIC protocol
builddeps   :
    - pkgconfig(gnutls)
    - pkgconfig(libnghttp3)
    - pkgconfig(openssl)
    # libev
setup       : |
    %configure \
        --disable-static \
        --with-gnutls \
        --with-openssl
build       : |
    %make
install     : |
    %make_install
check       : |
    %make check
packages    :
    - "%(name)-crypto-gnutls":
        summary: gnutls support for %(name)
        description: gnutls support for %(name)
        paths:
            - /usr/lib/libngtcp2_crypto_gnutls.so.*

    - "%(name)-devel":
        rundeps:
            - "%(name)-crypto-gnutls"
