name        : ngtcp2
version     : "1.24.0"
release     : 3
upstreams   :
    - https://github.com/ngtcp2/ngtcp2/releases/download/v1.24.0/ngtcp2-1.24.0.tar.gz : be7bf725d0108cf65a43e7f439ecb7ce791fea0bbe9b51dfaa1f272903b5ef8b
homepage    : https://nghttp2.org/ngtcp2/
license     : MIT
summary     : QUIC protocol implementation
description : |
    ngtcp2 project is an effort to implement IETF QUIC protocol
builddeps   :
    - pkgconfig(gnutls)
    - pkgconfig(libnghttp3)
    - pkgconfig(openssl)
    # libev
setup       : |
    %configure \
        --disable-static \
        --with-gnutls \
        --with-openssl
build       : |
    %make
install     : |
    %make_install
check       : |
    %make check
packages    :
    - "%(name)-crypto-gnutls":
        summary: gnutls support for %(name)
        description: gnutls support for %(name)
        paths:
            - /usr/lib/libngtcp2_crypto_gnutls.so.*

    - "%(name)-devel":
        rundeps:
            - "%(name)-crypto-gnutls"
