name        : ngtcp2
version     : "1.22.1"
release     : 1
upstreams   :
    - https://github.com/ngtcp2/ngtcp2/releases/download/v1.22.1/ngtcp2-1.22.1.tar.gz : 063d80531acac0ddbbc1b9d12829a824edc2abe8dba2e632fd1ce15cfd5632f9
homepage    : https://nghttp2.org/ngtcp2/
license     : MIT
summary     : QUIC protocol implementation
description : |
    ngtcp2 project is an effort to implement IETF QUIC protocol
builddeps   :
    - pkgconfig(gnutls)
    - pkgconfig(libnghttp3)
    - pkgconfig(openssl)
    # libev
setup       : |
    %configure \
        --disable-static \
        --with-gnutls \
        --with-openssl
build       : |
    %make
install     : |
    %make_install
check       : |
    %make check
packages    :
    - "%(name)-crypto-gnutls":
        summary: gnutls support for %(name)
        description: gnutls support for %(name)
        paths:
            - /usr/lib/libngtcp2_crypto_gnutls.so.*

    - "%(name)-devel":
        rundeps:
            - "%(name)-crypto-gnutls"
