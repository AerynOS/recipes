# 4. 构建步骤 (Build Steps)
setup: |
  # 传递额外的 CXXFLAGS 以忽略特定警告 ,come from https://aur.archlinux.org/cgit/aur.git/tree/PKGBUILD?h=noctalia-git
  export CXXFLAGS="$CXXFLAGS -Wno-unused-result"
  mkdir -p stb_compat/stb

  # 将下载的 stb 头文件复制到临时目录
  cp "%(sourcedir)/stb_image_resize2.h" stb_compat/stb/
  cp "%(sourcedir)/stb_image_write.h"   stb_compat/stb/
  cp "%(sourcedir)/stb_image.h"         stb_compat/stb/

  # 将临时目录加入编译器的头文件搜索路径
  export CXXFLAGS="$CXXFLAGS -I$(pwd)/stb_compat"
  export CFLAGS="$CFLAGS -I$(pwd)/stb_compat"

  %meson \
    -Db_ndebug=true \
    -Dnative_optimizations=true \
    -Dtests=disabled

build: |
  %meson_build

install: |
  %meson_install

  # 手动安装 License 和 README
  install -Dm644 LICENSE "%(installroot)/usr/share/licenses/%(name)/LICENSE"
  install -Dm644 README.md "%(installroot)/usr/share/doc/%(name)/README.md"
