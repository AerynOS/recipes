    - breeze-icons
    - kf6-kirigami
    - kf6-kirigami-addons
    - kf6-kitemmodels
    - kf6-kquickcharts
    - kf6-prison
    - kf6-sonnet
    - kquickimageeditor
    - qt6-location
    - qt6-wayland
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
