name        : neochat
version     : "26.04.3"
release     : 23
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/neochat-26.04.3.tar.xz : 7813106878bde5286f45c005647048217b2e46444c8ac2ef76480a2de88e7f0f
homepage    : https://apps.kde.org/neochat/
license     :
    - BSD-2-Clause
    - GPL-2.0-or-later
    - GPL-3.0-only
    - GPL-3.0-or-later
summary     : Neochat is a client for Matrix, the decentralized communication protocol for instant messaging.
description : |
    Neochat is a client for Matrix, the decentralized communication protocol for instant messaging.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6ColorScheme)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6DBusAddons)
    - cmake(KF6DocTools)
    - cmake(KF6I18n)
    - cmake(KF6IconThemes)
    - cmake(KF6ItemModels)
    - cmake(KF6KIO)
    - cmake(KF6Kirigami)
    - cmake(KF6KirigamiAddons)
    - cmake(KF6Notifications)
    - cmake(KF6QQC2DesktopStyle)
    - cmake(KF6Purpose)
    - cmake(KF6SyntaxHighlighting)
    - cmake(KF6WindowSystem)
    - cmake(KQuickImageEditor)
    - cmake(KUnifiedPush)
    - cmake(QCoro6)
    - cmake(QuotientQt6)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Keychain)
    - cmake(Qt6Multimedia)
    - cmake(Qt6Quick)
    - cmake(Qt6Svg)
    - cmake(Qt6TextToSpeech)
    - cmake(Qt6WebView)
    - cmake(cmark)
    - pkgconfig(icu-uc)
    - kf6-kquickcharts
    - kf6-sonnet
    - qt6-location
