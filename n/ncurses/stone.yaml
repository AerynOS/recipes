name        : ncurses
version     : "6.6-20260404"
release     : 23
homepage    : https://invisible-island.net/ncurses/ncurses.html
upstreams   :
    - https://invisible-island.net/archives/ncurses/current/ncurses-6.6-20260404.tgz : 39e2bed051b64fcc168f7335bc7e4a6781ff2833ed66be6ec7d892985121ad7e
summary     : Console display library
description : |
    The ncurses (new curses) library is a free software emulation of curses in System V Release 4.0 (SVr4), and more. It uses terminfo format, supports pads and color and multiple highlights and forms characters and function-key mapping, and has all the other SVr4-curses enhancements over BSD curses. SVr4 curses became the basis of X/Open Curses.
license     :
    - MIT
emul32      : true
setup       : |
    %patch %(pkgdir)/pkgconfig.patch
    unset CPP # Breaks stdin on this build.

    %configure \
        --disable-rpath \
        --disable-root-access \
        --disable-root-environ \
        --disable-setuid-environ \
        --disable-stripping \
        --enable-colorfgbg \
        --enable-db-install \
        --enable-largefile \
        --enable-pc-files \
        --enable-widec \
        --with-cxx-binding \
        --with-cxx-shared \
        --with-pkg-config-libdir=%(libdir)/pkgconfig \
        --with-shared \
        --with-terminfo-dirs='/etc/terminfo:/usr/share/terminfo' \
        --without-ada \
        --without-debug \
        PKG_CONFIG_LIBDIR=%(libdir)/pkgconfig
build       : |
    %make
install     : |
    %make_install

    # Additional symlink support
    for component in form menu ncurses ncurses++ panel; do
        ln -s "${component}w.pc" %(installroot)%(libdir)/pkgconfig/${component}.pc
        echo "INPUT(-l${component}w)" > "%(installroot)%(libdir)/lib${component}.so"
    done

    # Needs to match ABI version
    abi=6
    # tic and tinfo are built in by default
    for lib in tic tinfo; do
        ln -sv libncursesw.so.${abi} %(installroot)/%(libdir)/lib${lib}.so.${abi}
        ln -sv lib${lib}.so.${abi} %(installroot)/%(libdir)/lib${lib}.so
        ln -sv ncursesw.pc %(installroot)/%(libdir)/pkgconfig/${lib}.pc
    done

    # Remove duplicate terminfo that is provided by various terminals. Package-provided terminfo should be preferred over ncurses
    _terminfodir=%(installroot)%(datadir)/terminfo
    # terminfo-foot
    rm -v ${_terminfodir}/f/foot*
    # terminfo-ghostty
    rm -v ${_terminfodir}/g/ghostty

    # Unused
    rm -r %(installroot)/%(libdir)/terminfo || true
tuning      :
    - lto: full
packages    :
    - "%(name)":
        rundeps:
            - "%(name)-libs"

    - "%(name)-base":
        summary: Descriptions of common terminals
        description: |
            Descriptions of common terminals
        rundeps:
            - terminfo-foot
            - terminfo-ghostty
            - terminfo-kitty # Not sure why ncurses has a bare kitty terminfo but it doesn't confict so whatever
        paths:
            - /usr/share/tabset/
            - /usr/share/terminfo/

    - "%(name)-devel":
        paths:
            - /usr/bin/ncursesw6-config
            - /usr/share/man/man1/ncursesw6-config*
        rundeps:
            - "%(name)-c++-libs"

    - "%(name)-static":
        summary: Static libs for %(name)
        description: Static libs for %(name)
        paths:
            - /usr/lib/lib*.a
        rundeps:
            - "%(name)-devel"

    - "%(name)-libs":
        summary: "Library files for %(name)"
        description: |
            Library files for %(name), typically pulled in as a dependency of another package.
        paths:
            - /usr/lib/lib*.so.*
        rundeps:
            - "%(name)-base"

    - "%(name)-c++-libs":
        summary: Ncurses C++ bindings
        description: |
            Ncurses C++ bindings
        paths:
            - /usr/lib/libncurses++*.so.*
        rundeps:
            - "%(name)-libs"

    - "%(name)-32bit":
        rundeps:
            - "%(name)-base"

    - "%(name)-32bit-c++-libs":
        summary: Ncurses C++ bindings
        description: |
            Ncurses C++ bindings
        paths:
            - /usr/lib32/libncurses++*.so.*
        rundeps:
            - "%(name)-32bit"

    - "%(name)-32bit-devel":
        rundeps:
            - "%(name)-32bit-c++-libs"

    - "%(name)-32bit-static":
        summary: Static libs for %(name)
        description: Static libs for %(name)
        paths:
            - /usr/lib32/lib*.a
        rundeps:
            - "%(name)-32bit-devel"
