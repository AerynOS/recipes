name        : ntfs-3g
version     : "2026.7.7"
release     : 4
homepage    : https://github.com/tuxera/ntfs-3g
upstreams   :
    - https://download.tuxera.com/opensource/ntfs-3g_ntfsprogs-2026.7.7.tgz : d67b769025d32860549d35c2147e45024d172f81c540d750390ce3602c059dab
summary     : NTFS filesystem support
description : |
    NTFS-3G is an open source cross-platform implementation of the Microsoft Windows NTFS file system with read-write support.
license     : GPL-2.0-or-later
builddeps   :
    - binary(bison)
    - binary(flex)
    - binary(intltool-update)
    - pkgconfig(gnutls)
    - pkgconfig(libgcrypt)
    - pkgconfig(gpg-error)
    - pkgconfig(uuid)
    # hd.h (whatever that is)
setup       : |
    %configure \
        --disable-ldconfig \
        --disable-static \
        --disable-warnings \
        --enable-crypto \
        --enable-extras \
        --enable-posix-acls \
        --enable-xattr-mappings \
        --exec-prefix=%(prefix) \
        --sbin=%(sbindir) \
        --with-fuse=internal
build       : |
    %make
install     : |
    %make_install \
        rootsbindir=%(sbindir) \
        rootbindir=%(bindir)

    mv %(installroot)/sbin/* %(installroot)%(sbindir)/
    rmdir %(installroot)/sbin -v

    # Various compat symlinks
    ln -srv %(installroot)%(bindir)/ntfs-3g %(installroot)%(sbindir)/mount.ntfs
    ln -srv %(installroot)%(bindir)/ntfs-3g %(installroot)%(sbindir)/mount.ntfs-fuse
packages    :
    - "%(name)-libs":
        summary: Runtime libraries for ntfs-3g
        description: Runtime libraries for ntfs-3g
        paths:
            - /usr/lib/lib*.so.*

    - "ntfsprogs":
        summary: NTFS filesystem libraries and utilities
        description: NTFS filesystem libraries and utilities
        paths:
            - /usr/bin/ntfs*
            - /usr/sbin/mkfs.ntfs
            - /usr/sbin/mkntfs
            - /usr/sbin/ntfs*
            - /usr/share/man/man8/ntfs*
            - /usr/share/man/man8/mkfs.ntfs*
            - /usr/share/man/man8/mkntfs*

    - "%(name)":
        paths:
            - /usr/bin/ntfs-3g*
            - /usr/share/man/man8/ntfs-3g*
