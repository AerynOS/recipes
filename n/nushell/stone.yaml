name        : nushell
version     : "0.114.1"
release     : 11
homepage    : https://www.nushell.sh/
upstreams   :
    - https://github.com/nushell/nushell/archive/refs/tags/0.114.1.tar.gz : 48ef2fb6bb3ec2b1dcff87a792aeebdfab10b29f3119a62291075b17e4ad25d5
summary     : A new type of shell
description : |
    Nu is a new type of shell, that combines the traditional Unix tools with modern languages.
    It's written in Rust and has a powerful set of core commands, as well as a rich set of plugins for extending its functionality.
license     : MIT
networking  : true
builddeps   :
    - binary(find)
    - pkgconfig(libcurl)
    - pkgconfig(libgit2)
    - pkgconfig(libssh2)
    - pkgconfig(libzstd)
    - pkgconfig(openssl)
    - pkgconfig(sqlite3)
environment : |
    # Force use of system libs
    export LIBGIT2_NO_VENDOR=1
    export LIBSSH2_SYS_USE_PKG_CONFIG=1
    export LIBSQLITE3_SYS_USE_PKG_CONFIG=1
    export ZSTD_SYS_USE_PKG_CONFIG=1
setup       : |
    # https://github.com/nushell/nushell/issues/18578
    %patch %(pkgdir)/0001-Bump-ethnum-to-1.5.3-for-Rust-1.97.patch

    %cargo_fetch
build       : |
    %cargo_build \
        --workspace \
        --features=stable
install     : |
    %cargo_install nu

    find %(cargo_target_dir) -name "nu_plugin*" -executable -maxdepth 1 \
        -exec install -vDm755 -t "%(installroot)%(bindir)" "{}" +

    # Example plugins, not needed
    rm -rfv %(installroot)%(bindir)/nu_plugin_example \
            %(installroot)%(bindir)/nu_plugin_custom_values \
            %(installroot)%(bindir)/nu_plugin_stress_internals
