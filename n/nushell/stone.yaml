name        : nushell
version     : 0.103.0
release     : 1
homepage    : https://www.nushell.sh/
upstreams   :
    - https://github.com/nushell/nushell/archive/refs/tags/0.103.0.tar.gz : 0e654e47627ad8c053350bbc25fa75c55b76e11fd6841118214eaa5a10f9686e
summary     : A new type of shell
description : |
    Nu is a new type of shell, that combines the traditional Unix tools with modern languages.
    It's written in Rust and has a powerful set of core commands, as well as a rich set of plugins for extending its functionality.
license     : MIT
networking  : true
builddeps   :
    - pkgconfig(libssl)
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %cargo_install nu
