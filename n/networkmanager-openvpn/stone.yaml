name        : networkmanager-openvpn
version     : "1.12.5"
release     : 3
upstreams   :
    - https://download.gnome.org/sources/NetworkManager-openvpn/1.12/NetworkManager-openvpn-1.12.5.tar.xz : ce32e38b0500eddf2fc8072ca17679817fc2d35eb91f6ff7b9904209c14b5afd
homepage    : https://www.gnome.org/projects/NetworkManager/
license     : GPL-2.0-or-later
summary     : NetworkManager VPN plugin for OpenVPN
description : |
    This package contains software for integrating VPN capabilities with
    the OpenVPN server with NetworkManager.
builddeps   :
    - binary(msgfmt)
    - pkgconfig(glib-2.0)
    - pkgconfig(gmodule-2.0)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(gtk4)
    - pkgconfig(libnma)
    - pkgconfig(libnma-gtk4)
    - pkgconfig(libsecret-1)
setup       : |
    # TODO libnm-vpn-plugin-openvpn-editor.so is required by nm-connection-editor. Perhaps we should subpackage it separately.
    # Ideally nm-connection-editor would have a conditional dependency on it if networkmanager-openvpn was installed

    %patch %(pkgdir)/104.patch

    %configure \
        --with-dist-version=%(version)-%(release) \
        --with-gtk4
build       : |
    %make
install     : |
    %make_install
packages    :
    - "%(name)":
        rundeps:
            - networkmanager
            - openvpn

    - "%(name)-gnome":
        summary: NetworkManager VPN plugin for OpenVPN - GNOME/GTK files
        description: |
            NetworkManager VPN plugin for OpenVPN - GNOME/GTK files

            Note: You will need this package to manage OpenVPN VPNs with nm-connection-editor
        rundeps:
            - "%(name)"
            - shared-mime-info
        paths:
            - /usr/lib/networkmanager-openvpn/nm-openvpn-auth-dialog
            - /usr/lib/NetworkManager/libnm-gtk4-vpn-plugin-openvpn-editor.so
            - /usr/lib/NetworkManager/libnm-vpn-plugin-openvpn-editor.so
            - /usr/share/metainfo/network-manager-openvpn.metainfo.xml
