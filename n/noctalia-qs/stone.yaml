name        : noctalia-qs
version     : "0.0.10"
release     : 3
homepage    : https://github.com/noctalia-dev/noctalia-qs
upstreams   :
    - https://github.com/noctalia-dev/noctalia-qs/archive/refs/tags/v0.0.10.tar.gz : 129f7ad9ae0f2227bec853872347190a6b03490eec53c45817f22ec947573c8b
summary     : quickshell fork
description : |
    Flexible toolkit for making desktop shells with QtQuick, for Wayland and X11 
license     : 
    - LGPL-3.0-or-later
builddeps   :
    - binary(pkgconf)
    - cmake(Qt6Qml)
    - cmake(Qt6ShaderTools)
    - cmake(Qt6Svg)
    - cmake(Qt6WaylandClientPrivate)
    - pkgconfig(CLI11)
    - pkgconfig(gbm)
    - pkgconfig(jemalloc)
    - pkgconfig(libdrm)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(pam)
    - pkgconfig(polkit-agent-1)
    - pkgconfig(wayland-protocols)
setup       : |
    %cmake -DDISTRIBUTOR="AerynOS" \
           -DDISTRIBUTOR_DEBUGINFO_AVAILABLE=NO \
           -DCMAKE_BUILD_TYPE=RelWithDebInfo \
           -DINSTALL_QML_PREFIX="lib/qt6/qml" \
           -DCRASH_REPORTER=OFF \
           -DCMAKE_DISABLE_PRECOMPILE_HEADERS=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
