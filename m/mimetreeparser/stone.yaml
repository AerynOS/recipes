name        : mimetreeparser
version     : "26.04.3"
release     : 26
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/mimetreeparser-26.04.3.tar.xz : 88750429310e9dc60e1f962dc9d7e58e1936e878db54aa41cb7f5c4b4fc524dc
homepage    : https://kde.org
license     :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - FSFULLR
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
summary     : Parser for MIME trees
description : |
    A parser for a MIME tree and is based on KMime. The goal is given a MIME tree to extract a list of parts (e.g. text, html) and a list of attachments, check the validity of the signatures and decrypt any encrypted part.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Gpgmepp)
    - cmake(KF6CalendarCore)
    - cmake(KF6ColorScheme)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(KF6Mime)
    - cmake(KF6WidgetsAddons)
    - cmake(KPim6Mbox)
    - cmake(KPim6Libkleo)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
setup       : |
    %patch %(pkgdir)/kf6kmime.patch
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
