name        : malcontent
version     : "0.14.0"
release     : 2
homepage    : https://gitlab.freedesktop.org/pwithnall/malcontent
upstreams   :
    - https://tecnocode.co.uk/downloads/malcontent/malcontent-0.14.0.tar.xz : 951c2732106254b2f4d22c06061d1a813d8b6310a045afc638c1e1a0c97e4e69
summary     : Parental control support for applications
description : |
    libmalcontent implements parental controls support which can be used by applications to filter or limit the access of child accounts to inappropriate content.
license     : LGPL-2.1-or-later
networking  : true
builddeps   :
    - binary(itstool)
    - binary(msgfmt)
    - binary(python3)
    - binary(update-desktop-database)
    - pkgconfig(accountsservice)
    - pkgconfig(dbus-1)
    - pkgconfig(flatpak)
    - pkgconfig(gi-docgen)
    - pkgconfig(glib-testing-0)
    - pkgconfig(gnome-desktop-4)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(gsystemservice-0)
    - pkgconfig(gtk4)
    - pkgconfig(libadwaita-1)
    - pkgconfig(libcdb)
    - pkgconfig(libsoup-3.0)
    - pkgconfig(pam)
setup       : |
    %patch %(pkgdir)/tinycdb.patch
    %meson
build       : |
    %meson_build
install     : |
    %meson_install

packages    :
    - "lib%(name)":
        summary: Libraries for %(name)
        description: Libraries for %(name)
        paths:
            - /usr/lib/girepository-1.0/Malcontent-0.typelib
            - /usr/lib/libmalcontent-0.so.*
            - /usr/lib/libnss_malcontent.so.*

    - "%(name)-ui-libs":
        summary: Libraries for %(name)
        description: Libraries for %(name)
        paths:
            - /usr/lib/girepository-1.0/MalcontentUi-1.typelib
            - /usr/lib/libmalcontent-ui-1.so.*

    - "%(name)-ui-devel":
        summary: Development files for libmalcontent-ui
        description: Development files for libmalcontent-ui
        rundeps:
            - "%(name)-ui-libs"
        paths:
            - /usr/include/malcontent-ui-1/
            - /usr/lib/girepository-1.0/MalcontentUi-1.typelib
            - /usr/lib/libmalcontent-ui-1.so
            - /usr/share/gir-1.0/MalcontentUi-1.gir
            - /usr/lib/pkgconfig/malcontent-ui-1.pc

    - "%(name)-control":
        summary: Parental Controls UI
        description: Parental Controls UI
        rundeps:
            - "%(name)"
        paths:
            - /usr/bin/malcontent-control
            - /usr/share/applications/org.freedesktop.MalcontentControl.desktop
            - /usr/share/icons/
            - /usr/share/metainfo/org.freedesktop.MalcontentControl.metainfo.xml

    - "%(name)-docs":
        paths:
            - /usr/share/doc/

    - "%(name)-pam":
        summary: Parental Controls PAM Module
        description: Parental Controls PAM Module
        paths:
            - /usr/lib/security/pam_malcontent.so

    - "%(name)-tools":
        summary: Parental Controls Tools
        description: Parental Controls Tools
        rundeps:
            - "%(name)"
        paths:
            - /usr/bin/malcontent-client
            - /usr/share/man/man8/malcontent-client.8*

    - "%(name)":
        rundeps:
            - polkit
