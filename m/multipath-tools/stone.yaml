name        : multipath-tools
version     : "0.14.3"
release     : 1
upstreams   :
    - https://github.com/opensvc/multipath-tools/archive/refs/tags/0.14.3.tar.gz : 206ab1635b09309974e2fdf3bbd1825254638dc9b3d2bbd436d1105cd518d379
homepage    : https://github.com/opensvc/multipath-tools
license     :
    - GPL-2.0-or-later
    - GPL-3.0-or-later
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
summary     : Linux multipath tools
description : |
    Linux multipath tools
builddeps   :
    - pkgconfig(devmapper)
    - pkgconfig(json-c)
    - pkgconfig(liburcu)
    - pkgconfig(mount)
    - libaio-devel
build       : |
    %make \
        LIB=lib
install     : |
    %make_install \
        bindir=%(sbindir) \
        syslibdir=%(libdir) \
        usrlibdir=%(libdir) \
        plugindir=%(libdir)/multipath

    # Delete any empty directories to prevent path conflicts
    find %(installroot) -type d -empty -print -delete
packages    :
    - "%(name)-libs":
        summary: The %{name} modules and shared library
        description: The %{name} modules and shared library
        paths:
            - /usr/lib/lib*.so.*
            - /usr/lib/multipath/

    - "kpartx":
        summary: Partition device manager for device-mapper devices
        description: Partition device manager for device-mapper devices
        paths:
            - /usr/lib/udev/kpartx_id
            - /usr/lib/udev/rules.d/11-dm-parts.rules
            - /usr/lib/udev/rules.d/66-kpartx.rules
            - /usr/lib/udev/rules.d/68-del-part-nodes.rules
            - /usr/sbin/kpartx
            - /usr/share/man/man8/kpartx.8*

    - "libdmmp":
        summary: device-mapper-multipath C API library
        description: device-mapper-multipath C API library
        paths:
            - /usr/lib/libdmmp.so.*

    - "libdmmp-devel":
        summary: device-mapper-multipath C API library - Devel
        description: device-mapper-multipath C API library - Devel
        rundeps:
            - libdmmp
        paths:
            - /usr/include/libdmmp
            - /usr/lib/libdmmp.so
            - /usr/share/man/man3/dmmp*
            - /usr/share/man/man3/libdmmp.h.3*
