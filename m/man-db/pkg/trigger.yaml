name: mandb
description: |
    Rebuild manual pages database

handlers:
    mandb:
        run: systemd-run
        # We add a nice value because other stuff may be competing for cpu resources
        # right after a sync, so this avoids the system feeling unnecessarily
        # sluggish during the time it takes to create the man-db cache files.
        args: ["--unit=mandb-trigger", "--nice=19", "--collect", "/usr/bin/mandb", "-q"]

paths:
    "/usr/share/man/**" :
        handlers:
            - mandb
