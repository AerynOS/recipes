name        : mpc
version     : "1.4.1"
release     : 5
summary     : Library for arbitrary precision arithmetic
license     :
    - LGPL-3.0-or-later
homepage    : https://www.multiprecision.org/mpc/
description : |
    Library for arbitrary precision arithmetic.
upstreams   :
    - https://ftp.gnu.org/gnu/mpc/mpc-1.4.1.tar.xz: 91204cd32f164bd3b7c992d4a6a8ce6519511aadab30f78b6982d0bf8d73e931
builddeps   :
    - pkgconfig(gmp)
    - pkgconfig(mpfr)
setup       : |
    %configure \
        --disable-static
build       : |
    %make
install     : |
    %make_install
check       : |
    %make check
tuning      :
    - lto: full
    - nosemantic
    - optimize: speed
