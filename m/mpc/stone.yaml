name        : mpc
version     : "1.4.0"
release     : 4
summary     : Library for arbitrary precision arithmetic
license     :
    - LGPL-3.0-or-later
homepage    : https://www.multiprecision.org/mpc/
description : |
    Library for arbitrary precision arithmetic.
upstreams   :
    - https://ftp.gnu.org/gnu/mpc/mpc-1.4.0.tar.xz: 3210b3a546b1cb00c296ca360891d7740ee6ff06deb02a27a35b20cd3c0bb1a5
builddeps   :
    - pkgconfig(gmp)
    - pkgconfig(mpfr)
setup       : |
    %configure \
        --disable-static
build       : |
    %make
install     : |
    %make_install
check       : |
    %make check
tuning      :
    - lto: full
    - nosemantic
    - optimize: speed
