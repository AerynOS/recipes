name        : mangojuice
version     : "0.9.0"
release     : 1
homepage    : https://github.com/radiolamp/mangojuice
upstreams   :
    - https://github.com/radiolamp/mangojuice/archive/refs/tags/0.9.0.tar.gz : b68908178cdd3d7aba7687ae5252b6af4d5569fb6c482e3c5cf6ec0850fafc32
summary     : A convenient alternative to GOverlay for setting up MangoHud
description : |
    This program will be a convenient alternative to GOverlay for setting up MangoHud.
license     :
    - GPL-3.0-or-later
builddeps   :
    - binary(ln)
    - binary(vala)
    - pkgconfig(fontconfig)
    - pkgconfig(gee-0.8)
    - pkgconfig(gio-2.0)
    - pkgconfig(gtk4)
    - pkgconfig(libadwaita-1)
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
