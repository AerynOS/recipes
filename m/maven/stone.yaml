name        : maven
version     : 3.9.15
release     : 2
homepage    : https://maven.apache.org
upstreams   :
    - https://dlcdn.apache.org/maven/maven-3/3.9.15/source/apache-maven-3.9.15-src.tar.gz:
        hash: 1a6dcd849a3eefdd975ca0ce8f00f2778b892136352680e78573a0a1280728da
        unpackdir: "maven"

    # Comment out this section if bootstrapping isn't necessary
    # - https://dlcdn.apache.org/maven/maven-3/3.9.14/binaries/apache-maven-3.9.14-bin.tar.gz :
    #     hash: 126ed3233e569bd0add9e889d226139acd3de9005876a01fe6108fbf4246f515
    #     unpackdir: "maven/bootstrap"
summary     : Build automation tool for Java Projects
description : |
    Apache Maven is a build tool for Java projects. Using a project object model (POM), Maven manages a project's compilation, testing, and documentation.
license     : Apache-2.0
networking  : true
builddeps   :
    - binary(java-21)
    - binary(mvn)
    - binary(tar)
rundeps     :
    - binary(java-21)
environment : |
    _maven_dir="%(datadir)/%(name)"

    export JAVA_HOME=%(libdir)/openjdk-21
    export PATH=$JAVA_HOME/bin:$PATH

    if [ -d "bootstrap" ]; then
        export PATH="%(workdir)/bootstrap/bin:$PATH"
    fi
setup       : |
    mvn dependency:go-offline
build       : |
    mvn compile \
        -DdistributionTargetDir="%(installroot)${_maven_dir}" \
        -Drat.skip=true \
        -DskipTests
install     : |
    mvn install javadoc:aggregate \
        -DdistributionTargetDir="%(installroot)${_maven_dir}" \
        -Drat.skip=true \
        -DskipTests

    %install_dir %(installroot)/usr/bin
    ln -srv %(installroot)${_maven_dir}/bin/mvn %(installroot)%(bindir)/mvn
    ln -srv %(installroot)${_maven_dir}/bin/mvnDebug %(installroot)%(bindir)/mvnDebug
