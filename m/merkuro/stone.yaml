name        : merkuro
version     : "26.04.2"
release     : 27
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/merkuro-26.04.2.tar.xz : b48e3d5fa59ea6b4606680b6b2ff8160a04dbe3229cb52d2664983faa3c3443b
homepage    : https://kde.org/applications/system/org.kde.merkuro
license     :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
summary     : Application suite designed to handle emails, calendars, contacts and tasks
description : |
    Merkuro is a KDE personal information management suite for managing email, calendars,
    contacts, and tasks in one integrated app. It provides a modern interface for organizing
    communication, scheduling events, tracking to-dos, and keeping address books synchronized.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Gpgmepp)
    - cmake(KF6CalendarCore)
    - cmake(KF6ConfigWidgets)
    - cmake(KF6Contacts)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6DBusAddons)
    - cmake(KF6Holidays)
    - cmake(KF6I18n)
    - cmake(KF6IconThemes)
    - cmake(KF6ItemModels)
    - cmake(KF6Kirigami)
    - cmake(KF6KirigamiAddons) ##
    - cmake(KF6KIO)
    - cmake(KF6Mime)
    - cmake(KF6Notifications)
    - cmake(KF6QQC2DesktopStyle)
    - cmake(KF6WindowSystem)
    - cmake(KF6XmlGui)
    - cmake(KPim6AkonadiCalendar)
    - cmake(KPim6AkonadiSearch)
    - cmake(KPim6CalendarUtils)
    - cmake(KPim6IdentityManagementCore)
    - cmake(KPim6IdentityManagementQuick)
    - cmake(KPim6Libkdepim)
    - cmake(KPim6MailCommon)
    - cmake(KPim6MailTransport)
    - cmake(KPim6MimeTreeParserCore)
    - cmake(KPim6Mbox)
    - cmake(KPim6PimCommonAkonadi)
    - cmake(KPim6Libkleo)
    - cmake(KPim6MessageComposer)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Location)
    - cmake(Qt6Qml)
    - cmake(Qt6Svg)
    - cmake(Plasma)
rundeps     :
    - kf6-qqc2-desktop-style
    - kdepim-runtime # Required for basically anything function-wise
    - qt6-location # QML dep
    - qt6-wayland
setup       : |
    %patch %(pkgdir)/kf6kmime.patch
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)":
        paths:
            - /usr/lib/lib*.so # No need to split the package yet
