name        : mailimporter
version     : "26.04.3"
release     : 16
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/mailimporter-26.04.3.tar.xz : 47face1e8f0b2ad7158f6a1f033338856848a5599faf5a286887c69be8114b69
homepage    : https://kde.org
license     : GPL-2.0-or-later
summary     : Mail importer library
description : |
    Mail importer library.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(KF6KIO)
    - cmake(KF6I18n)
    - cmake(KF6Mime)
    - cmake(KPim6Akonadi)
    - cmake(KPim6AkonadiMime)
    - cmake(KPim6PimCommon)
setup       : |
    %patch %(pkgdir)/kf6kmime.patch
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
