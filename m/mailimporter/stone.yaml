name        : mailimporter
version     : "26.04.2"
release     : 15
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/mailimporter-26.04.2.tar.xz : 4ba31c1e91ee917a96dea553dcc38c2a8473e77a17e9ce543beb6b0d4217bf93
homepage    : https://kde.org
license     : GPL-2.0-or-later
summary     : Mail importer library
description : |
    Mail importer library.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(KF6KIO)
    - cmake(KF6I18n)
    - cmake(KF6Mime)
    - cmake(KPim6Akonadi)
    - cmake(KPim6AkonadiMime)
    - cmake(KPim6PimCommon)
setup       : |
    %patch %(pkgdir)/kf6kmime.patch
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
