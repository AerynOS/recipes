name        : mangohud
version     : "0.8.3"
release     : 13
homepage    : https://github.com/flightlessmango/MangoHud
upstreams   :
    - https://github.com/flightlessmango/MangoHud/releases/download/v0.8.3/MangoHud-v0.8.3-Source.tar.xz : e810ac73163468533ddb7c74b681f1de4992a3d785dce294fee9933ec8956b05
summary     : A Vulkan and OpenGL overlay for monitoring FPS, temperatures, CPU/GPU load and more
description : |
    A Vulkan and OpenGL overlay for monitoring FPS, temperatures, CPU/GPU load and more.
license     : MIT
builddeps   :
    - binary(glslang)
    - pkgconfig(cmocka)
    - pkgconfig(dbus-1)
    - pkgconfig(gl)
    - pkgconfig(glfw3)
    - pkgconfig(spdlog)
    - pkgconfig(wayland-client)
    - pkgconfig(x11)
    - pkgconfig(xkbcommon)
    - pkgconfig(xrandr)
    - python(mako)
    - libstdc++-static
setup       : |
    %meson \
        -Dmangoapp=true \
        -Dmangohudctl=true \
        -Duse_system_spdlog=enabled \
        -Dwith_xnvctrl=disabled # for now. needs nvidia-settings
build       : |
    %meson_build
install     : |
    %meson_install --skip-subprojects
packages    :
    - mangoplot:
        # This needs matplotlib and numpy
        paths:
            - /usr/bin/mangoplot
