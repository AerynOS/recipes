name        : minizip-ng
version     : "4.1.1"
release     : 6
summary     : Fork of the zlib zip library
license     : Zlib
homepage    : https://github.com/zlib-ng/minizip-ng
description : |
    Fork of the popular zip manipulation library found in the zlib distribution
upstreams   :
    - https://github.com/zlib-ng/minizip-ng/archive/refs/tags/4.1.1.tar.gz : ecc1a514f9e455cb627a768e1219369c576a761bc04196941590906c8b622d7e
builddeps   :
    - pkgconfig(bzip2)
    - pkgconfig(libcrypto)
    - pkgconfig(liblzma)
    - pkgconfig(libzstd)
    - pkgconfig(zlib-ng)
    # TODO: Figure out MZ_PPMD
tuning      :
    - lto : full
setup       : |
    %cmake -B compat \
        -DBUILD_SHARED_LIBS=ON \
        -DMZ_COMPAT=ON \
        -DMZ_LIBBSD=OFF \
        -DMZ_PPMD=OFF

    %cmake -B ng \
        -DBUILD_SHARED_LIBS=ON \
        -DMZ_COMPAT=OFF \
        -DMZ_LIBBSD=OFF \
        -DMZ_PPMD=OFF
build       : |
    for b in compat ng; do
        %ccache_zero
        BUILDDIR=${b}
        env CCACHE_BASEDIR="${PWD}/${b}" %cmake_build
        %ccache_stats
    done
install     : |
    for b in compat ng; do
        BUILDDIR=${b}
        %cmake_install
    done
packages    :
    - "minizip":
        paths:
            - /usr/lib/libminizip.so.*
    - "minizip-devel":
        paths:
            - /usr/include/minizip
            - /usr/lib/cmake/minizip
            - /usr/lib/libminizip.so
            - /usr/lib/pkgconfig/minizip.pc
        rundeps:
            - minizip
