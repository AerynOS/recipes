name        : mailcommon
version     : "26.04.2"
release     : 17
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.2/src/mailcommon-26.04.2.tar.xz : b65177ebaee6447a1d60cfb994eb2a03e3afd62b6010504ce45d99439ccc9ccc
homepage    : https://kde.org
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
