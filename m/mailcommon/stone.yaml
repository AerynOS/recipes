    - cmake(KF6Completion)
    - cmake(KF6Config)
    - cmake(KF6DBusAddons)
    - cmake(KF6I18n)
    - cmake(KF6IconThemes)
    - cmake(KF6ItemModels)
    - cmake(KF6ItemViews)
    - cmake(KF6KIO)
    - cmake(KF6SyntaxHighlighting)
    - cmake(KF6XmlGui)
    - cmake(KPim6Akonadi)
    - cmake(KPim6AkonadiMime)
    - cmake(KPim6Libkdepim)
    - cmake(KPim6MailImporter)
    - cmake(KPim6MailTransport)
    - cmake(KPim6MessageComposer)
    - cmake(QGpgmeQt6)
    - cmake(Qt6Multimedia)
setup       : |
    %patch %(pkgdir)/kf6kmime.patch
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
