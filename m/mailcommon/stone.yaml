name        : mailcommon
version     : "26.04.3"
release     : 18
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.3/src/mailcommon-26.04.3.tar.xz : 9aa486a65f311c4e6b4013fa446780f08bc889658724e0c51c479bdf9d945a7b
