name        : mpvqt
version     : "1.2.0"
release     : 4
homepage    : https://mpv.io/
upstreams   :
    - https://download.kde.org/stable/mpvqt/mpvqt-1.2.0.tar.xz : 8660ad79c0d60fed77f29b36e1742841466af5405de702c81a121e6eeb625ebb
summary     : MpvQt is a libmpv wrapper for QtQuick and QML
description : |
    MpvQt is a libmpv wrapper for QtQuick and QML
license     :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC-BY-SA-4.0
    - CC0-1.0
    - LGPL-2.1-only
    - LGPL-3.0-only
    - LicenseRef-KDE-Accepted-LGPL
    - MIT
builddeps   :
    - cmake(ECM)
    - cmake(Qt6Quick)
    - pkgconfig(mpv)
setup       : |
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(Qt6Quick)
            - pkgconfig(mpv)
