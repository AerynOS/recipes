name        : mullvad
version     : "2026.2"
release     : 7
homepage    : https://mullvad.net
upstreams   :
    - https://github.com/mullvad/mullvadvpn-app/archive/refs/tags/2026.2.tar.gz : 
        hash : 67a096f130da11b7deadba72b8204c71835d292762dbd4a74ca46b25cc0d4dc0
        rename: mullvad
    - https://github.com/mullvad/wireguard-go/archive/refs/tags/0.0.20230223-mullvad-0.1.6.tar.gz :
        hash: fd9fa45155098223a17ea934eaa6eb44ee990cd2a7ab638bce482f62fd8502e8
        unpackdir: mullvad/wireguard-go-rs/libwg/wireguard-go/
summary     : The Mullvad VPN client app for desktop
description : |
    The Mullvad VPN client app for desktop
license     : GPL-3.0-or-later
networking  : true
builddeps   :
    - binary(ar)
    - binary(go)
    - binary(npm)
    - binary(protoc)
    - binary(rustc)
    - pkgconfig(dbus-1)
    - pkgconfig(libmnl)
    - pkgconfig(libnftnl)
    - soname(libgcc_s.so.1(x86_64))
rundeps    :
    - libayatana-appindicator
setup       : |
    %patch %(pkgdir)/0001-pack-to-folder.patch
    %patch %(pkgdir)/0002-update-build.sh.patch
build       : |
    ./build.sh --optimize
install     : |
    %install_dir %(installroot)%(libdir)/%(name)
    cp -a dist/linux-unpacked/* %(installroot)%(libdir)/%(name)

    %install_bin dist-assets/mullvad
    %install_bin dist-assets/mullvad-exclude
    %install_bin dist-assets/mullvad-daemon

    %install_file %(pkgdir)/mullvad-vpn.desktop %(installroot)/%(datadir)/applications/mullvad-vpn.desktop
    %install_file graphics/icon.svg %(installroot)%(datadir)/icons/hicolor/scalable/apps/mullvad-vpn.svg

    %install_file dist-assets/linux/mullvad-daemon.service %(installroot)%(libdir)/systemd/system/mullvad-daemon.service
    sed -i 's|/opt/Mullvad.*VPN|/usr/share/mullvad|g' %(installroot)%(libdir)/systemd/system/mullvad-daemon.service
