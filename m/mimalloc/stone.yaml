name        : mimalloc
version     : "2.3.2"
release     : 13
homepage    : https://github.com/microsoft/mimalloc
upstreams   :
    - https://github.com/microsoft/mimalloc/archive/refs/tags/v2.3.2.tar.gz: c5ec406ac34006c751200e7e778f88e2a9070819e3f1d4ebbde4f4554ecf0d0b
summary     : Compact general purpose allocator
description : |
    mimalloc is a compact general purpose allocator with excellent performance.
license     : MIT
setup       : |
    %cmake \
        -DMI_BUILD_OBJECT=OFF \
        -DMI_BUILD_STATIC=ON \
        -DMI_INSTALL_TOPLEVEL=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
check       : |
    %cmake_test
tuning      :
    - lto: full
    - optimize: speed
packages    :
    - "%(name)-static":
        summary: Static libs for %(name)
        description: Static libs for %(name)
        paths:
            - /usr/lib/lib*.a
        rundeps:
            - "%(name)-devel"
