name        : mangowm
version     : "0.14.0"
release     : 5
homepage    : https://github.com/mangowm/mango
upstreams   :
        - https://github.com/mangowm/mango/archive/refs/tags/0.14.0.tar.gz : 695d43c5566aa9122a278123c77335e4f75ab594c324bb6a0a8b914f8c7a2d75
summary     : A Wayland compositor with smooth animation
description : |
    A wayland compositor utilizing wlroots as a base and SceneFX for aesthetics
license     :
    - GPL-3.0-or-later
builddeps   :
    - pkgconfig(libcjson)
    - pkgconfig(libpcre2-8)
    - pkgconfig(scenefx)
    - pkgconfig(wayland-protocols)
    - pkgconfig(wlroots)
setup       : |
    %patch %(pkgdir)/stateless-config.patch
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
