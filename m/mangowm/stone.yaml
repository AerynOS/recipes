name        : mangowm
version     : "0.13.1"
release     : 4
homepage    : https://github.com/mangowm/mango
upstreams   :
        - https://github.com/mangowm/mango/archive/refs/tags/0.13.1.tar.gz : bc23d06834e1a5222b8ce1f3ee3d68937e1321ef5446640a4f3dac53639569d8
summary     : A Wayland compositor with smooth animation
description : |
    A wayland compositor utilizing wlroots as a base and SceneFX for aesthetics
license     :
    - GPL-3.0-or-later
builddeps   :
    - pkgconfig(libpcre2-8)
    - pkgconfig(scenefx)
    - pkgconfig(wayland-protocols)
    - pkgconfig(wlroots)
setup       : |
    %patch %(pkgdir)/stateless-config.patch
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
