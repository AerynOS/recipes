name        : wayvr
version     : "26.7.1"
release     : 2
homepage    : https://wayvr.org/
upstreams   :
    - https://github.com/wayvr-org/wayvr/archive/refs/tags/v26.7.1.tar.gz : f0bd28664ae06f76c29c985726885caf94164e5e503dd3dfb14d74cb046339d6
summary     : A lightweight OpenXR/OpenVR overlay for Wayland and X11 desktops
description : |
    Your way to enjoy VR on Linux. Run apps inside VR & access your Wayland/X11 screens from Monado/WiVRn/SteamVR.
license     : GPL-3.0-or-later
builddeps   :
    - binary(cmake)
    - binary(ninja)
    - pkgconfig(alsa)
    - pkgconfig(dav1d)
    - pkgconfig(dbus-1)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(libspa-0.2)
    - pkgconfig(openssl)
    - pkgconfig(openxr)
    - pkgconfig(shaderc)
    - pkgconfig(udev)
    - pkgconfig(vulkan)
    - pkgconfig(wayland-client)
    - pkgconfig(x11)
    - pkgconfig(xext)
    - pkgconfig(xkbcommon)
    - pkgconfig(xkbcommon-x11)
    - pkgconfig(xrandr)
networking  : true
environment : |
    export CMAKE_GENERATOR=Ninja
setup       : |
    %cargo_fetch
build       : |
    # Enable all features except native OpenVR support. OpenXR is the
    # standard for Monado and SteamVR, while xrizer translates legacy
    # OpenVR calls to OpenXR, making native OpenVR support unnecessary.
    %cargo_build \
      --package wayvr \
      --package wayvrctl \
      --no-default-features \
      --features=openxr,osc,pipewire,wayland,whisper,x11
install     : |
    %cargo_install wayvr
    %cargo_install wayvrctl
    %install_file wayvr/wayvr.desktop %(installroot)%(datadir)/applications/wayvr.desktop
    %install_file wayvr/wayvr.png %(installroot)%(datadir)/icons/hicolor/128x128/apps/wayvr.png
    %install_file wayvr/wayvr.svg %(installroot)%(datadir)/icons/hicolor/scalable/apps/wayvr.svg
check       : |
    %cargo_test
