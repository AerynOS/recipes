name        : wlroots
version     : "0.19.3"
release     : 10
homepage    : https://gitlab.freedesktop.org/wlroots/wlroots/
upstreams   :
    - https://gitlab.freedesktop.org/wlroots/wlroots/-/releases/0.19.3/downloads/wlroots-0.19.3.tar.gz : 5d02693175e5afd9af5f10e3e4976d6e9249dc39a90eb17d23fa5f54b125ccc5
summary     : A modular Wayland compositor library
description : |
    Pluggable, composable, unopinionated modules for building a Wayland compositor.
license     :
    - MIT
builddeps   :
    - binary(glslangValidator)
    - cmake(VulkanHeaders)
    - pkgconfig(cairo)
    - pkgconfig(egl)
    - pkgconfig(gbm)
    - pkgconfig(hwdata)
    - pkgconfig(lcms2)
    - pkgconfig(libdisplay-info)
    - pkgconfig(libdrm)
    - pkgconfig(libinput)
    - pkgconfig(libliftoff)
    - pkgconfig(libseat)
    - pkgconfig(libudev)
    - pkgconfig(pixman-1)
    - pkgconfig(vulkan)
    - pkgconfig(wayland-protocols)
    - pkgconfig(wayland-server)
    - pkgconfig(xcb-errors)
    - pkgconfig(xcb-ewmh)
    - pkgconfig(xcb-renderutil)
    - pkgconfig(xkbcommon)
    - pkgconfig(xwayland)
rundeps     :
    - binary(Xwayland)
    - hwdata
tuning      :
    - lto: false
    - symbolic: false
setup       : |
    %meson
build       : |
    %meson_build
test        : |
    %meson_test
install     : |
    %meson_install

    # Create an unversioned symlink so we can continue to use `pkgconfig(wlroots)`
    ln -sv wlroots-$(echo %(version) | cut -d. -f1).$(echo %(version) | cut -d. -f2).pc %(installroot)/%(libdir)/pkgconfig/wlroots.pc
packages    :
    - "%(name)":
        paths:
            - /usr/lib*/*.so
