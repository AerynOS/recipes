name        : winetricks
version     : "20260125"
release     : 2
upstreams   :
    - https://github.com/Winetricks/winetricks/archive/refs/tags/20260125.tar.gz : 2890bd9fbbade4638e58b4999a237273192df03b58516ae7b8771e09c22d2f56
homepage    : https://github.com/Winetricks/winetricks/
license     : LGPL-2.1-or-later
summary     : Winetricks package manager
description : |
    Winetricks is an easy way to work around problems in Wine
rundeps     :
    - binary(cabextract)
    - binary(perl)
    - binary(sha256sum)
    - binary(unzip)
    - binary(wget)
    - binary(wine)
    - binary(xdg-open)
    - binary(zenity)
install     : |
    %make_install
