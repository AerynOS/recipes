name        : wayfreeze
version     : "0.2.0"
release     : 1
homepage    : https://github.com/Jappie3/wayfreeze
upstreams   :
  - https://github.com/Jappie3/wayfreeze/archive/refs/tags/0.2.0.tar.gz : 9ab941cbd242f82a7ff807c573e23f5f0576c2815a8a493581a9037a0d754bb6
summary     : Tool to freeze the screen of a Wayland compositor
description : |
  A small CLI tool to freeze the screen of a wlroots compositor, this can be useful to, for example, take a screenshot. Supports multiple monitors & fractional scaling.
license     : 
  - AGPL-3.0-or-later
  - AGPL-3.0-only
networking  : true
builddeps   :
  - pkgconfig(xkbcommon)
setup       : |
  %cargo_fetch
build       : |
  %cargo_build
install     : |
  %cargo_install
