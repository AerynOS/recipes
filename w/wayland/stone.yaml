name        : wayland
version     : "1.25.0"
release     : 9
homepage    : https://wayland.freedesktop.org
upstreams   :
    - https://gitlab.freedesktop.org/wayland/wayland/-/releases/1.25.0/downloads/wayland-1.25.0.tar.xz : c065f040afdff3177680600f249727e41a1afc22fccf27222f15f5306faa1f03
summary     : Modern protocol which replaces X11
description : |
    Wayland is a replacement for the X11 window system protocol and architecture with the aim to be easier to develop, extend, and maintain.

    Wayland is the language (protocol) that applications can use to talk to a display server in order to make themselves visible and get input from the user (a person). A Wayland server is called a "compositor". Applications are Wayland clients.
license     : MIT
builddeps   :
    - binary(dot)
    - binary(doxygen)
    - binary(nm)
    - binary(xmlto)
    - binary(xsltproc)
    - pkgconfig32(expat)
    - pkgconfig32(libffi)
    - pkgconfig32(libxml-2.0)
    # mdbook for docs
emul32      : true
setup       : |
    %meson \
        -Ddocumentation=false \
        -Dtests=false
build       : |
    %meson_build
install     : |
    %meson_install
packages    :
    - "%(name)-devel":
        paths:
            # Development tools
            - /usr/bin/
            - /usr/share/wayland/
